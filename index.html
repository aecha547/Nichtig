<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KOMMENTAR</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23050508'/%3E%3Cpath d='M8 8 L24 8 L24 20 L16 24 L8 20 Z' fill='none' stroke='%235588aa' stroke-width='2'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Caveat:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap');

:root {
  --bg-deep: #030305;
  --bg: #07070a;
  --cold-deep: #0a1218;
  --cold: #1a2a3a;
  --cold-light: #3a5a7a;
  --cold-glow: #5588aa;
  --cold-pale: #aaccdd;
  --danger-deep: #2a0808;
  --danger: #5a1515;
  --danger-glow: #cc4444;
  --white: #e0e4e8;
  --dim: #5a6a7a;
  --ghost: #2a3a4a;
  --font-crt: 'VT323', monospace;
  --font-hand: 'Caveat', cursive;
  --font-serif: 'Cormorant Garamond', serif;
  --font-body: 'EB Garamond', serif;
  --font-mono: 'Space Mono', monospace;
  --font-display: 'DM Serif Display', serif;
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { 
  height: 100%; 
  overflow: hidden; 
  background: var(--bg-deep); 
  font-family: var(--font-body);
  color: var(--white);
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  user-select: none;
  touch-action: manipulation;
}

/* NOISE & CRT */
#noise-layer {
  position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.05;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: noiseShift 0.4s steps(5) infinite;
}
@keyframes noiseShift { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-2%,-2%)} 50%{transform:translate(2%,0)} 75%{transform:translate(-1%,2%)} }

.crt-screen { position: relative; overflow: hidden; min-height: 100vh; }
.crt-screen::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 4px); pointer-events: none; z-index: 100; }
.crt-screen::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%); pointer-events: none; z-index: 101; }
.scan-bar { position: fixed; top: 0; left: 0; width: 100%; height: 12px; background: linear-gradient(180deg, transparent, rgba(85,136,170,0.08), transparent); opacity: 0.6; z-index: 102; pointer-events: none; animation: scanbar 8s linear infinite; }
@keyframes scanbar { from { top: -10%; } to { top: 110%; } }

/* LOADING */
#loading-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg-deep); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; opacity: 1; transition: opacity 2.5s var(--ease-smooth); }
#loading-overlay.hidden { opacity: 0; pointer-events: none; }
.glitch-title { font-family: var(--font-display); font-size: clamp(2rem, 6vw, 3rem); color: var(--cold-glow); letter-spacing: 6px; text-shadow: 0 0 40px var(--cold); text-align: center; margin-top: 20px; animation: titlePulse 4s infinite; }
@keyframes titlePulse { 0%,100%{opacity:0.7; filter: drop-shadow(0 0 10px var(--cold-glow))} 50%{opacity:1; filter: drop-shadow(0 0 30px var(--cold-pale))} }
.boot-text { color: var(--cold-light); font-family: var(--font-crt); font-size: clamp(13px, 2.2vw, 15px); margin-top: 40px; text-align: left; width: min(380px, 85vw); line-height: 2.2; min-height: 160px; white-space: pre-wrap; }
.boot-cursor { display: inline-block; width: 10px; height: 1.2em; background: var(--cold-light); vertical-align: text-bottom; margin-left: 3px; animation: blink 0.9s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }
.tap-hint { color: var(--dim); font-family: var(--font-crt); font-size: 14px; margin-top: 20px; letter-spacing: 2px; animation: blink 2s infinite; }

/* HEADER */
.header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; background: linear-gradient(180deg, rgba(2,2,4,0.95), transparent); pointer-events: none; }
.header > * { pointer-events: auto; }
.tape-label { background: linear-gradient(180deg, #1a2a3a, #0a1018); color: var(--cold-pale); padding: 6px 16px; font-family: var(--font-crt); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; border: 1px solid #3a5a7a; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }

/* AUDIO BTN */
.audio-btn { position: fixed; top: 14px; right: 14px; z-index: 200; background: rgba(0,0,0,0.75); border: 1px solid #2a3a4a; border-radius: 6px; color: var(--dim); font-family: var(--font-crt); font-size: 12px; padding: 6px 14px; cursor: pointer; transition: all 0.5s var(--ease-smooth); backdrop-filter: blur(4px); }
.audio-btn.on { color: var(--cold-glow); border-color: var(--cold-glow); box-shadow: 0 0 16px rgba(85,136,170,0.2); }

/* MAIN */
.main { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 100px 24px 180px; pointer-events: none; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; scroll-behavior: smooth; }
.main::-webkit-scrollbar { display: none; }

/* NARRATOR / ARCHIVIST */
.archivar-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 40px; opacity: 0; transform: translateY(-20px); transition: all 1.2s var(--ease-smooth); pointer-events: auto; }
.archivar-container.show { opacity: 1; transform: translateY(0); }
.archivar-container.hide { opacity: 0; transform: translateY(-20px); }
.archivar-glow { width: 140px; height: 140px; background: radial-gradient(circle, rgba(85,136,170,0.15) 0%, transparent 70%); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: archGlow 5s infinite; }
@keyframes archGlow { 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.05);opacity:1} }
.archivar-text { font-family: var(--font-serif); font-size: clamp(1.1rem, 2.5vw, 1.3rem); color: var(--cold-pale); text-align: center; max-width: 440px; line-height: 2; min-height: 3.5em; }
.archivar-text .whisper { font-style: italic; opacity: 0.6; }
.archivar-text .highlight { color: var(--white); font-weight: 500; }

/* SCENE */
.scene { max-width: 560px; width: 100%; text-align: center; pointer-events: none; padding-bottom: 60px; }
.scene p { font-family: var(--font-serif); font-size: clamp(1.1rem, 2.8vw, 1.35rem); font-weight: 300; line-height: 2.2; color: var(--white); margin-bottom: 25px; opacity: 0; transform: translateY(15px); transition: all 1.2s var(--ease-smooth); }
.scene p.show { opacity: 1; transform: translateY(0); }
.scene .narrator { color: var(--dim); font-style: italic; }
.scene .him { color: var(--cold-pale); }
.scene .mia { color: var(--white); font-style: italic; }
.scene .horror { color: var(--danger-glow); text-shadow: 0 0 20px rgba(204,68,68,0.4); letter-spacing: 1px; }
.scene .chat-bubble { background: rgba(26,42,58,0.4); border-left: 2px solid var(--cold-glow); padding: 14px 22px; text-align: left; font-family: var(--font-mono); font-size: 0.9em; border-radius: 0 8px 8px 0; margin: 30px auto; color: var(--cold-pale); max-width: 480px; }
.scene .chat-bubble.deleted { background: rgba(42,8,8,0.4); border-left-color: var(--danger-glow); color: var(--dim); text-decoration: line-through; }
.scene .chat-bubble.her { background: rgba(30,40,40,0.4); border-left: 2px solid #aaddaa; color: #ccddcc; margin-left: auto; margin-right: 0; text-align: right; border-radius: 8px 0 0 8px; }

/* CHOICES */
.choices { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 16px; opacity: 0; transform: translateY(20px); transition: all 1.2s 0.3s var(--ease-smooth); margin-top: 20px; padding-bottom: 120px; pointer-events: auto; }
.choices.show { opacity: 1; transform: translateY(0); }
.choice { width: 100%; padding: 20px 26px; background: linear-gradient(145deg, rgba(10,16,24,0.9), rgba(5,8,12,0.95)); border: 1px solid rgba(85,136,170,0.3); border-radius: 8px; color: var(--white); font-family: var(--font-serif); font-size: 1.15rem; text-align: left; cursor: pointer; transition: all 0.4s var(--ease-smooth); position: relative; overflow: hidden; }
.choice::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(85,136,170,0.1), transparent); transform: translateX(-100%); transition: transform 0.6s; }
.choice:hover:not(:disabled)::before { transform: translateX(100%); }
.choice:hover:not(:disabled) { border-color: var(--cold-glow); transform: translateX(6px); box-shadow: 0 4px 25px rgba(26,42,58,0.4); }
.choice:disabled { opacity: 0.3; cursor: default; }
.choice.selected { border-color: var(--cold-pale); background: rgba(26,42,58,0.3); transform: translateX(0); }

/* HUD */
.hud { position: fixed; bottom: 24px; right: 24px; z-index: 50; opacity: 0; transition: opacity 1.5s; pointer-events: none; }
.hud.show { opacity: 1; }
.stat-box { background: rgba(5,8,12,0.85); border: 1px solid #1a2a3a; padding: 10px 16px; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; width: 180px; backdrop-filter: blur(4px); }
.stat-label { font-family: var(--font-crt); font-size: 11px; color: var(--dim); letter-spacing: 2px; }
.stat-val { font-family: var(--font-mono); font-size: 12px; color: var(--cold-glow); transition: color 0.5s; }

/* ENDING SCREEN */
.ending-screen { position: fixed; inset: 0; z-index: 500; background: var(--bg-deep); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 3s; padding: 20px; text-align: center; }
.ending-screen.active { opacity: 1; pointer-events: auto; }
.ending-title { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3rem); color: var(--cold-glow); margin-bottom: 24px; letter-spacing: 4px; }
.ending-title.horror { color: var(--danger-glow); text-shadow: 0 0 30px rgba(204,68,68,0.4); }
.ending-desc { font-family: var(--font-serif); font-size: 1.25rem; color: var(--white); max-width: 540px; line-height: 1.9; margin-bottom: 45px; opacity: 0.9; }
.ending-btn { padding: 14px 28px; background: transparent; border: 1px solid var(--dim); color: var(--white); font-family: var(--font-crt); font-size: 1rem; cursor: pointer; transition: all 0.4s; letter-spacing: 2px; border-radius: 4px; }
.ending-btn:hover { border-color: var(--cold-glow); color: var(--cold-glow); box-shadow: 0 0 20px rgba(85,136,170,0.2); }

/* FX */
#flash { position: fixed; inset: 0; background: #fff; z-index: 900; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
#vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, rgba(2,2,4,0.95) 100%); z-index: 10; pointer-events: none; }

/* Continue system */
#continue-overlay { position: fixed; inset: 0; z-index: 198; cursor: pointer; display: none; background: rgba(0,0,0,0.01); -webkit-tap-highlight-color: rgba(0,0,0,0); }
#continue-overlay.show { display: block; }
.continue-prompt { position: fixed; bottom: clamp(28px, 6vh, 55px); left: 50%; transform: translateX(-50%); z-index: 199; display: flex; flex-direction: column; align-items: center; gap: 10px; opacity: 0; pointer-events: none; transition: opacity 0.6s var(--ease-smooth); }
.continue-prompt.show { opacity: 1; pointer-events: auto; }
.continue-text { color: var(--cold-glow); font-family: var(--font-crt); font-size: 0.85rem; letter-spacing: 3px; animation: promptPulse 3s ease-in-out infinite; text-shadow: 0 0 20px rgba(85,136,170,0.3); }
@keyframes promptPulse { 0%,100%{opacity:0.4;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }
</style>
</head>
<body>

<div id="flash"></div>
<div id="vignette"></div>
<div id="noise-layer"></div>

<div class="crt-screen">
  <div class="scan-bar"></div>

  <!-- Loading -->
  <div id="loading-overlay">
    <svg width="80" height="80" viewBox="0 0 100 100" style="animation: spin 6s linear infinite; opacity: 0.8;">
      <circle cx="50" cy="50" r="40" fill="none" stroke="#1a2a3a" stroke-width="2" stroke-dasharray="10 10"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="#5588aa" stroke-width="1" stroke-dasharray="5 30"/>
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
    </svg>
    <div class="glitch-title">KOMMENTAR</div>
    <div class="boot-text" id="boot-text"></div>
    <div class="tap-hint" id="tap-hint" style="display:none">[ ZUM STARTEN TIPPEN ]</div>
  </div>

  <div class="header">
    <div class="tape-label">ARCHIV: MIA (MÜNCHEN/LEIPZIG)</div>
  </div>

  <button class="audio-btn" id="audio-btn">♪ SFX OFF</button>

  <div class="main" id="main">
    <div class="archivar-container" id="archivar">
      <div class="archivar-glow" id="sglow"></div>
      <div class="archivar-text" id="stxt"></div>
    </div>
    <div class="scene" id="scene"></div>
    <div class="choices" id="choices"></div>
  </div>

  <div class="hud" id="hud">
    <div style="font-size:10px;font-family:var(--font-crt);color:var(--dim);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase">Verbindungsstatus</div>
    <div class="stat-box"><span class="stat-label">REALITÄT</span><span class="stat-val" id="val-real">20%</span></div>
    <div class="stat-box"><span class="stat-label">AUTHENTIZITÄT</span><span class="stat-val" id="val-auth">40%</span></div>
    <div class="stat-box"><span class="stat-label">OBSESSION</span><span class="stat-val" id="val-obs">0%</span></div>
  </div>

  <!-- Continue system -->
  <div id="continue-overlay"></div>
  <div class="continue-prompt" id="continue-prompt">
    <div class="continue-text">WEITER</div>
  </div>

  <!-- Ending -->
  <div class="ending-screen" id="ending">
    <div class="ending-title" id="end-title">ENDE</div>
    <div class="ending-desc" id="end-desc"></div>
    <button class="ending-btn" onclick="location.reload()">ERNEUT LESEN</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

let State = {
  reality: 20,
  authenticity: 40,
  obsession: 0,
  flags: new Set()
};

const Snd = {
  ctx: null, master: null, on: false,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.5;
    this.master.connect(this.ctx.destination);
  },
  resume() { if(this.ctx?.state==='suspended') this.ctx.resume(); },
  _osc(f, d, t='sine', v=0.05, delay=0) {
    if(!this.ctx || !this.on) return;
    const time = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = t; o.frequency.value = f;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(v, time + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, time + d);
    o.connect(g); g.connect(this.master);
    o.start(time); o.stop(time + d + 0.1);
  },
  _noise(d, v=0.05) {
    if(!this.ctx || !this.on) return;
    const sr=this.ctx.sampleRate, len=sr*d|0, buf=this.ctx.createBuffer(1,len,sr), data=buf.getChannelData(0);
    for(let i=0;i<len;i++) data[i]=(Math.random()*2-1)*Math.pow((1-i/len),2);
    const s=this.ctx.createBufferSource(), g=this.ctx.createGain();
    s.buffer=buf; g.gain.setValueAtTime(v, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+d);
    s.connect(g); g.connect(this.master); s.start();
  },
  type() { this._osc(600+Math.random()*200, 0.02, 'triangle', 0.015); },
  click() { this._osc(300, 0.08, 'sine', 0.04); this._osc(450, 0.08, 'sine', 0.03, 0.02); },
  select() { this._osc(250, 0.15, 'sine', 0.05); this._osc(350, 0.15, 'sine', 0.04, 0.05); },
  drone() { this._osc(55, 4, 'sawtooth', 0.03); },
  glitch() { this._noise(0.15, 0.1); this._osc(90, 0.1, 'square', 0.04); },
  delete() { this._noise(0.6, 0.15); this._osc(40, 1.2, 'sawtooth', 0.08); },
  heartbeat() { this._osc(45, 0.2, 'sine', 0.08); this._osc(45, 0.2, 'sine', 0.06, 0.3); },
  ensure() { this.init(); this.resume(); if(!this.on) { this.on=true; $('audio-btn').classList.add('on'); } },
  toggle() { this.init(); this.resume(); this.on=!this.on; $('audio-btn').classList.toggle('on', this.on); }
};

$('audio-btn').addEventListener('click', () => Snd.toggle());

const Archivar = {
  svg() {
    return `<svg width="120" height="120" viewBox="0 0 120 120">
      <ellipse cx="60" cy="78" rx="36" ry="28" fill="#1a2a3a"/>
      <ellipse cx="38" cy="70" rx="12" ry="10" fill="#2a3a4a"/>
      <ellipse cx="82" cy="70" rx="12" ry="10" fill="#2a3a4a"/>
      <ellipse cx="60" cy="35" rx="20" ry="16" fill="#0a1218"/>
      <circle cx="50" cy="32" r="1.5" fill="#aaccdd"/>
      <circle cx="70" cy="32" r="1.5" fill="#aaccdd"/>
      <line x1="56" y1="44" x2="64" y2="44" stroke="#aaccdd" stroke-width="1.5" opacity="0.8"/>
    </svg>`;
  },
  show() { $('sglow').innerHTML = this.svg(); $('archivar').classList.add('show'); },
  hide() { $('archivar').classList.remove('show'); },
  async say(txt) {
    const el = $('stxt'); el.innerHTML = '';
    for(let i=0; i<txt.length; i++) {
      if(txt[i]==='<') { const j=txt.indexOf('>',i); el.innerHTML+=txt.substring(i,j+1); i=j; }
      else { el.innerHTML+=txt[i]; Snd.type(); await sleep(35); }
    }
    await sleep(400);
  }
};

const UI = {
  scene: $('scene'),
  _resolver: null,
  _active: false,
  async p(html) {
    const el = document.createElement('p'); el.innerHTML = html;
    this.scene.appendChild(el);
    requestAnimationFrame(() => { el.classList.add('show'); el.scrollIntoView({behavior:'smooth', block:'end'}); });
    await sleep(900);
  },
  async chat(text, sender='him', deleted=false) {
    const el = document.createElement('div');
    el.className = 'chat-bubble' + (deleted ? ' deleted' : '') + (sender==='mia' ? ' her' : '');
    el.innerHTML = text;
    this.scene.appendChild(el);
    requestAnimationFrame(() => { el.scrollIntoView({behavior:'smooth', block:'end'}); });
    Snd.click();
    await sleep(900);
  },
  clear() { this.scene.innerHTML=''; $('choices').innerHTML=''; $('choices').classList.remove('show'); },
  updateHUD() {
    const r = $('val-real'), a = $('val-auth'), o = $('val-obs');
    r.textContent = State.reality + '%';
    a.textContent = State.authenticity + '%';
    o.textContent = State.obsession + '%';
    
    if(State.reality < 30) r.style.color = 'var(--dim)'; else r.style.color = 'var(--cold-glow)';
    if(State.authenticity < 30) a.style.color = 'var(--danger-glow)'; else a.style.color = 'var(--cold-glow)';
    if(State.obsession > 60) o.style.color = 'var(--danger-glow)'; else o.style.color = 'var(--cold-glow)';
  },
  choose(opts) {
    return new Promise(res => {
      $('choices').innerHTML='';
      opts.forEach(o => {
        const b = document.createElement('button'); b.className='choice'; 
        b.innerHTML = o.text;
        if(o.preview) b.innerHTML += `<span style="display:block;font-size:0.8rem;color:var(--dim);margin-top:6px;font-family:var(--font-hand)">${o.preview}</span>`;
        
        b.onmouseenter = () => Snd.click();
        b.onclick = () => {
          Snd.select();
          document.querySelectorAll('.choice').forEach(x=>x.disabled=true);
          b.classList.add('selected');
          if(o.r) State.reality = clamp(State.reality + o.r, 0, 100);
          if(o.a) State.authenticity = clamp(State.authenticity + o.a, 0, 100);
          if(o.o) State.obsession = clamp(State.obsession + o.o, 0, 100);
          if(o.f) State.flags.add(o.f);
          this.updateHUD();
          setTimeout(() => res(o.id), 800);
        };
        $('choices').appendChild(b);
      });
      $('choices').classList.add('show');
      setTimeout(()=>$('choices').scrollIntoView({behavior:'smooth', block:'end'}), 100);
    });
  },
  waitClick() {
    return new Promise(resolve => {
      setTimeout(() => {
        this._resolver = resolve;
        $('continue-prompt').classList.add('show');
        $('continue-overlay').classList.add('show');
        this._active = true;
      }, 200);
    });
  },
  _handleTap() {
    if(!this._active || !this._resolver) return;
    const fn = this._resolver;
    this._resolver = null;
    $('continue-prompt').classList.remove('show');
    $('continue-overlay').classList.remove('show');
    this._active = false;
    Snd.click();
    fn();
  }
};

['click','touchend'].forEach(e => {
  $('continue-overlay').addEventListener(e, ev=>{ ev.preventDefault(); ev.stopPropagation(); UI._handleTap(); },{passive:false});
});
document.addEventListener('click', e => {
  if(e.target.closest('.choice, .audio-btn')) return;
  UI._handleTap();
});

async function flash(color='#fff') {
  $('flash').style.background=color; $('flash').style.opacity=1;
  await sleep(60); $('flash').style.opacity=0;
}

async function boot() {
  const bt = $('boot-text');
  await sleep(1000);
  const lines =["> SYSTEM INIT... OK", "> LADE EXISTENZ-PROTOKOLL: MIA", "> VERBINDUNG: MÜNCHEN -> LEIPZIG", "> WARNUNG: PHANTOM-DATEN ENTDECKT", "> BEREIT."];
  for(let l of lines) {
    for(let c of l) { bt.innerHTML+=c; await sleep(15); }
    bt.innerHTML+='\\n'; await sleep(200);
  }
  bt.innerHTML+='<span class="boot-cursor"></span>';
  $('tap-hint').style.display = 'block';
  
  await new Promise(r => {
    const start = () => { Snd.ensure(); document.removeEventListener('click', start); r(); };
    document.addEventListener('click', start);
  });
  
  $('loading-overlay').classList.add('hidden');
  Snd.drone();
  $('hud').classList.add('show');
  UI.updateHUD();
  story();
}

async function story() {
  await sleep(1000);
  Archivar.show();
  await Archivar.say("Ein Mann, der das Leben kommentiert, aber nie lebt.");
  await Archivar.say("Trifft die eine Person, für die es sich lohnt, ins Bild zu treten...");
  await Archivar.say("Und löscht sich dann so vollständig aus, dass der einzige Beweis seiner Existenz <span class='highlight'>die Leere ist, die er hinterlässt.</span>");
  Archivar.hide(); await sleep(800);

  // ACT 1
  await UI.p("<span class='narrator'>Du bist Mia. München. 2 Uhr nachts. Das Licht deines Bildschirms ist die einzige Sonne, die du seit Tagen gesehen hast.</span>");
  await sleep(500);
  await UI.p("Er lebt in Leipzig. 400 Kilometer entfernt. Sagt er zumindest.");
  await sleep(500);
  await UI.chat("<i>Audio_Message_01.m4a (0:14)</i><br><br>Er spricht Deutsch. Gebrochen. Zögerlich. Es klingt, als würde er jedes Wort einzeln aus Stein meißeln, nur für dich.");
  
  let c = await UI.choose([
    {id:'a', text:"Korrigiere seine Grammatik.", preview:"Distanz bewahren. Du bleibst die Lehrerin.", r:-10, a:-10, o:0},
    {id:'b', text:"Antworte auf Englisch.", preview:"Nimm ihm die Maske ab. Fordere Realität.", r:20, a:20, o:0, f:'english'},
    {id:'c', text:"Sag ihm, dass seine Stimme beruhigend ist.", preview:"Öffne die Tür. Zeige Verletzlichkeit.", r:0, a:-10, o:10, f:'intimacy'}
  ]);
  
  UI.clear(); Snd.drone();
  if(c==='a') {
    await UI.p("<span class='narrator'>Du bleibst die Lehrerin. Er bleibt der Schüler. Die Sprachbarriere schützt ihn vor sich selbst.</span>");
  } else if(c==='b') {
    await UI.p("<span class='narrator'>Du schreibst auf Englisch. Die nächste Nachricht dauert 40 Minuten. Du hast seine sichere Wand eingerissen. Er fühlt sich entblößt.</span>");
  } else {
    await UI.p("<span class='narrator'>Er tippt lange. Löscht es. Tippt wieder. Das erste Mal, dass du ihn aus der Fassung bringst.</span>");
    await UI.chat("danke. ich... übe noch.");
  }
  await UI.waitClick();

  UI.clear();
  await UI.p("Monate vergehen. Er wird zu einer Konstante. Ein Geist in deinem Telefon, der mehr Gewicht hat als die echten Menschen um dich herum.");
  await UI.p("Eines Nachts erzählt er vom <i>Café Grundmann</i> in Leipzig. Vom Regen an den Fenstern dort. Und dass er wünscht, du wärst da.");
  
  c = await UI.choose([
    {id:'a', text:"'Ich komme dich besuchen.'", preview:"Mache das Virtuelle physisch.", r:30, a:10, o:0, f:'visit'},
    {id:'b', text:"'Eines Tages trinken wir dort Kaffee.'", preview:"Ein sicheres Versprechen für ein 'irgendwann'.", r:0, a:0, o:10},
    {id:'c', text:"'Schick mir ein Foto von dir dort.'", preview:"Verlange Beweise.", r:20, a:20, o:0, f:'proof'}
  ]);

  UI.clear(); Snd.drone();
  if(c==='a') {
    await UI.p("<span class='narrator'>Die Stille, die darauf folgt, ist ohrenbetäubend. Du hast gedroht, ihn real zu machen. Eine Bedrohung, die er nicht aushalten kann.</span>");
  } else if(c==='b') {
    await UI.p("<span class='narrator'>'Eines Tages' ist ein Ort, an dem Geister sicher sind. Er stimmt zu. Das Konstrukt hält. Vorerst.</span>");
  } else {
    await UI.p("<span class='narrator'>Er schickt ein Foto. Aber es ist nur die Kaffeetasse. Kein Gesicht. Keine Spiegelung im Fenster. Perfekt framiert, um niemanden zu zeigen.</span>");
  }
  await UI.waitClick();

  // THE VANISHING
  UI.clear();
  Snd.heartbeat();
  await UI.p("Ihr sprecht stundenlang. Die Nähe wird spürbar, fast physisch. Er sagt Dinge, die zu wahr sind, um erfunden zu sein.");
  await sleep(1000);
  
  Snd.glitch(); flash('#5588aa');
  await UI.p("<span class='narrator' style='font-family:var(--font-mono); color:var(--cold-glow)'>[ DREI WOCHEN SPÄTER ]</span>");
  await sleep(1000);
  await UI.p("Du öffnest den Chat, um ihm einen guten Morgen zu wünschen.");
  await sleep(800);
  await UI.chat("[Dieser Nutzer existiert nicht mehr]", 'him', true);
  Snd.delete(); flash('#cc4444');
  
  await UI.p("<span class='horror'>Er ist weg.</span>");
  await sleep(800);
  await UI.p("Kein Streit. Kein Abschied. Er hat nicht nur die App gelöscht. Er hat seine digitale Existenz demontiert. Die Nachrichten sind da, aber sie lesen sich wie Briefe von einem Geist.");
  await UI.waitClick();

  UI.clear();
  Archivar.show();
  await Archivar.say("Die meisten Menschen gehen durch die Tür.");
  await Archivar.say("Er hat das ganze Gebäude abgerissen.");
  await Archivar.say("Die Frage ist nicht, warum er gegangen ist.");
  await Archivar.say("Die Frage ist: <span class='highlight'>Was tust du jetzt?</span>");
  Archivar.hide(); await sleep(800);

  // THE SEARCH (Stalking Arc)
  await UI.p("<span class='narrator'>Die Abwesenheit von Beweisen ist eine eigene Provokation. Wenn er Fingerabdrücke hinterlassen hätte, könntest du trauern. Aber Nichts ist eine Einladung zu suchen.</span>");
  
  c = await UI.choose([
    {id:'a', text:"Suche auf Google Maps nach dem Café.", preview:"Vielleicht hat er eine Bewertung hinterlassen. Vielleicht sieht man ihn auf Street View.", r:0, a:0, o:40, f:'stalking'},
    {id:'b', text:"Suche nach seinem Schreibstil in anderen Foren.", preview:"Menschen ändern ihre Namen, aber nicht ihre Syntax.", r:15, a:0, o:35, f:'stalking'},
    {id:'c', text:"Lass ihn los.", preview:"Er wollte gehen. Das musst du akzeptieren.", r:-20, a:0, o:-30, f:'letgo'}
  ]);

  UI.clear(); Snd.drone();
  
  if(State.has('letgo')) {
    await UI.p("Du legst das Telefon weg. Du akzeptierst die Lücke, die er hinterlassen hat.");
    await UI.waitClick();
    endGame(6); return;
  }

  await UI.p("<span class='narrator'>Du fängst an zu graben. Du wirst selbst zum Geist. Du durchkämmst die digitale Stadt Leipzig, als wäre es ein Tatort.</span>");
  await sleep(1000);
  await UI.p("Nächte vergehen. Dann findest du es. Ein obskures Forum für Sprache und Isolation. Ein Eintrag, drei Jahre alt. Gleiche Syntax. Gleiche gebrochene Poesie, bevor er sie auf Deutsch übersetzte.");
  await sleep(1000);
  
  await UI.chat("<i>'Wie beschreibt man ein Leben in einer Stadt, in der man nie war, so dass es für jemanden anderen echt klingt? Ich studiere Google Street View stundenlang.'</i>", 'him');
  
  Snd.glitch(); flash('#cc4444');
  await UI.p("<span class='horror'>Er war nie im Café Grundmann. Er war nie in Leipzig.</span>");
  await UI.p("Die Wohnung, die Arbeit, die Regentage... es war eine Architektur aus Pixeln und Recherche. Gebaut, um dir das Gefühl von Realität zu geben, ohne das Risiko, real zu sein.");
  await UI.waitClick();

  UI.clear();
  await UI.p("Die Täuschung ist so total, dass sie fast wieder aufrichtig wird. Jemand hat hunderte Stunden investiert, um für dich ein Leben zu erfinden.");
  
  c = await UI.choose([
    {id:'a', text:"Er war ein manipulativer Lügner.", preview:"Es war alles eine kalte Konstruktion.", r:-10, a:-30, o:20},
    {id:'b', text:"Er war einfach nur grenzenlos einsam.", preview:"Er hat sich ein Leben gebaut, um deines berühren zu dürfen.", r:10, a:20, o:10},
    {id:'c', text:"Wer bin ich geworden, dass ich das herausgefunden habe?", preview:"Du beobachtest ihn jetzt genauso, wie er dich beobachtet hat.", r:0, a:0, o:40, f:'mirror'}
  ]);

  UI.clear();
  await sleep(1000);
  
  if(State.obsession >= 70 || State.has('mirror')) {
    endGame(9); return;
  }
  if(State.authenticity < 40) {
    endGame(7); return;
  }
  endGame(1);
}

function endGame(type) {
  $('ending').classList.add('active');
  const t = $('end-title'), d = $('end-desc');
  
  if(type === 6) {
    t.textContent = "ENDE: NICHTS";
    d.innerHTML = "Es gibt keinen Abschluss. Er ist weg. Du erfährst nie warum. Du lebst dein Leben weiter.<br><br><span style='color:var(--dim)'>Die realistischste aller Reaktionen. Und die am schwersten zu ertragende.</span>";
  } else if(type === 7) {
    t.textContent = "ENDE: DAS WAR NIE ICH";
    t.classList.add('horror');
    d.innerHTML = "Du hast ein Phantom geliebt. Die Person, die zuhörte, die in der Nacht schrieb... sie existierte nicht.<br><br>Er hat sie für dich konstruiert, weil es das Nächste war, was er je dem Gefühl von Echtheit gekommen ist. Du kannst nicht um jemanden trauern, der sagt, er habe nie existiert.";
  } else if(type === 9) {
    t.textContent = "ENDE: KOMMENTATORIN";
    d.innerHTML = "Du hörst nicht auf zu suchen, nicht weil du Frieden willst, sondern weil du seine Perspektive gefunden hast.<br><br>Du sitzt jetzt in Cafés. Du betrachtest Fremde. Du baust Leben für sie in deinem Kopf. <span style='color:var(--cold-pale)'>Der Kommentar geht weiter.</span>";
  } else {
    t.textContent = "ENDE: ER WAR REAL";
    d.innerHTML = "Auch wenn die Kulisse eine Lüge war – die Einsamkeit war echt. Die Verbindung in jenen Nächten, die Worte, die er wählte... sie waren die einzige Wahrheit, die er zu geben hatte.<br><br><span style='color:var(--cold-glow)'>Er existierte. Zumindest für eine Weile, in den Lücken zwischen den Lügen.</span>";
  }
}

document.addEventListener('DOMContentLoaded', boot);

</script>
