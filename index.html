<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#020204">
<title>KOMMENTAR — Ein Spuk in der Realität</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020204;--c:#8a9bae;--c-dim:#4a5a6e;--c-bright:#cfe8ff;
  --c-ghost:#7a8b9e;--gold:#b89b5f;--red:#8b2a3a;--red-dim:#662035;
  --font-crt:'VT323',monospace;--font-serif:'Cormorant Garamond',serif;
  --font-title:'Cinzel',serif;
  --ease-expo:cubic-bezier(0.16,1,0.3,1);--ease-io:cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--c);cursor:none;touch-action:none;font-family:var(--font-crt)}

/* ─── CURSOR ─── */
#cur{position:fixed;top:0;left:0;width:16px;height:16px;border:1.5px solid rgba(200,220,240,.55);border-radius:50%;pointer-events:none;z-index:999999;mix-blend-mode:difference;transform:translate(-50%,-50%);transition:width .18s,height .18s,background .18s,border-color .18s}
#cur::after{content:'';position:absolute;inset:0;margin:auto;width:4px;height:4px;background:rgba(207,232,255,.8);border-radius:50%}
#cur.big{width:28px;height:28px;background:rgba(207,232,255,.06);border-color:var(--c-bright)}
#cur.off{opacity:0}

/* ─── KEYFRAMES ─── */
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.85}}
@keyframes blink{50%{opacity:0}}
@keyframes fdIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes breathe{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.75;transform:scale(1.025)}}
@keyframes scanbar{from{top:-5%}to{top:106%}}
@keyframes drift{0%{top:-3%}100%{top:103%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes stIn{from{opacity:0;transform:translate(-50%,-50%) scale(.93)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes tapeIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}

/* ─── VHS PARTICLES BG ─── */
#vhsBg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ─── GLITCH SYSTEM ─── */
#glitch{position:fixed;inset:0;z-index:9990;pointer-events:none}
#tear{position:fixed;inset:0;z-index:9989;background:#000;opacity:0;pointer-events:none}
#tear.on{animation:tearAnim .12s steps(2) forwards}
@keyframes tearAnim{0%{opacity:1;clip-path:inset(37% 0 56% 0)}50%{clip-path:inset(41% 0 52% 0);transform:translateX(6px)}100%{opacity:0}}
#chroma{position:fixed;inset:0;z-index:9988;pointer-events:none;opacity:0;mix-blend-mode:screen}
#chroma.on{animation:chromaAnim .16s ease-out forwards}
@keyframes chromaAnim{0%{opacity:.35;box-shadow:inset -5px 0 0 rgba(136,170,204,.18),inset 5px 0 0 rgba(170,136,100,.12)}100%{opacity:0}}

/* ─── PROLOGUE ─── */
#pro{
  position:fixed;inset:0;z-index:10000;background:#010102;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity 1.8s var(--ease-io);cursor:pointer;
  padding:clamp(20px,5vw,60px)
}
#pro.vis{opacity:1}
#pro.gone{opacity:0;pointer-events:none;transition-duration:2.2s}

.pro-ghost{
  width:clamp(55px,14vw,90px);height:clamp(72px,18vw,116px);
  margin-bottom:clamp(16px,4vh,40px);opacity:0;
  filter:drop-shadow(0 0 45px rgba(138,155,174,.3));
  animation:float 9s ease-in-out infinite;
  transition:opacity 3.5s ease
}
.pro-ghost.vis{opacity:1}

.pro-lines{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:20px}
.pro-line{
  position:absolute;width:min(90%,700px);text-align:center;
  font-family:var(--font-serif);font-size:clamp(1.1rem,3.8vw,2.2rem);
  color:var(--c-ghost);line-height:1.75;
  opacity:0;filter:blur(12px);
  transform:translateY(22px) scale(.97);
  transition:opacity 2.8s ease,filter 2.8s ease,transform 2.8s var(--ease-expo)
}
.pro-line.show{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}
.pro-line.out{opacity:0;transform:translateY(-16px) scale(.98);filter:blur(7px);transition:opacity 1.3s ease,filter 1.3s ease,transform 1.3s var(--ease-io)}
.pro-line em{font-style:italic;color:var(--c-bright)}
.pro-line .void{color:#3a4a5e;opacity:.6;font-style:italic}
.pro-line .ache{color:#b8886a;font-style:italic}
.pro-line .sub{font-size:.82em;color:#5a6a7e}

.pro-btn{
  font-family:var(--font-crt);font-size:clamp(.95rem,2.2vw,1.55rem);
  color:var(--c-dim);letter-spacing:5px;border:1px solid var(--c-dim);
  padding:16px 32px;background:transparent;cursor:none;
  transition:all .5s;animation:pulse 2.5s infinite;outline:none;
  margin-top:clamp(28px,7vh,65px)
}
.pro-btn:hover{color:var(--c-bright);border-color:var(--c-bright);text-shadow:0 0 14px rgba(207,232,255,.5)}

.pro-title{
  position:absolute;font-family:var(--font-title);
  font-size:clamp(2.5rem,8.5vw,6rem);font-weight:700;
  letter-spacing:.35em;color:#fff;
  text-shadow:0 0 40px rgba(255,255,255,.3),0 0 80px rgba(184,155,95,.22);
  opacity:0;transform:scale(1.12) translateY(8px);
  transition:transform 5.5s cubic-bezier(.1,.8,.2,1),opacity .6s
}
.pro-title.slam{opacity:1;transform:scale(1) translateY(0)}

.pro-mark{
  position:absolute;font-family:var(--font-crt);
  font-size:clamp(2.5rem,10vw,5rem);color:var(--red);
  opacity:0;transform:rotate(-19deg);letter-spacing:8px;
  pointer-events:none;text-transform:uppercase;
  border:2.5px solid var(--red);padding:4px 20px
}
.pro-mark.flash{animation:markFlash .9s ease-out forwards}
@keyframes markFlash{0%{opacity:0;transform:rotate(-19deg) scale(.7)}18%{opacity:.14;transform:rotate(-19deg) scale(1.03)}100%{opacity:.04;transform:rotate(-19deg) scale(1)}}

/* ─── STATION ─── */
#station{
  display:none;
  grid-template-columns:1fr minmax(210px,310px);gap:clamp(14px,3vw,28px);
  width:min(96vw,1200px);height:min(90vh,800px);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0
}
#station.on{display:grid;animation:stIn 2s var(--ease-expo) forwards}

/* ─── TV UNIT ─── */
.tv{
  background:linear-gradient(145deg,#111118,#08080d);border-radius:22px;
  border:1.5px solid #191924;padding:clamp(14px,2.8vw,24px);
  box-shadow:inset 0 0 90px rgba(0,0,0,.92),0 22px 55px rgba(0,0,0,.88),0 0 2px rgba(138,155,174,.1);
  display:flex;flex-direction:column;position:relative;z-index:2
}
.bezel{
  flex:1;background:#010102;border-radius:14px;position:relative;overflow:hidden;
  border:2px solid #0a0a12;box-shadow:inset 0 0 55px rgba(0,0,0,1);min-height:240px;
  transition:border-color .7s,box-shadow .7s
}
.bezel.lit{border-color:rgba(138,155,174,.16);box-shadow:inset 0 0 55px rgba(0,0,0,1),0 0 28px rgba(138,155,174,.05)}

canvas#noise{position:absolute;inset:0;width:100%;height:100%;z-index:5;image-rendering:pixelated}
canvas#anim{position:absolute;inset:0;width:100%;height:100%;z-index:6;opacity:0;mix-blend-mode:screen;transition:opacity 2.2s ease;pointer-events:none}
canvas#anim.vis{opacity:.88}

.scanlines{position:absolute;inset:0;z-index:30;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.16) 2px,rgba(0,0,0,.16) 4px);pointer-events:none;opacity:.62}
.vig{position:absolute;inset:0;z-index:31;background:radial-gradient(ellipse at center,transparent 32%,rgba(0,0,0,.97) 100%);pointer-events:none}
.glare{position:absolute;inset:0;z-index:32;background:linear-gradient(130deg,rgba(255,255,255,.035) 0%,transparent 40%,transparent 62%,rgba(255,255,255,.012) 100%);pointer-events:none}
.scanbar{position:absolute;left:0;width:100%;height:5px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.03),transparent);z-index:33;pointer-events:none;animation:scanbar 7s linear infinite}
.tracker{position:absolute;left:0;width:100%;height:3px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.06),transparent);opacity:0;z-index:34;pointer-events:none;transition:opacity .3s}
.tracker.on{opacity:1;animation:drift 3.8s linear infinite}

/* OSD */
.osd{position:absolute;font-family:var(--font-crt);font-size:clamp(.9rem,2vw,1.2rem);color:var(--c-ghost);z-index:36;text-shadow:0 0 5px var(--c-ghost);opacity:.6}
#osd-ch{top:16px;left:18px}
#osd-rec{top:16px;right:18px;color:var(--red);opacity:0}
#osd-rec.on{opacity:1;animation:blink 1.1s infinite}
#osd-t{bottom:16px;right:18px;opacity:0}
#osd-t.on{opacity:.6}
#osd-q{bottom:22px;left:50%;transform:translateX(-50%);font-family:var(--font-serif);font-size:clamp(.6rem,1.4vw,.82rem);font-style:italic;opacity:0;transition:opacity 2.2s;white-space:nowrap;z-index:36;position:absolute}
#osd-q.show{opacity:.38}

/* Tape content */
#tc{
  position:absolute;inset:0;z-index:25;padding:clamp(18px,4vw,38px);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  opacity:0;transition:opacity .9s ease;
  background:rgba(1,1,2,.88);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)
}
#tc.show{opacity:1}
.tc-html{
  width:100%;height:100%;overflow-y:auto;text-align:left;
  font-family:var(--font-serif);font-size:clamp(.9rem,2.4vw,1.3rem);
  color:var(--c-bright);line-height:1.85;
  text-shadow:0 0 5px rgba(207,232,255,.2);
  scrollbar-width:thin;scrollbar-color:rgba(138,155,174,.2) transparent
}
.tc-html::-webkit-scrollbar{width:3px}
.tc-html::-webkit-scrollbar-thumb{background:rgba(138,155,174,.2);border-radius:2px}

/* Controls */
.ctrls{display:flex;align-items:center;justify-content:space-between;padding:14px 6px 0;gap:10px;flex-wrap:wrap}
.slot{
  flex:1;min-width:150px;height:36px;background:#030306;border:2px solid #111;
  border-radius:4px;box-shadow:inset 0 6px 16px rgba(0,0,0,.92);
  display:flex;align-items:center;justify-content:center;transition:all .35s
}
.slot.ov{border-color:var(--c-dim);box-shadow:inset 0 6px 16px rgba(0,0,0,.92),0 0 14px rgba(138,155,174,.22)}
.slot-txt{font-family:var(--font-crt);font-size:.82rem;letter-spacing:2.5px;color:#333;transition:color .3s}
.slot.ov .slot-txt{color:var(--c-bright);animation:pulse 1.5s infinite}
.btn{
  background:linear-gradient(180deg,#191924,#0d0d12);border:1px solid #222;
  color:#666;font-family:var(--font-crt);font-size:.82rem;letter-spacing:1.5px;
  padding:0 16px;height:36px;border-radius:4px;cursor:none;transition:all .2s
}
.btn:hover{color:#aaa;border-color:#444}
.btn:active{transform:translateY(2px)}

/* ─── RACK ─── */
.rack{
  background:linear-gradient(180deg,#0b0b10,#050509);border:1px solid #181820;
  border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:14px;
  box-shadow:inset 0 0 30px rgba(0,0,0,.8);overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:#181820 #050509
}
.rack-title{
  font-family:var(--font-crt);font-size:1rem;letter-spacing:4px;color:#444;
  text-align:center;border-bottom:1px solid #111;padding-bottom:10px
}
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:8px}
.dot{width:7px;height:7px;border-radius:50%;border:1px solid #3a4a5e;transition:all .6s}
.dot.on{background:var(--c-dim);border-color:var(--c-dim);box-shadow:0 0 7px var(--c-dim)}

/* ─── TAPES ─── */
.tape{
  background:linear-gradient(180deg,#15151e,#0a0a0e);border:1px solid #2a2a3a;
  border-radius:5px;height:88px;padding:10px;position:relative;
  box-shadow:0 5px 16px rgba(0,0,0,.65);
  transition:transform .35s var(--ease-expo),border-color .3s;
  cursor:none;flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  animation:tapeIn .6s var(--ease-expo) backwards
}
.tape:hover:not(.locked){transform:translateY(-4px) scale(1.025);border-color:#4a4a5e}
.tape::before{content:'';position:absolute;left:11%;right:11%;top:12px;height:17px;background:#030305;border-radius:3px;border:1px solid #11111a}
.t-label{background:linear-gradient(180deg,#d8d4c8,#c8c0b4);color:#111;font-family:var(--font-serif);font-weight:600;font-size:.83rem;padding:2px 8px;margin-top:28px;width:82%;text-align:center;border-radius:2px;box-shadow:inset 0 2px 3px rgba(0,0,0,.2);transform:rotate(-.4deg)}
.t-desc{font-family:sans-serif;font-size:.58rem;color:#4a5a6e;margin-top:5px;font-style:italic}
.tape.done{filter:grayscale(.45) brightness(.72)}
.tape.done::after{content:'✓';position:absolute;top:12px;right:12px;color:var(--c-bright);font-size:.9rem;text-shadow:0 0 7px var(--c-bright)}
.tape.locked{opacity:.3;pointer-events:none;filter:grayscale(1)}
.tape.secret{border-color:var(--red)}
.tape.secret .t-label{background:#111;color:var(--red);border:1px solid var(--red-dim)}

/* Ghost for drag */
.drag-g{
  position:fixed;pointer-events:none;z-index:99999;width:200px;height:82px;
  background:linear-gradient(180deg,#15151e,#0a0a0e);border:1.5px solid var(--c-dim);
  border-radius:5px;box-shadow:0 22px 45px rgba(0,0,0,.92);opacity:.88;
  transform:translate(-50%,-50%) rotate(-4deg) scale(1.06);
  display:flex;align-items:center;justify-content:center
}
.drag-g .t-label{background:linear-gradient(180deg,#d8d4c8,#c8c0b4);color:#111;padding:4px 10px;font-family:var(--font-serif);font-weight:600;border-radius:2px}

/* Final cinematic */
.final-v{text-align:center;padding:22px;max-width:100%}
.final-v h1{font-family:var(--font-title);font-size:clamp(2rem,4.5vw,3.2rem);color:var(--red);margin-bottom:28px;text-shadow:0 0 22px rgba(139,42,58,.55)}
.final-v p{font-family:var(--font-serif);font-size:clamp(1.1rem,2.2vw,1.5rem);color:var(--c-bright);opacity:0;animation:fdIn 2.2s forwards;margin-bottom:22px;line-height:1.65}
.final-v .d1{animation-delay:2s}
.final-v .d2{animation-delay:6.5s;color:var(--c-ghost);font-style:italic}
.final-v .d3{animation-delay:10.5s;font-family:var(--font-crt);font-size:clamp(1.4rem,3vw,1.85rem);letter-spacing:4px;color:#fff;text-shadow:0 0 12px #fff}

/* ─── RESPONSIVE ─── */
@media(max-width:820px){
  #station{grid-template-columns:1fr;grid-template-rows:52vh auto;padding:10px;gap:14px}
  .rack{flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:14px}
  .rack-title,.dots{display:none}
  .tape{width:160px;height:80px;flex-shrink:0}
}
@media(max-width:480px){
  .tv{padding:8px;border-radius:14px}
  .bezel{border-radius:8px;min-height:190px}
  .ctrls{flex-wrap:wrap;justify-content:center}
  .slot{width:100%;margin-top:6px}
  .tape{width:140px;height:74px}
  .t-label{font-size:.75rem}
}
</style>
</head>
<body>

<div id="cur"></div>
<canvas id="vhsBg"></canvas>
<div id="glitch"></div>
<div id="tear"></div>
<div id="chroma"></div>

<!-- PROLOGUE -->
<div id="pro">
  <svg class="pro-ghost" id="proGhost" viewBox="0 0 80 120">
    <defs>
      <radialGradient id="gG" cx="50%" cy="38%">
        <stop offset="0%" stop-color="#9aaab8" stop-opacity=".48"/>
        <stop offset="55%" stop-color="#6a7a8a" stop-opacity=".15"/>
        <stop offset="100%" stop-color="#4a5a6a" stop-opacity="0"/>
      </radialGradient>
      <filter id="gBlur"><feGaussianBlur stdDeviation="2.5"/></filter>
    </defs>
    <ellipse cx="40" cy="60" rx="28" ry="48" fill="url(#gG)" filter="url(#gBlur)" opacity=".38">
      <animate attributeName="opacity" values=".38;.58;.38" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M40 17 C27 17 19 34 19 54 C19 75 25 97 30 113 L50 113 C55 97 61 75 61 54 C61 34 53 17 40 17Z" fill="#8a9bae" opacity=".22" filter="url(#gBlur)">
      <animate attributeName="opacity" values=".22;.34;.22" dur="6s" repeatCount="indefinite"/>
    </path>
    <ellipse cx="40" cy="21" rx="9" ry="11" fill="#9aaab8" opacity=".26" filter="url(#gBlur)"/>
    <circle cx="36.5" cy="19.5" r="1.3" fill="#141420" opacity=".45"/>
    <circle cx="43.5" cy="19.5" r="1.3" fill="#141420" opacity=".45"/>
  </svg>

  <button class="pro-btn" id="btnStart">[ ZUGRIFF INITIIEREN ]</button>

  <div class="pro-lines">
    <div class="pro-line" id="pl0"></div>
    <div class="pro-line" id="pl1"></div>
    <div class="pro-line" id="pl2"></div>
    <div class="pro-line" id="pl3"></div>
    <div class="pro-line" id="pl4"></div>
  </div>

  <div class="pro-title" id="proTitle">KOMMENTAR</div>
  <div class="pro-mark" id="proMark">VERTRAULICH</div>
</div>

<!-- MAIN STATION -->
<div id="station">
  <div class="tv">
    <div class="bezel" id="bezel">
      <canvas id="noise"></canvas>
      <canvas id="anim"></canvas>
      <div class="scanlines"></div>
      <div class="vig"></div>
      <div class="glare"></div>
      <div class="scanbar"></div>
      <div class="tracker" id="tracker"></div>

      <div class="osd" id="osd-ch">AKTE-0</div>
      <div class="osd" id="osd-rec">● REC</div>
      <div class="osd" id="osd-t">▶ 00:00</div>
      <div id="osd-q"></div>

      <div id="tc"></div>
    </div>

    <div class="ctrls">
      <div class="slot" id="slot"><span class="slot-txt">▶ HIERHER ZIEHEN</span></div>
      <button class="btn" id="btnEject">⏏ EJECT</button>
      <button class="btn" id="btnAudio">♪ VOL</button>
    </div>
  </div>

  <div class="rack" id="rack">
    <div class="rack-title">ARCHIV</div>
    <div class="dots" id="dots"></div>
  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
const TAPES=[
  {id:'tape1',title:'AKTE I: Beobachter',  desc:'Die erste Sichtung.',    file:'tape1.html'},
  {id:'tape2',title:'AKTE II: Nähe',       desc:'Der Abstand schwindet.', file:'tape2.html'},
  {id:'tape3',title:'AKTE III: Verlust',   desc:'Plötzliche Leere.',      file:'tape3.html'},
  {id:'tape4',title:'AKTE IV: Suche',      desc:'Verbleibende Spuren.',   file:'tape4.html'},
  {id:'tape5',title:'???: Kommentar',      desc:'CLASSIFIED',secret:true, file:null}
];

const S={
  done:[],playing:null,dragging:null,
  audioOn:true,playStart:0,timer:null,bgmGoing:false
};

const $=id=>document.getElementById(id);
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const rnd=(a,b)=>a+Math.random()*(b-a);
const TAU=Math.PI*2;

/* ══════════════════════════════════════
   CURSOR
══════════════════════════════════════ */
const cur=$('cur');
let dragGhost=null;

document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
  if(S.dragging)moveDragGhost(e.clientX,e.clientY);
});
document.addEventListener('mousedown',()=>cur.classList.add('big'));
document.addEventListener('mouseup',()=>{cur.classList.remove('big');if(S.dragging)endDrag()});
document.addEventListener('mouseleave',()=>cur.classList.add('off'));
document.addEventListener('mouseenter',()=>cur.classList.remove('off'));

/* ══════════════════════════════════════
   VHS BACKGROUND
══════════════════════════════════════ */
(function initVHSBg(){
  const cv=$('vhsBg'),cx=cv.getContext('2d');
  let W=cv.width=innerWidth,H=cv.height=innerHeight;
  window.addEventListener('resize',()=>{W=cv.width=innerWidth;H=cv.height=innerHeight});
  const pts=Array.from({length:55},()=>({
    x:Math.random()*W,y:Math.random()*H,
    vy:rnd(.1,.55)+.08,vx:rnd(-.04,.04),
    sz:rnd(1,2.8),op:rnd(.025,.075),ph:Math.random()*TAU
  }));
  // nebula clouds
  const nebs=Array.from({length:3},()=>({
    x:Math.random()*W,y:Math.random()*H,
    vx:rnd(-.05,.05),vy:rnd(-.05,.05),
    r:rnd(85,160),ph:Math.random()*TAU
  }));
  function draw(){
    cx.fillStyle='rgba(2,2,4,.12)';cx.fillRect(0,0,W,H);
    const t=performance.now()*.001;
    nebs.forEach(n=>{
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<-n.r)n.x=W+n.r;if(n.x>W+n.r)n.x=-n.r;
      if(n.y<-n.r)n.y=H+n.r;if(n.y>H+n.r)n.y=-n.r;
      const g=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      const a=.005+.003*Math.sin(t*.3+n.ph);
      g.addColorStop(0,`rgba(138,155,174,${a})`);
      g.addColorStop(1,'transparent');
      cx.fillStyle=g;cx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);
    });
    pts.forEach(p=>{
      p.y-=p.vy;p.x+=p.vx;p.ph+=.006;
      if(p.y<-8){p.y=H+8;p.x=Math.random()*W}
      if(p.x<-8)p.x=W+8;if(p.x>W+8)p.x=-8;
      const op=p.op*(.55+.45*Math.sin(t*1.4+p.ph));
      cx.globalAlpha=op;cx.fillStyle='#8a9bae';
      cx.beginPath();cx.arc(p.x,p.y,p.sz,0,TAU);cx.fill();
    });
    cx.globalAlpha=1;
    // occasional horizontal tape line
    if(Math.random()<.018){
      const ly=Math.random()*H;
      cx.fillStyle=`rgba(138,155,174,${.006+Math.random()*.01})`;
      cx.fillRect(0,ly,W,1+Math.random()*2.5);
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════
   GLITCH ENGINE
══════════════════════════════════════ */
const Glitch={
  fire(strength){
    const gl=$('glitch');let v=strength;
    const run=()=>{
      if(v>.02){
        gl.style.background=`rgba(${Math.random()*200+55},${Math.random()*200+55},${Math.random()*200+55},${v*.12})`;
        gl.style.transform=`translate(${(Math.random()-.5)*13*v}px,${(Math.random()-.5)*13*v}px)`;
        v*=.82;requestAnimationFrame(run);
      }else{gl.style.background='transparent';gl.style.transform='none'}
    };run();
  },
  tear(){const t=$('tear');t.classList.add('on');setTimeout(()=>t.classList.remove('on'),145)},
  chroma(){const c=$('chroma');c.classList.add('on');setTimeout(()=>c.classList.remove('on'),175)},
  burst(s=1.5){
    this.fire(s);
    if(Math.random()<.55)setTimeout(()=>this.tear(),60);
    if(Math.random()<.3)setTimeout(()=>this.chroma(),80);
  }
};

/* ══════════════════════════════════════
   AUDIO ENGINE
══════════════════════════════════════ */
const Audio2={
  ctx:null,master:null,bgm:null,

  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.master=this.ctx.createGain();
    this.master.gain.value=.5;
    this.master.connect(this.ctx.destination);
    this.bgm=new window.Audio('MEMORY.mp3');
    this.bgm.loop=true;this.bgm.volume=0;this.bgm.preload='auto';
  },

  // Oppressive hollow sub-bass drone for the 10s silence in MEMORY.mp3
  voidDrone(){
    if(!this.ctx)return;const t=this.ctx.currentTime;

    // Sub-bass layer
    const sub=this.ctx.createOscillator();
    const subG=this.ctx.createGain();
    sub.type='sine';sub.frequency.setValueAtTime(42,t);
    sub.frequency.linearRampToValueAtTime(37,t+10);
    subG.gain.setValueAtTime(0,t);
    subG.gain.linearRampToValueAtTime(.9,t+2.5);
    subG.gain.linearRampToValueAtTime(.9,t+7.8);
    subG.gain.linearRampToValueAtTime(0,t+10);

    // Detuned shimmer for unease
    const lfo=this.ctx.createOscillator();
    const lfoG=this.ctx.createGain();
    lfo.type='sine';lfo.frequency.value=.12;lfoG.gain.value=4;
    lfo.connect(lfoG);lfoG.connect(sub.frequency);

    // High-end breath
    const hn=this.ctx.createOscillator();
    const hnG=this.ctx.createGain();
    hn.type='sawtooth';hn.frequency.value=1800;
    hnG.gain.setValueAtTime(0,t);
    hnG.gain.linearRampToValueAtTime(.012,t+3);
    hnG.gain.linearRampToValueAtTime(.008,t+8);
    hnG.gain.linearRampToValueAtTime(0,t+10);

    [sub,hn,lfo].forEach(o=>o.start(t));
    sub.connect(subG);subG.connect(this.master);
    hn.connect(hnG);hnG.connect(this.master);
    [sub,hn,lfo].forEach(o=>o.stop(t+10.6));
  },

  // Deep cinematic boom when title slams
  impact(){
    if(!this.ctx)return;const t=this.ctx.currentTime;
    const boom=this.ctx.createOscillator();const bG=this.ctx.createGain();
    boom.type='triangle';boom.frequency.setValueAtTime(90,t);
    boom.frequency.exponentialRampToValueAtTime(18,t+2.2);
    bG.gain.setValueAtTime(1,t);bG.gain.exponentialRampToValueAtTime(.002,t+2.2);
    boom.connect(bG);bG.connect(this.master);boom.start(t);boom.stop(t+2.3);

    const crack=this.ctx.createOscillator();const cG=this.ctx.createGain();
    crack.type='square';crack.frequency.value=900;
    cG.gain.setValueAtTime(.07,t);cG.gain.exponentialRampToValueAtTime(.001,t+.12);
    crack.connect(cG);cG.connect(this.master);crack.start(t);crack.stop(t+.15);
  },

  insert(){
    if(!this.ctx)return;const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator();const g=this.ctx.createGain();
    o.type='square';o.frequency.setValueAtTime(52,t);
    o.frequency.exponentialRampToValueAtTime(28,t+.7);
    g.gain.setValueAtTime(.11,t);g.gain.linearRampToValueAtTime(0,t+.75);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+.8);
  },

  clunk(){
    if(!this.ctx)return;const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator();const g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(130,t);
    o.frequency.exponentialRampToValueAtTime(32,t+.22);
    g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.004,t+.22);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+.3);
  },

  // BGM fade: silence runs 0-10s, melody begins ~10s — so fade in starting at 7.5s
  startBGM(){
    if(S.bgmGoing)return;S.bgmGoing=true;
    this.bgm.currentTime=0;
    this.bgm.play().then(()=>{
      const t0=Date.now();const self=this;
      const fade=()=>{
        if(!S.bgmGoing)return;
        const el=(Date.now()-t0)/1000;
        if(el<7.4){requestAnimationFrame(fade);return}
        if(self.bgm.volume<.18){self.bgm.volume=Math.min(self.bgm.volume+.0012,.18);requestAnimationFrame(fade)}
      };requestAnimationFrame(fade);
    }).catch(()=>{S.bgmGoing=false});
  },

  toggle(){
    if(!this.ctx)this.init();
    S.audioOn=!S.audioOn;
    const t=this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(t);
    this.master.gain.setValueAtTime(this.master.gain.value,t);
    this.master.gain.linearRampToValueAtTime(S.audioOn?.5:0,t+.5);
    if(this.bgm)this.bgm.volume=S.audioOn?.18:0;
    $('btnAudio').textContent=S.audioOn?'♪ VOL':'♪ MUTE';
    $('btnAudio').style.color=S.audioOn?'#aaa':'#555';
  }
};

/* ══════════════════════════════════════
   TAPE RACK
══════════════════════════════════════ */
function buildRack(){
  const rack=$('rack'),dotsEl=$('dots');
  Array.from(rack.querySelectorAll('.tape')).forEach(e=>e.remove());
  dotsEl.innerHTML='';

  const std=TAPES.filter(t=>!t.secret);
  const allDone=std.every(t=>S.done.includes(t.id));

  std.forEach(()=>{
    const d=document.createElement('div');d.className='dot';dotsEl.appendChild(d);
  });
  let dc=0;
  std.forEach(t=>{if(S.done.includes(t.id))dc++});
  Array.from(dotsEl.children).forEach((d,i)=>{if(i<dc)d.classList.add('on')});

  TAPES.forEach((tape,i)=>{
    const el=document.createElement('div');el.className='tape';
    const isDone=S.done.includes(tape.id);
    el.style.animationDelay=(i*.1)+'s';

    if(tape.secret){
      el.classList.add('secret');
      if(!allDone){
        el.classList.add('locked');
        el.innerHTML=`<div class="t-label">GESPERRT</div><div class="t-desc">Archiv unvollständig</div>`;
      }else{
        el.innerHTML=`<div class="t-label">${tape.title}</div><div class="t-desc">${tape.desc}</div>`;
        el.addEventListener('mousedown',e=>startDrag(e,tape));
      }
    }else{
      if(isDone)el.classList.add('done');
      el.innerHTML=`<div class="t-label">${tape.title}</div><div class="t-desc">${tape.desc}</div>`;
      el.addEventListener('mousedown',e=>startDrag(e,tape));
    }
    rack.appendChild(el);
  });
}

/* ══════════════════════════════════════
   DRAG & DROP
══════════════════════════════════════ */
function startDrag(e,tape){
  if(S.playing)return;
  S.dragging=tape.id;
  Audio2.clunk();
  dragGhost=document.createElement('div');
  dragGhost.className='drag-g';
  dragGhost.innerHTML=`<div class="t-label">${tape.title}</div>`;
  document.body.appendChild(dragGhost);
  moveDragGhost(e.clientX,e.clientY);
}
function moveDragGhost(x,y){
  if(!dragGhost)return;
  dragGhost.style.left=x+'px';dragGhost.style.top=y+'px';
  const sr=$('slot').getBoundingClientRect();
  const over=(x>sr.left&&x<sr.right&&y>sr.top&&y<sr.bottom);
  $('slot').classList.toggle('ov',over);
}
function endDrag(){
  const over=$('slot').classList.contains('ov');
  $('slot').classList.remove('ov');
  if(over)insertTape(S.dragging);
  S.dragging=null;
  if(dragGhost){dragGhost.remove();dragGhost=null}
}

/* ══════════════════════════════════════
   TAPE PLAYBACK
══════════════════════════════════════ */
function fmt(s){const m=0|s/60;return m+':'+(''+(0|s%60)).padStart(2,'0')}

async function insertTape(id){
  if(S.playing)return;
  S.playing=id;
  const tape=TAPES.find(t=>t.id===id);
  const idx=TAPES.indexOf(tape);

  Audio2.insert();Glitch.burst(1.6);
  $('bezel').classList.add('lit');
  $('osd-ch').textContent='AKTE-'+(idx+1);
  $('osd-rec').classList.add('on');
  $('osd-t').classList.add('on');
  $('tracker').classList.add('on');
  $('slot').querySelector('.slot-txt').textContent=tape.title;
  SceneAnim.stop();

  S.playStart=Date.now();
  S.timer=setInterval(()=>{
    $('osd-t').textContent='▶ '+fmt((Date.now()-S.playStart)/1000);
  },1000);

  const tc=$('tc');tc.innerHTML='';
  await wait(1000);

  if(tape.secret){
    tc.innerHTML=`<div class="final-v">
      <h1>KOMMENTAR</h1>
      <p class="d1">Wenn jemand dich liebt und dann jeden Beweis seiner Existenz entfernt...</p>
      <p class="d1">Wurdest du dann geliebt?</p>
      <p class="d2">— Ende des Archivs —</p>
      <p class="d3">NICHTS BLEIBT.</p>
    </div>`;
    tc.classList.add('show');
  }else{
    try{
      const r=await fetch(tape.file);
      if(!r.ok)throw 0;
      const html=await r.text();
      tc.innerHTML=`<div class="tc-html">${html}</div>`;
    }catch{
      tc.innerHTML=`<div class="final-v">
        <h1 style="color:var(--c-dim)">ARCHIV-FEHLER</h1>
        <p style="color:var(--c-ghost);font-family:var(--font-crt);font-size:1rem">VERBINDUNG ZU ${tape.file} GETRENNT.</p>
        <p style="font-style:italic;margin-top:12px">"Wir waren hier. Aber niemand erinnert sich."</p>
      </div>`;
    }
    tc.classList.add('show');
  }
}

function ejectTape(){
  if(!S.playing)return;
  Audio2.clunk();Glitch.burst(1.1);
  if(!S.done.includes(S.playing))S.done.push(S.playing);
  S.playing=null;
  clearInterval(S.timer);

  $('bezel').classList.remove('lit');
  $('osd-ch').textContent='AKTE-0';
  $('osd-rec').classList.remove('on');
  $('osd-t').classList.remove('on');
  $('osd-t').textContent='▶ 00:00';
  $('tracker').classList.remove('on');
  $('slot').querySelector('.slot-txt').textContent='▶ HIERHER ZIEHEN';

  const tc=$('tc');tc.classList.remove('show');
  setTimeout(()=>{tc.innerHTML=''},850);

  buildRack();
  SceneAnim.start();
}

/* ══════════════════════════════════════
   CRT NOISE ENGINE
══════════════════════════════════════ */
const CRT={
  cv:null,cx:null,W:0,H:0,buf:null,
  init(){
    this.cv=$('noise');this.cx=this.cv.getContext('2d',{alpha:false});
    this.resize();window.addEventListener('resize',()=>this.resize());this.draw();
  },
  resize(){
    const r=$('bezel').getBoundingClientRect();
    this.W=this.cv.width=Math.max(r.width*.5|0,1);
    this.H=this.cv.height=Math.max(r.height*.5|0,1);
    const id=this.cx.createImageData(this.W,this.H);
    const b=new Uint32Array(id.data.buffer);
    const cols=[0xFF1e1e28,0xFF1a1a22,0xFF221e2a,0xFF141420];
    for(let i=0;i<b.length;i++)b[i]=Math.random()<.055?cols[Math.random()*4|0]:0xFF050508;
    this.buf=id;
  },
  draw(){
    if(this.W&&this.H&&this.buf){
      this.cx.putImageData(this.buf,0,0);
      if(Math.random()<.055){
        const y=Math.random()*this.H|0;
        this.cx.fillStyle='rgba(255,255,255,.04)';
        this.cx.fillRect(0,y,this.W,(Math.random()*5)|0);
      }
      // occasional H shift artifact
      if(Math.random()<.012){
        const y=Math.random()*this.H|0,h=2+Math.random()*4|0;
        const shift=(Math.random()-.5)*16|0;
        this.cx.drawImage(this.cv,0,y,this.W,h,shift,y,this.W,h);
      }
    }
    requestAnimationFrame(()=>this.draw());
  }
};

/* ══════════════════════════════════════
   6 CANVAS ATMOSPHERIC SCENES
══════════════════════════════════════ */
const SceneAnim={
  cv:null,cx:null,W:0,H:0,
  active:false,raf:0,idx:0,switchAt:0,
  QUOTES:['Geistwalzer','Der Beobachter','Regengedächtnis','Die Tänzerin','Verlorene Worte','Abwesenheit'],
  dust:[],

  init(){
    this.cv=$('anim');this.cx=this.cv.getContext('2d');
    this.resize();window.addEventListener('resize',()=>this.resize());
    for(let i=0;i<20;i++)this.dust.push({
      x:Math.random(),y:Math.random(),
      vx:rnd(-.0003,.0003),vy:rnd(-.0012,-.0002),
      sz:rnd(.6,2.2),op:rnd(.03,.11),ph:Math.random()*TAU
    });
    this.start();
  },

  resize(){
    const r=$('bezel').getBoundingClientRect();
    this.W=this.cv.width=Math.max(r.width|0,1);
    this.H=this.cv.height=Math.max(r.height|0,1);
  },

  start(){
    if(this.active)return;
    this.active=true;this.cv.classList.add('vis');
    this.switchAt=performance.now();
    this.setQuote();
    const loop=n=>{if(!this.active)return;this.render(n);this.raf=requestAnimationFrame(loop)};
    this.raf=requestAnimationFrame(loop);
  },

  stop(){
    this.active=false;cancelAnimationFrame(this.raf);
    this.cv.classList.remove('vis');
    $('osd-q').classList.remove('show');
  },

  setQuote(){
    const q=$('osd-q');q.textContent=this.QUOTES[this.idx];
    q.classList.remove('show');
    setTimeout(()=>{if(this.active)q.classList.add('show')},600);
  },

  render(now){
    const dt=now-this.switchAt;
    if(dt>12000){this.idx=(this.idx+1)%6;this.switchAt=now;this.setQuote();Glitch.fire(.5)}
    let fa=1;
    if(dt<2000)fa=dt/2000;else if(dt>10000)fa=Math.max(0,(12000-dt)/2000);

    const cx=this.cx,W=this.W,H=this.H;
    cx.clearRect(0,0,W,H);
    cx.globalAlpha=fa*.38;
    this.scenes[this.idx].call(this,cx,W,H,now*.001);

    // floating dust
    cx.fillStyle='#aabbcc';
    this.dust.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.ph+=.007;
      if(p.y<-.02){p.y=1.02;p.x=Math.random()}
      if(p.x<-.02)p.x=1.02;if(p.x>1.02)p.x=-.02;
      cx.globalAlpha=p.op*(.5+.5*Math.sin(now*.001*1.5+p.ph))*fa*.35;
      cx.beginPath();cx.arc(p.x*W,p.y*H,p.sz,0,TAU);cx.fill();
    });
    cx.globalAlpha=1;
  },

  // shared ghost helper
  ghost(cx,x,y,sc,sw,op){
    op=op||.19;
    cx.save();cx.translate(x,y);cx.scale(sc,sc);
    cx.beginPath();
    cx.moveTo(0,-31);
    cx.bezierCurveTo(-14+sw,-22,-16+sw*1.2,6,-12+sw*1.3,30);
    cx.lineTo(12-sw*1.3,30);
    cx.bezierCurveTo(16-sw*1.2,6,14-sw,-22,0,-31);
    cx.closePath();
    cx.fillStyle=`rgba(138,155,174,${op})`;cx.fill();
    // head
    cx.beginPath();cx.ellipse(0,-36,7.5,9.5,0,0,TAU);
    cx.fillStyle=`rgba(155,172,189,${op*1.1})`;cx.fill();
    // eyes
    cx.fillStyle=`rgba(20,20,32,${op*2.8})`;
    cx.beginPath();cx.arc(-2.8,-37,1.2,0,TAU);cx.fill();
    cx.beginPath();cx.arc(2.8,-37,1.2,0,TAU);cx.fill();
    cx.restore();
  },

  scenes:[
    // 0 — Ghost Waltz: two figures orbit each other, one flickers
    function(cx,W,H,t){
      const cx2=W*.5,cy=H*.48,r=W*.12;
      const a=t*.42;
      const x1=cx2+Math.cos(a)*r,y1=cy+Math.sin(a)*r*.35;
      const x2=cx2+Math.cos(a+Math.PI)*r,y2=cy+Math.sin(a+Math.PI)*r*.35;
      // trailing glow
      const g=cx.createRadialGradient(cx2,cy,0,cx2,cy,r*1.6);
      g.addColorStop(0,'rgba(138,155,174,.055)');g.addColorStop(1,'transparent');
      cx.fillStyle=g;cx.fillRect(0,0,W,H);
      // connection line
      cx.strokeStyle='rgba(138,155,174,.05)';cx.lineWidth=1.5;
      cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();
      if(Math.sin(t*4.8)>-.55)this.ghost(cx,x1,y1,.92,Math.sin(t*2.2)*2,.22);
      this.ghost(cx,x2,y2,.92,Math.sin(t*2.2+1.1)*2,.19);
      // floor shimmer
      cx.fillStyle='rgba(138,155,174,.015)';
      cx.beginPath();cx.ellipse(cx2,cy+H*.25,r*2,8,0,0,TAU);cx.fill();
    },

    // 1 — The Observer: lone still figure behind window cross
    function(cx,W,H,t){
      const cx2=W*.5,cy=H*.52;
      this.ghost(cx,cx2,cy,1.18,Math.sin(t*.55)*1.8,.2);
      // window frame
      cx.strokeStyle='rgba(255,255,255,.038)';cx.lineWidth=2.5;
      cx.strokeRect(cx2-55,cy-62,110,128);
      cx.beginPath();cx.moveTo(cx2,cy-62);cx.lineTo(cx2,cy+66);cx.stroke();
      cx.beginPath();cx.moveTo(cx2-55,cy+4);cx.lineTo(cx2+55,cy+4);cx.stroke();
      // fog
      for(let i=0;i<4;i++){
        const fy=H*(.7+i*.07);
        const fx=cx2+Math.sin(t*.22+i*2)*W*.2;
        cx.fillStyle='rgba(138,155,174,.02)';
        cx.beginPath();cx.ellipse(fx,fy,W*.32,12,0,0,TAU);cx.fill();
      }
      // rare blink
      if(Math.sin(t*2.9)>.96){
        cx.fillStyle='rgba(138,170,204,.14)';
        cx.beginPath();cx.arc(cx2-4.5,cy-38,1.8,0,TAU);cx.fill();
        cx.beginPath();cx.arc(cx2+4.5,cy-38,1.8,0,TAU);cx.fill();
      }
    },

    // 2 — Rain Memory: rainfall, puddle ripples, silhouette
    function(cx,W,H,t){
      // rain
      cx.strokeStyle='rgba(138,155,174,.13)';cx.lineWidth=1.1;
      for(let i=0;i<38;i++){
        const rx=(i*43+t*215)%W;const ry=(i*89+t*430)%H;
        cx.beginPath();cx.moveTo(rx,ry);cx.lineTo(rx-1.5,ry+16);cx.stroke();
      }
      // puddles
      for(let j=0;j<4;j++){
        const pr=(t*24+j*38)%68;
        const po=Math.max(0,1-pr/68)*.1;
        cx.strokeStyle=`rgba(138,155,174,${po})`;cx.lineWidth=.8;
        cx.beginPath();cx.ellipse(W*(.15+j*.22),H*.82,pr*2.2,pr*.32,0,0,TAU);cx.stroke();
      }
      cx.globalAlpha*=.42;this.ghost(cx,W*.5,H*.54,.9,Math.sin(t)*.8,.16);cx.globalAlpha=1;
      // ground reflection
      cx.fillStyle='rgba(138,155,174,.015)';
      cx.beginPath();cx.fillRect(0,H*.86,W,H*.14);
    },

    // 3 — Ballerina: slow turn, particles dissolving off her form
    function(cx,W,H,t){
      const x=W*.5,y=H*.48;const rot=Math.sin(t*.38)*.26;
      // spotlight
      const g=cx.createRadialGradient(x,H*.2,0,x,H*.2,W*.32);
      g.addColorStop(0,'rgba(196,175,87,.028)');g.addColorStop(1,'transparent');
      cx.fillStyle=g;cx.fillRect(0,0,W,H);
      cx.save();cx.translate(x,y);cx.rotate(rot);
      // torso
      cx.fillStyle='rgba(155,172,189,.17)';
      cx.beginPath();cx.moveTo(0,-24);cx.bezierCurveTo(-8,-18,-6,4,-3,14);cx.lineTo(3,14);cx.bezierCurveTo(6,4,8,-18,0,-24);cx.fill();
      // tutu
      cx.beginPath();cx.ellipse(0,13,20,5.5,0,0,TAU);cx.fill();
      // head
      cx.beginPath();cx.arc(0,-27,5.5,0,TAU);cx.fill();
      // arms
      const aa=Math.sin(t*2)*.9;
      cx.strokeStyle='rgba(155,172,189,.12)';cx.lineWidth=1.5;
      cx.beginPath();cx.moveTo(-3,-14);cx.quadraticCurveTo(-20+aa*6,-22+Math.cos(t*2)*8,-28+aa*9,-16);cx.stroke();
      cx.beginPath();cx.moveTo(3,-14);cx.quadraticCurveTo(20-aa*6,-22-Math.cos(t*2)*8,28-aa*9,-16);cx.stroke();
      cx.restore();
      // dissolving particles
      for(let i=0;i<12;i++){
        const px=x+Math.sin(t*2.5+i*.9)*32;const py=y-(t*58+i*17)%115+22;
        const pa=Math.max(0,1-i/12)*.3;
        cx.fillStyle=`rgba(170,188,206,${pa})`;
        cx.beginPath();cx.arc(px,py,1.7,0,TAU);cx.fill();
      }
      // shadow
      cx.fillStyle='rgba(0,0,0,.06)';cx.beginPath();cx.ellipse(x,y+48,22,5,0,0,TAU);cx.fill();
    },

    // 4 — Lost Words: floating German fragments
    function(cx,W,H,t){
      const words=['Leere','Stille','War er real?','Kommentar','Sie','Warum?','Erinnerung','Verschwunden','Ich war hier'];
      cx.font='20px "Cormorant Garamond",serif';cx.textAlign='center';cx.textBaseline='middle';
      for(let i=0;i<words.length;i++){
        const ph=t*.16+i*1.28;
        const wx=W*(.14+(Math.sin(ph*.72+i)*.5+.5)*.72);
        const wy=H*(.1+(Math.cos(ph*.5+i*2)*.5+.5)*.8);
        const wo=.045+.06*Math.sin(ph*2+i);
        cx.save();cx.translate(wx,wy);cx.rotate(Math.sin(ph*.3+i)*.13);
        cx.globalAlpha=wo;cx.fillStyle='#aabbcc';cx.fillText(words[i],0,0);
        cx.restore();
      }
      cx.globalAlpha=1;
    },

    // 5 — Absence: empty chair, rising afterimage, "Er war hier."
    function(cx,W,H,t){
      const x=W*.5,y=H*.5;const pu=.38+.28*Math.sin(t*.42);
      // chair
      cx.strokeStyle='rgba(138,155,174,.1)';cx.lineWidth=2;
      cx.beginPath();
      cx.moveTo(x-22,y+14);cx.lineTo(x-22,y+52);
      cx.moveTo(x+22,y+14);cx.lineTo(x+22,y+52);
      cx.moveTo(x-22,y+14);cx.lineTo(x+22,y+14);
      cx.moveTo(x-22,y-30);cx.lineTo(x-22,y+14);
      cx.moveTo(x+22,y-30);cx.lineTo(x+22,y+14);
      cx.moveTo(x-22,y-30);cx.lineTo(x+22,y-30);
      cx.stroke();
      // afterimage rising
      const yOff=-((t*10)%55);const ga=Math.max(0,1-Math.abs(yOff)/55)*pu;
      cx.globalAlpha*=ga*.55;this.ghost(cx,x,y+yOff,.88,0,.15);cx.globalAlpha=1;
      // glow
      const g=cx.createRadialGradient(x,y,0,x,y,W*.22);
      g.addColorStop(0,`rgba(138,155,174,${.018*pu})`);g.addColorStop(1,'transparent');
      cx.fillStyle=g;cx.fillRect(0,0,W,H);
      // text
      const to=.028+.022*Math.sin(t*.25);cx.globalAlpha=to;
      cx.font='18px "Cormorant Garamond",serif';
      cx.fillStyle='#aabbcc';cx.textAlign='center';
      cx.fillText('Er war hier.',x,y+H*.36);cx.globalAlpha=1;
    }
  ]
};

/* touch support */
(function(){
  let touchTape=null,touchSX=0,touchSY=0;
  $('rack').addEventListener('touchstart',e=>{
    const el=e.target.closest('.tape');
    if(!el||el.classList.contains('locked'))return;
    const id=el.dataset&&el.dataset.id;
    if(!id){
      // find tape by label text
      const lbl=el.querySelector('.t-label');
      if(!lbl)return;
      const tape=TAPES.find(t=>t.title===lbl.textContent.trim());
      if(!tape)return;
      touchTape=tape;
    }else{touchTape=TAPES.find(t=>t.id===id)||null}
    touchSX=e.touches[0].clientX;touchSY=e.touches[0].clientY;
  },{passive:true});

  // store id on tape elements
  const observer=new MutationObserver(()=>{
    $('rack').querySelectorAll('.tape').forEach((el,i)=>{
      if(TAPES[i])el.dataset.id=TAPES[i].id;
    });
  });
  observer.observe($('rack'),{childList:true});

  $('rack').addEventListener('touchend',e=>{
    if(!touchTape)return;
    const dx=e.changedTouches[0].clientX-touchSX;
    const dy=e.changedTouches[0].clientY-touchSY;
    if(Math.sqrt(dx*dx+dy*dy)<12)insertTape(touchTape.id);
    touchTape=null;
  },{passive:true});
})();
</script>
