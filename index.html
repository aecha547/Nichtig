<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050505">
<title>KOMMENTAR — Ein Spuk in der Realität</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='sg' cx='50%25' cy='50%25'%3E%3Cstop offset='0%25' stop-color='%23888aaa' stop-opacity='.7'/%3E%3Cstop offset='100%25' stop-color='%233a3a4a' stop-opacity='.4'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='32' height='32' fill='%23080810'/%3E%3Cellipse cx='16' cy='16' rx='8' ry='10' fill='url(%23sg)' transform='rotate(-15 16 16)' opacity='0.6'/%3E%3Cellipse cx='16' cy='12' rx='4' ry='2.5' fill='%23aaaacc' transform='rotate(-15 16 12)'/%3E%3Cpath d='M12 6 Q16 2 20 6' stroke='%23777' stroke-width='1' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Crimson+Text:ital@0;1&display=swap');

/* ═══ ROOT VARIABLES — DETECTIVE GHOST PALETTE ═══ */
:root{
--bg:#080810;--colour:#8899aa;--colour-dim:#556677;--colour-bright:#aabbcc;
--gold:#c4af57;--grey:#aabbcc;--warm:#ffeedd;--red:#aa4444;--blue:#5588bb;
--cyan:#88aacc;--dim:#555;--white:#d4d4d4;--earth:#7a7a8a;
--font-crt:'VT323',monospace;--font-serif:'Cormorant Garamond',serif;
--font-detect:'Crimson Text',serif;
--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px);
--safe-left:env(safe-area-inset-left,0px);
--safe-right:env(safe-area-inset-right,0px);
--min-touch:48px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{height:100%;overflow:hidden;background:#050508;font-family:var(--font-crt);color:var(--colour);touch-action:pan-y pinch-zoom}

/* ═══ DETECTIVE GLITCH EFFECTS ═══ */
.glitch-overlay{position:fixed;inset:0;z-index:9990;pointer-events:none;overflow:hidden}
.glitch-slice{position:absolute;left:0;width:100%;height:3px;opacity:0;background:linear-gradient(90deg,transparent,var(--colour),transparent)}
.glitch-colour{background:linear-gradient(90deg,transparent,rgba(136,153,170,0.3),transparent);animation:glitchColour 4s infinite}
.glitch-dark{background:linear-gradient(90deg,transparent,rgba(8,8,16,0.8),transparent);animation:glitchDark 5s infinite}
.glitch-grey{background:linear-gradient(90deg,transparent,rgba(170,187,204,0.15),transparent);animation:glitchGrey 6s infinite}

@keyframes glitchColour{
0%,100%{top:-5%;opacity:0;transform:translateX(-100%)}
5%{top:20%;opacity:0.7;transform:translateX(0)}
10%{top:25%;opacity:0;transform:translateX(100%)}
50%{top:-5%;opacity:0}
55%{top:45%;opacity:0.5;transform:translateX(-50%)}
60%{top:50%;opacity:0;transform:translateX(50%)}
}

@keyframes glitchDark{
0%,100%{top:-5%;opacity:0;height:5px}
8%{top:60%;opacity:0.6;height:8px;transform:translateX(-30%)}
12%{top:65%;opacity:0;height:3px}
45%{top:-5%;opacity:0}
48%{top:35%;opacity:0.4;height:12px}
52%{top:38%;opacity:0;height:4px}
}

@keyframes glitchGrey{
0%,100%{top:-5%;opacity:0}
15%{top:70%;opacity:0.3;transform:translateX(20%)}
18%{top:75%;opacity:0;transform:translateX(-20%)}
60%{top:-5%;opacity:0}
65%{top:15%;opacity:0.25;transform:translateX(-10%)}
70%{top:18%;opacity:0;transform:translateX(10%)}
}

/* Scanline corruption effect */
.corruption-line{
position:absolute;left:0;width:100%;height:1px;
background:linear-gradient(90deg,transparent,var(--colour-bright),var(--colour),var(--colour-dim),transparent);
opacity:0;
pointer-events:none;
}
.corruption-line.active{animation:corruptionSweep 0.8s ease-out}

/* Detective text scramble */
.text-scramble{
position:relative;
display:inline-block;
}
.text-scramble::before{
content:attr(data-text);
position:absolute;
left:0;top:0;
color:var(--colour-bright);
clip-path:inset(0 0 50% 0);
animation:scrambleTop 0.1s steps(1) infinite;
opacity:0;
}
.text-scramble::after{
content:attr(data-text);
position:absolute;
left:0;top:0;
color:var(--colour-dim);
clip-path:inset(50% 0 0 0);
animation:scrambleBot 0.15s steps(1) infinite;
opacity:0;
}
@keyframes scrambleTop{
0%,49%{opacity:0}
50%,100%{opacity:0.4;content:attr(data-glitch)}
}
@keyframes scrambleBot{
0%,49%{opacity:0}
50%,100%{opacity:0.3}
}

/* ═══ VHS BACKGROUND ═══ */
#vhs-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#vhs-bg canvas{position:absolute;inset:0;width:100%;height:100%}

/* Touch Effects */
.touch-ripple{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;border:2px solid var(--colour);animation:touchRipple .8s ease-out forwards;opacity:0}
@keyframes touchRipple{0%{transform:scale(0);opacity:.8}100%{transform:scale(4);opacity:0}}
.glitch-flash{position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(136,153,170,.1) 2px,rgba(136,153,170,.1) 4px);animation:glitchFlash .15s ease-out}
@keyframes glitchFlash{0%{opacity:.4}100%{opacity:0}}

/* Mobile tap indicator */
.tap-indicator{position:fixed;width:60px;height:60px;border-radius:50%;border:3px solid var(--colour);pointer-events:none;z-index:9999;animation:tapPulse .6s ease-out forwards;opacity:0}
@keyframes tapPulse{0%{transform:scale(.5);opacity:1}100%{transform:scale(1.5);opacity:0}}

/* ═══ BACKGROUND SCENES ═══ */
#bg-scenes{position:absolute;inset:0;z-index:21;pointer-events:none;opacity:0;transition:opacity 2s ease}
#bg-scenes.active{opacity:.35}
.bg-scene{position:absolute;inset:0;opacity:0;transition:opacity 3s ease;overflow:hidden}
.bg-scene.active{opacity:1}
.bg-scene svg{position:absolute;inset:0;width:100%;height:100%}

/* ═══ AMBIENT LIGHT RAYS ═══ */
.ambient-rays{position:absolute;inset:0;z-index:22;pointer-events:none;opacity:0;transition:opacity 3s}
.ambient-rays.on{opacity:1}
.ambient-ray{position:absolute;width:200%;height:200%;top:-50%;left:-50%;background:conic-gradient(from 0deg at 50% 50%,transparent 0%,rgba(136,153,170,.012) 5%,transparent 10%,transparent 25%,rgba(196,175,87,.008) 30%,transparent 35%,transparent 50%,rgba(136,153,170,.01) 55%,transparent 60%,transparent 75%,rgba(136,153,170,.008) 80%,transparent 85%);animation:rayRotate 30s linear infinite}
.ambient-ray:nth-child(2){animation-direction:reverse;animation-duration:45s;opacity:.7}
@keyframes rayRotate{to{transform:rotate(360deg)}}

/* ═══ SCENE ANIMATIONS — GHOSTLY DETECTIVE THEMES ═══ */

/* Café Scene - The Meeting */
.scene-cafe .floor{fill:url(#cafeFloor)}
.scene-cafe .window-light{animation:windowFlicker 8s ease-in-out infinite}
@keyframes windowFlicker{0%,100%{opacity:.15}50%{opacity:.25}}
.scene-cafe .steam{animation:steamRise 4s ease-out infinite;transform-origin:bottom}
.scene-cafe .steam:nth-child(2){animation-delay:.8s}
.scene-cafe .steam:nth-child(3){animation-delay:1.6s}
@keyframes steamRise{0%{opacity:0;transform:translateY(0) scaleX(1)}30%{opacity:.4}100%{opacity:0;transform:translateY(-40px) scaleX(1.5)}}
.scene-cafe .silhouette{animation:shadowPulse 6s ease-in-out infinite}
@keyframes shadowPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.5;transform:scale(1.02)}}

/* Train Scene - The Departure */
.scene-train .platform-light{animation:platformGlow 5s ease-in-out infinite}
@keyframes platformGlow{0%,100%{opacity:.1}50%{opacity:.25}}
.scene-train .window{animation:windowPass 3s linear infinite}
@keyframes windowPass{0%{transform:translateX(0);opacity:.3}100%{transform:translateX(-100px);opacity:.1}}
.scene-train .fog{animation:fogDrift 10s ease-in-out infinite}
.scene-train .fog:nth-child(2){animation-delay:3s;animation-duration:12s}
@keyframes fogDrift{0%,100%{opacity:.2;transform:translateX(0)}50%{opacity:.4;transform:translateX(30px)}}

/* Rain Scene - The Search */
.scene-rain .raindrop{animation:rainFall 1.5s linear infinite}
.scene-rain .raindrop:nth-child(2){animation-delay:.3s}
.scene-rain .raindrop:nth-child(3){animation-delay:.6s}
.scene-rain .raindrop:nth-child(4){animation-delay:.9s}
.scene-rain .raindrop:nth-child(5){animation-delay:1.2s}
@keyframes rainFall{0%{opacity:0;transform:translateY(-20px)}20%{opacity:.5}100%{opacity:0;transform:translateY(100px)}}
.scene-rain .puddle{animation:puddleRipple 3s ease-in-out infinite}
@keyframes puddleRipple{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.4;transform:scale(1.1)}}

/* Archive Scene - The Evidence */
.scene-archive .paper{animation:paperFloat 6s ease-in-out infinite}
.scene-archive .paper:nth-child(2){animation-delay:1s;animation-duration:7s}
.scene-archive .paper:nth-child(3){animation-delay:2s;animation-duration:5s}
@keyframes paperFloat{0%,100%{opacity:.3;transform:translateY(0) rotate(0deg)}50%{opacity:.5;transform:translateY(-15px) rotate(2deg)}}
.scene-archive .folder{animation:folderShift 8s ease-in-out infinite}
@keyframes folderShift{0%,100%{opacity:.2}50%{opacity:.4}}

/* ═══ BOOT OVERLAY — DETECTIVE GHOST STYLE ═══ */
#boot-overlay{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;opacity:1;transition:opacity 2s cubic-bezier(.4,0,.2,1);padding:var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left)}
#boot-overlay.hidden{opacity:0;pointer-events:none}
.ghost-svg{width:clamp(70px,20vw,130px);height:clamp(70px,20vw,130px);animation:ghostPulse 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(136,153,170,0.3))}
@keyframes ghostPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.06);opacity:1}}
#boot-overlay h1{font-family:var(--font-serif);font-size:clamp(1.3rem,5.5vw,2.6rem);font-weight:600;color:var(--colour);letter-spacing:-1px;text-shadow:0 0 30px var(--colour);animation:titleFlicker 3s infinite;text-align:center;line-height:1.3;margin-top:clamp(12px,3vw,22px)}
#boot-overlay .sub{font-family:var(--font-detect);font-size:clamp(.85rem,2.8vw,1.3rem);color:var(--colour-dim);margin-top:clamp(6px,1.5vw,10px);opacity:.7;font-style:italic}
.boot-prompt{color:#444;font-size:clamp(.9rem,2.5vw,1.2rem);margin-top:clamp(20px,5vh,50px);animation:pulse 2s infinite;letter-spacing:2px}
.boot-sub{color:var(--colour-dim);font-size:clamp(.6rem,1.6vw,.75rem);margin-top:clamp(8px,2vh,12px);opacity:.4;text-align:center;padding:0 10px;font-family:var(--font-crt);letter-spacing:1px}
@keyframes titleFlicker{0%,18%,22%,25%,53%,56%,100%{opacity:1;text-shadow:0 0 30px var(--colour)}20%,24%,55%{opacity:.6;text-shadow:0 0 15px var(--colour-dim)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
@keyframes blink{50%{opacity:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes screenShake{0%,100%{transform:translate(0)}10%{transform:translate(-2px,1px)}30%{transform:translate(2px,-1px)}50%{transform:translate(-1px,2px)}70%{transform:translate(1px,-1px)}90%{transform:translate(-1px,0)}}
@keyframes ledBreathe{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInSlow{from{opacity:0}to{opacity:1}}
@keyframes loadPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
@keyframes warmGlow{0%,100%{background:radial-gradient(circle at center,#0a0a12 0%,#050508 70%)}50%{background:radial-gradient(circle at center,#0f0f18 0%,#080810 60%)}}
@keyframes noSignalPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
@keyframes gentleDrift{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* Mobile tap hint animation */
.tap-hint{display:none;color:var(--colour-dim);font-size:clamp(.7rem,2vw,.85rem);margin-top:10px;animation:pulse 1.5s infinite}
.tap-hint.show{display:block}
@media(hover:none) and (pointer:coarse){
  .tap-hint{display:block}
}

/* ═══ STATION - DESKTOP DEFAULT ═══ */
#particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;contain:strict}
.particle{position:absolute;border-radius:50%;pointer-events:none;will-change:transform,opacity}

#station{
  display:none;
  grid-template-columns:1fr minmax(180px,280px);
  grid-template-rows:1fr;
  gap:clamp(8px,2vw,12px);
  width:min(96vw,1100px);
  height:min(90vh,760px);
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  contain:layout style;
  padding:max(4px,var(--safe-top)) var(--safe-right) max(4px,var(--safe-bottom)) var(--safe-left)
}
#station.on{display:grid;animation:stationFadeIn 1.5s ease-out forwards}
@keyframes stationFadeIn{from{opacity:0;transform:translate(-50%,-50%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* TV Unit */
.tv-unit{
  grid-column:1;grid-row:1;
  background:linear-gradient(145deg,#141418,#0c0c10);
  border-radius:clamp(12px,3vw,20px);
  border:2px solid #1a1a22;
  box-shadow:inset 0 0 50px #000,0 12px 50px rgba(0,0,0,.85);
  display:flex;
  flex-direction:column;
  padding:clamp(10px,2vw,18px);
  position:relative;
  z-index:2;
  animation:tvPulse 4s ease-in-out infinite
}
@keyframes tvPulse{0%,100%{box-shadow:inset 0 0 50px #000,0 12px 50px rgba(0,0,0,.85)}50%{box-shadow:inset 0 0 50px #000,0 12px 50px rgba(0,0,0,.85),0 0 20px rgba(136,153,170,.04)}}

.screen-bezel{
  flex:1;
  background:#020204;
  border-radius:clamp(8px,2vw,12px);
  position:relative;
  overflow:hidden;
  border:2px solid #12121a;
  box-shadow:inset 0 0 50px rgba(0,0,0,.9);
  transition:border-color .5s,box-shadow .5s;
  min-height:200px
}
.screen-bezel.shake{animation:screenShake .5s ease-out}
.screen-bezel.flash{border-color:rgba(136,153,170,.25);box-shadow:inset 0 0 50px rgba(0,0,0,.9),0 0 25px rgba(136,153,170,.06)}

canvas#crt{position:absolute;inset:0;width:100%;height:100%;z-index:5;image-rendering:pixelated}
canvas#fx{position:absolute;inset:0;width:100%;height:100%;z-index:7;opacity:0;transition:opacity 1s;pointer-events:none}
canvas#fx.on{opacity:1}
.crt-warmup{position:absolute;inset:0;z-index:19;background:radial-gradient(circle at center,#0a0a12 0%,#050508 60%);transition:opacity 3s;pointer-events:none;animation:warmGlow 2s ease-in-out}
.crt-warmup.off{opacity:0}
.scanlines{position:absolute;inset:0;pointer-events:none;z-index:30;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);opacity:.5}
.vignette{position:absolute;inset:0;pointer-events:none;z-index:31;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,.8) 100%)}
.glass-glare{position:absolute;inset:0;pointer-events:none;z-index:32;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 35%)}
.scan-bar{position:absolute;top:0;left:0;width:100%;height:6px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.05),transparent);opacity:.4;z-index:33;pointer-events:none;animation:scanbar 5s linear infinite}
.tracking-bar{position:absolute;left:0;width:100%;height:4px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.07),transparent);opacity:0;z-index:34;pointer-events:none;transition:opacity .3s}
.tracking-bar.on{opacity:1;animation:trackDrift 3s linear infinite}
@keyframes scanbar{from{top:-4%}to{top:104%}}
@keyframes trackDrift{0%{top:-2%}100%{top:102%}}
.screen-glow{position:absolute;inset:-15px;z-index:-1;border-radius:22px;pointer-events:none;transition:background 2.5s}

/* Screen Content */
#screen{position:absolute;inset:0;z-index:25;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(10px,3vw,20px);opacity:1;transition:opacity 1s}
#screen.fade-out{opacity:0}
#screen.fade-in{animation:screenFadeIn 1s forwards}
@keyframes screenFadeIn{from{opacity:0;filter:blur(3px)}to{opacity:1;filter:blur(0)}}
.channel-id{position:absolute;top:clamp(8px,2vw,14px);left:clamp(8px,2vw,16px);font-size:clamp(1rem,2.5vw,1.6rem);color:var(--colour-dim);opacity:.45;text-shadow:0 0 6px var(--colour-dim);letter-spacing:2px;z-index:35;font-family:var(--font-crt)}
.counter{position:absolute;top:clamp(8px,2vw,14px);right:clamp(8px,2vw,16px);font-size:clamp(.85rem,2vw,1.1rem);color:rgba(255,255,255,.5);opacity:0;z-index:35;transition:opacity .5s}
.counter.on{opacity:1}
.rec-ind{position:absolute;top:clamp(8px,2vw,14px);right:clamp(8px,2vw,16px);font-size:clamp(.8rem,2vw,1rem);color:var(--red);opacity:0;transition:opacity .4s;z-index:35}
.rec-ind.on{opacity:1;animation:blink 1s infinite}
.screen-msg{font-size:clamp(.9rem,3vw,1.6rem);color:var(--colour-dim);text-shadow:0 0 10px var(--colour-dim);letter-spacing:3px;text-align:center;animation:fadeInSlow 1.2s,noSignalPulse 4s ease-in-out 1.2s infinite;font-family:var(--font-crt)}
.dlg-box{position:absolute;bottom:clamp(8px,2vw,16px);left:50%;transform:translateX(-50%);z-index:40;text-align:center;color:var(--colour-bright);font-family:var(--font-serif);font-size:clamp(.85rem,2.5vw,1.25rem);text-shadow:0 0 8px var(--colour);background:rgba(8,8,12,.92);padding:clamp(8px,2vw,12px) clamp(12px,3vw,20px);border-radius:4px;border:1px solid rgba(136,153,170,.12);max-width:90%;line-height:1.5;opacity:0;transition:opacity .6s;pointer-events:none}
.dlg-box.vis{opacity:1}
.boot-text{width:90%;text-align:left;color:var(--colour);font-size:clamp(10px,2vw,15px);line-height:1.9;white-space:pre-wrap;font-family:var(--font-crt)}
.boot-line{opacity:0;animation:fadeIn .5s forwards}
.boot-text .cursor{display:inline-block;width:7px;height:1.1em;background:var(--colour);vertical-align:text-bottom;margin-left:2px;animation:blink .8s step-end infinite}

/* TV Controls */
.tv-controls{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:clamp(6px,1.5vw,8px) clamp(8px,2vw,14px);
  margin-top:clamp(4px,1vw,6px);
  flex-shrink:0;
  flex-wrap:wrap;
  gap:6px
}
.power-section{display:flex;align-items:center;gap:4px}
.led{width:clamp(5px,1.5vw,7px);height:clamp(5px,1.5vw,7px);border-radius:50%;transition:all .4s;box-shadow:inset 0 0 2px rgba(0,0,0,.6)}
.led.pwr{background:#303}
.led.pwr.on{background:#88aacc;box-shadow:0 0 5px rgba(136,170,204,.5);animation:ledBreathe 3s infinite}
.led.play{background:#202}
.led.play.on{background:#8899aa;box-shadow:0 0 5px rgba(136,153,170,.5)}
.ctrl-label{font-size:clamp(7px,1.5vw,9px);letter-spacing:.1em;color:#444;text-transform:uppercase;margin-left:2px}
.tape-slot{
  width:clamp(100px,25vw,160px);
  height:clamp(22px,5vw,26px);
  background:#040406;
  border:1.5px solid #222228;
  border-radius:3px;
  cursor:default;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.8);
  position:relative;
  overflow:hidden;
  transition:all .4s;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:var(--min-touch)
}
.slot-label{font-size:clamp(7px,1.5vw,9px);letter-spacing:.1em;color:#2a2a32;transition:color .4s;position:relative;z-index:2}
.tape-slot.active{border-color:var(--colour);box-shadow:inset 0 2px 6px rgba(0,0,0,.8),0 0 10px rgba(136,153,170,.15)}
.tape-slot.active .slot-label{color:var(--colour);animation:pulse 1.5s infinite}
.slot-flap{position:absolute;inset:0;background:linear-gradient(180deg,#161618,#0c0c10);transform-origin:top;transition:transform .6s;border-bottom:1px solid #222228;z-index:1}
.tape-slot.inserting .slot-flap{transform:perspective(80px) rotateX(-95deg)}
.eject-btn{
  padding:clamp(4px,1vw,6px) clamp(8px,2vw,14px);
  background:linear-gradient(180deg,#1a1a1e,#101012);
  border:1.5px solid #28282e;
  color:#666;
  cursor:pointer;
  font-family:var(--font-crt);
  font-size:clamp(8px,1.5vw,10px);
  border-radius:3px;
  letter-spacing:1px;
  transition:all .2s;
  min-height:var(--min-touch);
  min-width:60px
}
.eject-btn:hover,.eject-btn:active{background:#141416;color:#aaa;border-color:#36363e}
.brand-label{font-size:clamp(7px,1.2vw,10px);letter-spacing:.2em;color:#1a1a22;text-transform:uppercase;display:none}
@media(min-width:600px){.brand-label{display:inline}}

/* ═══ TAPE RACK ═══ */
.tape-rack{
  grid-column:2;grid-row:1;
  background:linear-gradient(180deg,#0c0c10,#060608);
  border:2px solid #16161c;
  border-radius:clamp(6px,1.5vw,10px);
  padding:clamp(8px,2vw,14px);
  display:flex;
  flex-direction:column;
  gap:clamp(8px,1.5vw,12px);
  overflow-y:auto;
  box-shadow:inset 0 0 20px #000;
  scrollbar-width:thin;
  scrollbar-color:#1a1a22 #060608;
  contain:content
}
.rack-header{color:#2a2a32;text-align:center;border-bottom:1px solid #141418;padding-bottom:6px;margin-bottom:2px;letter-spacing:2px;font-size:clamp(8px,1.5vw,11px);animation:fadeInSlow .8s;font-family:var(--font-crt)}
.rack-progress{font-size:clamp(7px,1.2vw,9px);color:var(--colour-dim);opacity:.6;display:block;margin-top:2px}

/* VHS Tape Styling */
.vhs-tape{
  min-height:clamp(70px,15vw,88px);
  background:linear-gradient(180deg,#14141a,#0c0c10);
  border-radius:4px;
  border:1.5px solid #22222a;
  position:relative;
  cursor:grab;
  transition:border-color .3s,opacity .3s,transform .3s,box-shadow .3s;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-shadow:2px 4px 12px rgba(0,0,0,.5);
  flex-shrink:0;
  touch-action:none;
  opacity:0;
  animation:tapeSlideIn .6s forwards
}
@keyframes tapeSlideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.vhs-tape:nth-child(2){animation-delay:.05s}
.vhs-tape:nth-child(3){animation-delay:.1s}
.vhs-tape:nth-child(4){animation-delay:.15s}
.vhs-tape:nth-child(5){animation-delay:.2s}
.vhs-tape:nth-child(6){animation-delay:.25s}
.vhs-tape:active{cursor:grabbing;transform:scale(.97)}
.vhs-tape.dragging{opacity:.2!important;transform:scale(.9)}
.vhs-tape.locked,.vhs-tape.seq-locked{opacity:.35!important;cursor:not-allowed}
.vhs-tape.seq-locked{opacity:.5!important}
.vhs-tape.complete::after{content:'✓';position:absolute;top:4px;right:4px;font-size:clamp(8px,1.5vw,11px);color:var(--grey);text-shadow:0 0 4px var(--grey)}
.vhs-tape.tapped{animation:tapeTap .3s ease-out}
@keyframes tapeTap{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.vhs-tape.selected{border-color:var(--colour);box-shadow:0 0 15px rgba(136,153,170,.25),2px 4px 12px rgba(0,0,0,.5)}
.vhs-tape.selected::before{content:'EINLEGEN';position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:clamp(6px,1.2vw,8px);color:var(--colour);letter-spacing:1px;animation:pulse 1s infinite;white-space:nowrap}

/* Desktop hover effect */
@media(hover:hover){
  .vhs-tape:hover:not(.locked):not(.seq-locked){transform:translateY(-3px) scale(1.02);box-shadow:3px 6px 18px rgba(0,0,0,.6);border-color:#2e2e38;z-index:5}
}

.tape-ghost{position:fixed;z-index:9999;pointer-events:none;width:140px;height:88px;background:linear-gradient(180deg,#14141a,#0c0c10);border:1.5px solid var(--colour);border-radius:5px;box-shadow:0 10px 30px rgba(0,0,0,.8),0 0 15px rgba(136,153,170,.12);transform:rotate(-5deg) scale(1.05);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .2s}
.tape-window{position:absolute;top:8px;left:12%;width:76%;height:20px;background:#050506;border-radius:3px;border:1.5px solid #18181e;display:flex;align-items:center;justify-content:space-around;padding:0 8px;overflow:hidden;box-shadow:inset 0 0 5px rgba(0,0,0,.6)}
.reel{width:clamp(10px,2vw,14px);height:clamp(10px,2vw,14px);border:2px solid #2a2a32;border-radius:50%;background:#060606;position:relative;transition:border-color .3s}
.reel::after{content:'';position:absolute;inset:2px;border:1.5px solid #18181e;border-radius:50%;background:#020204}
.vhs-tape:active .reel,.vhs-tape.selected .reel{border-color:#3a3a44;animation:spin 1.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tape-strip{width:20px;height:1px;background:#18181e}
.tape-label{
  background:linear-gradient(#d8d4cc,#c8c0b4);
  color:#1a1a1e;
  padding:2px 6px;
  margin-top:clamp(20px,5vw,28px);
  width:85%;
  text-align:center;
  font-family:var(--font-serif);
  font-weight:600;
  font-size:clamp(9px,2vw,12px);
  transform:rotate(-.5deg);
  box-shadow:0 1px 3px rgba(0,0,0,.25);
  border-radius:2px;
  line-height:1.2
}
.tape-status{font-family:var(--font-crt);font-size:clamp(6px,1.2vw,8px);color:#666;letter-spacing:.06em;margin-top:1px}
.tape-color{position:absolute;top:8px;right:4px;width:4px;height:4px;border-radius:50%}
.tape-rating{position:absolute;bottom:4px;left:4px;font-size:clamp(5px,1vw,7px);color:#444;opacity:.6}

/* ═══ UMBRA INTRO — GHOSTLY DETECTIVE ═══ */
.umbra-intro{display:flex;flex-direction:column;align-items:center;gap:clamp(10px,3vw,16px);width:100%;animation:fadeIn 1.2s}
.umbra-glow{width:clamp(100px,28vw,180px);height:clamp(100px,28vw,180px);background:radial-gradient(circle,rgba(136,153,170,.15) 0%,transparent 70%);border-radius:50%;animation:umbraGlow 3s infinite;display:flex;align-items:center;justify-content:center}
@keyframes umbraGlow{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:.9;transform:scale(1.05)}}
.intro-line{font-family:var(--font-serif);font-size:clamp(.9rem,2.5vw,1.4rem);color:var(--colour-bright);text-align:center;min-height:2.2em;display:flex;align-items:center;justify-content:center;transition:opacity .8s,transform .8s;opacity:0;transform:translateY(6px);padding:0 10px;font-style:italic}
.intro-line.show{opacity:1;transform:translateY(0)}
.intro-line.hiding{opacity:0;transform:translateY(-4px)}
.intro-line .hand{font-family:var(--font-detect);font-size:1.1em;color:var(--gold)}
.load-display{text-align:center;width:90%;animation:fadeIn 1s}
.load-title{font-size:clamp(10px,2vw,14px);margin-bottom:4px;letter-spacing:.1em;font-family:var(--font-crt)}
.load-desc{font-family:var(--font-serif);font-size:clamp(9px,1.8vw,12px);color:var(--colour-dim);margin-bottom:clamp(8px,2vw,12px);font-style:italic;opacity:0;animation:fadeInSlow 1s .5s forwards}
.load-bar{width:clamp(150px,40vw,200px);height:clamp(4px,1vw,6px);border-radius:3px;overflow:hidden;margin:0 auto;border:1px solid var(--colour);background:rgba(136,153,170,.08)}
.load-fill{height:100%;width:0%;transition:width .1s;animation:loadPulse 1.5s infinite}

/* ═══ ARCHIVE ═══ */
.archive{display:flex;flex-direction:column;align-items:center;gap:clamp(12px,3vw,20px);animation:fadeIn 3.5s;padding:0 10px}
.archive-text{font-family:var(--font-serif);font-size:clamp(.85rem,2.5vw,1.3rem);color:var(--grey);text-shadow:0 0 15px rgba(136,153,170,.25);text-align:center;line-height:1.6;animation:gentleDrift 4s infinite;font-style:italic}
.archive-sub{font-family:var(--font-detect);font-size:clamp(.75rem,2vw,1.1rem);color:var(--colour-dim);opacity:0;animation:fadeInSlow 2s 1.5s forwards}

/* Audio Button */
.audio-btn{
  position:fixed;
  top:calc(8px + var(--safe-top));
  right:calc(8px + var(--safe-right));
  z-index:200;
  background:rgba(0,0,0,.65);
  border:1px solid #222228;
  border-radius:3px;
  color:#444;
  font-family:var(--font-crt);
  font-size:clamp(9px,2vw,11px);
  padding:clamp(4px,1vw,6px) clamp(6px,1.5vw,10px);
  cursor:pointer;
  transition:all .3s;
  min-height:var(--min-touch);
  min-width:50px
}
.audio-btn:hover,.audio-btn.on{color:var(--colour);border-color:var(--colour)}
.bgm-debug{position:fixed;bottom:4px;left:4px;font-size:8px;color:#333;z-index:999;pointer-events:none;font-family:monospace;opacity:0}

/* ═══════════════════════════════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
   ═══════════════════════════════════════════════════════════════════ */

/* Large Tablets and Small Laptops (1024px) */
@media(max-width:1024px){
  #station{width:98vw;height:min(92vh,720px)}
}

/* Tablets Portrait (768px) */
@media(max-width:768px){
  #station{
    grid-template-columns:1fr;
    grid-template-rows:minmax(300px,1fr) auto;
    width:100vw;
    height:auto;
    max-height:none;
    position:relative;
    top:auto;left:auto;
    transform:none;
    padding:clamp(6px,2vw,10px);
    gap:8px;
    margin:0 auto
  }
  #station.on{animation:stationFadeInMobile 1.5s forwards}
  @keyframes stationFadeInMobile{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  .tv-unit{min-height:clamp(280px,50vh,400px)}
  .tape-rack{
    grid-column:1;grid-row:2;
    flex-direction:row;
    overflow-x:auto;
    overflow-y:hidden;
    padding:clamp(6px,1.5vw,10px);
    gap:clamp(6px,1.5vw,8px);
    min-height:clamp(90px,18vh,120px);
    max-height:clamp(100px,20vh,130px);
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:x mandatory
  }
  .tape-rack::-webkit-scrollbar{height:3px}
  .tape-rack::-webkit-scrollbar-track{background:#060608}
  .tape-rack::-webkit-scrollbar-thumb{background:#1a1a22;border-radius:2px}
  .rack-header{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);padding-bottom:0;padding-right:6px;border-bottom:none;border-right:1px solid #121216;margin-bottom:0;margin-right:2px;flex-shrink:0}
  .rack-progress{display:none}
  .vhs-tape{
    min-width:clamp(100px,22vw,130px);
    min-height:clamp(65px,14vw,80px);
    scroll-snap-align:start;
    flex-shrink:0
  }
}

/* Mobile Landscape and Large Phones (600px) */
@media(max-width:600px){
  #station{
    grid-template-rows:minmax(250px,55vh) auto;
    padding:4px;
    gap:6px
  }
  .tv-unit{padding:8px;min-height:250px}
  .tv-controls{padding:4px 6px;gap:4px}
  .tape-slot{width:90px;height:var(--min-touch)}
  .eject-btn{min-width:50px;padding:4px 8px}
  .brand-label{display:none}
  .vhs-tape{min-width:95px;min-height:70px}
  .tape-label{font-size:9px;padding:2px 5px;margin-top:18px}
  .tape-status{font-size:6px}
}

/* Small Phones (480px) */
@media(max-width:480px){
  .ghost-svg{width:70px;height:70px}
  #boot-overlay h1{font-size:clamp(1.2rem,7vw,1.6rem)}
  .boot-prompt{font-size:clamp(.8rem,3vw,.9rem)}
  .boot-sub{font-size:clamp(.55rem,2vw,.7rem);padding:0 15px}
  .intro-line{font-size:clamp(.8rem,3.5vw,1rem)}
  .tv-unit{padding:6px;border-radius:10px}
  .screen-bezel{border-radius:8px;min-height:200px}
  .tv-controls{flex-wrap:wrap;justify-content:center}
  .power-section{order:1}
  .tape-slot{order:3;width:100%;margin-top:4px}
  .eject-btn{order:2}
  .vhs-tape{min-width:85px;min-height:60px}
  .tape-window{height:16px;top:6px}
  .reel{width:10px;height:10px}
  .tape-label{font-size:8px;margin-top:14px;width:90%}
  .channel-id,.counter,.rec-ind{font-size:clamp(.75rem,2vw,.9rem)}
  .dlg-box{font-size:clamp(.75rem,2vw,.9rem);padding:6px 10px}
}

/* Very Small Phones (360px) */
@media(max-width:360px){
  .tv-unit{padding:5px}
  .tv-controls{padding:3px 4px}
  .vhs-tape{min-width:75px;min-height:55px}
  .tape-label{font-size:7px;margin-top:12px}
  .tape-status{font-size:5px}
}

/* Extra Small (320px) */
@media(max-width:320px){
  #station{gap:4px;padding:3px}
  .tv-unit{padding:4px;border-radius:8px}
  .screen-bezel{border-radius:6px}
  .vhs-tape{min-width:70px;min-height:50px}
}

/* Landscape Mode for Mobile */
@media(max-height:500px) and (orientation:landscape){
  #station{
    grid-template-columns:minmax(200px,1fr) minmax(100px,200px);
    grid-template-rows:1fr;
    height:96vh;
    width:98vw
  }
  .tv-unit{min-height:auto}
  .tape-rack{
    grid-column:2;grid-row:1;
    flex-direction:column;
    overflow-x:hidden;
    overflow-y:auto;
    min-height:auto;
    max-height:none
  }
  .rack-header{writing-mode:horizontal-tb;transform:none;padding-right:0;padding-bottom:6px;border-right:none;border-bottom:1px solid #121216}
  .vhs-tape{min-width:auto;min-height:clamp(50px,12vh,65px)}
}

/* High DPI / Retina */
@media(-webkit-min-device-pixel-ratio:2),(min-resolution:192dpi){
  .scanlines{opacity:.35}
}

/* Reduced Motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important;
    animation-iteration-count:1!important;
    transition-duration:.01ms!important
  }
  .scan-bar,.tracking-bar{display:none}
}

/* Dark Mode preference (already dark but for completeness) */
@media(prefers-color-scheme:light){
  /* Keep dark theme regardless - this is intentional design */
}
</style>

/* ═══════════════════════════════════════════════════════════════════
   DETECTIVE GLITCH EFFECTS
   ═══════════════════════════════════════════════════════════════════ */
const DetectiveGlitch={
  slices:null,
  init(){
    this.slices=document.querySelectorAll('.glitch-slice');
    this.randomGlitch();
  },
  trigger(type='colour'){
    const slice=document.querySelector(`.glitch-${type}`);
    if(slice){
      slice.style.animation='none';
      slice.offsetHeight;
      slice.style.animation=`glitch${type.charAt(0).toUpperCase()+type.slice(1)} 0.3s ease-out`;
    }
  },
  randomGlitch(){
    const types=['colour','dark','grey'];
    const interval=3000+Math.random()*5000;
    setTimeout(()=>{
      this.trigger(types[Math.floor(Math.random()*types.length)]);
      this.randomGlitch();
    },interval);
  },
  corruption(){
    const overlay=$('glitch-overlay');
    if(!overlay)return;
    const line=document.createElement('div');
    line.className='corruption-line active';
    line.style.top=(20+Math.random()*60)+'%';
    overlay.appendChild(line);
    setTimeout(()=>line.remove(),800);
  }
};

/* ═══════════════════════════════════════════════════════════════════
   TOUCH EFFECTS
   ═══════════════════════════════════════════════════════════════════ */
const TouchFX={
  init(){
    document.addEventListener('pointerdown',e=>this.ripple(e),{passive:true});
    document.addEventListener('pointerdown',e=>this.glitch(e),{passive:true});
  },
  ripple(e){
    const r=document.createElement('div');
    r.className='touch-ripple';
    r.style.left=(e.clientX-20)+'px';
    r.style.top=(e.clientY-20)+'px';
    r.style.width=r.style.height='40px';
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),800);
  },
  glitch(e){
    if(e.pointerType==='touch'&&e.isPrimary){
      const g=document.createElement('div');
      g.className='glitch-flash';
      document.body.appendChild(g);
      setTimeout(()=>g.remove(),150);
      DetectiveGlitch.corruption();
      if(navigator.vibrate)navigator.vibrate(15);
    }
  },
  tapIndicator(x,y){
    const t=document.createElement('div');
    t.className='tap-indicator';
    t.style.left=(x-30)+'px';
    t.style.top=(y-30)+'px';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),600);
  }
};

/* ═══════════════════════════════════════════════════════════════════
   VHS BACKGROUND - Ghostly Detective Palette
   ═══════════════════════════════════════════════════════════════════ */
const VHS_BG={
  canvas:null,ctx:null,w:0,h:0,
  dust:[],sparks:[],nebulas:[],stars:[],
  glitchTimer:0,raf:0,mouseX:.5,mouseY:.5,
  getDustCount(){return isMobile()?40:80},
  getSparkCount(){return isMobile()?8:15},
  getNebulaCount(){return isMobile()?2:4},
  getStarCount(){return isMobile()?30:60},
  init(){
    this.canvas=$('vhsCanvas');
    this.ctx=this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize',()=>this.resize());
    document.addEventListener('pointermove',e=>{
      this.mouseX=e.clientX/this.w;
      this.mouseY=e.clientY/this.h;
    },{passive:true});
    this.createAll();
    this.draw();
  },
  resize(){this.w=this.canvas.width=window.innerWidth;this.h=this.canvas.height=window.innerHeight;},
  createAll(){
    this.dust=[];this.sparks=[];this.nebulas=[];this.stars=[];
    for(let i=0;i<this.getDustCount();i++) this.dust.push({
      x:Math.random()*this.w, y:Math.random()*this.h,
      vx:(Math.random()-.5)*.2, vy:-.15-Math.random()*.35,
      sz:1+Math.random()*3, baseOp:.02+Math.random()*.06,
      phase:Math.random()*Math.PI*2, freq:.3+Math.random()*.5,
      hue:Math.random()<.5?'grey':'white'
    });
    for(let i=0;i<this.getSparkCount();i++) this.sparks.push({
      x:Math.random()*this.w, y:Math.random()*this.h,
      vx:(Math.random()-.5)*1.5, vy:(Math.random()-.5)*1.5,
      sz:1.5+Math.random(), life:Math.random()*200,maxLife:100+Math.random()*200
    });
    for(let i=0;i<this.getNebulaCount();i++) this.nebulas.push({
      x:Math.random()*this.w, y:Math.random()*this.h,
      vx:(Math.random()-.5)*.15, vy:(Math.random()-.5)*.15,
      r:80+Math.random()*120, phase:Math.random()*Math.PI*2,
      color:['136,153,170','196,175,87','170,187,204','136,170,204'][i]
    });
    for(let i=0;i<this.getStarCount();i++) this.stars.push({
      x:Math.random()*this.w, y:Math.random()*this.h,
      sz:.5+Math.random()*1.5, phase:Math.random()*Math.PI*2,
      speed:.5+Math.random()*2
    });
  },
  draw(){
    const ctx=this.ctx, w=this.w, h=this.h, t=performance.now()*.001;
    if(!w||!h){this.raf=requestAnimationFrame(()=>this.draw());return}
    ctx.fillStyle='rgba(5,5,8,.12)';
    ctx.fillRect(0,0,w,h);
    for(const s of this.stars){
      const twinkle=.3+.7*(.5+.5*Math.sin(t*s.speed+s.phase));
      ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,6.28);
      ctx.fillStyle=`rgba(200,200,210,${.03*twinkle})`;ctx.fill();
    }
    for(const n of this.nebulas){
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<-n.r)n.x=w+n.r; if(n.x>w+n.r)n.x=-n.r;
      if(n.y<-n.r)n.y=h+n.r; if(n.y>h+n.r)n.y=-n.r;
      const pulse=.006+.004*Math.sin(t*.3+n.phase);
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0,`rgba(${n.color},${pulse})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);
    }
    for(const p of this.dust){
      p.phase+=.008;
      p.x+=p.vx+Math.sin(p.phase*p.freq)*.4;
      p.y+=p.vy;
      const dx=p.x-this.mouseX*w, dy=p.y-this.mouseY*h;
      const md=Math.sqrt(dx*dx+dy*dy);
      if(md<150){const f=(150-md)/150*.3;p.x+=dx/md*f;p.y+=dy/md*f;}
      if(p.y<-10){p.y=h+10;p.x=Math.random()*w;}
      if(p.x<-10)p.x=w+10; if(p.x>w+10)p.x=-10;
      const op=p.baseOp*(.7+.3*Math.sin(t*1.5+p.phase));
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,6.28);
      ctx.fillStyle=p.hue==='grey'?`rgba(136,153,170,${op})`:`rgba(220,220,230,${op})`;
      ctx.fill();
    }
    for(const s of this.sparks){
      s.x+=s.vx; s.y+=s.vy; s.life--;
      if(s.life<=0){s.x=Math.random()*w;s.y=Math.random()*h;s.life=s.maxLife;s.vx=(Math.random()-.5)*1.5;s.vy=(Math.random()-.5)*1.5;}
      const fade=Math.min(s.life/s.maxLife,1)*Math.min((s.maxLife-s.life)/20,1);
      ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,6.28);
      ctx.fillStyle=`rgba(200,200,210,${.1*fade})`;ctx.fill();
    }
    this.glitchTimer++;
    if(this.glitchTimer%80<4&&Math.random()<.4){
      const y=Math.random()*h;
      ctx.fillStyle=`rgba(136,153,170,${.012+Math.random()*.02})`;
      ctx.fillRect(0,y,w,1+Math.random()*6);
    }
    if(Math.random()<.015){
      ctx.globalCompositeOperation='screen';
      ctx.fillStyle='rgba(60,70,80,.004)';ctx.fillRect(2,0,w,h);
      ctx.fillStyle='rgba(40,50,60,.004)';ctx.fillRect(-2,0,w,h);
      ctx.globalCompositeOperation='source-over';
    }
    this.raf=requestAnimationFrame(()=>this.draw());
  }
};

/* ═══════════════════════════════════════════════════════════════════

const Snd={
  ctx:null,master:null,clickBuf:null,bgm:null,bgmFadeId:0,bgmFading:false,on:false,

  noise(dur,vol=.05){if(!this.ctx)return;const sz=this.ctx.sampleRate*dur|0,buf=this.ctx.createBuffer(1,sz,this.ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;const s=this.ctx.createBufferSource(),g=this.ctx.createGain(),t=this.ctx.currentTime;s.buffer=buf;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);s.connect(g);g.connect(this.master);s.start()},

const CRT={
  ctx:null,fxCtx:null,w:0,h:0,fxW:0,fxH:0,noiseTex:null,burstTex:null,isBurst:false,rafId:0,resizeTimer:0,
  genTex(density){const c=document.createElement('canvas');c.width=512;c.height=512;const ctx=c.getContext('2d'),img=ctx.createImageData(512,512);const buf=new Uint32Array(img.data.buffer);const dk=0xFF060608,cols=[0xFF1a1a22,0xFF181820,0xFF1c1a24,0xFF161620,0xFF20201e];for(let i=0;i<buf.length;i++)buf[i]=Math.random()<density?cols[Math.random()*5|0]:dk;ctx.putImageData(img,0,0);return c},

  resize(){const r=D.bezel.getBoundingClientRect();this.w=D.crt.width=Math.min(r.width*.5,400)|0;this.h=D.crt.height=Math.min(r.height*.5,300)|0;this.fxW=D.fx.width=r.width|0;this.fxH=D.fx.height=r.height|0},

/* ═══════════════════════════════════════════════════════════════════
   PARTICLE SYSTEM - Ghost Dust
   ═══════════════════════════════════════════════════════════════════ */
const Dust={
  canvas:null,ctx:null,w:0,h:0,
  particles:[],raf:0,active:false,
  getCount(){return isMobile()?60:120},
  init(){
    this.canvas=document.createElement('canvas');
    this.canvas.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1';
    D.particles.appendChild(this.canvas);
    this.ctx=this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize',()=>this.resize());
    for(let i=0;i<this.getCount();i++){
      this.particles.push({
        x:Math.random()*this.w,
        y:Math.random()*this.h,
        vx:(Math.random()-.5)*.25,
        vy:-.25-Math.random()*.7,
        sz:1.5+Math.random()*3.5,
        opacity:.03+Math.random()*.08,
        phase:Math.random()*Math.PI*2,
        freq:.2+Math.random()*.5,
        color:Math.random()<.5?[136,153,170]:[200,200,210],
        wobble:.5+Math.random()*1.2
      });
    }
  },
  resize(){this.w=this.canvas.width=window.innerWidth;this.h=this.canvas.height=window.innerHeight;},
  start(){if(this.active)return;this.active=true;this.loop()},
  stop(){this.active=false;cancelAnimationFrame(this.raf)},
  loop(){
    if(!this.active)return;
    const ctx=this.ctx,w=this.w,h=this.h;
    ctx.clearRect(0,0,w,h);
    const t=performance.now()*.001;
    for(const p of this.particles){
      p.phase+=.006;
      p.x+=p.vx+Math.sin(p.phase*p.freq)*p.wobble*.3;
      p.y+=p.vy;
      if(p.y<-10){p.y=h+10;p.x=Math.random()*w}
      if(p.x<-10)p.x=w+10;if(p.x>w+10)p.x=-10;
      const op=p.opacity*(.7+.3*Math.sin(t*1.2+p.phase));
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.sz,0,6.28);
      ctx.fillStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${op})`;
      ctx.fill();
    }
    this.raf=requestAnimationFrame(()=>this.loop());
  }
};

  booted=true;
  Snd.ensure();
  Snd.sfxPowerOn();
  D.boot.style.opacity='0';
  await sleep(2000);
  D.boot.classList.add('hidden');
  VHS_BG.init();
  CRT.init();

}

/* ═══════════════════════════════════════════════════════════════════
   TAPE SYSTEM
   ═══════════════════════════════════════════════════════════════════ */
function showTapeRack(){
  const rack=$('tape-rack');
  rack.innerHTML=`<div class="rack-header">ARCHIV</div>`;
  TAPES.forEach(t=>{
    const locked=!canPlay(t.id);
    const complete=isDone(t.id);
    const el=document.createElement('div');
    el.className=`vhs-tape${locked?' locked':''}${complete?' complete':''}`;
    el.dataset.id=t.id;
    el.innerHTML=`
      <div class="tape-window">
        <div class="reel"></div>
        <div class="tape-strip"></div>
        <div class="reel"></div>
      </div>
      <div class="tape-label"${t.locked?' style="filter:brightness(0.6)"':''}>${t.title}</div>
      <div class="tape-status">${t.locked?'GESPERRT':t.rating}</div>
      <div class="tape-color" style="background:${t.color}"></div>
      <div class="tape-rating">${t.desc}</div>
    `;
    if(!locked)setupTapeInteraction(el);
    rack.appendChild(el);
  });
}

function setupTapeInteraction(el){
  let ghost=null,startX,startY,offsetX,offsetY;
  const onStart=e=>{
    if(el.classList.contains('locked')||el.classList.contains('seq-locked'))return;
    const rect=el.getBoundingClientRect();
    ghost=document.createElement('div');
    ghost.className='tape-ghost';
    ghost.innerHTML=el.innerHTML;
    document.body.appendChild(ghost);
    startX=e.clientX;startY=e.clientY;
    offsetX=rect.left+e.touches?.[0]?.clientX-startX||0;
    offsetY=rect.top+e.touches?.[0]?.clientY-startY||0;
    el.classList.add('dragging');
    Snd.sfxHover();
    if(isTouch())TouchFX.tapIndicator(startX,startY);
  };
  const onMove=e=>{
    if(!ghost)return;
    const cx=e.clientX||e.touches?.[0]?.clientX;
    const cy=e.clientY||e.touches?.[0]?.clientY;
    ghost.style.left=(cx-70)+'px';
    ghost.style.top=(cy-44)+'px';
    const slotRect=D.slot.getBoundingClientRect();
    const gRect=ghost.getBoundingClientRect();
    const over=!(gRect.right<slotRect.left||gRect.left>slotRect.right||gRect.bottom<slotRect.top||gRect.top>slotRect.bottom);
    D.slot.classList.toggle('active',over);
    if(over&&e.type==='touchmove')DetectiveGlitch.corruption();
  };
  const onEnd=e=>{
    if(!ghost)return;
    const slotRect=D.slot.getBoundingClientRect();
    const gRect=ghost.getBoundingClientRect();
    const over=!(gRect.right<slotRect.left||gRect.left>slotRect.right||gRect.bottom<slotRect.top||gRect.top>slotRect.bottom);
    if(over){
      const id=el.dataset.id;
      D.slot.classList.add('inserting');
      Snd.sfxWhoosh();
      setTimeout(()=>playTape(id),600);
    }
    el.classList.remove('dragging');
    D.slot.classList.remove('active');
    ghost.remove();
    ghost=null;
    setTimeout(()=>D.slot.classList.remove('inserting'),700);
  };
  el.addEventListener('mousedown',onStart);
  el.addEventListener('touchstart',onStart,{passive:true});
  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchmove',onMove,{passive:true});
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchend',onEnd);
  el.addEventListener('click',()=>{
    if(!el.classList.contains('locked')&&!el.classList.contains('seq-locked')){
      el.classList.toggle('selected');
      Snd.typeClick();
    }
  });
}

async function playTape(id){
  const tape=TAPES.find(t=>t.id===id);
  if(!tape||tape.locked)return;
  D.slotLabel.textContent=tape.title;
  D.channel.textContent=`AV-${TAPES.indexOf(id)+1}`;
  D.ledPlay.classList.add('on');
  D.rec.classList.add('on');
  D.counter.classList.add('on');
  D.tracking.classList.add('on');
  D.bezel.classList.add('flash');
  Snd.sfxSnap();
  Snd.sfxMotor();
  Snd.sfxTape(id);
  FX.start(id);
  CRT.burst();
  DetectiveGlitch.corruption();
  await sleep(1200);
  const state=loadState();
  if(!state[id])state[id]={};
  if(!state[id].visited){
    state[id].visited=true;
    localStorage.setItem(KEY,JSON.stringify(state));
  }
  const content=await fetch(tape.file).then(r=>r.text()).catch(()=>null);
  if(!content){
    showError('Archiv nicht gefunden');
    return;
  }
  await fadeToScreen(()=>{
    D.screen.innerHTML=`<div class="boot-text" style="font-family:var(--font-crt);color:var(--colour)">${content}</div>`;
    animateBootText();
  });
  const elapsed=Date.now()-startTime;
  D.counter.textContent=`▶ ${fmt(elapsed/1000)}`;
  let timer=setInterval(()=>{
    const e=Date.now()-startTime;
    D.counter.textContent=`▶ ${fmt(e/1000)}`;
  },1000);
  const done=isDone(id);
  D.screen.onclick=()=>{
    if(done)return;
    const state=loadState();
    if(!state[id])state[id]={};
    state[id].complete=true;
    localStorage.setItem(KEY,JSON.stringify(state));
    clearInterval(timer);
    Snd.sfxSnap();
    showComplete();
  };
}

let startTime=Date.now();
const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

function showComplete(){
  D.screen.innerHTML=`
    <div class="archive">
      <div class="archive-text" style="color:var(--colour-bright);font-family:var(--font-serif)">
        Band abgeschlossen.
      </div>
      <div class="archive-sub" style="font-family:var(--font-detect)">
        ${allDone()?'Alle Geschichten erzählt.':'Zurück zum Archiv...'}
      </div>
    </div>
  `;
  setTimeout(()=>{
    D.ledPlay.classList.remove('on');
    D.rec.classList.remove('on');
    D.counter.classList.remove('on');
    D.tracking.classList.remove('on');
    D.slotLabel.textContent='▶ HIERHER ZIEHEN';
    D.channel.textContent='AV-1';
    D.bezel.classList.remove('flash');
    D.counter.textContent='▶ 00:00';
    startTime=Date.now();
    showTapeRack();
  },2500);
}

function showError(msg){
  D.screen.innerHTML=`<div class="screen-msg">FEHLER: ${msg}</div>`;
  setTimeout(()=>showTapeRack(),2000);
}

function animateBootText(){
  const lines=document.querySelectorAll('.boot-line');
  lines.forEach((l,i)=>l.style.animationDelay=`${i*.15}s`);
}

};

/* ═══════════════════════════════════════════════════════════════════
   STATION INIT
   ═══════════════════════════════════════════════════════════════════ */
function initStation(){
  TouchFX.init();
  DetectiveGlitch.init();
  D.eject.addEventListener('click',()=>{
    Snd.sfxClunk();
    D.ledPlay.classList.remove('on');
    D.rec.classList.remove('on');
    D.counter.classList.remove('on');
    D.tracking.classList.remove('on');
    D.slotLabel.textContent='▶ HIERHER ZIEHEN';
    D.channel.textContent='AV-1';
    D.bezel.classList.remove('flash');
    D.counter.textContent='▶ 00:00';
    startTime=Date.now();
  });
  D.audioBtn.addEventListener('click',()=>Snd.toggle());
  D.boot.addEventListener('click',()=>boot());
  D.boot.addEventListener('touchend',e=>{e.preventDefault();boot()});
  setTimeout(()=>{
    if(!booted){
      D.boot.style.opacity='1';
      D.boot.classList.remove('hidden');
    }
  },100);
}

/* ═══════════════════════════════════════════════════════════════════
   INITIALIZE
   ═══════════════════════════════════════════════════════════════════ */
document.fonts.ready.then(()=>{
  requestAnimationFrame(()=>{
    D.boot.style.opacity='1';
    D.boot.classList.remove('hidden');
  });
});
</script>
</body>
</html>
