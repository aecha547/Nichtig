
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050505">
<title>KOMMENTAR — Ein Spuk in der Realität</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23080810'/%3E%3Cellipse cx='16' cy='14' rx='7' ry='10' fill='%238899aa' opacity='.3'/%3E%3Ccircle cx='14' cy='12' r='1' fill='%23334'/%3E%3Ccircle cx='18' cy='12' r='1' fill='%23334'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Crimson+Text:ital@0;1&display=swap');

:root{
--bg:#080810;--colour:#8899aa;--colour-dim:#556677;--colour-bright:#aabbcc;
--colour-ghost:#99aabb;--gold:#c4af57;--gold-dim:#8a7a3a;--red:#aa4444;
--red-dim:#663333;--font-crt:'VT323',monospace;
--font-serif:'Cormorant Garamond',serif;--font-detect:'Crimson Text',serif;
--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
--safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);
--min-touch:48px;--ease-out-expo:cubic-bezier(0.16,1,0.3,1);
--ease-in-out:cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{height:100%;overflow:hidden;background:#030306;font-family:var(--font-crt);color:var(--colour);touch-action:pan-y pinch-zoom}

@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
@keyframes blink{50%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInSlow{from{opacity:0}to{opacity:1}}
@keyframes breathe{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-2px,1px)}30%{transform:translate(2px,-1px)}50%{transform:translate(-1px,2px)}70%{transform:translate(1px,-1px)}90%{transform:translate(-1px,0)}}
@keyframes ledBreathe{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scanbar{from{top:-4%}to{top:104%}}
@keyframes trackDrift{0%{top:-2%}100%{top:102%}}
@keyframes rayRotate{to{transform:rotate(360deg)}}
@keyframes gentleDrift{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-8px) rotate(.5deg)}50%{transform:translateY(-3px) rotate(-.3deg)}75%{transform:translateY(-10px) rotate(.2deg)}}
@keyframes proFadeUp{from{opacity:0;transform:translateY(20px) scale(.96);filter:blur(3px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
@keyframes proFadeOut{to{opacity:0;transform:translateY(-14px) scale(.97);filter:blur(4px)}}

.glitch-overlay{position:fixed;inset:0;z-index:9990;pointer-events:none;overflow:hidden}
.gl{position:absolute;left:0;width:100%;opacity:0;pointer-events:none}
.gl--colour{height:2px;background:linear-gradient(90deg,transparent 5%,rgba(136,170,204,.5) 25%,rgba(196,175,87,.2) 50%,rgba(136,153,170,.4) 75%,transparent 95%)}
.gl--dark{height:8px;background:linear-gradient(90deg,transparent,rgba(0,0,0,.9) 15%,rgba(3,3,6,1) 50%,rgba(0,0,0,.9) 85%,transparent)}
.gl--grey{height:3px;background:linear-gradient(90deg,transparent,rgba(170,187,204,.15) 30%,rgba(200,200,210,.1) 70%,transparent)}
.gl.flash{animation:glSweep .3s ease-out forwards}
@keyframes glSweep{0%{opacity:0;transform:scaleX(.2) translateX(-50%)}12%{opacity:1;transform:scaleX(1.1) translateX(0)}100%{opacity:0;transform:scaleX(.4) translateX(30%)}}
.corr-bar{position:fixed;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--colour),transparent);opacity:0;z-index:9991;pointer-events:none}
.corr-bar.sweep{animation:corrSweep .5s ease-out forwards}
@keyframes corrSweep{0%{opacity:.5;transform:scaleX(0);transform-origin:left}25%{opacity:.4;transform:scaleX(1)}100%{opacity:0;transform:scaleX(1)}}
.screen-tear{position:fixed;inset:0;z-index:9989;pointer-events:none;opacity:0;background:#030306}
.screen-tear.active{animation:tearFlash .1s steps(1) forwards}
@keyframes tearFlash{0%{opacity:1;clip-path:inset(38% 0 56% 0)}25%{clip-path:inset(41% 0 53% 0);transform:translateX(4px)}50%{clip-path:inset(37% 0 58% 0);transform:translateX(-3px)}75%{clip-path:inset(40% 0 55% 0);transform:translateX(1px)}100%{opacity:0}}
.chroma-burst{position:fixed;inset:0;z-index:9988;pointer-events:none;opacity:0;mix-blend-mode:screen}
.chroma-burst.active{animation:chromaBurst .15s ease-out forwards}
@keyframes chromaBurst{0%{opacity:.3;box-shadow:inset -3px 0 0 rgba(136,170,204,.15),inset 3px 0 0 rgba(170,136,100,.1)}100%{opacity:0}}
.touch-rip{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;border:1px solid var(--colour-dim);opacity:0;animation:tRip .6s ease-out forwards}
@keyframes tRip{0%{transform:scale(0);opacity:.5}100%{transform:scale(2.5);opacity:0}}

#vhs-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#vhs-bg canvas{position:absolute;inset:0;width:100%;height:100%}

/* PROLOGUE */
#prologue{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 1.6s var(--ease-in-out);cursor:pointer;padding:20px;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
#prologue.vis{opacity:1}
#prologue.gone{opacity:0;pointer-events:none}
.pro-ghost{width:clamp(55px,15vw,95px);height:clamp(70px,19vw,120px);margin-bottom:clamp(18px,5vh,40px);opacity:0;transition:opacity 3s ease;filter:drop-shadow(0 0 35px rgba(136,153,170,.25));animation:gentleDrift 9s ease-in-out infinite}
.pro-ghost.show{opacity:1}
.pro-lines-wrap{position:relative;min-height:clamp(60px,14vh,100px);display:flex;align-items:center;justify-content:center;width:100%;max-width:640px}
.pro-line{font-family:var(--font-serif);font-weight:300;font-size:clamp(1rem,3.8vw,1.7rem);color:var(--colour-ghost);text-align:center;line-height:1.9;opacity:0;max-width:600px;letter-spacing:.03em;position:absolute}
.pro-line.show{animation:proFadeUp 1.6s var(--ease-out-expo) forwards}
.pro-line.out{animation:proFadeOut 1.3s ease forwards}
.pro-line em{font-style:italic;color:var(--colour-bright)}
.pro-line .void{color:var(--colour-dim);opacity:.55;font-style:italic}
.pro-line .ache{color:#aa8866;opacity:.7}
.pro-prompt{position:absolute;bottom:clamp(30px,8vh,80px);color:#333;font-family:var(--font-crt);font-size:clamp(.75rem,2vw,1rem);letter-spacing:3px;animation:pulse 2.5s infinite;opacity:0;transition:opacity 1.2s ease}
.pro-prompt.show{opacity:1}
.pro-meta{position:absolute;bottom:clamp(10px,3vh,25px);font-family:var(--font-crt);font-size:clamp(.45rem,1.2vw,.6rem);color:var(--colour-dim);opacity:0;letter-spacing:2px;transition:opacity 1s ease}
.pro-meta.show{opacity:.2}
.pro-watermark{position:absolute;font-family:var(--font-crt);font-size:clamp(2.5rem,10vw,5rem);color:var(--red);opacity:0;transform:rotate(-18deg);letter-spacing:8px;pointer-events:none;text-transform:uppercase;border:3px solid var(--red);padding:4px 20px}
.pro-watermark.flash{animation:watermarkFlash .8s ease-out forwards}
@keyframes watermarkFlash{0%{opacity:0;transform:rotate(-18deg) scale(.8)}15%{opacity:.12;transform:rotate(-18deg) scale(1.02)}100%{opacity:.04;transform:rotate(-18deg) scale(1)}}

/* BOOT */
#boot{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1s var(--ease-in-out)}
#boot.vis{opacity:1;pointer-events:auto}
#boot.gone{opacity:0;pointer-events:none}
.boot-text-container{width:min(85%,500px);text-align:left;font-family:var(--font-crt);font-size:clamp(11px,2vw,15px);color:var(--colour-dim);line-height:2;white-space:pre-wrap;min-height:200px}
.boot-text-container .bline{opacity:0;animation:fadeIn .4s forwards}
.boot-text-container .cursor{display:inline-block;width:7px;height:1.1em;background:var(--colour);vertical-align:text-bottom;margin-left:2px;animation:blink .7s step-end infinite}
.boot-text-container .ok{color:var(--colour)}
.boot-text-container .warn{color:var(--gold-dim)}
.boot-text-container .fail{color:var(--red-dim)}

.audio-btn{position:fixed;top:calc(8px + var(--safe-top));right:calc(8px + var(--safe-right));z-index:200;background:rgba(0,0,0,.5);border:1px solid #1a1a22;border-radius:3px;color:#333;font-family:var(--font-crt);font-size:clamp(9px,2vw,11px);padding:clamp(4px,1vw,6px) clamp(6px,1.5vw,10px);cursor:pointer;transition:all .3s;min-height:var(--min-touch);min-width:50px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.audio-btn:hover,.audio-btn.on{color:var(--colour);border-color:var(--colour-dim)}

/* STATION */
#station{display:none;grid-template-columns:1fr minmax(170px,270px);grid-template-rows:1fr;gap:clamp(8px,2vw,14px);width:min(96vw,1100px);height:min(90vh,760px);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;contain:layout style;padding:max(4px,var(--safe-top)) var(--safe-right) max(4px,var(--safe-bottom)) var(--safe-left)}
#station.on{display:grid;animation:stationIn 2s var(--ease-out-expo) forwards}
@keyframes stationIn{from{opacity:0;transform:translate(-50%,-50%) scale(.94)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

.tv-unit{grid-column:1;grid-row:1;background:linear-gradient(145deg,#111116,#0a0a0e);border-radius:clamp(12px,3vw,22px);border:1.5px solid #1a1a22;box-shadow:inset 0 0 60px rgba(0,0,0,.8),0 15px 60px rgba(0,0,0,.9),0 0 1px rgba(136,153,170,.05);display:flex;flex-direction:column;padding:clamp(10px,2vw,18px);position:relative;z-index:2}
.screen-bezel{flex:1;background:#020203;border-radius:clamp(8px,2vw,14px);position:relative;overflow:hidden;border:1.5px solid #101018;box-shadow:inset 0 0 60px rgba(0,0,0,.95),inset 0 0 2px rgba(136,153,170,.03);transition:border-color .6s,box-shadow .6s;min-height:200px}
.screen-bezel.shake{animation:shake .5s ease-out}
.screen-bezel.flash{border-color:rgba(136,153,170,.15);box-shadow:inset 0 0 60px rgba(0,0,0,.95),0 0 25px rgba(136,153,170,.04),inset 0 0 2px rgba(136,153,170,.06)}
canvas#crt{position:absolute;inset:0;width:100%;height:100%;z-index:5;image-rendering:pixelated}
canvas#fx{position:absolute;inset:0;width:100%;height:100%;z-index:7;opacity:0;transition:opacity 1s;pointer-events:none}
canvas#fx.on{opacity:1}
canvas#scr-anim{position:absolute;inset:0;width:100%;height:100%;z-index:23;opacity:0;transition:opacity 2.5s ease;pointer-events:none}
canvas#scr-anim.on{opacity:1}
.crt-warmup{position:absolute;inset:0;z-index:19;background:radial-gradient(circle,#0a0a12 0%,#030306 60%);transition:opacity 4s ease;pointer-events:none}
.crt-warmup.off{opacity:0}
.scanlines{position:absolute;inset:0;pointer-events:none;z-index:30;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);opacity:.35}
.vignette{position:absolute;inset:0;pointer-events:none;z-index:31;background:radial-gradient(ellipse 85% 85% at center,transparent 40%,rgba(0,0,0,.85) 100%)}
.glass-glare{position:absolute;inset:0;pointer-events:none;z-index:32;background:linear-gradient(125deg,rgba(255,255,255,.015) 0%,transparent 30%,transparent 70%,rgba(255,255,255,.008) 100%)}
.scan-bar{position:absolute;top:0;left:0;width:100%;height:5px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.03),transparent);opacity:.3;z-index:33;pointer-events:none;animation:scanbar 6s linear infinite}
.tracking-bar{position:absolute;left:0;width:100%;height:3px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.05),transparent);opacity:0;z-index:34;pointer-events:none;transition:opacity .3s}
.tracking-bar.on{opacity:1;animation:trackDrift 3s linear infinite}
.screen-glow{position:absolute;inset:-20px;z-index:-1;border-radius:28px;pointer-events:none;transition:background 3s ease}
.ambient-rays{position:absolute;inset:0;z-index:22;pointer-events:none;opacity:0;transition:opacity 4s ease}
.ambient-rays.on{opacity:1}
.ambient-ray{position:absolute;width:200%;height:200%;top:-50%;left:-50%;background:conic-gradient(from 0deg at 50% 50%,transparent 0%,rgba(136,153,170,.008) 5%,transparent 10%,transparent 25%,rgba(196,175,87,.005) 30%,transparent 35%,transparent 50%,rgba(136,153,170,.006) 55%,transparent 60%,transparent 75%,rgba(136,153,170,.005) 80%,transparent 85%);animation:rayRotate 35s linear infinite}
.ambient-ray:nth-child(2){animation-direction:reverse;animation-duration:50s;opacity:.7}
.reality-meter{position:absolute;left:5px;top:18%;bottom:18%;width:2px;z-index:36;pointer-events:none;border-radius:2px;background:rgba(136,153,170,.04);overflow:hidden;opacity:0;transition:opacity 1.5s ease}
.reality-meter.on{opacity:1}
.reality-fill{position:absolute;bottom:0;left:0;width:100%;height:0%;background:linear-gradient(0deg,var(--colour-dim),var(--colour));border-radius:2px;transition:height 2s var(--ease-out-expo)}

.scene-quote{position:absolute;bottom:clamp(14px,3vh,28px);left:50%;transform:translateX(-50%);font-family:var(--font-serif);font-size:clamp(.6rem,1.4vw,.8rem);color:var(--colour-dim);opacity:0;transition:opacity 2.5s ease;letter-spacing:1px;text-align:center;z-index:26;pointer-events:none;font-style:italic;white-space:nowrap}
.scene-quote.show{opacity:.3}

#bg-scenes{position:absolute;inset:0;z-index:21;pointer-events:none;opacity:0;transition:opacity 3s ease}
#bg-scenes.active{opacity:.25}
.bg-scene{position:absolute;inset:0;opacity:0;transition:opacity 4s ease;overflow:hidden}
.bg-scene.active{opacity:1}
.bg-scene svg{position:absolute;inset:0;width:100%;height:100%}
.sc-cafe .wlight{animation:wFlicker 8s ease-in-out infinite}
@keyframes wFlicker{0%,100%{opacity:.1}50%{opacity:.2}}
.sc-cafe .steam{animation:steamR 4s ease-out infinite;transform-origin:bottom}
.sc-cafe .steam:nth-child(2){animation-delay:.9s}
@keyframes steamR{0%{opacity:0;transform:translateY(0) scaleX(1)}30%{opacity:.25}100%{opacity:0;transform:translateY(-35px) scaleX(1.4)}}
.sc-train .fog{animation:fogD 11s ease-in-out infinite}
.sc-train .fog:nth-child(2){animation-delay:3.5s;animation-duration:13s}
@keyframes fogD{0%,100%{opacity:.1;transform:translateX(0)}50%{opacity:.22;transform:translateX(25px)}}
.sc-rain .rd{animation:rainF 1.4s linear infinite}
.sc-rain .rd:nth-child(2){animation-delay:.28s}
.sc-rain .rd:nth-child(3){animation-delay:.56s}
.sc-rain .rd:nth-child(4){animation-delay:.84s}
.sc-rain .rd:nth-child(5){animation-delay:1.12s}
@keyframes rainF{0%{opacity:0;transform:translateY(-20px)}20%{opacity:.3}100%{opacity:0;transform:translateY(100px)}}
.sc-archive .paper{animation:paperF 7s ease-in-out infinite}
.sc-archive .paper:nth-child(2){animation-delay:1.5s;animation-duration:8s}
@keyframes paperF{0%,100%{opacity:.2;transform:translateY(0) rotate(0)}50%{opacity:.4;transform:translateY(-10px) rotate(1.5deg)}}

#screen{position:absolute;inset:0;z-index:25;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(10px,3vw,22px);opacity:1;transition:opacity .8s ease}
#screen.fade-out{opacity:0}
#screen.fade-in{animation:screenFadeIn .8s ease forwards}
@keyframes screenFadeIn{from{opacity:0;filter:blur(3px)}to{opacity:1;filter:blur(0)}}
.channel-id{position:absolute;top:clamp(8px,2vw,14px);left:clamp(8px,2vw,16px);font-size:clamp(.85rem,2vw,1.2rem);color:var(--colour-dim);opacity:.35;text-shadow:0 0 6px var(--colour-dim);letter-spacing:2px;z-index:35}
.rec-ind{position:absolute;top:clamp(8px,2vw,14px);right:clamp(8px,2vw,16px);font-size:clamp(.75rem,1.8vw,.95rem);color:var(--red);opacity:0;transition:opacity .4s;z-index:35}
.rec-ind.on{opacity:1;animation:blink 1s infinite}
.counter{position:absolute;top:clamp(8px,2vw,14px);right:clamp(8px,2vw,16px);font-size:clamp(.8rem,1.8vw,1rem);color:rgba(255,255,255,.4);opacity:0;z-index:35;transition:opacity .5s}
.counter.on{opacity:1}
.dlg-box{position:absolute;bottom:clamp(8px,2vw,16px);left:50%;transform:translateX(-50%);z-index:40;text-align:center;color:var(--colour-bright);font-family:var(--font-serif);font-size:clamp(.85rem,2.5vw,1.2rem);text-shadow:0 0 8px var(--colour);background:rgba(5,5,8,.9);padding:clamp(8px,2vw,12px) clamp(12px,3vw,22px);border-radius:4px;border:1px solid rgba(136,153,170,.08);max-width:90%;line-height:1.5;opacity:0;transition:opacity .6s;pointer-events:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.dlg-box.vis{opacity:1}
.tape-content{width:100%;height:100%;overflow-y:auto;padding:clamp(14px,3vw,28px);font-family:var(--font-serif);font-size:clamp(.85rem,2.5vw,1.15rem);color:var(--colour-bright);line-height:1.7;text-align:left;scrollbar-width:thin;scrollbar-color:rgba(136,153,170,.15) transparent}
.tape-content::-webkit-scrollbar{width:3px}
.tape-content::-webkit-scrollbar-thumb{background:rgba(136,153,170,.15);border-radius:2px}
.screen-msg{font-size:clamp(.9rem,3vw,1.4rem);color:var(--colour-dim);text-shadow:0 0 12px var(--colour-dim);letter-spacing:3px;text-align:center;animation:fadeInSlow 1.5s ease}

.intro-view{display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2.5vw,18px);width:100%;animation:fadeIn 1.5s var(--ease-out-expo)}
.intro-glow{width:clamp(90px,24vw,150px);height:clamp(90px,24vw,150px);background:radial-gradient(circle,rgba(136,153,170,.1) 0%,transparent 70%);border-radius:50%;animation:breathe 5s ease-in-out infinite;display:flex;align-items:center;justify-content:center}
.intro-line{font-family:var(--font-serif);font-size:clamp(.82rem,2.3vw,1.2rem);color:var(--colour-bright);text-align:center;font-style:italic;opacity:0;transform:translateY(10px);transition:opacity 1.2s ease,transform 1.2s var(--ease-out-expo);padding:0 12px;line-height:1.6}
.intro-line.show{opacity:1;transform:translateY(0)}
.intro-line .gold{font-family:var(--font-detect);color:var(--gold)}
.intro-sub{font-family:var(--font-crt);font-size:clamp(.55rem,1.5vw,.75rem);color:var(--colour-dim);opacity:0;letter-spacing:4px;text-transform:uppercase;animation:fadeInSlow 2s 1.8s forwards}
.load-display{text-align:center;width:90%;animation:fadeIn 1s ease;margin-top:clamp(8px,2vw,14px)}
.load-bar{width:clamp(140px,38vw,200px);height:clamp(3px,.8vw,5px);border-radius:3px;overflow:hidden;margin:0 auto;border:1px solid rgba(136,153,170,.15);background:rgba(136,153,170,.04)}
.load-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--colour-dim),var(--colour));transition:width .06s linear}

.archive-view{display:flex;flex-direction:column;align-items:center;gap:clamp(12px,3vw,20px);animation:fadeIn 2.5s var(--ease-out-expo);padding:0 12px}
.archive-text{font-family:var(--font-serif);font-size:clamp(.85rem,2.5vw,1.2rem);color:var(--colour-ghost);text-shadow:0 0 12px rgba(136,153,170,.15);text-align:center;line-height:1.7;font-style:italic}
.archive-dots{display:flex;gap:clamp(6px,1.5vw,10px);align-items:center;justify-content:center}
.archive-dot{width:clamp(5px,1.2vw,7px);height:clamp(5px,1.2vw,7px);border-radius:50%;border:1px solid rgba(136,153,170,.2);background:transparent;transition:all .8s ease}
.archive-dot.filled{background:var(--colour);border-color:var(--colour);box-shadow:0 0 6px rgba(136,153,170,.3)}
.archive-hint{font-family:var(--font-detect);font-size:clamp(.75rem,2vw,1rem);color:var(--colour-dim);opacity:0;animation:fadeInSlow 2s 1s forwards;font-style:italic}

.tv-controls{display:flex;align-items:center;justify-content:space-between;padding:clamp(6px,1.5vw,10px) clamp(8px,2vw,14px);margin-top:clamp(4px,1vw,8px);flex-shrink:0;flex-wrap:wrap;gap:6px}
.power-section{display:flex;align-items:center;gap:5px}
.led{width:clamp(5px,1.5vw,7px);height:clamp(5px,1.5vw,7px);border-radius:50%;transition:all .5s ease;box-shadow:inset 0 0 2px rgba(0,0,0,.6)}
.led.pwr{background:#1a1a22}.led.pwr.on{background:var(--colour);box-shadow:0 0 6px rgba(136,170,204,.4);animation:ledBreathe 3s infinite}
.led.play{background:#1a1a22}.led.play.on{background:var(--colour-dim);box-shadow:0 0 5px rgba(136,153,170,.3)}
.ctrl-label{font-size:clamp(7px,1.5vw,9px);letter-spacing:.12em;color:#333;text-transform:uppercase;margin-left:2px}
.tape-slot{width:clamp(100px,25vw,160px);height:clamp(24px,5vw,30px);background:#030306;border:1px solid #1a1a22;border-radius:3px;box-shadow:inset 0 3px 8px rgba(0,0,0,.9);position:relative;overflow:hidden;transition:all .4s ease;display:flex;align-items:center;justify-content:center;min-height:var(--min-touch);cursor:pointer}
.slot-label{font-size:clamp(7px,1.5vw,9px);letter-spacing:.12em;color:#222;transition:color .4s;position:relative;z-index:2}
.tape-slot.active{border-color:var(--colour-dim);box-shadow:inset 0 3px 8px rgba(0,0,0,.9),0 0 12px rgba(136,153,170,.08)}
.tape-slot.active .slot-label{color:var(--colour);animation:pulse 1.5s infinite}
.tape-slot.inserting{border-color:var(--colour);transition:border-color .2s}
.eject-btn{padding:clamp(4px,1vw,6px) clamp(8px,2vw,14px);background:linear-gradient(180deg,#161618,#0e0e10);border:1px solid #222228;color:#555;cursor:pointer;font-family:var(--font-crt);font-size:clamp(8px,1.5vw,10px);border-radius:3px;letter-spacing:1px;transition:all .2s;min-height:var(--min-touch);min-width:58px}
.eject-btn:hover,.eject-btn:active{background:#141416;color:#999;border-color:#333}
.brand-label{font-size:clamp(7px,1.2vw,10px);letter-spacing:.25em;color:#151518;text-transform:uppercase;display:none}
@media(min-width:600px){.brand-label{display:inline}}

.tape-rack{grid-column:2;grid-row:1;background:linear-gradient(180deg,#0a0a0e,#060608);border:1.5px solid #14141a;border-radius:clamp(6px,1.5vw,12px);padding:clamp(8px,2vw,14px);display:flex;flex-direction:column;gap:clamp(8px,1.5vw,12px);overflow-y:auto;box-shadow:inset 0 0 30px rgba(0,0,0,.7);scrollbar-width:thin;scrollbar-color:#1a1a22 #060608;contain:content}
.rack-header{color:#222;text-align:center;border-bottom:1px solid #111118;padding-bottom:6px;margin-bottom:2px;letter-spacing:3px;font-size:clamp(8px,1.5vw,11px);animation:fadeInSlow 1s ease}

.vhs-tape{min-height:clamp(72px,15vw,90px);background:linear-gradient(180deg,#12121a,#0a0a0e);border-radius:5px;border:1px solid #1e1e28;position:relative;cursor:pointer;transition:border-color .3s,opacity .3s,transform .4s var(--ease-out-expo),box-shadow .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:2px 4px 15px rgba(0,0,0,.5);flex-shrink:0;opacity:0;animation:tapeSlideIn .7s var(--ease-out-expo) forwards}
@keyframes tapeSlideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.vhs-tape:nth-child(2){animation-delay:.06s}.vhs-tape:nth-child(3){animation-delay:.12s}.vhs-tape:nth-child(4){animation-delay:.18s}.vhs-tape:nth-child(5){animation-delay:.24s}.vhs-tape:nth-child(6){animation-delay:.30s}
.vhs-tape.locked{opacity:.25!important;cursor:not-allowed;filter:grayscale(.6) brightness(.7)}
.vhs-tape.complete::after{content:'\2713';position:absolute;top:5px;right:5px;font-size:clamp(9px,1.5vw,12px);color:var(--colour);text-shadow:0 0 5px var(--colour)}
.vhs-tape.selected{border-color:var(--colour-dim);box-shadow:0 0 18px rgba(136,153,170,.12),2px 4px 15px rgba(0,0,0,.5)}
.vhs-tape.selected::before{content:'\25B6 EINLEGEN';position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:clamp(6px,1.2vw,8px);color:var(--colour);letter-spacing:1px;animation:pulse 1.2s infinite;white-space:nowrap}
@media(hover:hover){.vhs-tape:hover:not(.locked){transform:translateY(-3px) scale(1.02);box-shadow:3px 7px 20px rgba(0,0,0,.65);border-color:#28283a;z-index:5}}
.tape-ghost{position:fixed;z-index:9999;pointer-events:none;width:125px;height:78px;background:linear-gradient(180deg,#12121a,#0a0a0e);border:1px solid var(--colour-dim);border-radius:5px;box-shadow:0 12px 35px rgba(0,0,0,.85),0 0 15px rgba(136,153,170,.08);transform:rotate(-3deg) scale(1.05);display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:9px;color:var(--colour)}
.tape-window{position:absolute;top:8px;left:12%;width:76%;height:17px;background:#040406;border-radius:3px;border:1px solid #16161e;display:flex;align-items:center;justify-content:space-around;padding:0 8px;overflow:hidden}
.reel{width:clamp(10px,2vw,13px);height:clamp(10px,2vw,13px);border:1.5px solid #252530;border-radius:50%;background:#050506;position:relative;transition:border-color .3s}
.reel::after{content:'';position:absolute;inset:2px;border:1px solid #16161e;border-radius:50%;background:#020203}
.vhs-tape.selected .reel{border-color:#3a3a48;animation:spin 1.2s linear infinite}
.tape-strip{width:16px;height:1px;background:#16161e}
.tape-label{background:linear-gradient(#d4d0c8,#c4bcb0);color:#1a1a1e;padding:2px 5px;margin-top:clamp(18px,4.5vw,24px);width:84%;text-align:center;font-family:var(--font-serif);font-weight:600;font-size:clamp(8px,1.8vw,11px);transform:rotate(-.5deg);box-shadow:0 1px 3px rgba(0,0,0,.2);border-radius:2px;line-height:1.2}
.tape-status{font-size:clamp(6px,1.1vw,8px);color:#555;letter-spacing:.06em;margin-top:1px}
.tape-dot{position:absolute;top:8px;right:5px;width:4px;height:4px;border-radius:50%}
.tape-desc{position:absolute;bottom:4px;left:5px;font-size:clamp(5px,1vw,7px);color:#3a3a44;font-style:italic;opacity:.6}
.tape-case{position:absolute;bottom:4px;right:5px;font-size:clamp(4px,.9vw,6px);color:#2a2a32;letter-spacing:1px;opacity:.3}

@media(max-width:768px){
#station{grid-template-columns:1fr;grid-template-rows:minmax(280px,1fr) auto;width:100vw;height:auto;position:relative;top:auto;left:auto;transform:none;padding:clamp(6px,2vw,10px);gap:8px;margin:0 auto}

.tape-rack::-webkit-scrollbar{height:3px}.tape-rack::-webkit-scrollbar-track{background:#060608}.tape-rack::-webkit-scrollbar-thumb{background:#1a1a22;border-radius:2px}
.rack-header{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);padding-bottom:0;padding-right:6px;border-bottom:none;border-right:1px solid #111118;margin-bottom:0;margin-right:3px;flex-shrink:0}

.power-section{order:1}.tape-slot{order:3;width:100%;margin-top:4px}.eject-btn{order:2}

.reel{width:10px;height:10px}.tape-label{font-size:7px;margin-top:13px;width:90%}
}

#station{grid-template-columns:minmax(200px,1fr) minmax(100px,200px);grid-template-rows:1fr;height:96vh;width:98vw}

.tape-rack{grid-column:2;grid-row:1;flex-direction:column;overflow-x:hidden;overflow-y:auto;min-height:auto;max-height:none}

@media(-webkit-min-device-pixel-ratio:2),(min-resolution:192dpi){.scanlines{opacity:.25}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}.scan-bar,.tracking-bar{display:none}}
</style>
</head>

<script>
'use strict';

var $=function(id){return document.getElementById(id)};
var sleep=function(ms){return new Promise(function(r){setTimeout(r,ms)})};
var rnd=function(lo,hi){return lo+Math.random()*(hi-lo)};
var isMob=function(){return matchMedia('(max-width:768px)').matches};
var TAU=Math.PI*2;

var SAVE_KEY='larvatus_k_v4';

var TAPES=[
{id:'tape1',title:'AKTE I: Der Beobachter',color:'#7a7a8a',file:'tape1.html',desc:'Wo alles begann'},
{id:'tape2',title:'AKTE II: Die N\u00e4he',color:'#556677',file:'tape2.html',desc:'Die Stille zwischen ihnen'},
{id:'tape3',title:'AKTE III: Das Verschwinden',color:'#667788',file:'tape3.html',desc:'Die Leere die er hinterlie\u00df'},
{id:'tape4',title:'AKTE IV: Die Suche',color:'#8899aa',file:'tape4.html',desc:'Die Antwort'},
{id:'tape5',title:'???: Kommentar',color:'#aabbcc',file:null,desc:'Das Ende',locked:true}
];

var REQS={tape1:[],tape2:['tape1'],tape3:['tape2'],tape4:['tape1','tape2','tape3'],tape5:['tape1','tape2','tape3','tape4']};

var S={phase:'prologue',playing:null,selected:null,counterTimer:null,playStart:0,drag:null,bgmStarted:false};

function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{}}catch(e){return{}}}
function writeSave(s){try{localStorage.setItem(SAVE_KEY,JSON.stringify(s))}catch(e){}}
function isDone(id){var s=loadSave();return !!(s[id]&&s[id].complete)}
function markComplete(id){var s=loadSave();if(!s[id])s[id]={};s[id].complete=true;writeSave(s)}
function countDone(){return TAPES.filter(function(t){return isDone(t.id)}).length}
function canPlay(id){return(REQS[id]||[]).every(isDone)}
function findTape(id){return TAPES.find(function(t){return t.id===id})}

var D={};
function cacheDom(){
['prologue','pro-ghost','pro-prompt','pro-meta','pro-watermark',
'boot','boot-text','audio-btn','station','screen-bezel','crt','fx','warmup',
'screen-glow','screen','channel-id','rec-ind','counter',
'tracking-bar','tape-slot','slot-label','led-pwr','led-play',
'dlg','tape-rack','eject-btn','reality-meter','reality-fill',
'ambient-rays','bg-scenes','glitch-overlay','screen-tear','chroma-burst',
'vhsCanvas','scr-anim','scene-quote'].forEach(function(id){
var key=id.replace(/-([a-z])/g,function(_,c){return c.toUpperCase()});
D[key]=$(id);
});
}

/* ═══ PROLOGUE ═══ */
var PROLOGUE_LINES=[
{html:'<em>Stille.</em>',delay:0,show:2200},
{html:'Die Art von Stille, die jemand hinterl\u00e4sst.',delay:2400,show:2000},
{html:'Er beobachtete das Leben \u2014<br><span class="void">lebte es aber nie.</span>',delay:4600,show:2200},
{html:'Bis <span class="ache">sie</span> kam.',delay:7000,show:1400},
{html:'<em>War er \u00fcberhaupt real?</em>',delay:8600,show:1400}
];

function runPrologue(){
D.prologue.classList.add('vis');
setTimeout(function(){D.proGhost.classList.add('show')},400);
setTimeout(function(){D.proPrompt.classList.add('show');D.proMeta.classList.add('show')},1400);
}

function startPrologueSequence(){
D.proPrompt.classList.remove('show');
setTimeout(function(){D.proWatermark.classList.add('flash')},200);
Snd.ensure();
Snd.playBGM();

PROLOGUE_LINES.forEach(function(line,i){
var el=$('pro-'+i);
if(!el)return;
setTimeout(function(){
el.innerHTML=line.html;
el.classList.remove('out');
el.classList.add('show');
Glitch.fire('colour');

function pxy(e){return{x:e.clientX,y:e.clientY}}

function onTapeDown(e){
var el=e.target.closest('.vhs-tape');
if(!el||el.classList.contains('locked')||S.playing)return;
S.drag={el:el,id:el.dataset.id,sx:e.clientX,sy:e.clientY,dragging:false,ghost:null};

function onTapeMove(e){
var d=S.drag;if(!d)return;
var dx=e.clientX-d.sx,dy=e.clientY-d.sy;
if(!d.dragging&&Math.sqrt(dx*dx+dy*dy)>14){
d.dragging=true;d.el.style.opacity='0.25';
var ghost=document.createElement('div');ghost.className='tape-ghost';
var tape=findTape(d.id);ghost.textContent=tape?tape.title:'';
document.body.appendChild(ghost);d.ghost=ghost;
}
if(d.dragging&&d.ghost){
d.ghost.style.left=(e.clientX-62)+'px';d.ghost.style.top=(e.clientY-39)+'px';
var sr=D.tapeSlot.getBoundingClientRect(),gr=d.ghost.getBoundingClientRect();
var over=!(gr.right<sr.left||gr.left>sr.right||gr.bottom<sr.top||gr.top>sr.bottom);
D.tapeSlot.classList.toggle('active',over);
if(over)Glitch.corruption();
}
}

function onTapeUp(){
var d=S.drag;if(!d)return;
if(d.dragging&&d.ghost){
var sr=D.tapeSlot.getBoundingClientRect(),gr=d.ghost.getBoundingClientRect();
var over=!(gr.right<sr.left||gr.left>sr.right||gr.bottom<sr.top||gr.top>sr.bottom);
d.ghost.remove();d.el.style.opacity='';D.tapeSlot.classList.remove('active');
if(over)insertTape(d.id);
}else{tapeClick(d.el,d.id)}

function onTapeCancel(){

d.el.style.opacity='';D.tapeSlot.classList.remove('active');S.drag=null;

/* ═══ SCREEN ANIMATIONS — 6 scenes ═══ */
var ScreenAnim={
canvas:null,ctx:null,w:0,h:0,raf:0,active:false,
scene:0,sceneT:0,sceneDur:11000,
QUOTES:[
'Geistwalzer','Der Beobachter','Regenged\u00e4chtnis',
'Die T\u00e4nzerin','Verlorene Worte','Abwesenheit'
],
dust:[],

init:function(){
this.canvas=D.scrAnim;
this.ctx=this.canvas.getContext('2d');
this.resize();
var self=this;
window.addEventListener('resize',function(){self.resize()});
for(var i=0;i<18;i++){
this.dust.push({x:Math.random(),y:Math.random(),vx:rnd(-.0003,.0003),vy:rnd(-.001,-.0002),sz:rnd(.5,2),op:rnd(.03,.12),ph:Math.random()*TAU});
}
},

resize:function(){
if(!this.canvas)return;
var r=D.screenBezel.getBoundingClientRect();
this.w=this.canvas.width=Math.max(r.width|0,1);
this.h=this.canvas.height=Math.max(r.height|0,1);
},

start:function(){
if(this.active)return;
this.active=true;
this.canvas.classList.add('on');
this.sceneT=performance.now();
this.scene=Math.floor(Math.random()*6);
this.updateQuote();
var self=this;
var draw=function(now){
if(!self.active)return;
self.render(now);
self.raf=requestAnimationFrame(draw);
};
this.raf=requestAnimationFrame(draw);
},

stop:function(){
this.active=false;
cancelAnimationFrame(this.raf);
this.canvas.classList.remove('on');
D.sceneQuote.classList.remove('show');
},

updateQuote:function(){
D.sceneQuote.textContent=this.QUOTES[this.scene]||'';
D.sceneQuote.classList.remove('show');
var self=this;
setTimeout(function(){if(self.active)D.sceneQuote.classList.add('show')},500);
},

render:function(now){
var ctx=this.ctx,w=this.w,h=this.h;
if(!w||!h)return;
var elapsed=now-this.sceneT;
if(elapsed>this.sceneDur){
this.scene=(this.scene+1)%6;
this.sceneT=now;
elapsed=0;
this.updateQuote();
}
var fade=1;
if(elapsed<1500)fade=elapsed/1500;
else if(elapsed>this.sceneDur-1500)fade=Math.max(0,(this.sceneDur-elapsed)/1500);

ctx.clearRect(0,0,w,h);
ctx.globalAlpha=fade*.35;
var t=now*.001;

switch(this.scene){
case 0:this.drawWaltz(ctx,w,h,t);break;
case 1:this.drawObserver(ctx,w,h,t);break;
case 2:this.drawRain(ctx,w,h,t);break;
case 3:this.drawBallerina(ctx,w,h,t);break;
case 4:this.drawWords(ctx,w,h,t);break;
case 5:this.drawAbsence(ctx,w,h,t);break;
}

/* floating dust */
ctx.globalAlpha=fade*.15;
for(var i=0;i<this.dust.length;i++){
var p=this.dust[i];
p.x+=p.vx;p.y+=p.vy;p.ph+=.008;
if(p.y<-.02){p.y=1.02;p.x=Math.random()}
if(p.x<-.02)p.x=1.02;if(p.x>1.02)p.x=-.02;
var op=p.op*(.5+.5*Math.sin(t*1.5+p.ph));
ctx.globalAlpha=op*fade;
ctx.fillStyle='#aabbcc';
ctx.beginPath();ctx.arc(p.x*w,p.y*h,p.sz,0,TAU);ctx.fill();
}
ctx.globalAlpha=1;
},

/* Helper: draw a ghostly figure */
ghost:function(ctx,x,y,scale,sway){
ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
var s=sway||0;
/* body */
ctx.beginPath();
ctx.moveTo(0,-30);
ctx.bezierCurveTo(-12+s,-25,-16+s,-5,-14+s*1.2,25);
ctx.lineTo(14-s*1.2,25);
ctx.bezierCurveTo(16-s,-5,12-s,-25,0,-30);
ctx.closePath();
ctx.fillStyle='rgba(136,153,170,.18)';ctx.fill();
/* head */
ctx.beginPath();ctx.ellipse(0,-32,6,8,0,0,TAU);
ctx.fillStyle='rgba(153,170,187,.2)';ctx.fill();
/* eyes */
ctx.fillStyle='rgba(20,20,30,.4)';
ctx.beginPath();ctx.arc(-2.5,-33,1,0,TAU);ctx.fill();
ctx.beginPath();ctx.arc(2.5,-33,1,0,TAU);ctx.fill();
ctx.restore();
},

/* Scene 0: Ghost Waltz — two figures orbiting */
drawWaltz:function(ctx,w,h,t){
var cx=w*.5,cy=h*.48,r=w*.12;
var a1=t*.4,a2=a1+Math.PI;
var x1=cx+Math.cos(a1)*r,y1=cy+Math.sin(a1)*r*.5;
var x2=cx+Math.cos(a2)*r,y2=cy+Math.sin(a2)*r*.5;

/* connection glow */
var g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.5);
g.addColorStop(0,'rgba(136,153,170,.06)');g.addColorStop(1,'transparent');
ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

/* trail */
ctx.strokeStyle='rgba(136,153,170,.04)';ctx.lineWidth=1;ctx.beginPath();
for(var i=0;i<20;i++){
var tt=t*.4-i*.04;
ctx.lineTo(cx+Math.cos(tt)*r,cy+Math.sin(tt)*r*.5);
}ctx.stroke();

var sw1=Math.sin(t*2)*.8;
var sw2=Math.sin(t*2+1)*.8;
this.ghost(ctx,x1,y1,.8,sw1);
this.ghost(ctx,x2,y2,.8,sw2);

/* floor reflection */
ctx.fillStyle='rgba(136,153,170,.02)';
ctx.beginPath();ctx.ellipse(cx,cy+h*.22,r*1.8,8,0,0,TAU);ctx.fill();
},

/* Scene 1: Observer — single figure standing still */
drawObserver:function(ctx,w,h,t){
var cx=w*.5,cy=h*.55;
var sway=Math.sin(t*.5)*1.5;

/* distant light */
var g=ctx.createRadialGradient(cx,h*.15,0,cx,h*.15,w*.4);
g.addColorStop(0,'rgba(170,187,204,.04)');g.addColorStop(1,'transparent');
ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

this.ghost(ctx,cx,cy,1.2,sway);

/* shadow */
ctx.fillStyle='rgba(0,0,0,.08)';
ctx.beginPath();ctx.ellipse(cx,cy+38,18,4,0,0,TAU);ctx.fill();

/* fog layers */
for(var i=0;i<3;i++){
var fy=h*(.7+i*.08);
var fx=w*.5+Math.sin(t*.2+i*2)*w*.15;
ctx.fillStyle='rgba(136,153,170,.015)';
ctx.beginPath();ctx.ellipse(fx,fy,w*.3,12,0,0,TAU);ctx.fill();
}

/* blinking eyes occasionally */
var blink=Math.sin(t*3)>.97;
if(blink){
ctx.fillStyle='rgba(136,170,204,.15)';
ctx.beginPath();ctx.arc(cx-3,cy-33-4,1.5,0,TAU);ctx.fill();
ctx.beginPath();ctx.arc(cx+3,cy-33-4,1.5,0,TAU);ctx.fill();
}
},

/* Scene 2: Rain Memory */
drawRain:function(ctx,w,h,t){
/* rain drops */
ctx.strokeStyle='rgba(136,153,170,.12)';ctx.lineWidth=1;
for(var i=0;i<35;i++){
var rx=(i*37+t*40*((i%3)+1))%w;
var ry=(i*53+t*80*((i%2)+1))%h;
ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-1,ry+rnd(8,18));ctx.stroke();
}

/* puddle ripples */
var py=h*.82;
for(var j=0;j<4;j++){
var px=w*(.15+j*.22);
var rr=(t*30+j*90)%60;
var rop=Math.max(0,1-rr/60)*.08;
ctx.strokeStyle='rgba(136,153,170,'+rop+')';ctx.lineWidth=.5;
ctx.beginPath();ctx.ellipse(px,py,rr,rr*.25,0,0,TAU);ctx.stroke();
}

/* faint silhouette in rain */
ctx.save();ctx.globalAlpha*=.4;
this.ghost(ctx,w*.5,h*.55,.9,Math.sin(t)*.3);
ctx.restore();
},

/* Scene 3: Ballerina */
drawBallerina:function(ctx,w,h,t){
var cx=w*.5,cy=h*.5;
var rot=t*.3;

/* spotlight */
var g=ctx.createRadialGradient(cx,h*.2,0,cx,h*.2,w*.35);
g.addColorStop(0,'rgba(196,175,87,.03)');g.addColorStop(1,'transparent');
ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

ctx.save();ctx.translate(cx,cy);

/* body */
var bodyLean=Math.sin(rot)*.15;
ctx.rotate(bodyLean);

/* torso */
ctx.fillStyle='rgba(153,170,187,.15)';
ctx.beginPath();ctx.moveTo(0,-25);
ctx.bezierCurveTo(-8,-18,-6,5,-2,15);
ctx.lineTo(2,15);
ctx.bezierCurveTo(6,5,8,-18,0,-25);
ctx.fill();

/* head */
ctx.beginPath();ctx.ellipse(0,-28,5,6,0,0,TAU);
ctx.fillStyle='rgba(170,187,204,.18)';ctx.fill();

/* arms */
var armA=Math.sin(rot*2)*.8;
ctx.strokeStyle='rgba(153,170,187,.12)';ctx.lineWidth=1.5;
ctx.beginPath();ctx.moveTo(-3,-15);
ctx.quadraticCurveTo(-20+armA*5,-25+Math.cos(rot*2)*8,-28+armA*8,-18);ctx.stroke();
ctx.beginPath();ctx.moveTo(3,-15);
ctx.quadraticCurveTo(20-armA*5,-25-Math.cos(rot*2)*8,28-armA*8,-18);ctx.stroke();

/* legs */
var legA=Math.sin(rot*2+1)*12;
ctx.beginPath();ctx.moveTo(-1,15);ctx.lineTo(-6+legA*.3,40);ctx.stroke();
ctx.beginPath();ctx.moveTo(1,15);ctx.lineTo(6-legA*.3,35+Math.abs(legA)*.3);ctx.stroke();

/* tutu */
ctx.fillStyle='rgba(136,153,170,.06)';
ctx.beginPath();ctx.ellipse(0,14,14,4,.1,0,TAU);ctx.fill();

ctx.restore();

/* floor */
ctx.fillStyle='rgba(136,153,170,.02)';
ctx.beginPath();ctx.ellipse(cx,cy+45,25,5,0,0,TAU);ctx.fill();

/* trail particles */
for(var i=0;i<8;i++){
var pa=rot*2-i*.3;
var px=cx+Math.cos(pa)*22;
var py2=cy+Math.sin(pa)*8+i*2;
var pop=Math.max(0,1-i/8)*.08;
ctx.fillStyle='rgba(170,187,204,'+pop+')';
ctx.beginPath();ctx.arc(px,py2,1,0,TAU);ctx.fill();
}
},

/* Scene 4: Lost Words */
drawWords:function(ctx,w,h,t){
var words=['Leere','Stille','War er real?','Kommentar','Sie','Warum?','Erinnerung','Verschwunden'];
ctx.font=(Math.min(w,h)*.06|0)+'px "Cormorant Garamond",serif';
ctx.textAlign='center';ctx.textBaseline='middle';

for(var i=0;i<words.length;i++){
var phase=t*.15+i*1.3;
var wx=w*(.15+((Math.sin(phase*.7+i)*0.5+0.5)*.7));
var wy=h*(.1+((Math.cos(phase*.5+i*2)*0.5+0.5)*.8));
var wop=.04+.06*Math.sin(phase*2);
var wrot=Math.sin(phase*.3+i)*.12;

ctx.save();
ctx.translate(wx,wy);
ctx.rotate(wrot);
ctx.globalAlpha=wop;
ctx.fillStyle='#aabbcc';
ctx.fillText(words[i],0,0);
ctx.restore();
}
},

/* Scene 5: Absence — fading afterimage */
drawAbsence:function(ctx,w,h,t){
var cx=w*.5,cy=h*.5;
var pulse=.4+.3*Math.sin(t*.4);

/* seated figure afterimage */
ctx.save();ctx.translate(cx,cy);ctx.globalAlpha*=pulse;

/* body - seated */
ctx.fillStyle='rgba(136,153,170,.1)';
ctx.beginPath();
ctx.moveTo(0,-20);
ctx.bezierCurveTo(-10,-15,-12,0,-10,10);
ctx.lineTo(-15,20);/* bent knee */
ctx.lineTo(-5,22);
ctx.lineTo(0,12);
ctx.lineTo(5,22);
ctx.lineTo(15,20);
ctx.lineTo(10,10);
ctx.bezierCurveTo(12,0,10,-15,0,-20);
ctx.fill();

/* head, slightly tilted down */
ctx.beginPath();ctx.ellipse(-1,-24,5,7,-.15,0,TAU);
ctx.fillStyle='rgba(153,170,187,.12)';ctx.fill();
ctx.restore();

/* glow around absence */
var g=ctx.createRadialGradient(cx,cy,0,cx,cy,w*.25);
g.addColorStop(0,'rgba(136,153,170,'+(.02*pulse)+')');
g.addColorStop(1,'transparent');
ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

/* chair hint */
ctx.strokeStyle='rgba(136,153,170,.03)';ctx.lineWidth=1;
ctx.beginPath();
ctx.moveTo(cx-20,cy+22);ctx.lineTo(cx-22,cy+40);
ctx.moveTo(cx+20,cy+22);ctx.lineTo(cx+22,cy+40);
ctx.moveTo(cx-22,cy+10);ctx.lineTo(cx+22,cy+10);
ctx.stroke();

/* fading text */
var fadeText=Math.sin(t*.2)*.03+.02;
ctx.globalAlpha=fadeText;
ctx.font=(Math.min(w,h)*.04|0)+'px "Cormorant Garamond",serif';
ctx.fillStyle='#aabbcc';ctx.textAlign='center';
ctx.fillText('Er war hier.',cx,cy+h*.35);
ctx.globalAlpha=1;
}
};

/* ═══ VHS BG ═══ */
var VHS={
canvas:null,ctx:null,w:0,h:0,dust:[],nebulas:[],raf:0,
init:function(){
this.canvas=D.vhsCanvas;this.ctx=this.canvas.getContext('2d');
this.resize();
var self=this;window.addEventListener('resize',function(){self.resize()});
var dN=isMob()?35:60;
for(var i=0;i<dN;i++){
this.dust.push({x:Math.random()*this.w,y:Math.random()*this.h,vx:rnd(-.08,.08),vy:rnd(-.35,-.08),sz:rnd(1,3),op:rnd(.015,.05),phase:Math.random()*TAU,freq:rnd(.25,.55)});
}
var nCols=['136,153,170','196,175,87','170,187,204'];
var nN=isMob()?2:3;
for(var j=0;j<nN;j++){
this.nebulas.push({x:Math.random()*this.w,y:Math.random()*this.h,vx:rnd(-.08,.08),vy:rnd(-.08,.08),r:rnd(80,150),phase:Math.random()*TAU,color:nCols[j]});
}
this.draw();
},
resize:function(){this.w=this.canvas.width=window.innerWidth;this.h=this.canvas.height=window.innerHeight},
draw:function(){
var self=this,ctx=this.ctx,w=this.w,h=this.h,t=performance.now()*.001;
if(!w||!h){this.raf=requestAnimationFrame(function(){self.draw()});return}
ctx.fillStyle='rgba(3,3,6,.1)';ctx.fillRect(0,0,w,h);
for(var i=0;i<this.nebulas.length;i++){
var n=this.nebulas[i];n.x+=n.vx;n.y+=n.vy;
if(n.x<-n.r)n.x=w+n.r;if(n.x>w+n.r)n.x=-n.r;
if(n.y<-n.r)n.y=h+n.r;if(n.y>h+n.r)n.y=-n.r;
var pulse=.004+.003*Math.sin(t*.3+n.phase);
var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
g.addColorStop(0,'rgba('+n.color+','+pulse+')');g.addColorStop(1,'transparent');
ctx.fillStyle=g;ctx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);
}
for(var j=0;j<this.dust.length;j++){
var p=this.dust[j];p.phase+=.005;
p.x+=p.vx+Math.sin(p.phase*p.freq)*.25;p.y+=p.vy;
if(p.y<-10){p.y=h+10;p.x=Math.random()*w}
if(p.x<-10)p.x=w+10;if(p.x>w+10)p.x=-10;
var op=p.op*(.6+.4*Math.sin(t*1.2+p.phase));
ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,TAU);
ctx.fillStyle='rgba(136,153,170,'+op+')';ctx.fill();
}
if(Math.random()<.025){
var ly=Math.random()*h;
ctx.fillStyle='rgba(136,153,170,'+(0.008+Math.random()*.012)+')';
ctx.fillRect(0,ly,w,1+Math.random()*3);
}
this.raf=requestAnimationFrame(function(){self.draw()});
}
};

ctx:null,fxCtx:null,w:0,h:0,fxW:0,fxH:0,

/* ═══ FX TRANSITIONS ═══ */
var FX={
raf:0,active:false,
start:function(tapeId){
this.stop();this.active=true;D.fx.classList.add('on');CRT.resize();
var ctx=CRT.fxCtx,w=CRT.fxW,h=CRT.fxH;if(!w||!h)return;
var tape=findTape(tapeId);var col=tape?tape.color:'#8899aa';
var pts=[];
for(var i=0;i<22;i++){
pts.push({x:Math.random()*w,y:Math.random()*h,vx:rnd(-.8,.8),vy:rnd(-1.8,-.4),sz:rnd(1.5,3.5),a:rnd(.15,.45),rot:Math.random()*TAU,rv:rnd(-.04,.04)});
}
var t0=performance.now(),self=this;
var render=function(now){
if(!self.active)return;
var p=Math.min((now-t0)/4000,1);ctx.clearRect(0,0,w,h);
var fade=p>.8?1-(p-.8)/.2:Math.min(p/.12,1);
ctx.fillStyle=col;
for(var j=0;j<pts.length;j++){
var pt=pts[j];pt.y+=pt.vy*.35;pt.x+=pt.vx*.12+Math.sin(pt.rot)*.35;pt.rot+=pt.rv;
if(pt.y<-10){pt.y=h+10;pt.x=Math.random()*w}
ctx.globalAlpha=pt.a*fade*.35;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.sz,0,TAU);ctx.fill();
}
ctx.globalAlpha=1;
if(p<1)self.raf=requestAnimationFrame(render);else self.stop();
};
this.raf=requestAnimationFrame(render);
},

/* ═══ AUDIO ═══ */
var Snd={
ctx:null,master:null,clickBuf:null,on:false,
humOsc:null,humGain:null,bgmAudio:null,bgmReady:false,

init:function(){
if(this.ctx)return;
this.ctx=new(window.AudioContext||window.webkitAudioContext)();
this.master=this.ctx.createGain();this.master.gain.value=0;
this.master.connect(this.ctx.destination);
var sr=this.ctx.sampleRate,len=(sr*.008)|0;
this.clickBuf=this.ctx.createBuffer(1,len,sr);
var d=this.clickBuf.getChannelData(0);
for(var i=0;i<len;i++)d[i]=(.5-Math.random())*.1*Math.exp(-i/(len*.15));
},
resume:function(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()},
vol:function(v){
if(!this.master)return;var t=this.ctx.currentTime;
this.master.gain.cancelScheduledValues(t);
this.master.gain.setValueAtTime(this.master.gain.value,t);
this.master.gain.linearRampToValueAtTime(v,t+.5);
},
note:function(f,dur,type,vol){
if(!this.ctx)return;
var o=this.ctx.createOscillator(),g=this.ctx.createGain(),t=this.ctx.currentTime;
o.type=type||'triangle';o.frequency.value=f;
g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(vol||.05,t+.01);
g.gain.exponentialRampToValueAtTime(.001,t+dur);
o.connect(g);g.connect(this.master);o.start();o.stop(t+dur+.05);
},
noise:function(dur,vol){
if(!this.ctx)return;var sz=(this.ctx.sampleRate*dur)|0;
var buf=this.ctx.createBuffer(1,sz,this.ctx.sampleRate);
var d=buf.getChannelData(0);for(var i=0;i<sz;i++)d[i]=Math.random()*2-1;
var s=this.ctx.createBufferSource(),g=this.ctx.createGain(),t=this.ctx.currentTime;
s.buffer=buf;g.gain.setValueAtTime(vol||.05,t);
g.gain.exponentialRampToValueAtTime(.001,t+dur);
s.connect(g);g.connect(this.master);s.start();
},
click:function(){
if(!this.ctx||!this.clickBuf)return;
var s=this.ctx.createBufferSource();s.buffer=this.clickBuf;
s.connect(this.master);s.start();
},
startHum:function(){
if(!this.ctx||this.humOsc)return;
this.humOsc=this.ctx.createOscillator();this.humGain=this.ctx.createGain();
this.humOsc.type='sine';this.humOsc.frequency.value=60;this.humGain.gain.value=.005;
this.humOsc.connect(this.humGain);this.humGain.connect(this.master);this.humOsc.start();
},
stopHum:function(){if(this.humOsc){this.humOsc.stop();this.humOsc=null;this.humGain=null}},
sfxPowerOn:function(){this.noise(.25,.1);this.note(180,.1,'square',.07);var self=this;setTimeout(function(){self.note(45,.12,'sawtooth',.05)},80)},
sfxClunk:function(){this.note(60,.1,'square',.08);this.noise(.04,.06)},
sfxSnap:function(){this.note(600,.04,'sine',.06);var self=this;setTimeout(function(){self.note(150,.04,'sine',.03)},30)},
sfxReady:function(){var self=this;this.note(380,.12,'sine',.03);setTimeout(function(){self.note(480,.12,'sine',.03)},120);setTimeout(function(){self.note(560,.15,'sine',.03)},240)},
sfxMotor:function(){
if(!this.ctx)return;var t=this.ctx.currentTime;
var o=this.ctx.createOscillator(),g=this.ctx.createGain();
o.type='sawtooth';o.frequency.value=50;
g.gain.setValueAtTime(.02,t);g.gain.linearRampToValueAtTime(0,t+.9);
o.connect(g);g.connect(this.master);o.start();o.stop(t+1);
},
preloadBGM:function(){
if(this.bgmAudio)return;var self=this;
var a=new Audio();a.loop=true;a.volume=0;a.preload='auto';
a.addEventListener('canplaythrough',function(){self.bgmReady=true},{once:true});
a.src='MEMORY.mp3';this.bgmAudio=a;
},
playBGM:function(){
if(!this.bgmAudio||S.bgmStarted)return;
if(!this.bgmReady){
var self=this;var check=setInterval(function(){
if(self.bgmReady){clearInterval(check);self.playBGM()}
},200);return;
}
S.bgmStarted=true;var a=this.bgmAudio;
a.currentTime=0;
a.play().then(function(){
/* Music has 10s silence. Start fading in around second 8 so volume is
   audible right when the actual melody begins at ~10s */
var started=Date.now();
var fadeIn=function(){
if(!S.bgmStarted)return;
var elapsed=(Date.now()-started)/1000;
if(elapsed<7.5){requestAnimationFrame(fadeIn);return}
if(a.volume<0.15){a.volume=Math.min(a.volume+0.0012,0.15);requestAnimationFrame(fadeIn)}
};
requestAnimationFrame(fadeIn);
}).catch(function(){S.bgmStarted=false});
},
stopBGM:function(){
S.bgmStarted=false;if(!this.bgmAudio)return;var a=this.bgmAudio;
var fadeOut=function(){
if(a.volume>.004){a.volume=Math.max(a.volume-.002,0);requestAnimationFrame(fadeOut)}
else a.pause();
};requestAnimationFrame(fadeOut);
},
ensure:function(){
this.init();this.resume();
if(!this.on){this.on=true;this.vol(.3);this.startHum();
D.audioBtn.textContent='\u266A AN';D.audioBtn.classList.add('on');this.preloadBGM()}
},
toggle:function(){
this.init();this.resume();this.on=!this.on;
this.vol(this.on?.3:0);
if(this.on){this.startHum();if(this.bgmReady&&!S.bgmStarted)this.playBGM()}
else{this.stopBGM();this.stopHum()}
D.audioBtn.textContent=this.on?'\u266A AN':'\u266A AUS';
D.audioBtn.classList.toggle('on',this.on);
}
};
