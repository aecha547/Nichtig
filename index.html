<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#010102">
<title>KOMMENTAR — Ein Spuk in der Realität</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400;1,600&family=VT323&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#010102;
  --c:#8a9bae;
  --c-dim:#4a5a6e;
  --c-bright:#cfe8ff;
  --c-ghost:#7a8b9e;
  --gold:#b89b5f;
  --red:#8b2a3a;
  --red-dim:#5a1a28;
  --panel:#0b0b10;
  --font-crt:'VT323', monospace;
  --font-serif:'Cormorant Garamond', serif;
  --font-title:'Cinzel', serif;
  --ease-expo:cubic-bezier(0.16,1,0.3,1);
  --ease-io:cubic-bezier(0.4,0,0.2,1);
}

*,*::before,*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--c);
  touch-action:none;
  cursor:none;
  font-family:var(--font-crt);
}

.svg-sprite{
  position:absolute;
  width:0;
  height:0;
  overflow:hidden;
}

@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.9}}
@keyframes blink{50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes scanbar{from{top:-5%}to{top:105%}}
@keyframes trackDrift{0%{top:-3%}100%{top:103%}}
@keyframes stationIn{from{opacity:0;transform:translate(-50%,-50%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes tapeSlide{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes tearFlash{
  0%{opacity:1;clip-path:inset(35% 0 60% 0)}
  33%{clip-path:inset(42% 0 52% 0);transform:translateX(8px)}
  66%{clip-path:inset(32% 0 62% 0);transform:translateX(-6px)}
  100%{opacity:0;clip-path:inset(35% 0 60% 0);transform:none}
}
@keyframes chromaBurst{
  0%{opacity:.55;box-shadow:inset -6px 0 0 rgba(136,170,204,.25), inset 6px 0 0 rgba(170,136,100,.2)}
  100%{opacity:0}
}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:.8}
  50%{transform:scale(1.12);opacity:1}
}
@keyframes haloPulse{
  0%,100%{filter:drop-shadow(0 0 25px rgba(138,155,174,.16))}
  50%{filter:drop-shadow(0 0 40px rgba(207,232,255,.28))}
}

#cur{
  position:fixed;
  top:0;
  left:0;
  width:16px;
  height:16px;
  border:1.5px solid rgba(207,232,255,.6);
  border-radius:50%;
  pointer-events:none;
  z-index:999999;
  mix-blend-mode:difference;
  transform:translate(-50%,-50%);
  transition:width .15s,height .15s,background .15s,opacity .15s;
}
#cur::after{
  content:'';
  position:absolute;
  inset:0;
  margin:auto;
  width:4px;
  height:4px;
  background:rgba(207,232,255,.9);
  border-radius:50%;
}
#cur.big{width:32px;height:32px;background:rgba(207,232,255,.1);border-color:var(--c-bright)}
#cur.hide{opacity:0}

#flash{
  position:fixed;
  inset:0;
  z-index:999998;
  background:#fff;
  opacity:0;
  pointer-events:none;
  transition:opacity .8s ease;
}
#flash.on{opacity:1;pointer-events:auto}
#flash.out{opacity:0;transition:opacity 1.8s ease-out}

#glitch,#tear,#chroma,#vhsBg{
  position:fixed;
  inset:0;
  pointer-events:none;
}
#glitch{z-index:9990}
#tear{z-index:9989;background:#000;opacity:0}
#tear.on{animation:tearFlash .15s steps(3) forwards}
#chroma{z-index:9988;opacity:0;mix-blend-mode:screen}
#chroma.on{animation:chromaBurst .2s ease-out forwards}
#vhsBg{z-index:0}

#pro{
  position:fixed;
  inset:0;
  z-index:10000;
  background:#010102;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity 2.5s var(--ease-io);
  cursor:pointer;
  padding:20px;
  outline:none;
}
#pro.vis{opacity:1}
#pro.gone{opacity:0;pointer-events:none}

.pro-ghost{
  width:clamp(72px,17vw,124px);
  height:clamp(96px,22vw,156px);
  margin-bottom:clamp(22px,5vh,52px);
  opacity:0;
  transition:opacity 3.5s ease;
  animation:float 8s ease-in-out infinite, haloPulse 6s ease-in-out infinite;
}
.pro-ghost.vis{opacity:1}

.pro-lines{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
.pro-line{
  position:absolute;
  width:min(90%,800px);
  text-align:center;
  font-family:var(--font-serif);
  font-size:clamp(1.4rem,4.5vw,2.6rem);
  color:var(--c-ghost);
  line-height:1.6;
  opacity:0;
  filter:blur(15px);
  transform:translateY(25px) scale(.96);
  transition:opacity 2.8s ease,filter 2.8s ease,transform 2.8s var(--ease-expo);
}
.pro-line.show{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}
.pro-line.out{
  opacity:0;
  transform:translateY(-20px) scale(.97);
  filter:blur(10px);
  transition:opacity 1.5s ease,filter 1.5s ease,transform 1.5s var(--ease-io);
}
.pro-line em{font-style:italic;color:var(--c-bright);text-shadow:0 0 10px rgba(207,232,255,.3)}
.pro-line .void{color:#3a4858;opacity:.6;font-style:italic}
.pro-line .ache{color:#c49c82;font-style:italic;text-shadow:0 0 15px rgba(196,156,130,.2)}
.pro-line .sub{font-size:.75em;color:#5a6a7c}

.pro-btn{
  font-family:var(--font-crt);
  font-size:clamp(1.1rem,2.5vw,1.8rem);
  color:var(--c-dim);
  letter-spacing:6px;
  border:1px solid var(--c-dim);
  padding:20px 40px;
  background:transparent;
  cursor:none;
  outline:none;
  transition:all .5s;
  animation:pulse 2.5s infinite;
  margin-top:clamp(40px,8vh,80px);
}
.pro-btn:hover{
  color:var(--c-bright);
  border-color:var(--c-bright);
  text-shadow:0 0 20px rgba(207,232,255,.7);
}

.pro-title{
  position:absolute;
  font-family:var(--font-title);
  font-size:clamp(3rem,10vw,7rem);
  font-weight:700;
  letter-spacing:.4em;
  color:#fff;
  text-shadow:0 0 45px rgba(255,255,255,.4),0 0 90px rgba(184,155,95,.3);
  opacity:0;
  transform:scale(1.2) translateY(15px);
  transition:transform 5s cubic-bezier(.1,.8,.2,1),opacity .5s;
}
.pro-title.slam{opacity:1;transform:scale(1) translateY(0)}

#station{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:min(96vw,1250px);
  height:min(90vh,820px);
  display:none;
  opacity:0;
  z-index:5;
}
#station.on{
  display:flex;
  gap:clamp(15px,3vw,35px);
  animation:stationIn 2.2s var(--ease-expo) forwards;
}

.tv-unit{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  background:linear-gradient(145deg,#111118,#080810);
  border-radius:20px;
  border:1.5px solid #181824;
  padding:clamp(15px,3vw,25px);
  box-shadow:inset 0 0 90px rgba(0,0,0,.98),0 30px 70px rgba(0,0,0,.95),0 0 5px rgba(138,155,174,.15);
  position:relative;
  z-index:2;
}

.bezel{
  flex:1;
  position:relative;
  background:#010102;
  border-radius:12px;
  overflow:hidden;
  border:2px solid #0a0a12;
  box-shadow:inset 0 0 70px rgba(0,0,0,1);
  min-height:250px;
  transition:border-color .7s,box-shadow .7s;
}
.bezel.lit{
  border-color:rgba(138,155,174,.22);
  box-shadow:inset 0 0 70px rgba(0,0,0,1),0 0 45px rgba(138,155,174,.08);
}

#noise,#sceneCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
#noise{z-index:5;image-rendering:pixelated}
#sceneCanvas{
  z-index:6;
  opacity:0;
  mix-blend-mode:screen;
  transition:opacity 2.5s ease;
}
#sceneCanvas.vis{opacity:.95}

.crt-warmup{
  position:absolute;
  inset:0;
  z-index:19;
  background:radial-gradient(circle,#0a0a14 0%,#030306 70%);
  transition:opacity 3s ease;
  pointer-events:none;
}
.crt-warmup.off{opacity:0}
.scanlines{
  position:absolute;
  inset:0;
  z-index:30;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 4px);
  pointer-events:none;
  opacity:.7;
}
.vig{
  position:absolute;
  inset:0;
  z-index:31;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.98) 100%);
  pointer-events:none;
}
.glare{
  position:absolute;
  inset:0;
  z-index:32;
  background:linear-gradient(130deg,rgba(255,255,255,.05) 0%,transparent 40%,transparent 60%,rgba(255,255,255,.015) 100%);
  pointer-events:none;
}
.scanbar{
  position:absolute;
  left:0;
  width:100%;
  height:6px;
  z-index:33;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.04),transparent);
  pointer-events:none;
  animation:scanbar 7s linear infinite;
}
.tracker{
  position:absolute;
  left:0;
  width:100%;
  height:4px;
  z-index:34;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.07),transparent);
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
}
.tracker.on{opacity:1;animation:trackDrift 4.5s linear infinite}

.tv-badge{
  position:absolute;
  top:14px;
  right:14px;
  z-index:37;
  pointer-events:none;
  color:rgba(138,155,174,.28);
  filter:drop-shadow(0 0 10px rgba(138,155,174,.1));
}
.tv-ic,.ui-ic,.slot-ic,.rack-ic,.led-ic,.t-ic{
  display:inline-block;
  width:18px;
  height:18px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  flex:0 0 auto;
}
.tv-ic{width:22px;height:22px}

.osd{
  position:absolute;
  z-index:36;
  font-family:var(--font-crt);
  font-size:clamp(1.1rem,2.5vw,1.4rem);
  color:var(--c-ghost);
  opacity:.7;
  text-shadow:0 0 8px var(--c-ghost);
  pointer-events:none;
}
#osdCh{top:20px;left:25px}
#osdRec{top:20px;right:25px;color:var(--red);opacity:0}
#osdRec.on{opacity:1;animation:blink 1.1s infinite}
#osdTime{bottom:20px;right:25px;opacity:0}
#osdTime.on{opacity:.7}
#osdQ{
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  font-family:var(--font-serif);
  font-style:italic;
  font-size:clamp(.8rem,1.8vw,1rem);
  opacity:0;
  transition:opacity 2s;
  white-space:nowrap;
  z-index:36;
  position:absolute;
  pointer-events:none;
  text-shadow:0 0 10px #000;
}
#osdQ.show{opacity:.55}

#tapeContent{
  position:absolute;
  inset:0;
  z-index:25;
  padding:clamp(20px,4.5vw,40px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:opacity .9s ease;
  background:rgba(1,1,2,.92);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
#tapeContent.show{opacity:1}

.final-v{text-align:center;padding:clamp(20px,4.5vw,35px);max-width:100%;width:100%}
.final-v h1{
  font-family:var(--font-title);
  font-size:clamp(2.2rem,5.5vw,4rem);
  color:var(--red);
  margin-bottom:clamp(20px,3.5vh,40px);
  text-shadow:0 0 30px rgba(139,42,58,.7);
}
.final-v p{
  font-family:var(--font-serif);
  font-size:clamp(1.3rem,2.8vw,1.8rem);
  color:var(--c-bright);
  opacity:0;
  animation:fadeUp 2.5s forwards;
  margin-bottom:clamp(15px,2.5vh,25px);
  line-height:1.8;
  text-shadow:0 0 15px rgba(207,232,255,.2);
}
.final-v .d1{animation-delay:1.5s}
.final-v .d2{animation-delay:6s;color:var(--c-ghost);font-style:italic}
.final-v .d3{
  animation-delay:10s;
  font-family:var(--font-crt);
  font-size:clamp(1.6rem,3.5vw,2.5rem);
  letter-spacing:6px;
  color:#fff;
  text-shadow:0 0 20px #fff;
  margin-top:30px;
}
.loading-txt{
  font-family:var(--font-crt);
  font-size:clamp(1.2rem,3vw,1.8rem);
  color:var(--c-bright);
  letter-spacing:5px;
  animation:pulse 1s infinite;
  text-shadow:0 0 15px var(--c-bright);
}

.ctrls{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:clamp(12px,2.5vw,20px) 0 0;
  gap:12px;
  flex-shrink:0;
  flex-wrap:wrap;
}
.slot{
  flex:1;
  min-width:160px;
  height:42px;
  min-height:48px;
  background:#030306;
  border:2px solid #111118;
  border-radius:5px;
  box-shadow:inset 0 6px 20px rgba(0,0,0,.98);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .3s;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}
.slot::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent,rgba(207,232,255,.03),transparent);
  transform:translateX(-120%);
  transition:transform .7s ease;
}
.slot.ov::before,.slot.ins::before{transform:translateX(120%)}
.slot.ov{
  border-color:var(--c-dim);
  box-shadow:inset 0 6px 20px rgba(0,0,0,.98),0 0 20px rgba(138,155,174,.25);
}
.slot.ins{border-color:var(--c-bright)}
.slot-txt{
  font-family:var(--font-crt);
  font-size:clamp(.9rem,2.2vw,1.1rem);
  letter-spacing:3px;
  color:#2a2a3a;
  transition:color .3s;
}
.slot.ov .slot-txt{color:var(--c-bright);animation:pulse 1.5s infinite}
.slot-ic{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  opacity:.28;
  color:var(--c-dim);
  width:20px;
  height:20px;
}
.ctrl-btn{
  background:linear-gradient(180deg,#18181e,#0e0e14);
  border:1px solid #222230;
  color:#666;
  font-family:var(--font-crt);
  font-size:clamp(.85rem,2vw,1rem);
  letter-spacing:1.5px;
  padding:0 clamp(15px,3vw,25px);
  height:42px;
  min-height:48px;
  min-width:90px;
  border-radius:4px;
  cursor:none;
  transition:all .25s;
  box-shadow:0 4px 6px rgba(0,0,0,.4);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.ctrl-btn:hover{color:#bbb;border-color:#4a4a5e;box-shadow:0 2px 4px rgba(0,0,0,.6)}
.ctrl-btn:active{transform:translateY(2px);box-shadow:none}

.leds{display:flex;align-items:center;gap:8px}
.led{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#0d0d14;
  transition:all .5s;
  flex-shrink:0;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.8);
}
.led.pwr.on{
  background:var(--c);
  box-shadow:0 0 10px var(--c), inset 0 1px 2px rgba(255,255,255,.5);
  animation:breathe 3s infinite;
}
.led.play.on{
  background:var(--c-dim);
  box-shadow:0 0 8px var(--c-dim), inset 0 1px 2px rgba(255,255,255,.5);
}
.led-lbl{
  font-size:clamp(9px,1.8vw,11px);
  color:#333340;
  letter-spacing:.2em;
  margin-right:10px;
  font-weight:bold;
  display:inline-flex;
  align-items:center;
  gap:6px;
}
.led-ic{width:14px;height:14px;color:#465669}

.rack{
  width:clamp(220px,28vw,360px);
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:clamp(14px,2vw,18px);
  background:linear-gradient(180deg,#0b0b10,#050509);
  border:1.5px solid #181822;
  border-radius:16px;
  padding:clamp(18px,3vw,25px);
  overflow-y:auto;
  overflow-x:hidden;
  box-shadow:inset 0 0 40px rgba(0,0,0,.9);
  scrollbar-width:thin;
  scrollbar-color:#181822 #050509;
}
.rack-title{
  font-family:var(--font-crt);
  font-size:clamp(1rem,2vw,1.2rem);
  letter-spacing:6px;
  color:#3a3a4a;
  text-align:center;
  border-bottom:1px solid #111118;
  padding-bottom:12px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.rack-ic{width:17px;height:17px;color:#425365}
.rack-dots{display:flex;justify-content:center;gap:10px;flex-shrink:0;margin-bottom:5px}
.rdot{
  width:8px;
  height:8px;
  border-radius:50%;
  border:1px solid #2a3a4a;
  transition:all .55s;
}
.rdot.on{background:var(--c-dim);border-color:var(--c-dim);box-shadow:0 0 8px var(--c-dim)}

.tape{
  position:relative;
  height:clamp(90px,13vw,110px);
  flex-shrink:0;
  background:linear-gradient(180deg,#14141c,#0a0a0e);
  border:1px solid #28283a;
  border-radius:6px;
  padding:14px;
  box-shadow:0 8px 22px rgba(0,0,0,.7);
  transition:transform .35s var(--ease-expo),border-color .3s,opacity .3s,box-shadow .3s;
  cursor:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:tapeSlide .6s var(--ease-expo) backwards;
  overflow:hidden;
}
.tape::before{
  content:'';
  position:absolute;
  left:10%;
  right:10%;
  top:12px;
  height:20px;
  background:#030305;
  border-radius:3px;
  border:1px solid #101018;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.8);
}
.tape::after{
  content:'';
  position:absolute;
  inset:auto auto 13px 14px;
  width:40px;
  height:4px;
  background:linear-gradient(90deg,#111822,#202a38);
  border-radius:5px;
  opacity:.25;
}
.tape:hover:not(.locked){
  transform:translateY(-6px) scale(1.03);
  border-color:#4a4a65;
  box-shadow:0 12px 25px rgba(0,0,0,.8);
}
.t-orn{
  position:absolute;
  left:16px;
  right:16px;
  top:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  z-index:2;
}
.t-ic{
  width:15px;
  height:15px;
  color:#536476;
  opacity:.9;
}
.t-ic.sub{
  width:13px;
  height:13px;
  color:#394755;
  opacity:.75;
}
.tape.secret .t-ic{color:var(--red)}
.tape.done .t-ic{color:var(--c-bright)}
.t-label{
  background:linear-gradient(180deg,#d8d4c8,#c8beb2);
  color:#101018;
  font-family:var(--font-serif);
  font-weight:600;
  font-size:clamp(.8rem,2vw,1.05rem);
  padding:4px 12px;
  margin-top:clamp(26px,4.5vw,34px);
  width:86%;
  text-align:center;
  border-radius:3px;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.3);
  transform:rotate(-.5deg);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  position:relative;
  z-index:1;
}
.t-desc{
  font-family:sans-serif;
  font-size:.65rem;
  color:#3a4a5e;
  margin-top:8px;
  font-style:italic;
  font-weight:bold;
  letter-spacing:.5px;
}
.tape.done{filter:grayscale(.25) brightness(.9)}
.tape.done > .tape-check{
  position:absolute;
  top:14px;
  right:14px;
  color:var(--c-bright);
  font-size:1.1rem;

<script>
'use strict';

const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const rnd = (a,b) => a + Math.random()*(b-a);
const TAU = Math.PI * 2;
const clampVal = (min, val, max) => Math.max(min, Math.min(val, max));
const STORE_KEY = 'kommentar.archive.v3';

const TAPES = [
  {id:'tape1', title:'AKTE I: Beobachter', desc:'Die erste Sichtung.', file:'tape1.html'},
  {id:'tape2', title:'AKTE II: Nähe', desc:'Der Abstand schwindet.', file:'tape2.html'},
  {id:'tape3', title:'AKTE III: Verlust', desc:'Plötzliche Leere.', file:'tape3.html'},
  {id:'tape4', title:'AKTE IV: Suche', desc:'Verbleibende Spuren.', file:'tape4.html'},
  {id:'tape5', title:'???: Kommentar', desc:'CLASSIFIED', file:null, secret:true}
];

const REQS = {
  tape1: [],
  tape2: ['tape1'],
  tape3: ['tape2'],
  tape4: ['tape1', 'tape2', 'tape3'],
  tape5: ['tape1', 'tape2', 'tape3', 'tape4']
};

const STD = TAPES.filter(t => !t.secret);
const canPlay = id => (REQS[id] || []).every(req => G.done.includes(req));

const G = {
  done: [],
  playing: null,
  dragging: null,
  audioOn: true,
  bgmGoing: false,
  playStart: 0,
  timer: null,
  glitchTimeout: null
};

function loadProgress(){
  try{
    const raw = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
    G.done = Array.isArray(raw) ? raw.filter(id => TAPES.some(t => t.id === id)) : [];
  }catch{
    G.done = [];
  }
}
function saveProgress(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(G.done));
  }catch{}
}
loadProgress();

const D = {
  cur:$('cur'),
  flash:$('flash'),
  pro:$('pro'),
  proGhost:$('proGhost'),
  proTitle:$('proTitle'),
  btnStart:$('btnStart'),
  station:$('station'),
  bezel:$('bezel'),
  warmup:$('warmup'),
  noise:$('noise'),
  scene:$('sceneCanvas'),
  tracker:$('tracker'),
  osdCh:$('osdCh'),
  osdRec:$('osdRec'),
  osdTime:$('osdTime'),
  osdQ:$('osdQ'),
  tapeContent:$('tapeContent'),
  slot:$('slot'),
  slotTxt:$('slotTxt'),
  slotIconUse:$('slotIconUse'),
  btnEject:$('btnEject'),
  btnAudio:$('btnAudio'),
  btnAudioLabel:$('btnAudioLabel'),
  btnAudioIconUse:$('btnAudioIconUse'),
  ledPwr:$('ledPwr'),
  ledPlay:$('ledPlay'),
  rack:$('rack'),
  rackDots:$('rackDots'),
  glitch:$('glitch'),
  tear:$('tear'),
  chroma:$('chroma'),
  vhsBg:$('vhsBg')
};

function setSlotGlyph(href){
  D.slotIconUse.setAttribute('href', href);
  D.slotIconUse.setAttribute('xlink:href', href);
}

let dragGhost = null;
document.addEventListener('mousemove', e => {
  D.cur.style.left = e.clientX + 'px';
  D.cur.style.top = e.clientY + 'px';
  if(G.dragging) moveDragGhost(e.clientX, e.clientY);
});
document.addEventListener('mousedown', () => D.cur.classList.add('big'));
document.addEventListener('mouseup', () => {
  D.cur.classList.remove('big');
  if(G.dragging) endDrag();
});
document.addEventListener('mouseleave', () => D.cur.classList.add('hide'));
document.addEventListener('mouseenter', () => D.cur.classList.remove('hide'));

const Flash = {
  async show(){
    D.flash.className = 'on';
    await sleep(600);
  },
  async hide(){
    D.flash.className = 'out';
    await sleep(1800);
  }
};

const Glitch = {
  fire(s = 1){
    const gl = D.glitch;
    let v = s;
    const run = () => {
      if(v > .02){
        gl.style.background = `rgba(${Math.random()*200+55},${Math.random()*200+55},${Math.random()*200+55},${v*.15})`;
        gl.style.transform = `translate(${(Math.random()-.5)*18*v}px,${(Math.random()-.5)*18*v}px)`;
        v *= .82;
        requestAnimationFrame(run);
      }else{
        gl.style.background = 'transparent';
        gl.style.transform = 'none';
      }
    };
    run();
  },
  tear(){
    const t = D.tear;
    t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 160);
  },
  chroma(){
    const c = D.chroma;
    c.classList.add('on');
    setTimeout(() => c.classList.remove('on'), 220);
  },
  burst(s = 1.5){
    this.fire(s);
    if(Math.random() < .6) setTimeout(() => this.tear(), 50);
    if(Math.random() < .4) setTimeout(() => this.chroma(), 80);
    if(G.audioOn && Audio2.ctx) Audio2.sfxGlitch();
  },
  auto(){
    clearTimeout(G.glitchTimeout);
    G.glitchTimeout = setTimeout(() => {
      if(!G.playing && D.station.classList.contains('on')){
        this.burst(.6 + Math.random());
      }
      this.auto();
    }, 3000 + Math.random() * 8000);
  }
};

(function VHSBg(){
  const cv = D.vhsBg;
  const cx = cv.getContext('2d');
  let W,H;
  const resize = () => {
    W = cv.width = innerWidth;
    H = cv.height = innerHeight;
  };
  resize();
  window.addEventListener('resize', resize);

  const pts = Array.from({length:75}, () => ({
    x:Math.random(),
    y:Math.random(),
    vx:rnd(-.0004,.0004),
    vy:rnd(-.001,.0002) - rnd(.0002,.0008),
    sz:rnd(1.5,3.8),
    op:rnd(.02,.09),
    ph:Math.random()*TAU
  }));

  const nebs = Array.from({length:4}, () => ({
    x:Math.random(),
    y:Math.random(),
    vx:rnd(-.00005,.00005),
    vy:rnd(-.00005,.00005),
    r:rnd(.1,.2),
    ph:Math.random()*TAU
  }));

  function draw(){
    if(!W || !H){ requestAnimationFrame(draw); return; }

    cx.fillStyle = 'rgba(2,2,4,0.15)';
    cx.fillRect(0,0,W,H);
    const t = performance.now() * .001;

    nebs.forEach(n => {
      n.x += n.vx;
      n.y += n.vy;
      const nx = ((n.x % 1) + 1) % 1;
      const ny = ((n.y % 1) + 1) % 1;
      const g = cx.createRadialGradient(nx*W, ny*H, 0, nx*W, ny*H, n.r*W);
      const a = .006 + .005 * Math.sin(t*.25 + n.ph);
      g.addColorStop(0, `rgba(138,155,174,${a})`);
      g.addColorStop(1, 'transparent');
      cx.fillStyle = g;
      cx.beginPath();
      cx.arc(nx*W, ny*H, n.r*W, 0, TAU);
      cx.fill();
    });

    pts.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.ph += .006;
      p.x = ((p.x % 1) + 1) % 1;
      p.y = ((p.y % 1) + 1) % 1;
      const op = p.op * (.55 + .45 * Math.sin(t*1.4 + p.ph));
      cx.globalAlpha = op;
      cx.fillStyle = '#8a9bae';
      cx.beginPath();
      cx.arc(p.x*W, p.y*H, p.sz, 0, TAU);
      cx.fill();
    });

    cx.globalAlpha = 1;
    if(Math.random() < .025){
      cx.fillStyle = `rgba(138,155,174,${.008 + Math.random()*.015})`;
      cx.fillRect(0, Math.random()*H, W, 1 + Math.random()*3);
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

const Audio2 = {
  ctx:null,
  master:null,
  bgm:null,

  init(){
    if(this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = .5;
    this.master.connect(this.ctx.destination);

    this.bgm = new window.Audio('MEMORY.mp3');
    this.bgm.loop = true;
    this.bgm.volume = 0;
    this.bgm.preload = 'auto';
  },

  voidDrone(){
    if(!this.ctx) return;
    const t = this.ctx.currentTime;

    const sub = this.ctx.createOscillator();
    const subG = this.ctx.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(42, t);
    sub.frequency.linearRampToValueAtTime(37, t + 10);
    subG.gain.setValueAtTime(0, t);
    subG.gain.linearRampToValueAtTime(.95, t + 2.5);
    subG.gain.linearRampToValueAtTime(.95, t + 7.8);
    subG.gain.linearRampToValueAtTime(0, t + 10);

    const lfo = this.ctx.createOscillator();
    const lfoG = this.ctx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = .12;
    lfoG.gain.value = 4.5;
    lfo.connect(lfoG);
    lfoG.connect(sub.frequency);

    const hn = this.ctx.createOscillator();
    const hnG = this.ctx.createGain();
    hn.type = 'sawtooth';
    hn.frequency.value = 1850;
    hnG.gain.setValueAtTime(0, t);
    hnG.gain.linearRampToValueAtTime(.015, t + 3);
    hnG.gain.linearRampToValueAtTime(.01, t + 8);
    hnG.gain.linearRampToValueAtTime(0, t + 10);

    sub.connect(subG); subG.connect(this.master);
    hn.connect(hnG); hnG.connect(this.master);

    [sub, hn, lfo].forEach(o => o.start(t));
    [sub, hn, lfo].forEach(o => o.stop(t + 10.6));
  },

  impact(){
    if(!this.ctx) return;
    const t = this.ctx.currentTime;

    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(90, t);
    o.frequency.exponentialRampToValueAtTime(15, t + 2.4);
    g.gain.setValueAtTime(1, t);
    g.gain.exponentialRampToValueAtTime(.001, t + 2.4);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 2.5);

    const c = this.ctx.createOscillator();
    const cg = this.ctx.createGain();
    c.type = 'square';
    c.frequency.value = 850;
    cg.gain.setValueAtTime(.1, t);
    cg.gain.exponentialRampToValueAtTime(.001, t + .15);
    c.connect(cg); cg.connect(this.master);
    c.start(t); c.stop(t + .2);
  },

  insert(){
    if(!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(52, t);
    o.frequency.exponentialRampToValueAtTime(28, t + .7);
    g.gain.setValueAtTime(.12, t);
    g.gain.linearRampToValueAtTime(0, t + .75);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + .8);
  },

  clunk(){
    if(!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(130, t);
    o.frequency.exponentialRampToValueAtTime(32, t + .25);
    g.gain.setValueAtTime(.28, t);
    g.gain.exponentialRampToValueAtTime(.003, t + .25);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + .3);
  },

  sfxGlitch(){
    if(!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(150 + Math.random()*100, t);
    g.gain.setValueAtTime(.04, t);
    g.gain.exponentialRampToValueAtTime(.001, t + .1);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + .15);
  },

  startBGM(){
    if(G.bgmGoing || !this.bgm) return;
    G.bgmGoing = true;
    this.bgm.currentTime = 0;
    this.bgm.play().then(() => {
      const t0 = Date.now();
      const self = this;
      const fade = () => {
        if(!G.bgmGoing) return;
        const el = (Date.now() - t0) / 1000;
        if(el < 7.4){ requestAnimationFrame(fade); return; }
        if(self.bgm.volume < .18){
          self.bgm.volume = Math.min(self.bgm.volume + .0015, .18);
          requestAnimationFrame(fade);
        }
      };
      requestAnimationFrame(fade);
    }).catch(() => { G.bgmGoing = false; });
  },

  toggle(){
    if(!this.ctx) return;
    G.audioOn = !G.audioOn;
    const t = this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(t);
    this.master.gain.setValueAtTime(this.master.gain.value, t);
    this.master.gain.linearRampToValueAtTime(G.audioOn ? .5 : 0, t + .5);

    if(this.bgm) this.bgm.volume = G.audioOn ? .18 : 0;

    const href = G.audioOn ? '#icon-volume' : '#icon-volume-off';
    D.btnAudioIconUse.setAttribute('href', href);
    D.btnAudioIconUse.setAttribute('xlink:href', href);
    D.btnAudioLabel.textContent = G.audioOn ? 'VOL' : 'MUTE';
    D.btnAudio.style.color = G.audioOn ? '#aaa' : '#555';
  }
};

const Scene = {
  cx:null,W:0,H:0,
  active:false,raf:0,idx:0,switchAt:0,
  QUOTES:['Geistwalzer','Der Beobachter','Regengedächtnis','Die Tänzerin','Verlorene Worte','Abwesenheit'],
  dust:[],

  init(){
    this.cx = D.scene.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
    for(let i=0;i<30;i++){
      this.dust.push({
        x:Math.random(),
        y:Math.random(),
        vx:rnd(-.0005,.0005),
        vy:rnd(-.0016,-.0004),
        sz:rnd(.8,3.0),
        op:rnd(.04,.15),
        ph:Math.random()*TAU
      });
    }
    this.start();
  },

  resize(){
    const r = D.bezel.getBoundingClientRect();
    this.W = D.scene.width = Math.max(r.width | 0, 1);
    this.H = D.scene.height = Math.max(r.height | 0, 1);
  },

  start(){
    if(this.active) return;
    this.active = true;
    D.scene.classList.add('vis');
    this.switchAt = performance.now();
    this.setQuote();
    const loop = n => {
      if(!this.active) return;
      this.frame(n);
      this.raf = requestAnimationFrame(loop);
    };
    this.raf = requestAnimationFrame(loop);
  },

  stop(){
    this.active = false;
    cancelAnimationFrame(this.raf);
    D.scene.classList.remove('vis');
    D.osdQ.classList.remove('show');
  },

  setQuote(){
    D.osdQ.textContent = this.QUOTES[this.idx];
    D.osdQ.classList.remove('show');
    setTimeout(() => { if(this.active) D.osdQ.classList.add('show'); }, 600);
  },

  frame(now){
    const dt = now - this.switchAt;
    if(dt > 12000){
      this.idx = (this.idx + 1) % 6;
      this.switchAt = now;
      this.setQuote();
      Glitch.fire(.7);
    }

    let fa = 1;
    if(dt < 2200) fa = dt / 2200;
    else if(dt > 10000) fa = Math.max(0, (12000 - dt) / 2000);

    const c = this.cx, W = this.W, H = this.H, t = now * .001;
    c.clearRect(0, 0, W, H);
    c.globalAlpha = fa * .6;

    this.SCENES[this.idx].call(this, c, W, H, t);

    this.dust.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.ph += .007;
      p.x = ((p.x % 1) + 1) % 1;
      p.y = ((p.y % 1) + 1) % 1;
      const op = p.op * (.5 + .5 * Math.sin(t * 1.5 + p.ph));
      c.globalAlpha = op * fa * .5;
      c.fillStyle = '#aabbcc';
      c.beginPath();
      c.arc(p.x * W, p.y * H, p.sz, 0, TAU);
      c.fill();
    });
    c.globalAlpha = 1;
  },

  apexEntity(c, x, y, sc, sw, op, t){
    op = op || .25;
    sw = sw || 0;
    c.save();
    c.translate(x, y);
    c.scale(sc, sc);

    const gAura = c.createRadialGradient(0,-10,0,0,-10,40);
    gAura.addColorStop(0, `rgba(138,155,174,${op*.25})`);
    gAura.addColorStop(1, 'transparent');
    c.fillStyle = gAura;
    c.beginPath();
    c.arc(0,-10,40,0,TAU);
    c.fill();

    c.beginPath();
    c.moveTo(0,-32);
    c.bezierCurveTo(-16+sw,-24,-18+sw*1.3,8,-14+sw*1.4,34);
    c.lineTo(14-sw*1.4,34);
    c.bezierCurveTo(18-sw*1.3,8,16-sw,-24,0,-32);
    c.closePath();

    const gBody = c.createLinearGradient(0,-32,0,34);
    gBody.addColorStop(0, `rgba(180,195,210,${op*.9})`);
    gBody.addColorStop(.5, `rgba(138,155,174,${op*.5})`);
    gBody.addColorStop(1, `rgba(100,120,140,${op*.1})`);
    c.fillStyle = gBody;
    c.fill();

    const gSpine = c.createLinearGradient(0,-28,0,30);
    gSpine.addColorStop(0, `rgba(255,255,255,${op*.3})`);
    gSpine.addColorStop(1, 'transparent');
    c.fillStyle = gSpine;
    c.fillRect(-1, -28, 2, 58);

    for(let i=0;i<7;i++){
      let wx = -10 + i*3.3 + sw*(i-3)*.3;
      let by = 32 + Math.abs(i-3)*1.5;
      let wl = 12 + Math.sin(t*1.8 + i)*6;
      c.beginPath();
      c.moveTo(wx, by);
      c.quadraticCurveTo(wx + sw*.5 + Math.sin(t*2.5+i)*3, by + wl*.5, wx + sw + Math.sin(t*1.5+i*1.2)*4, by + wl);
      c.strokeStyle = `rgba(138,155,174,${op * .4 * (1 - Math.abs(i-3)/4)})`;
      c.lineWidth = 1.2;
      c.stroke();
    }

    const gHead = c.createRadialGradient(0,-37,0,0,-37,12);
    gHead.addColorStop(0, `rgba(200,215,230,${op*1.1})`);
    gHead.addColorStop(1, `rgba(138,155,174,${op*.1})`);
    c.beginPath();
    c.ellipse(0,-37,8,10.5,0,0,TAU);
    c.fillStyle = gHead;
    c.fill();

    c.fillStyle = `rgba(10,10,18,${op*3.5})`;
    c.beginPath(); c.ellipse(-3,-38,1.4,2,0,0,TAU); c.fill();
    c.beginPath(); c.ellipse(3,-38,1.4,2,0,0,TAU); c.fill();

    c.restore();
  },

  SCENES:[
    function(c,W,H,t){
      const cx = W*.5, cy = H*.48, r = W*.28;
      const a = t*.42;
      const x1 = cx + Math.cos(a)*r, y1 = cy + Math.sin(a)*r*.4;
      const x2 = cx + Math.cos(a+Math.PI)*r, y2 = cy + Math.sin(a+Math.PI)*r*.4;

      const g = c.createRadialGradient(cx,cy,0,cx,cy,W*.65);
      g.addColorStop(0, 'rgba(138,155,174,0.09)');
      g.addColorStop(1, 'transparent');
      c.fillStyle = g;
      c.fillRect(0,0,W,H);

      c.strokeStyle = 'rgba(138,155,174,0.12)';
      c.lineWidth = 3;
      c.beginPath();
      c.moveTo(x1,y1);
      c.lineTo(x2,y2);
      c.stroke();

      if(Math.sin(t*4.8) > -.55) this.apexEntity(c,x1,y1,2.5,Math.sin(t*2.2)*2.2,.35,t);
      this.apexEntity(c,x2,y2,2.5,Math.sin(t*2.2+1.1)*2.2,.3,t);

      c.fillStyle = 'rgba(138,155,174,0.025)';
      c.beginPath();
      c.ellipse(cx, cy+H*.26, r*2.2, 14, 0, 0, TAU);
      c.fill();
    },

    function(c,W,H,t){
      const cx = W*.5, cy = H*.55;
      this.apexEntity(c, cx, cy+H*.1, 4.0, Math.sin(t*.5)*2.8, .3, t);

      c.strokeStyle = 'rgba(255,255,255,0.06)';
      c.lineWidth = 5;
      const fw = W*.85, fh = H*.9;
      c.strokeRect(cx-fw/2, cy-fh/2, fw, fh);
      c.beginPath(); c.moveTo(cx, cy-fh/2); c.lineTo(cx, cy+fh/2); c.stroke();
      c.beginPath(); c.moveTo(cx-fw/2, cy); c.lineTo(cx+fw/2, cy); c.stroke();

      for(let i=0;i<4;i++){
        const fy = H*(.6+i*.1);
        const fx = cx + Math.sin(t*.2+i*2)*W*.35;
        c.fillStyle = 'rgba(138,155,174,0.025)';
        c.beginPath();
        c.ellipse(fx, fy, W*.45, H*.15, 0, 0, TAU);
        c.fill();
      }

      if(Math.sin(t*2.8) > .96){
        c.save();

        c.beginPath(); c.ellipse(3,-38,2.5,3,0,0,TAU); c.fill();

    function(c,W,H,t){

      c.lineWidth = 2.5;
      for(let i=0;i<65;i++){
        const rx = (i*65 + t*380) % W;

      for(let j=0;j<6;j++){

      }
      c.globalAlpha *= .7;
      this.apexEntity(c, W*.5, H*.62, 3.2, Math.sin(t)*1.8, .22, t);
      c.globalAlpha = 1;
      c.fillStyle = 'rgba(138,155,174,0.035)';
      c.fillRect(0,H*.75,W,H*.25);
    },

    function(c,W,H,t){
      const x = W*.5, y = H*.55, rot = Math.sin(t*.38)*.3;
      const g = c.createRadialGradient(x, H*.2, 0, x, H*.2, W*.65);

      c.fillStyle = g;
      c.fillRect(0,0,W,H);

      c.save();
      c.translate(x,y);
      c.scale(3,3);
      c.rotate(rot);
      c.fillStyle = 'rgba(155,172,189,0.25)';
      c.beginPath();
      c.moveTo(0,-24);
      c.bezierCurveTo(-8,-18,-6,4,-3,14);

      c.bezierCurveTo(6,4,8,-18,0,-24);
      c.fill();
      c.beginPath(); c.ellipse(0,13,22,6,0,0,TAU); c.fill();
      c.beginPath(); c.arc(0,-27,5.5,0,TAU); c.fill();
      const aa = Math.sin(t*2)*.95;
      c.strokeStyle = 'rgba(155,172,189,0.18)';
      c.lineWidth = 2;
      c.beginPath(); c.moveTo(-3,-14); c.quadraticCurveTo(-20+aa*6, -22+Math.cos(t*2)*8, -28+aa*9, -16); c.stroke();
      c.beginPath(); c.moveTo(3,-14); c.quadraticCurveTo(20-aa*6, -22-Math.cos(t*2)*8, 28-aa*9, -16); c.stroke();
      c.restore();

      for(let i=0;i<30;i++){
        const px = x + Math.sin(t*2.8+i*.9)*85;

        c.arc(px,py,4.5,0,TAU);
        c.fill();
      }
      c.fillStyle = 'rgba(0,0,0,0.15)';
      c.beginPath();
      c.ellipse(x, y+100, 70, 14, 0, 0, TAU);
      c.fill();
    },

    function(c,W,H,t){
      const words = ['Leere','Stille','War er real?','Kommentar','Sie','Warum?','Erinnerung','Verschwunden','Ich war hier'];
      const fs = clampVal(40, W * .08, 90);

      c.textBaseline = 'middle';

      for(let i=0;i<words.length;i++){

        c.save();

        c.rotate(Math.sin(ph*.3+i)*.2);
        c.globalAlpha = wo;
        c.fillStyle = '#aabbcc';
        c.fillText(words[i], 0, 0);
        c.restore();
      }
      c.globalAlpha = 1;
    },

    function(c,W,H,t){
      const x = W*.5, y = H*.55, pu = .45 + .35 * Math.sin(t*.45);
      const s = 2.8;
      c.strokeStyle = 'rgba(138,155,174,0.2)';
      c.lineWidth = 3.5;
      c.beginPath();
      c.moveTo(x-22*s, y+14*s); c.lineTo(x-22*s, y+52*s);
      c.moveTo(x+22*s, y+14*s); c.lineTo(x+22*s, y+52*s);
      c.moveTo(x-22*s, y+14*s); c.lineTo(x+22*s, y+14*s);
      c.moveTo(x-22*s, y-30*s); c.lineTo(x-22*s, y+14*s);
      c.moveTo(x+22*s, y-30*s); c.lineTo(x+22*s, y+14*s);
      c.moveTo(x-22*s, y-30*s); c.lineTo(x+22*s, y-30*s);
      c.stroke();

      const yOff = -((t*15) % 130);
      const ga = Math.max(0, 1 - Math.abs(yOff)/130) * pu;
      c.globalAlpha *= ga * .75;
      this.apexEntity(c, x, y+yOff, 3.2, 0, .3, t);
      c.globalAlpha = 1;

      const g = c.createRadialGradient(x,y,0,x,y,W*.45);
      g.addColorStop(0, 'rgba(138,155,174,'+(0.03*pu)+')');
      g.addColorStop(1, 'transparent');
      c.fillStyle = g;
      c.fillRect(0,0,W,H);

      const to = .04 + .03 * Math.sin(t*.28);
      c.globalAlpha = to;
      const fs = clampVal(32, W * .05, 50);
      c.font = `${fs}px "Cormorant Garamond", serif`;
      c.fillStyle = '#aabbcc';
      c.textAlign = 'center';
      c.fillText('Er war hier.', x, y+H*.42);
      c.globalAlpha = 1;
    }
  ]
};

function tapeMarkup(tape, label, desc, completed, locked){
  const leftIcon = tape.secret
    ? (locked ? '#icon-ghost-off' : '#icon-ghost-2')
    : '#sigil-tape';

  const rightIcon = tape.secret ? '#sigil-ghost' : '#icon-eye';

  return `
    <div class="t-orn">
      <svg class="t-ic" aria-hidden="true"><use href="${leftIcon}"></use></svg>
      <svg class="t-ic sub" aria-hidden="true"><use href="${rightIcon}"></use></svg>
    </div>
    <div class="t-label">${label}</div>
    <div class="t-desc">${desc}</div>
    ${completed ? '<div class="tape-check">✓</div>' : ''}
  `;
}

function buildRack(){
  D.rack.querySelectorAll('.tape').forEach(e => e.remove());
  D.rackDots.innerHTML = '';

  const allDone = STD.every(t => G.done.includes(t.id));

  STD.forEach(() => {
    const d = document.createElement('div');
    d.className = 'rdot';
    D.rackDots.appendChild(d);
  });

  let dc = 0;
  STD.forEach(t => { if(G.done.includes(t.id)) dc++; });
  Array.from(D.rackDots.children).forEach((d,i) => { if(i < dc) d.classList.add('on'); });

  TAPES.forEach((tape, i) => {
    const el = document.createElement('div');
    el.className = 'tape';
    el.dataset.tid = tape.id;
    el.style.animationDelay = (i * .08) + 's';

    const avail = canPlay(tape.id);
    const completed = G.done.includes(tape.id);

    if(tape.secret){
      el.classList.add('secret');
      if(!allDone){
        el.classList.add('locked');
        el.innerHTML = tapeMarkup(tape, 'GESPERRT', 'Archiv unvollständig', false, true);
      }else{
        el.innerHTML = tapeMarkup(tape, tape.title, tape.desc, completed, false);
        addTapeListeners(el, tape);
      }
    }else{
      if(!avail){
        el.classList.add('locked');
        el.innerHTML = tapeMarkup(tape, tape.title, 'Voraussetzung fehlt', false, true);
      }else{
        if(completed) el.classList.add('done');
        el.innerHTML = tapeMarkup(tape, tape.title, tape.desc, completed, false);
        addTapeListeners(el, tape);
      }
    }

    D.rack.appendChild(el);
  });
}

let selectedTapeId = null;

function addTapeListeners(el, tape){
  el.addEventListener('mousedown', e => startDrag(e, tape));
  el.addEventListener('click', () => tapeClick(el, tape));
  el.addEventListener('touchend', e => {
    e.preventDefault();
    tapeClick(el, tape);
  }, {passive:false});
}

function tapeClick(el, tape){
  if(G.playing) return;

  if(selectedTapeId === tape.id){
    insertTape(tape.id);
    return;
  }

  D.rack.querySelectorAll('.tape.selected').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedTapeId = tape.id;
  D.slotTxt.textContent = '▶ EINLEGEN: ' + tape.title.substring(0, 12) + '…';
  setSlotGlyph(tape.secret ? '#icon-ghost-2' : '#sigil-tape');
  Audio2.clunk();
}

function startDrag(e, tape){
  if(G.playing) return;
  G.dragging = tape.id;
  Audio2.clunk();

  dragGhost = document.createElement('div');
  dragGhost.className = 'drag-ghost';
  dragGhost.innerHTML = `<div class="t-label">${tape.title}</div>`;
  document.body.appendChild(dragGhost);
  moveDragGhost(e.clientX, e.clientY);
}

function moveDragGhost(x, y){
  if(!dragGhost) return;
  dragGhost.style.left = x + 'px';
  dragGhost.style.top = y + 'px';

  const sr = D.slot.getBoundingClientRect();
  const over = (x > sr.left && x < sr.right && y > sr.top && y < sr.bottom);
  D.slot.classList.toggle('ov', over);
}

function endDrag(){
  const over = D.slot.classList.contains('ov');
  D.slot.classList.remove('ov');
  const id = G.dragging;
  G.dragging = null;
  if(dragGhost){ dragGhost.remove(); dragGhost = null; }
  if(over && id) insertTape(id);
}

function fmt(s){
  const m = 0 | s / 60;
  return m + ':' + ('' + (0 | s % 60)).padStart(2,'0');
}

async function insertTape(id){
  if(G.playing) return;
  G.playing = id;
  selectedTapeId = null;
  D.rack.querySelectorAll('.tape.selected').forEach(e => e.classList.remove('selected'));

  const tape = TAPES.find(t => t.id === id);
  const idx = TAPES.indexOf(tape);

  Audio2.insert();
  Glitch.burst(2.0);
  D.bezel.classList.add('lit');
  D.slot.classList.add('ins');
  D.osdCh.textContent = 'AKTE-' + (idx+1);
  D.osdRec.classList.add('on');
  D.osdTime.classList.add('on');
  D.tracker.classList.add('on');
  D.slotTxt.textContent = tape.title;
  D.ledPlay.classList.add('on');
  setSlotGlyph(tape.secret ? '#icon-ghost-2' : '#sigil-tape');

  Scene.stop();

  G.playStart = Date.now();
  G.timer = setInterval(() => {
    D.osdTime.textContent = '▶ ' + fmt((Date.now() - G.playStart) / 1000);
  }, 1000);

  D.tapeContent.innerHTML = '';
  await sleep(1000);

  if(tape.secret){
    D.tapeContent.innerHTML = `
      <div class="final-v">
        <h1>KOMMENTAR</h1>
        <p class="d1">Wenn jemand dich liebt und dann jeden<br>Beweis seiner Existenz entfernt,</p>
        <p class="d1">wurdest du dann geliebt?</p>
        <p class="d2">— Ende des Archivs —</p>
        <p class="d3">NICHTS BLEIBT.</p>
      </div>`;
    D.tapeContent.classList.add('show');

    if(!G.done.includes(tape.id)){
      G.done.push(tape.id);
      saveProgress();
      buildRack();
    }
  }else{
    D.tapeContent.innerHTML = `
      <div class="final-v">
        <h1 style="color:var(--c-dim);font-size:clamp(2rem,5vw,3rem);">LADE ARCHIV...</h1>
        <p class="loading-txt">VERBINDE MIT ${tape.file}</p>
      </div>`;
    D.tapeContent.classList.add('show');

    await sleep(2800);
    if(!G.done.includes(tape.id)){
      G.done.push(tape.id);
      saveProgress();
    }
    await Flash.show();
    window.location.href = tape.file;
  }
}

function ejectTape(){
  if(!G.playing) return;
  Audio2.clunk();
  Glitch.burst(1.2);

  if(!G.done.includes(G.playing)){
    G.done.push(G.playing);
    saveProgress();
  }

  G.playing = null;
  clearInterval(G.timer);

  D.bezel.classList.remove('lit');
  D.slot.classList.remove('ins');
  D.osdCh.textContent = 'AKTE-0';
  D.osdRec.classList.remove('on');
  D.osdTime.classList.remove('on');
  D.osdTime.textContent = '▶ 00:00';
  D.tracker.classList.remove('on');
  D.slotTxt.textContent = '▶ HIERHER ZIEHEN';
  D.ledPlay.classList.remove('on');
  setSlotGlyph('#sigil-tape');

  D.tapeContent.classList.remove('show');
  setTimeout(() => { D.tapeContent.innerHTML = ''; }, 850);

  buildRack();
  Scene.start();
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape' && G.playing) ejectTape();
});
</script>
