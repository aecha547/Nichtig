<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020204">
<title>KOMMENTAR — Ein Spuk in der Realität</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=VT323&display=swap" rel="stylesheet">

<style>
/* ══════════════════ ROOT ══════════════════ */
:root{
  --bg:#020204;
  --c:#8a9bae;--c-dim:#4a5a6e;--c-bright:#cfe8ff;--c-ghost:#7a8b9e;
  --gold:#b89b5f;--red:#8b2a3a;--red-dim:#5a1a28;
  --font-crt:'VT323',monospace;
  --font-serif:'Cormorant Garamond',serif;
  --font-title:'Cinzel',serif;
  --ease-expo:cubic-bezier(0.16,1,0.3,1);
  --ease-io:cubic-bezier(0.4,0,0.2,1);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
}

*,*::before,*::after{
  margin:0;padding:0;box-sizing:border-box;
  user-select:none;-webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}
html,body{
  height:100%;overflow:hidden;
  background:var(--bg);color:var(--c);
  touch-action:none;cursor:none;
  font-family:var(--font-crt);
}

/* ══════════════════ KEYFRAMES ══════════════════ */
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.85}}
@keyframes blink{50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes breathe{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.7;transform:scale(1.02)}}
@keyframes scanbar{from{top:-5%}to{top:106%}}
@keyframes trackDrift{0%{top:-3%}100%{top:103%}}
@keyframes stationIn{from{opacity:0;transform:translate(-50%,-50%) scale(.94)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes tapeSlide{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes tearFlash{
  0%{opacity:1;clip-path:inset(38% 0 56% 0)}
  33%{clip-path:inset(41% 0 52% 0);transform:translateX(5px)}
  66%{clip-path:inset(36% 0 59% 0);transform:translateX(-3px)}
  100%{opacity:0;clip-path:inset(38% 0 56% 0);transform:none}
}
@keyframes chromaBurst{
  0%{opacity:.35;box-shadow:inset -5px 0 0 rgba(136,170,204,.18),inset 5px 0 0 rgba(170,136,100,.12)}
  100%{opacity:0}
}
@keyframes markFlash{
  0%{opacity:0;transform:rotate(-19deg) scale(.7)}
  20%{opacity:.14;transform:rotate(-19deg) scale(1.04)}
  100%{opacity:.04;transform:rotate(-19deg) scale(1)}
}

/* ══════════════════ CURSOR ══════════════════ */
#cur{
  position:fixed;top:0;left:0;
  width:15px;height:15px;
  border:1.5px solid rgba(207,232,255,.5);border-radius:50%;
  pointer-events:none;z-index:999999;mix-blend-mode:difference;
  transform:translate(-50%,-50%);
  transition:width .18s,height .18s,border-color .18s,background .18s;
}
#cur::after{
  content:'';position:absolute;inset:0;margin:auto;
  width:4px;height:4px;background:rgba(207,232,255,.85);
  border-radius:50%;
}
#cur.big{width:26px;height:26px;background:rgba(207,232,255,.06);border-color:var(--c-bright)}
#cur.hide{opacity:0}

/* ══════════════════ FULL-SCREEN FLASH (transition) ══════════════════ */
#flash{
  position:fixed;inset:0;z-index:99998;
  background:#fff;opacity:0;pointer-events:none;
  transition:opacity .6s ease;
}
#flash.on{opacity:1;pointer-events:auto}

/* ══════════════════ GLITCH SYSTEM ══════════════════ */
#glitch{position:fixed;inset:0;z-index:9990;pointer-events:none}
#tear{position:fixed;inset:0;z-index:9989;background:#000;opacity:0;pointer-events:none}
#tear.on{animation:tearFlash .14s steps(3) forwards}
#chroma{position:fixed;inset:0;z-index:9988;pointer-events:none;opacity:0;mix-blend-mode:screen}
#chroma.on{animation:chromaBurst .18s ease-out forwards}

/* ══════════════════ VHS BG ══════════════════ */
#vhsBg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ══════════════════ PROLOGUE ══════════════════ */
#pro{
  position:fixed;inset:0;z-index:10000;
  background:#010102;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity 1.8s var(--ease-io);
  cursor:pointer;
  padding:clamp(20px,5vw,60px);
  padding-top:calc(clamp(20px,5vw,60px) + var(--safe-t));
  padding-bottom:calc(clamp(20px,5vw,60px) + var(--safe-b));
}
#pro.vis{opacity:1}
#pro.gone{opacity:0;pointer-events:none;transition-duration:2.4s}

/* Ghost SVG */
.pro-ghost{
  width:clamp(52px,13vw,88px);
  height:clamp(68px,17vw,114px);
  margin-bottom:clamp(14px,4vh,38px);
  opacity:0;transition:opacity 3.5s ease;
  filter:drop-shadow(0 0 42px rgba(138,155,174,.28));
  animation:float 9s ease-in-out infinite;
}
.pro-ghost.vis{opacity:1}

/* Lines wrapper */
.pro-lines{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  padding:clamp(16px,4vw,48px);
}
.pro-line{
  position:absolute;
  width:min(92%,680px);
  text-align:center;
  font-family:var(--font-serif);
  font-size:clamp(1.1rem,3.8vw,2.1rem);
  color:var(--c-ghost);
  line-height:1.78;
  opacity:0;
  filter:blur(10px);
  transform:translateY(20px) scale(.97);
  transition:opacity 2.8s ease,filter 2.8s ease,transform 2.8s var(--ease-expo);
}
.pro-line.show{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}
.pro-line.out{
  opacity:0;
  transform:translateY(-15px) scale(.98);
  filter:blur(7px);
  transition:opacity 1.3s ease,filter 1.3s ease,transform 1.3s var(--ease-io);
}
.pro-line em{font-style:italic;color:var(--c-bright)}
.pro-line .void{color:#3a4858;opacity:.65;font-style:italic}
.pro-line .ache{color:#b08870;font-style:italic}
.pro-line .sub{font-size:.82em;color:#5a6a7c}

/* Start button */
.pro-btn{
  font-family:var(--font-crt);
  font-size:clamp(.9rem,2.1vw,1.5rem);
  color:var(--c-dim);letter-spacing:5px;
  border:1px solid var(--c-dim);
  padding:15px 30px;
  background:transparent;cursor:none;
  outline:none;
  transition:all .5s;animation:pulse 2.5s infinite;
  margin-top:clamp(24px,6vh,58px);
  min-height:48px;
}
.pro-btn:hover{color:var(--c-bright);border-color:var(--c-bright);text-shadow:0 0 12px rgba(207,232,255,.5)}

/* Title */
.pro-title{
  position:absolute;
  font-family:var(--font-title);
  font-size:clamp(2.5rem,8vw,5.8rem);
  font-weight:700;letter-spacing:.35em;
  color:#fff;
  text-shadow:0 0 38px rgba(255,255,255,.32),0 0 80px rgba(184,155,95,.2);
  opacity:0;
  transform:scale(1.12) translateY(8px);
  transition:transform 5.5s cubic-bezier(.1,.8,.2,1),opacity .6s;
}
.pro-title.slam{opacity:1;transform:scale(1) translateY(0)}

/* Watermark */
.pro-mark{
  position:absolute;
  font-family:var(--font-crt);
  font-size:clamp(2.2rem,9vw,4.5rem);
  color:var(--red);opacity:0;
  transform:rotate(-19deg);
  letter-spacing:8px;
  pointer-events:none;
  text-transform:uppercase;
  border:2.5px solid var(--red);padding:4px 18px;
}
.pro-mark.flash{animation:markFlash .9s ease-out forwards}

/* ══════════════════ STATION — CRITICAL: fixed center ══════════════════ */
#station{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(96vw,1150px);
  height:min(90vh,800px);
  display:none;
  opacity:0;
  z-index:5;
}
#station.on{
  display:flex;
  gap:clamp(12px,2.5vw,24px);
  animation:stationIn 2s var(--ease-expo) forwards;
  padding:
    calc(6px + var(--safe-t))
    calc(6px + var(--safe-r))
    calc(6px + var(--safe-b))
    calc(6px + var(--safe-l));
}

/* ══════════════════ TV UNIT ══════════════════ */
.tv-unit{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  background:linear-gradient(145deg,#111118,#080810);
  border-radius:20px;
  border:1.5px solid #181824;
  padding:clamp(12px,2.5vw,22px);
  box-shadow:
    inset 0 0 80px rgba(0,0,0,.9),
    0 20px 55px rgba(0,0,0,.88),
    0 0 2px rgba(138,155,174,.08);
  position:relative;z-index:2;
}

/* ══════════════════ BEZEL — fills available height ══════════════════ */
.bezel{
  flex:1;
  position:relative;
  background:#010102;
  border-radius:12px;
  overflow:hidden;
  border:2px solid #0a0a12;
  box-shadow:inset 0 0 60px rgba(0,0,0,1);
  min-height:200px;
  transition:border-color .7s,box-shadow .7s;
}
.bezel.lit{
  border-color:rgba(138,155,174,.15);
  box-shadow:inset 0 0 60px rgba(0,0,0,1),0 0 28px rgba(138,155,174,.05);
}

/* Canvas elements — all absolutely fill the bezel */
#noise,#sceneCanvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;
}
#noise{z-index:5;image-rendering:pixelated}
#sceneCanvas{z-index:6;opacity:0;mix-blend-mode:screen;transition:opacity 2.2s ease}
#sceneCanvas.vis{opacity:.88}

/* CRT overlay layers */
.crt-warmup{
  position:absolute;inset:0;z-index:19;
  background:radial-gradient(circle,#0a0a14 0%,#030306 60%);
  transition:opacity 4s ease;pointer-events:none;
}
.crt-warmup.off{opacity:0}
.scanlines{
  position:absolute;inset:0;z-index:30;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.14) 2px,rgba(0,0,0,.14) 4px);
  pointer-events:none;opacity:.6;
}
.vig{
  position:absolute;inset:0;z-index:31;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.97) 100%);
  pointer-events:none;
}
.glare{
  position:absolute;inset:0;z-index:32;
  background:linear-gradient(130deg,rgba(255,255,255,.035) 0%,transparent 40%,transparent 62%,rgba(255,255,255,.01) 100%);
  pointer-events:none;
}
.scanbar{
  position:absolute;left:0;width:100%;height:5px;z-index:33;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.028),transparent);
  pointer-events:none;
  animation:scanbar 7s linear infinite;
}
.tracker{
  position:absolute;left:0;width:100%;height:3px;z-index:34;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.055),transparent);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.tracker.on{opacity:1;animation:trackDrift 3.8s linear infinite}

/* On-screen display */
.osd{
  position:absolute;z-index:36;
  font-family:var(--font-crt);
  font-size:clamp(.9rem,2vw,1.2rem);
  color:var(--c-ghost);opacity:.6;
  text-shadow:0 0 5px var(--c-ghost);
  pointer-events:none;
}
#osdCh{top:14px;left:16px}
#osdRec{top:14px;right:16px;color:var(--red);opacity:0}
#osdRec.on{opacity:1;animation:blink 1.1s infinite}
#osdTime{bottom:14px;right:16px;opacity:0}
#osdTime.on{opacity:.6}
#osdQ{
  bottom:20px;left:50%;transform:translateX(-50%);
  font-family:var(--font-serif);font-style:italic;
  font-size:clamp(.6rem,1.4vw,.82rem);
  opacity:0;transition:opacity 2.2s;
  white-space:nowrap;z-index:36;position:absolute;
  pointer-events:none;
}
#osdQ.show{opacity:.38}

/* Tape content overlay */
#tapeContent{
  position:absolute;inset:0;z-index:25;
  padding:clamp(16px,4vw,36px);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  opacity:0;transition:opacity .9s ease;
  background:rgba(1,1,2,.88);
  backdrop-filter:blur(5px);
  -webkit-backdrop-filter:blur(5px);
}
#tapeContent.show{opacity:1}
.tc-html{
  width:100%;height:100%;overflow-y:auto;
  text-align:left;
  font-family:var(--font-serif);
  font-size:clamp(.88rem,2.4vw,1.25rem);
  color:var(--c-bright);line-height:1.85;
  text-shadow:0 0 4px rgba(207,232,255,.18);
  scrollbar-width:thin;scrollbar-color:rgba(138,155,174,.2) transparent;
}
.tc-html::-webkit-scrollbar{width:3px}
.tc-html::-webkit-scrollbar-thumb{background:rgba(138,155,174,.2);border-radius:2px}

/* Final cinematic */
.final-v{text-align:center;padding:clamp(16px,4vw,28px);max-width:100%}
.final-v h1{
  font-family:var(--font-title);
  font-size:clamp(1.8rem,4.5vw,3rem);
  color:var(--red);margin-bottom:clamp(16px,3vh,28px);
  text-shadow:0 0 22px rgba(139,42,58,.55);
}
.final-v p{
  font-family:var(--font-serif);
  font-size:clamp(1rem,2.2vw,1.45rem);
  color:var(--c-bright);opacity:0;
  animation:fadeUp 2.2s forwards;
  margin-bottom:clamp(14px,2.5vh,22px);line-height:1.68;
}
.final-v .d1{animation-delay:1.8s}
.final-v .d2{animation-delay:6.5s;color:var(--c-ghost);font-style:italic}
.final-v .d3{animation-delay:10.5s;font-family:var(--font-crt);font-size:clamp(1.3rem,2.8vw,1.8rem);letter-spacing:4px;color:#fff;text-shadow:0 0 12px #fff}

/* TV controls row */
.ctrls{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:clamp(8px,1.8vw,14px) 0 0;
  gap:10px;flex-shrink:0;flex-wrap:wrap;
}
.slot{
  flex:1;min-width:130px;height:34px;
  min-height:44px;
  background:#030306;border:2px solid #111118;border-radius:4px;
  box-shadow:inset 0 5px 16px rgba(0,0,0,.92);
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;cursor:pointer;
}
.slot.ov{border-color:var(--c-dim);box-shadow:inset 0 5px 16px rgba(0,0,0,.92),0 0 14px rgba(138,155,174,.2)}
.slot.ins{border-color:var(--c-bright)}
.slot-txt{
  font-family:var(--font-crt);
  font-size:clamp(.75rem,1.8vw,.9rem);
  letter-spacing:2px;color:#2a2a3a;transition:color .3s;
}
.slot.ov .slot-txt{color:var(--c-bright);animation:pulse 1.5s infinite}
.ctrl-btn{
  background:linear-gradient(180deg,#18181e,#0e0e14);
  border:1px solid #222230;color:#555;
  font-family:var(--font-crt);
  font-size:clamp(.72rem,1.6vw,.88rem);
  letter-spacing:1.5px;
  padding:0 clamp(10px,2vw,18px);
  height:34px;min-height:44px;min-width:60px;
  border-radius:4px;cursor:none;transition:all .2s;
}
.ctrl-btn:hover{color:#aaa;border-color:#3a3a4a}
.ctrl-btn:active{transform:translateY(2px)}
.leds{display:flex;align-items:center;gap:5px}
.led{width:6px;height:6px;border-radius:50%;background:#0d0d14;transition:all .5s;flex-shrink:0}
.led.pwr.on{background:var(--c);box-shadow:0 0 6px var(--c);animation:breathe 3s infinite}
.led.play.on{background:var(--c-dim);box-shadow:0 0 5px var(--c-dim)}
.led-lbl{font-size:clamp(7px,1.4vw,9px);color:#282830;letter-spacing:.1em;margin-right:6px}

/* ══════════════════ RACK ══════════════════ */
.rack{
  width:clamp(180px,22vw,280px);
  flex-shrink:0;
  display:flex;flex-direction:column;gap:clamp(10px,1.5vw,14px);
  background:linear-gradient(180deg,#0b0b10,#060609);
  border:1px solid #18182;
  border-radius:12px;
  padding:clamp(12px,2vw,18px);
  overflow-y:auto;overflow-x:hidden;
  box-shadow:inset 0 0 30px rgba(0,0,0,.8);
  scrollbar-width:thin;scrollbar-color:#181820 #060609;
}
.rack-title{
  font-family:var(--font-crt);
  font-size:clamp(.8rem,1.6vw,1rem);
  letter-spacing:4px;color:#3a3a4a;
  text-align:center;
  border-bottom:1px solid #111;
  padding-bottom:8px;flex-shrink:0;
}
.rack-dots{
  display:flex;justify-content:center;gap:7px;
  flex-shrink:0;margin-bottom:2px;
}
.rdot{
  width:6px;height:6px;border-radius:50%;
  border:1px solid #2a3a4a;transition:all .55s;
}
.rdot.on{background:var(--c-dim);border-color:var(--c-dim);box-shadow:0 0 6px var(--c-dim)}

/* ══════════════════ TAPE CARDS ══════════════════ */
.tape{
  position:relative;
  height:clamp(75px,11vw,90px);
  flex-shrink:0;
  background:linear-gradient(180deg,#14141c,#0a0a0e);
  border:1px solid #28283a;
  border-radius:5px;
  padding:10px;
  box-shadow:0 5px 16px rgba(0,0,0,.6);
  transition:transform .32s var(--ease-expo),border-color .3s,opacity .3s;
  cursor:none;
  display:flex;flex-direction:column;align-items:center;
  animation:tapeSlide .6s var(--ease-expo) backwards;
  overflow:hidden;
}
.tape::before{
  content:'';position:absolute;
  left:10%;right:10%;top:11px;
  height:16px;
  background:#030305;border-radius:2px;
  border:1px solid #101018;
}
.tape:hover:not(.locked){transform:translateY(-4px) scale(1.025);border-color:#3a3a50}
.t-label{
  background:linear-gradient(180deg,#d8d4c8,#c8beb2);
  color:#101018;font-family:var(--font-serif);font-weight:600;
  font-size:clamp(.72rem,1.6vw,.88rem);
  padding:2px 8px;
  margin-top:clamp(22px,3.5vw,28px);
  width:84%;text-align:center;
  border-radius:2px;
  box-shadow:inset 0 2px 3px rgba(0,0,0,.2);
  transform:rotate(-.4deg);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.t-desc{
  font-family:sans-serif;font-size:.58rem;
  color:#3a4a5e;margin-top:4px;font-style:italic;
}
.tape.done{filter:grayscale(.45) brightness(.72)}
.tape.done::after{
  content:'✓';position:absolute;top:11px;right:10px;
  color:var(--c-bright);font-size:.85rem;
  text-shadow:0 0 6px var(--c-bright);
}
.tape.locked{opacity:.28;pointer-events:none;filter:grayscale(1)}
.tape.secret{border-color:var(--red)}
.tape.secret .t-label{background:#111;color:var(--red);border:1px solid var(--red-dim)}
.tape.selected{border-color:var(--c-dim)}
.tape.selected::before{animation:pulse 1.5s infinite;border-color:rgba(138,155,174,.2)}

/* Drag ghost */
.drag-ghost{
  position:fixed;pointer-events:none;z-index:99997;
  width:190px;height:80px;
  background:linear-gradient(180deg,#14141c,#0a0a0e);
  border:1.5px solid var(--c-dim);
  border-radius:5px;
  box-shadow:0 20px 44px rgba(0,0,0,.9);
  opacity:.9;
  transform:translate(-50%,-50%) rotate(-4deg) scale(1.05);
  display:flex;align-items:center;justify-content:center;
}
.drag-ghost .t-label{
  background:linear-gradient(180deg,#d8d4c8,#c8beb2);
  color:#101018;padding:4px 10px;
  font-family:var(--font-serif);font-weight:600;border-radius:2px;
}

/* ══════════════════ RESPONSIVE ══════════════════ */
@media(max-width:820px){
  #station.on{flex-direction:column}
  .tv-unit{flex:1 1 0;min-height:0}
  .rack{
    width:100%;flex-shrink:0;
    flex-direction:row;
    overflow-x:auto;overflow-y:hidden;
    min-height:clamp(88px,16vw,110px);
    max-height:clamp(100px,18vw,125px);
    gap:10px;padding:10px;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .rack-title,.rack-dots{display:none}
  .tape{min-width:clamp(130px,22vw,160px);height:auto;scroll-snap-align:start}
  .t-label{font-size:.75rem}
}
@media(max-width:540px){
  .ctrls{flex-wrap:wrap}
  .slot{order:3;width:100%;min-width:0;margin-top:4px}
  .ctrl-btn{min-width:50px;font-size:.75rem;padding:0 8px}
  .leds{order:1}
  #btnEject{order:2}
  #btnAudio{order:4}
}
@media(max-height:500px) and (orientation:landscape){
  #station.on{flex-direction:row}
  .rack{
    width:clamp(140px,20vw,200px);
    flex-direction:column;
    overflow-y:auto;overflow-x:hidden;
    min-height:auto;max-height:none;
  }
  .rack-title{display:block}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
  .scanbar,.tracker{display:none}
}
</style>
</head>
<body>

<!-- Full screen flash overlay -->
<div id="flash"></div>

<!-- Cursor -->

<!-- VHS Background Canvas -->

<!-- Glitch System -->

<div id="tear"></div>
<div id="chroma"></div>

<!-- ╔══════════════════════════════╗ -->
<!-- ║         PROLOGUE             ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="pro">
  <!-- Floating ghost SVG -->
  <svg class="pro-ghost" id="proGhost" viewBox="0 0 80 120">
    <defs>
      <radialGradient id="gG" cx="50%" cy="38%">
        <stop offset="0%" stop-color="#9aaab8" stop-opacity=".48"/>

      </radialGradient>
      <filter id="gBlur"><feGaussianBlur stdDeviation="2.5"/></filter>
    </defs>
    <ellipse cx="40" cy="62" rx="28" ry="46" fill="url(#gG)" filter="url(#gBlur)" opacity=".38">
      <animate attributeName="opacity" values=".38;.58;.38" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M40 18C28 18 19 35 19 55C19 76 25 98 30 114L50 114C55 98 61 76 61 55C61 35 53 18 40 18Z"
          fill="#8a9bae" opacity=".22" filter="url(#gBlur)">
      <animate attributeName="opacity" values=".22;.34;.22" dur="6s" repeatCount="indefinite"/>
    </path>
    <ellipse cx="40" cy="22" rx="9" ry="11" fill="#9aaab8" opacity=".26" filter="url(#gBlur)"/>
    <circle cx="36.5" cy="20" r="1.3" fill="#141420" opacity=".5"/>
    <circle cx="43.5" cy="20" r="1.3" fill="#141420" opacity=".5"/>
  </svg>

  <button class="pro-btn" id="btnStart">[ ZUGRIFF INITIIEREN ]</button>

  <div class="pro-lines">
    <div class="pro-line" id="pl0"></div>
    <div class="pro-line" id="pl1"></div>
    <div class="pro-line" id="pl2"></div>
    <div class="pro-line" id="pl3"></div>
    <div class="pro-line" id="pl4"></div>
  </div>

  <div class="pro-title" id="proTitle">KOMMENTAR</div>
  <div class="pro-mark" id="proMark">VERTRAULICH</div>
</div>

<!-- ╔══════════════════════════════╗ -->
<!-- ║         MAIN STATION         ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="station">

  <!-- LEFT: TV Unit -->
  <div class="tv-unit">
    <!-- Screen Bezel (fills remaining height) -->
    <div class="bezel" id="bezel">
      <canvas id="noise"></canvas>
      <canvas id="sceneCanvas"></canvas>
      <div class="crt-warmup" id="warmup"></div>
      <div class="scanlines"></div>
      <div class="vig"></div>
      <div class="glare"></div>
      <div class="scanbar"></div>
      <div class="tracker" id="tracker"></div>

      <!-- HUD -->
      <div class="osd" id="osdCh">AKTE-0</div>
      <div class="osd" id="osdRec">● REC</div>
      <div class="osd" id="osdTime">▶ 00:00</div>

      <!-- Tape content injected here -->
      <div id="tapeContent"></div>
    </div>

    <!-- Controls Row -->
    <div class="ctrls">
      <div class="leds">
        <div class="led pwr" id="ledPwr"></div>
        <div class="led play" id="ledPlay"></div>
        <span class="led-lbl">LARVATUS</span>
      </div>
      <div class="slot" id="slot"><span class="slot-txt" id="slotTxt">▶ HIERHER ZIEHEN</span></div>
      <button class="ctrl-btn" id="btnEject">⏏ EJECT</button>
      <button class="ctrl-btn" id="btnAudio">♪ VOL</button>
    </div>
  </div>

  <!-- RIGHT: Tape Rack -->
  <div class="rack" id="rack">
    <div class="rack-title">ARCHIV</div>
    <div class="rack-dots" id="rackDots"></div>
    <!-- tapes injected -->
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════ */
'use strict';
const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const rnd=(a,b)=>a+Math.random()*(b-a);
const TAU=Math.PI*2;

/* ══════════════════════════════════════════════════════
   TAPE CONFIGURATION
══════════════════════════════════════════════════════ */
const TAPES=[
  {id:'tape1',title:'AKTE I: Der Beobachter', desc:'Die erste Sichtung.',   file:'tape1.html'},
  {id:'tape2',title:'AKTE II: Die Nähe',      desc:'Der Abstand schwindet.',file:'tape2.html'},
  {id:'tape3',title:'AKTE III: Das Verschwinden',desc:'Plötzliche Leere.', file:'tape3.html'},
  {id:'tape4',title:'AKTE IV: Die Suche',     desc:'Verbleibende Spuren.', file:'tape4.html'},
  {id:'tape5',title:'???: Kommentar',          desc:'CLASSIFIED',           file:null,secret:true}
];
const STD=TAPES.filter(t=>!t.secret);

/* ══════════════════════════════════════════════════════
   GLOBAL STATE
══════════════════════════════════════════════════════ */
const G={
  done:[],
  playing:null,
  dragging:null,
  audioOn:true,
  bgmGoing:false,
  playStart:0,
  timer:null
};

/* ══════════════════════════════════════════════════════
   DOM CACHE
══════════════════════════════════════════════════════ */
const D={
  cur:$('cur'),flash:$('flash'),pro:$('pro'),
  proGhost:$('proGhost'),proTitle:$('proTitle'),proMark:$('proMark'),
  btnStart:$('btnStart'),
  station:$('station'),bezel:$('bezel'),warmup:$('warmup'),
  noise:$('noise'),scene:$('sceneCanvas'),
  tracker:$('tracker'),
  osdCh:$('osdCh'),osdRec:$('osdRec'),osdTime:$('osdTime'),osdQ:$('osdQ'),
  tapeContent:$('tapeContent'),
  slot:$('slot'),slotTxt:$('slotTxt'),
  btnEject:$('btnEject'),btnAudio:$('btnAudio'),
  ledPwr:$('ledPwr'),ledPlay:$('ledPlay'),
  rack:$('rack'),rackDots:$('rackDots'),
  glitch:$('glitch'),tear:$('tear'),chroma:$('chroma'),vhsBg:$('vhsBg')
};

/* ══════════════════════════════════════════════════════
   CURSOR
══════════════════════════════════════════════════════ */
let dragGhost=null;
document.addEventListener('mousemove',e=>{
  D.cur.style.left=e.clientX+'px';
  D.cur.style.top=e.clientY+'px';
  if(G.dragging)moveDragGhost(e.clientX,e.clientY);
});
document.addEventListener('mousedown',()=>D.cur.classList.add('big'));
document.addEventListener('mouseup',()=>{D.cur.classList.remove('big');if(G.dragging)endDrag()});
document.addEventListener('mouseleave',()=>D.cur.classList.add('hide'));
document.addEventListener('mouseenter',()=>D.cur.classList.remove('hide'));

/* ══════════════════════════════════════════════════════
   FULL-SCREEN FLASH TRANSITION
══════════════════════════════════════════════════════ */
const Flash={
  async show(){
    D.flash.style.transition='opacity .5s ease';
    D.flash.classList.add('on');
    await sleep(500);
  },
  async hide(){
    D.flash.style.transition='opacity .8s ease';
    D.flash.classList.remove('on');
    await sleep(800);
  }
};

/* ══════════════════════════════════════════════════════
   GLITCH ENGINE
══════════════════════════════════════════════════════ */
const Glitch={
  fire(s=1){
    const gl=D.glitch;let v=s;
    const run=()=>{
      if(v>.02){
        gl.style.background=`rgba(${Math.random()*200+55},${Math.random()*200+55},${Math.random()*200+55},${v*.11})`;
        gl.style.transform=`translate(${(Math.random()-.5)*12*v}px,${(Math.random()-.5)*12*v}px)`;
        v*=.82;requestAnimationFrame(run);
      }else{gl.style.background='transparent';gl.style.transform='none'}
    };run();
  },
  tear(){const t=D.tear;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),150)},
  chroma(){const c=D.chroma;c.classList.add('on');setTimeout(()=>c.classList.remove('on'),190)},
  burst(s=1.5){
    this.fire(s);
    if(Math.random()<.55)setTimeout(()=>this.tear(),55);
    if(Math.random()<.32)setTimeout(()=>this.chroma(),75);
  }
};

/* ══════════════════════════════════════════════════════
   VHS BACKGROUND
══════════════════════════════════════════════════════ */
(function VHSBg(){
  const cv=D.vhsBg;const cx=cv.getContext('2d');
  let W,H;
  const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight};
  resize();window.addEventListener('resize',resize);

  const pts=Array.from({length:60},()=>({
    x:Math.random(),y:Math.random(),
    vx:rnd(-.00025,.00025),vy:rnd(-.0008,.00025)-rnd(.0001,.0005),
    sz:rnd(1,2.8),op:rnd(.02,.07),ph:Math.random()*TAU
  }));
  const nebs=Array.from({length:3},()=>({
    x:Math.random(),y:Math.random(),
    vx:rnd(-.00003,.00003),vy:rnd(-.00003,.00003),
    r:rnd(.08,.15),ph:Math.random()*TAU
  }));

  function draw(){
    if(!W||!H){requestAnimationFrame(draw);return}
    cx.fillStyle='rgba(2,2,4,.12)';cx.fillRect(0,0,W,H);
    const t=performance.now()*.001;
    nebs.forEach(n=>{
      n.x+=n.vx;n.y+=n.vy;
      const nx=((n.x%1)+1)%1,ny=((n.y%1)+1)%1;
      const g=cx.createRadialGradient(nx*W,ny*H,0,nx*W,ny*H,n.r*W);
      const a=.004+.003*Math.sin(t*.25+n.ph);
      g.addColorStop(0,`rgba(138,155,174,${a})`);
      g.addColorStop(1,'transparent');
      cx.fillStyle=g;cx.beginPath();cx.arc(nx*W,ny*H,n.r*W,0,TAU);cx.fill();
    });
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.ph+=.006;
      p.x=((p.x%1)+1)%1;p.y=((p.y%1)+1)%1;
      const op=p.op*(.55+.45*Math.sin(t*1.4+p.ph));
      cx.globalAlpha=op;cx.fillStyle='#8a9bae';
      cx.beginPath();cx.arc(p.x*W,p.y*H,p.sz,0,TAU);cx.fill();
    });
    cx.globalAlpha=1;
    if(Math.random()<.018){
      cx.fillStyle=`rgba(138,155,174,${.005+Math.random()*.01})`;
      cx.fillRect(0,Math.random()*H,W,1+Math.random()*2);
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════════════════════
   AUDIO ENGINE
══════════════════════════════════════════════════════ */
const Audio2={
  ctx:null,master:null,bgm:null,

  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.master=this.ctx.createGain();
    this.master.gain.value=.5;
    this.master.connect(this.ctx.destination);
    this.bgm=new window.Audio('MEMORY.mp3');
    this.bgm.loop=true;this.bgm.volume=0;this.bgm.preload='auto';
  },

  /* ── VOID DRONE fills MEMORY.mp3's 10s silence ── */
  voidDrone(){
    if(!this.ctx)return;
    const t=this.ctx.currentTime;

    // Deep sub-bass
    const sub=this.ctx.createOscillator();
    const subG=this.ctx.createGain();
    sub.type='sine';
    sub.frequency.setValueAtTime(42,t);
    sub.frequency.linearRampToValueAtTime(37,t+10);
    subG.gain.setValueAtTime(0,t);
    subG.gain.linearRampToValueAtTime(.92,t+2.4);
    subG.gain.linearRampToValueAtTime(.92,t+7.8);
    subG.gain.linearRampToValueAtTime(0,t+10);

    // Detuning LFO for unease
    const lfo=this.ctx.createOscillator();
    const lfoG=this.ctx.createGain();
    lfo.type='sine';lfo.frequency.value=.11;lfoG.gain.value=4.5;
    lfo.connect(lfoG);lfoG.connect(sub.frequency);

    // High shimmer breath
    const hn=this.ctx.createOscillator();
    const hnG=this.ctx.createGain();
    hn.type='sawtooth';hn.frequency.value=1850;
    hnG.gain.setValueAtTime(0,t);
    hnG.gain.linearRampToValueAtTime(.013,t+3);
    hnG.gain.linearRampToValueAtTime(.009,t+8);
    hnG.gain.linearRampToValueAtTime(0,t+10);

    sub.connect(subG);subG.connect(this.master);
    hn.connect(hnG);hnG.connect(this.master);
    [sub,hn,lfo].forEach(o=>o.start(t));
    [sub,hn,lfo].forEach(o=>o.stop(t+10.6));
  },

  /* ── Sub-bass cinematic BOOM for title slam ── */
  impact(){
    if(!this.ctx)return;const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator();const g=this.ctx.createGain();
    o.type='triangle';o.frequency.setValueAtTime(90,t);
    o.frequency.exponentialRampToValueAtTime(18,t+2.2);
    g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.002,t+2.2);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+2.3);
    // sharp crack
    const c=this.ctx.createOscillator();const cg=this.ctx.createGain();
    c.type='square';c.frequency.value=900;
    cg.gain.setValueAtTime(.07,t);cg.gain.exponentialRampToValueAtTime(.001,t+.12);
    c.connect(cg);cg.connect(this.master);c.start(t);c.stop(t+.15);
  },

  insert(){
    if(!this.ctx)return;const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator();const g=this.ctx.createGain();
    o.type='square';o.frequency.setValueAtTime(52,t);
    o.frequency.exponentialRampToValueAtTime(28,t+.7);
    g.gain.setValueAtTime(.11,t);g.gain.linearRampToValueAtTime(0,t+.75);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+.8);
  },

  clunk(){
    if(!this.ctx)return;const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator();const g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(130,t);
    o.frequency.exponentialRampToValueAtTime(32,t+.22);
    g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.004,t+.22);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+.3);
  },

  /* BGM: silence runs 0→10s, melody drops ~10s.
     Start fade at 7.5s so it's clearly audible at the melody entry. */
  startBGM(){
    if(G.bgmGoing||!this.bgm)return;
    G.bgmGoing=true;
    this.bgm.currentTime=0;
    this.bgm.play().then(()=>{
      const t0=Date.now();const self=this;
      const fade=()=>{
        if(!G.bgmGoing)return;
        const el=(Date.now()-t0)/1000;
        if(el<7.4){requestAnimationFrame(fade);return}
        if(self.bgm.volume<.18){self.bgm.volume=Math.min(self.bgm.volume+.0012,.18);requestAnimationFrame(fade)}
      };requestAnimationFrame(fade);
    }).catch(()=>{G.bgmGoing=false});
  },

  toggle(){
    if(!this.ctx)return;
    G.audioOn=!G.audioOn;
    const t=this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(t);
    this.master.gain.setValueAtTime(this.master.gain.value,t);
    this.master.gain.linearRampToValueAtTime(G.audioOn?.5:0,t+.5);
    if(this.bgm)this.bgm.volume=G.audioOn?.18:0;
    D.btnAudio.textContent=G.audioOn?'♪ VOL':'♪ MUTE';
    D.btnAudio.style.color=G.audioOn?'#aaa':'#555';
  }
};

/* ══════════════════════════════════════════════════════
   PROLOGUE CHOREOGRAPHY
══════════════════════════════════════════════════════ */
const LINES=[
  {html:'<em>Stille.</em>'},
  {html:'Die Art von Stille, die jemand hinterlässt,<br>der <span class="void">nie wirklich da war.</span>'},
  {html:'Er dokumentierte das Leben anderer —<br>weil er sein eigenes fürchtete.'},
  {html:'Und dann kam <span class="ache">sie</span>.<br>Ein Fehler im Skript.'},
  {html:'Wenn jemand alle Beweise seiner Existenz löscht...<br><span class="sub">Hast du ihn dann erfunden?</span>'}
];
LINES.forEach((l,i)=>{$('pl'+i).innerHTML=l.html});

// Show prologue on load
window.addEventListener('load',()=>{
  requestAnimationFrame(()=>{
    D.pro.classList.add('vis');
    setTimeout(()=>D.proGhost.classList.add('vis'),500);
  });
});

D.btnStart.addEventListener('click',startIntro);
D.pro.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' ')startIntro();
});

function showLine(i){
  const el=$('pl'+i);
  el.classList.remove('out');
  void el.offsetWidth; // force reflow
  el.classList.add('show');
}
function hideLine(i){
  const el=$('pl'+i);
  el.classList.remove('show');
  el.classList.add('out');
}

async function startIntro(){
  D.btnStart.style.display='none';
  Audio2.init();
  Audio2.startBGM();
  Audio2.voidDrone();

  // Line sequence timed to the 10s drone arc
  await sleep(600);  showLine(0);
  await sleep(2700); hideLine(0); await sleep(150); showLine(1); Glitch.fire(.4);
  await sleep(3100); hideLine(1); await sleep(150); showLine(2);
  await sleep(3000); hideLine(2); await sleep(150); showLine(3); Glitch.fire(.6);

  // ~10s: melody enters — SLAM the title
  await sleep(2100); hideLine(3);
  Audio2.impact();
  D.proTitle.classList.add('slam');
  D.proMark.classList.add('flash');
  Glitch.burst(2.2);

  // Final philosophical line
  await sleep(4000);
  D.proTitle.style.opacity='0';
  showLine(4);

  await sleep(4600); hideLine(4);
  await sleep(2000);

  // Full-screen white flash transition
  await Flash.show();
  D.pro.classList.add('gone');
  initStation();
  await Flash.hide();
}

/* ══════════════════════════════════════════════════════
   STATION INIT
══════════════════════════════════════════════════════ */
async function initStation(){
  D.station.classList.add('on');
  CRT.init();
  Scene.init();
  D.ledPwr.classList.add('on');

  setTimeout(()=>D.warmup.classList.add('off'),600);

  buildRack();

  D.btnEject.addEventListener('click',ejectTape);
  D.btnAudio.addEventListener('click',()=>Audio2.toggle());
  D.slot.addEventListener('click',()=>{
    if(G.playing||!G.dragging)return;
    // tap slot to insert if tape is selected
    if(selectedTapeId){insertTape(selectedTapeId)}
  });
}

/* ══════════════════════════════════════════════════════
   CRT NOISE ENGINE
══════════════════════════════════════════════════════ */
const CRT={
  cx:null,W:0,H:0,noiseBuf:null,raf:0,
  init(){
    this.cx=D.noise.getContext('2d',{alpha:false});
    this.resize();
    window.addEventListener('resize',()=>this.resize());
    this.draw();
  },
  resize(){
    // Scale canvas at half resolution for chunky pixel look
    const r=D.bezel.getBoundingClientRect();
    this.W=D.noise.width=Math.max((r.width*.5)|0,1);
    this.H=D.noise.height=Math.max((r.height*.5)|0,1);
    const id=this.cx.createImageData(this.W,this.H);
    const buf=new Uint32Array(id.data.buffer);
    const cols=[0xFF1e1e28,0xFF1a1a22,0xFF201c28,0xFF141420,0xFF181822];
    for(let i=0;i<buf.length;i++)
      buf[i]=Math.random()<.055?cols[Math.random()*5|0]:0xFF050508;
    this.noiseBuf=id;
  },
  draw(){
    if(this.W&&this.H&&this.noiseBuf){
      this.cx.putImageData(this.noiseBuf,0,0);
      // scanline artifact
      if(Math.random()<.055){
        const y=Math.random()*this.H|0;
        this.cx.fillStyle='rgba(255,255,255,.038)';
        this.cx.fillRect(0,y,this.W,(Math.random()*5)|0);
      }
      // horizontal shift artifact
      if(Math.random()<.012){
        const y=Math.random()*this.H|0,h=2+Math.random()*4|0;
        const shift=((Math.random()-.5)*16)|0;
        this.cx.drawImage(D.noise,0,y,this.W,h,shift,y,this.W,h);
      }
    }
    this.raf=requestAnimationFrame(()=>this.draw());
  }
};

/* ══════════════════════════════════════════════════════
   6 ATMOSPHERIC CANVAS SCENES
══════════════════════════════════════════════════════ */
const Scene={
  cx:null,W:0,H:0,
  active:false,raf:0,idx:0,switchAt:0,
  QUOTES:['Geistwalzer','Der Beobachter','Regengedächtnis','Die Tänzerin','Verlorene Worte','Abwesenheit'],
  dust:[],

  init(){
    this.cx=D.scene.getContext('2d');
    this.resize();
    window.addEventListener('resize',()=>this.resize());
    for(let i=0;i<22;i++) this.dust.push({
      x:Math.random(),y:Math.random(),
      vx:rnd(-.0003,.0003),vy:rnd(-.0012,-.0002),
      sz:rnd(.6,2.2),op:rnd(.025,.1),ph:Math.random()*TAU
    });
    this.start();
  },

  resize(){
    const r=D.bezel.getBoundingClientRect();
    this.W=D.scene.width=Math.max(r.width|0,1);
    this.H=D.scene.height=Math.max(r.height|0,1);
  },

  start(){
    if(this.active)return;
    this.active=true;D.scene.classList.add('vis');
    this.switchAt=performance.now();
    this.setQuote();
    const loop=n=>{if(!this.active)return;this.frame(n);this.raf=requestAnimationFrame(loop)};
    this.raf=requestAnimationFrame(loop);
  },

  stop(){
    this.active=false;cancelAnimationFrame(this.raf);
    D.scene.classList.remove('vis');
    D.osdQ.classList.remove('show');
  },

  setQuote(){
    D.osdQ.textContent=this.QUOTES[this.idx];
    D.osdQ.classList.remove('show');
    setTimeout(()=>{if(this.active)D.osdQ.classList.add('show')},600);
  },

  frame(now){
    const dt=now-this.switchAt;
    if(dt>12000){
      this.idx=(this.idx+1)%6;
      this.switchAt=now;
      this.setQuote();
      Glitch.fire(.5);
    }
    let fa=1;
    if(dt<2000)fa=dt/2000;
    else if(dt>10000)fa=Math.max(0,(12000-dt)/2000);

    const c=this.cx,W=this.W,H=this.H;
    c.clearRect(0,0,W,H);
    c.globalAlpha=fa*.36;
    this.SCENES[this.idx].call(this,c,W,H,now*.001);

    // floating dust particles
    this.dust.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.ph+=.007;
      p.x=((p.x%1)+1)%1;p.y=((p.y%1)+1)%1;
      const op=p.op*(.5+.5*Math.sin(now*.001*1.5+p.ph));
      c.globalAlpha=op*fa*.3;
      c.fillStyle='#aabbcc';
      c.beginPath();c.arc(p.x*W,p.y*H,p.sz,0,TAU);c.fill();
    });
    c.globalAlpha=1;
  },

  /* ── Shared ghost silhouette ── */
  ghost(c,x,y,sc,sw,op){
    op=op||.19;sw=sw||0;
    c.save();c.translate(x,y);c.scale(sc,sc);
    c.beginPath();
    c.moveTo(0,-31);
    c.bezierCurveTo(-14+sw,-22,-16+sw*1.2,6,-12+sw*1.3,30);
    c.lineTo(12-sw*1.3,30);
    c.bezierCurveTo(16-sw*1.2,6,14-sw,-22,0,-31);
    c.closePath();
    c.fillStyle='rgba(138,155,174,'+op+')';c.fill();
    c.beginPath();c.ellipse(0,-36,7.5,9.5,0,0,TAU);
    c.fillStyle='rgba(155,172,189,'+(op*1.1)+')';c.fill();
    // eyes
    c.fillStyle='rgba(20,20,32,'+(op*2.8)+')';
    c.beginPath();c.arc(-2.8,-37,1.2,0,TAU);c.fill();
    c.beginPath();c.arc(2.8,-37,1.2,0,TAU);c.fill();
    c.restore();
  },

  SCENES:[
    /* 0 — GEISTWALZER: Two figures orbiting, one flickers */
    function(c,W,H,t){
      const cx=W*.5,cy=H*.48,r=W*.12;
      const a=t*.42;
      const x1=cx+Math.cos(a)*r,y1=cy+Math.sin(a)*r*.35;
      const x2=cx+Math.cos(a+Math.PI)*r,y2=cy+Math.sin(a+Math.PI)*r*.35;
      // ambient glow
      const g=c.createRadialGradient(cx,cy,0,cx,cy,r*1.7);
      g.addColorStop(0,'rgba(138,155,174,.055)');g.addColorStop(1,'transparent');
      c.fillStyle=g;c.fillRect(0,0,W,H);
      // connection thread
      c.strokeStyle='rgba(138,155,174,.05)';c.lineWidth=1.5;
      c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
      // figures — one flickers emotionally
      if(Math.sin(t*4.8)>-.6)this.ghost(c,x1,y1,.9,Math.sin(t*2.2)*2.2,.22);
      this.ghost(c,x2,y2,.9,Math.sin(t*2.2+1.1)*2.2,.19);
      // floor shimmer
      c.fillStyle='rgba(138,155,174,.014)';
      c.beginPath();c.ellipse(cx,cy+H*.26,r*2,8,0,0,TAU);c.fill();
    },

    /* 1 — DER BEOBACHTER: Lone figure, window cross, fog */
    function(c,W,H,t){
      const cx=W*.5,cy=H*.52;
      this.ghost(c,cx,cy,1.15,Math.sin(t*.55)*1.8,.2);
      // window frame
      c.strokeStyle='rgba(255,255,255,.035)';c.lineWidth=2.5;
      c.strokeRect(cx-55,cy-64,110,130);
      c.beginPath();c.moveTo(cx,cy-64);c.lineTo(cx,cy+66);c.stroke();
      c.beginPath();c.moveTo(cx-55,cy+2);c.lineTo(cx+55,cy+2);c.stroke();
      // fog layers
      for(let i=0;i<4;i++){
        const fy=H*(.7+i*.07);
        const fx=cx+Math.sin(t*.22+i*2)*W*.2;
        c.fillStyle='rgba(138,155,174,.018)';
        c.beginPath();c.ellipse(fx,fy,W*.33,13,0,0,TAU);c.fill();
      }
      // rare blink
      if(Math.sin(t*2.9)>.96){
        c.fillStyle='rgba(138,170,204,.14)';
        c.beginPath();c.arc(cx-4.5,cy-38,1.8,0,TAU);c.fill();
        c.beginPath();c.arc(cx+4.5,cy-38,1.8,0,TAU);c.fill();
      }
    },

    /* 2 — REGENGEDÄCHTNIS: Rain, puddle ripples, faint silhouette */
    function(c,W,H,t){
      c.strokeStyle='rgba(138,155,174,.13)';c.lineWidth=1.1;
      for(let i=0;i<38;i++){
        const rx=(i*43+t*218)%W;
        const ry=(i*89+t*435)%H;
        c.beginPath();c.moveTo(rx,ry);c.lineTo(rx-1.5,ry+16);c.stroke();
      }
      for(let j=0;j<4;j++){
        const pr=(t*24+j*38)%68;
        const po=Math.max(0,1-pr/68)*.1;
        c.strokeStyle=`rgba(138,155,174,${po})`;c.lineWidth=.8;
        c.beginPath();c.ellipse(W*(.15+j*.22),H*.82,pr*2.2,pr*.32,0,0,TAU);c.stroke();
      }
      c.globalAlpha*=.42;
      this.ghost(c,W*.5,H*.54,.9,Math.sin(t)*.8,.16);
      c.globalAlpha=1;
      // ground fog
      c.fillStyle='rgba(138,155,174,.015)';c.fillRect(0,H*.85,W,H*.15);
    },

    /* 3 — DIE TÄNZERIN: Slow spin, particles dissolving off her */
    function(c,W,H,t){
      const x=W*.5,y=H*.48;
      const rot=Math.sin(t*.38)*.26;
      // spotlight
      const g=c.createRadialGradient(x,H*.2,0,x,H*.2,W*.32);
      g.addColorStop(0,'rgba(196,175,87,.028)');g.addColorStop(1,'transparent');
      c.fillStyle=g;c.fillRect(0,0,W,H);
      c.save();c.translate(x,y);c.rotate(rot);
      // torso
      c.fillStyle='rgba(155,172,189,.17)';
      c.beginPath();c.moveTo(0,-24);c.bezierCurveTo(-8,-18,-6,4,-3,14);c.lineTo(3,14);c.bezierCurveTo(6,4,8,-18,0,-24);c.fill();
      // tutu
      c.beginPath();c.ellipse(0,13,20,5.5,0,0,TAU);c.fill();
      // head
      c.beginPath();c.arc(0,-27,5.5,0,TAU);c.fill();
      // arms
      const aa=Math.sin(t*2)*.9;
      c.strokeStyle='rgba(155,172,189,.12)';c.lineWidth=1.5;
      c.beginPath();c.moveTo(-3,-14);c.quadraticCurveTo(-20+aa*6,-22+Math.cos(t*2)*8,-28+aa*9,-16);c.stroke();
      c.beginPath();c.moveTo(3,-14);c.quadraticCurveTo(20-aa*6,-22-Math.cos(t*2)*8,28-aa*9,-16);c.stroke();
      c.restore();
      // dissolving particles
      for(let i=0;i<12;i++){
        const px=x+Math.sin(t*2.5+i*.9)*32;
        const py=y-(t*58+i*17)%115+22;
        const pa=Math.max(0,1-i/12)*.3;
        c.fillStyle=`rgba(170,188,206,${pa})`;
        c.beginPath();c.arc(px,py,1.7,0,TAU);c.fill();
      }
      // floor shadow
      c.fillStyle='rgba(0,0,0,.06)';
      c.beginPath();c.ellipse(x,y+48,22,5,0,0,TAU);c.fill();
    },

    /* 4 — VERLORENE WORTE: Floating German text fragments */
    function(c,W,H,t){
      const words=['Leere','Stille','War er real?','Kommentar','Sie','Warum?','Erinnerung','Verschwunden','Ich war hier'];
      // NOTE: Using literal font name — never use CSS vars in canvas font
      c.font='20px "Cormorant Garamond",serif';
      c.textAlign='center';c.textBaseline='middle';
      for(let i=0;i<words.length;i++){
        const ph=t*.16+i*1.28;
        const wx=W*(.14+(Math.sin(ph*.72+i)*.5+.5)*.72);
        const wy=H*(.1+(Math.cos(ph*.5+i*2)*.5+.5)*.8);
        const wo=.045+.06*Math.sin(ph*2+i);
        c.save();c.translate(wx,wy);c.rotate(Math.sin(ph*.3+i)*.13);
        c.globalAlpha=wo;c.fillStyle='#aabbcc';c.fillText(words[i],0,0);
        c.restore();
      }
      c.globalAlpha=1;
    },

    /* 5 — ABWESENHEIT: Empty chair, rising afterimage, "Er war hier." */
    function(c,W,H,t){
      const x=W*.5,y=H*.5;
      const pu=.38+.28*Math.sin(t*.42);
      // chair lines
      c.strokeStyle='rgba(138,155,174,.1)';c.lineWidth=2;
      c.beginPath();
      c.moveTo(x-22,y+14);c.lineTo(x-22,y+52);
      c.moveTo(x+22,y+14);c.lineTo(x+22,y+52);
      c.moveTo(x-22,y+14);c.lineTo(x+22,y+14);
      c.moveTo(x-22,y-30);c.lineTo(x-22,y+14);
      c.moveTo(x+22,y-30);c.lineTo(x+22,y+14);
      c.moveTo(x-22,y-30);c.lineTo(x+22,y-30);
      c.stroke();
      // rising afterimage
      const yOff=-((t*10)%55);
      const ga=Math.max(0,1-Math.abs(yOff)/55)*pu;
      c.globalAlpha*=ga*.55;
      this.ghost(c,x,y+yOff,.88,0,.15);
      c.globalAlpha=1;
      // ambient glow
      const g=c.createRadialGradient(x,y,0,x,y,W*.22);
      g.addColorStop(0,'rgba(138,155,174,'+(0.016*pu)+')');g.addColorStop(1,'transparent');
      c.fillStyle=g;c.fillRect(0,0,W,H);
      // "Er war hier."
      const to=.028+.022*Math.sin(t*.25);
      c.globalAlpha=to;
      c.font='18px "Cormorant Garamond",serif'; // literal font name
      c.fillStyle='#aabbcc';c.textAlign='center';
      c.fillText('Er war hier.',x,y+H*.36);
      c.globalAlpha=1;
    }
  ]
};

/* ══════════════════════════════════════════════════════
   TAPE RACK
══════════════════════════════════════════════════════ */
function buildRack(){
  // Clear old tapes (keep title + dots container)
  D.rack.querySelectorAll('.tape').forEach(e=>e.remove());
  D.rackDots.innerHTML='';

  const allDone=STD.every(t=>G.done.includes(t.id));

  // Progress dots
  STD.forEach(()=>{
    const d=document.createElement('div');
    d.className='rdot';D.rackDots.appendChild(d);
  });
  let dc=0;STD.forEach(t=>{if(G.done.includes(t.id))dc++});
  Array.from(D.rackDots.children).forEach((d,i)=>{if(i<dc)d.classList.add('on')});

  TAPES.forEach((tape,i)=>{
    const el=document.createElement('div');
    el.className='tape';
    el.dataset.tid=tape.id;
    el.style.animationDelay=(i*.08)+'s';

    if(tape.secret){
      el.classList.add('secret');
      if(!allDone){
        el.classList.add('locked');
        el.innerHTML=`<div class="t-label">GESPERRT</div><div class="t-desc">Archiv unvollständig</div>`;
      }else{
        el.innerHTML=`<div class="t-label">${tape.title}</div><div class="t-desc">${tape.desc}</div>`;
        addTapeListeners(el,tape);
      }
    }else{
      if(G.done.includes(tape.id))el.classList.add('done');
      el.innerHTML=`<div class="t-label">${tape.title}</div><div class="t-desc">${tape.desc}</div>`;
      addTapeListeners(el,tape);
    }
    D.rack.appendChild(el);
  });
}

let selectedTapeId=null;

function addTapeListeners(el,tape){
  el.addEventListener('mousedown',e=>startDrag(e,tape));
  el.addEventListener('click',()=>tapeClick(el,tape));
  el.addEventListener('touchend',e=>{e.preventDefault();tapeClick(el,tape)},{passive:false});
}

function tapeClick(el,tape){
  if(G.playing)return;
  if(selectedTapeId===tape.id){
    // Double-tap or re-click = insert
    insertTape(tape.id);
    return;
  }
  // Select tape
  D.rack.querySelectorAll('.tape.selected').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  selectedTapeId=tape.id;
  D.slotTxt.textContent='▶ EINLEGEN: '+tape.title.substring(0,16)+'…';
  Audio2.clunk&&Audio2.clunk();
}

/* ══════════════════════════════════════════════════════
   DRAG & DROP
══════════════════════════════════════════════════════ */
function startDrag(e,tape){
  if(G.playing)return;
  G.dragging=tape.id;
  Audio2.clunk();
  dragGhost=document.createElement('div');
  dragGhost.className='drag-ghost';
  dragGhost.innerHTML=`<div class="t-label">${tape.title}</div>`;
  document.body.appendChild(dragGhost);
  moveDragGhost(e.clientX,e.clientY);
}

function moveDragGhost(x,y){
  if(!dragGhost)return;
  dragGhost.style.left=x+'px';dragGhost.style.top=y+'px';
  const sr=D.slot.getBoundingClientRect();
  const over=(x>sr.left&&x<sr.right&&y>sr.top&&y<sr.bottom);
  D.slot.classList.toggle('ov',over);
}

function endDrag(){
  const over=D.slot.classList.contains('ov');
  D.slot.classList.remove('ov');
  const id=G.dragging;G.dragging=null;
  if(dragGhost){dragGhost.remove();dragGhost=null}
  if(over&&id)insertTape(id);
}

/* ══════════════════════════════════════════════════════
   TAPE PLAYBACK
══════════════════════════════════════════════════════ */
function fmt(s){const m=0|s/60;return m+':'+(''+(0|s%60)).padStart(2,'0')}

async function insertTape(id){
  if(G.playing)return;
  G.playing=id;
  selectedTapeId=null;
  D.rack.querySelectorAll('.tape.selected').forEach(e=>e.classList.remove('selected'));

  const tape=TAPES.find(t=>t.id===id);
  const idx=TAPES.indexOf(tape);

  Audio2.insert();
  Glitch.burst(1.7);
  D.bezel.classList.add('lit');
  D.slot.classList.add('ins');
  D.osdCh.textContent='AKTE-'+(idx+1);
  D.osdRec.classList.add('on');
  D.osdTime.classList.add('on');
  D.tracker.classList.add('on');
  D.slotTxt.textContent=tape.title;
  D.ledPlay.classList.add('on');

  Scene.stop();

  G.playStart=Date.now();
  G.timer=setInterval(()=>{
    D.osdTime.textContent='▶ '+fmt((Date.now()-G.playStart)/1000);
  },1000);

  D.tapeContent.innerHTML='';
  await sleep(1000);

  if(tape.secret){
    D.tapeContent.innerHTML=`
      <div class="final-v">
        <h1>KOMMENTAR</h1>
        <p class="d1">Wenn jemand dich liebt und dann jeden<br>Beweis seiner Existenz entfernt,</p>
        <p class="d1">wurdest du dann geliebt?</p>
        <p class="d2">— Ende des Archivs —</p>
        <p class="d3">NICHTS BLEIBT.</p>
      </div>`;
    D.tapeContent.classList.add('show');
  }else{
    try{
      const r=await fetch(tape.file);
      if(!r.ok)throw new Error(r.status);
      const html=await r.text();
      D.tapeContent.innerHTML=`<div class="tc-html">${html}</div>`;
    }catch{
      D.tapeContent.innerHTML=`
        <div class="final-v">
          <h1 style="color:var(--c-dim)">ARCHIV-FEHLER</h1>
          <p style="color:var(--c-ghost);font-family:var(--font-crt);font-size:clamp(.9rem,2vw,1.1rem)">
            VERBINDUNG ZU ${tape.file} GETRENNT.</p>
          <p style="font-style:italic;margin-top:16px">
            "Wir waren hier.<br>Aber niemand erinnert sich."</p>
        </div>`;
    }
    D.tapeContent.classList.add('show');
  }
}

function ejectTape(){
  if(!G.playing)return;
  Audio2.clunk();
  Glitch.burst(1.1);
  if(!G.done.includes(G.playing))G.done.push(G.playing);
  G.playing=null;
  clearInterval(G.timer);

  D.bezel.classList.remove('lit');
  D.slot.classList.remove('ins');
  D.osdCh.textContent='AKTE-0';
  D.osdRec.classList.remove('on');
  D.osdTime.classList.remove('on');
  D.osdTime.textContent='▶ 00:00';
  D.tracker.classList.remove('on');
  D.slotTxt.textContent='▶ HIERHER ZIEHEN';
  D.ledPlay.classList.remove('on');

  D.tapeContent.classList.remove('show');
  setTimeout(()=>{D.tapeContent.innerHTML=''},850);

  buildRack();
  Scene.start();
}

/* ══════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&G.playing)ejectTape();
});
</script>
