<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050505">
<title>KOMMENTAR — Lemuria Archiv</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23080810'/%3E%3Cellipse cx='16' cy='14' rx='7' ry='10' fill='%23667788' opacity='.35'/%3E%3Ccircle cx='20' cy='10' r='1' fill='%238899aa' opacity='.5'/%3E%3Ccircle cx='22' cy='7' r='.6' fill='%23aabbcc' opacity='.3'/%3E%3Ccircle cx='24' cy='12' r='.8' fill='%23778899' opacity='.4'/%3E%3Ctext x='16' y='28' text-anchor='middle' fill='%23556677' font-size='6' font-family='serif'%3E%3F%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Crimson+Text:ital@0;1&family=Special+Elite&display=swap');

:root{
  --bg:#080810;--colour:#8899aa;--colour-dim:#556677;--colour-bright:#aabbcc;
  --gold:#c4a35a;--amber:rgba(196,163,90,.4);--grey:#aabbcc;--warm:#ffeedd;
  --red:#8a3a3a;--red-bright:#aa4444;--blue:#5588bb;--cyan:#88aacc;
  --void:#020204;--dim:#555;--white:#d4d4d4;--earth:#7a7a8a;
  --font-crt:'VT323',monospace;--font-serif:'Cormorant Garamond',serif;
  --font-detect:'Crimson Text',serif;--font-case:'Special Elite',monospace;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);
  --min-touch:48px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{height:100%;overflow:hidden;background:#050508;font-family:var(--font-crt);color:var(--colour);touch-action:pan-y pinch-zoom}

/* ═══ THREE-LAYER GLITCH SYSTEM ═══ */
.glitch-overlay{position:fixed;inset:0;z-index:9990;pointer-events:none;overflow:hidden}

/* FARBE — warm amber, moments of life/connection */
.glitch-farbe{
  position:absolute;left:0;width:100%;height:3px;opacity:0;
  background:linear-gradient(90deg,transparent,var(--amber),rgba(200,160,80,.25),transparent);
  animation:glitchFarbe 8s ease-in-out infinite;
  box-shadow:0 0 8px rgba(196,163,90,.15);
}
@keyframes glitchFarbe{
  0%,92%,100%{top:-5%;opacity:0;transform:translateX(-100%)}
  94%{top:35%;opacity:.7;transform:translateX(0);height:2px}
  96%{top:38%;opacity:0;transform:translateX(100%)}
}

/* DUNKELHEIT — void black, his erasure */
.glitch-dunkel{
  position:absolute;left:0;width:100%;height:8px;opacity:0;
  background:linear-gradient(90deg,transparent 5%,rgba(2,2,4,.95) 20%,rgba(0,0,0,.85) 80%,transparent 95%);
  animation:glitchDunkel 5s ease-in-out infinite;
}
@keyframes glitchDunkel{
  0%,100%{top:-5%;opacity:0;height:6px}
  8%{top:55%;opacity:.7;height:10px;transform:translateX(-15%)}
  13%{top:60%;opacity:0;height:4px}
  45%{top:-5%;opacity:0}
  50%{top:30%;opacity:.5;height:14px}
  55%{top:34%;opacity:0;height:5px}
}

/* GRAU — static noise, "was he real?" uncertainty */
.glitch-grau{
  position:absolute;left:0;width:100%;height:2px;opacity:0;
  background:linear-gradient(90deg,transparent,rgba(170,187,204,.18),rgba(136,153,170,.12),rgba(200,200,210,.15),transparent);
  animation:glitchGrau 6s linear infinite;
  filter:blur(.3px);
}
@keyframes glitchGrau{
  0%,100%{top:-5%;opacity:0}
  15%{top:68%;opacity:.35;transform:translateX(12%)}
  18%{top:72%;opacity:0;transform:translateX(-8%)}
  58%{top:-5%;opacity:0}
  62%{top:18%;opacity:.3;transform:translateX(-5%)}
  65%{top:20%;opacity:0;transform:translateX(8%)}
  78%{top:-5%;opacity:0}
  80%{top:45%;opacity:.25;height:3px}
  83%{top:47%;opacity:0;height:1px}
}

/* Corruption line — digital artifact */
.corruption-line{
  position:fixed;left:0;width:100%;height:1px;z-index:9991;
  background:linear-gradient(90deg,transparent,var(--colour-bright),var(--colour),var(--colour-dim),transparent);
  opacity:0;pointer-events:none;
}
.corruption-line.active{animation:corruptionSweep .6s ease-out forwards}
@keyframes corruptionSweep{0%{opacity:.6;transform:scaleX(.3)}30%{opacity:.8;transform:scaleX(1)}100%{opacity:0;transform:scaleX(1.2)}}

/* Subliminal text — ghostly fragments */
.subliminal{
  position:fixed;z-index:9993;pointer-events:none;
  font-family:var(--font-crt);color:var(--colour-bright);opacity:0;
  font-size:clamp(1.2rem,4vw,2.5rem);text-shadow:0 0 15px var(--colour);
  letter-spacing:4px;white-space:nowrap;
}
.subliminal.flash{animation:subliminalFlash .12s steps(1) forwards}
@keyframes subliminalFlash{0%{opacity:.6}60%{opacity:.4}100%{opacity:0}}

/* Evidence flash — forensic camera */
.evidence-flash{position:fixed;inset:0;z-index:9996;pointer-events:none;background:#fff;opacity:0}
.evidence-flash.active{animation:evFlash .25s ease-out}
@keyframes evFlash{0%{opacity:.5}15%{opacity:.2}100%{opacity:0}}

/* ═══ CASE FILE OVERLAY ═══ */
.case-number{
  position:fixed;top:calc(10px + var(--safe-top));left:calc(10px + var(--safe-left));
  z-index:195;font-family:var(--font-case);font-size:clamp(8px,1.5vw,11px);
  color:var(--colour-dim);opacity:0;letter-spacing:1px;pointer-events:none;
  transition:opacity 2s;text-shadow:0 0 4px rgba(85,102,119,.3)
}
.case-number.on{opacity:.4}
.confidential-stamp{
  position:fixed;top:50%;left:50%;z-index:9992;pointer-events:none;
  font-family:var(--font-case);font-size:clamp(2rem,6vw,4rem);
  color:var(--red);opacity:0;transform:translate(-50%,-50%) rotate(-18deg);
  border:3px solid var(--red);padding:8px 24px;letter-spacing:6px;
  text-transform:uppercase;
  animation:confStamp 15s ease-in-out infinite;
}
@keyframes confStamp{0%,93%,100%{opacity:0}95%{opacity:.08}97%{opacity:.06}}

/* Redacted text */
.redacted{position:relative;background:#111118;color:transparent;padding:0 3px;border-radius:1px}
.redacted::selection{background:transparent}

/* ═══ VHS BACKGROUND ═══ */
#vhs-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#vhs-bg canvas{position:absolute;inset:0;width:100%;height:100%}

/* Touch Effects */
.touch-ripple{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;border:1.5px solid var(--colour);animation:touchRipple .7s ease-out forwards;opacity:0}
@keyframes touchRipple{0%{transform:scale(0);opacity:.7}100%{transform:scale(3.5);opacity:0}}
.glitch-flash{position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(136,153,170,.08) 2px,rgba(136,153,170,.08) 4px);animation:glitchFlash .12s ease-out}
@keyframes glitchFlash{0%{opacity:.35}100%{opacity:0}}

/* ═══ BACKGROUND SCENES ═══ */
#bg-scenes{position:absolute;inset:0;z-index:21;pointer-events:none;opacity:0;transition:opacity 2s ease}
#bg-scenes.active{opacity:.3}
.bg-scene{position:absolute;inset:0;opacity:0;transition:opacity 3s ease;overflow:hidden}
.bg-scene.active{opacity:1}
.bg-scene svg{position:absolute;inset:0;width:100%;height:100%}

/* Ambient rays */
.ambient-rays{position:absolute;inset:0;z-index:22;pointer-events:none;opacity:0;transition:opacity 3s}
.ambient-rays.on{opacity:1}
.ambient-ray{position:absolute;width:200%;height:200%;top:-50%;left:-50%;background:conic-gradient(from 0deg at 50% 50%,transparent 0%,rgba(136,153,170,.01) 5%,transparent 10%,transparent 25%,rgba(196,163,90,.006) 30%,transparent 35%,transparent 50%,rgba(136,153,170,.008) 55%,transparent 60%,transparent 75%,rgba(136,153,170,.006) 80%,transparent 85%);animation:rayRotate 30s linear infinite}
.ambient-ray:nth-child(2){animation-direction:reverse;animation-duration:45s;opacity:.7}
@keyframes rayRotate{to{transform:rotate(360deg)}}

/* ═══ SCENE ANIMATIONS ═══ */
.scene-cafe .window-light{animation:windowFlicker 8s ease-in-out infinite}
@keyframes windowFlicker{0%,100%{opacity:.12}50%{opacity:.22}}
.scene-cafe .steam{animation:steamRise 4s ease-out infinite;transform-origin:bottom}
.scene-cafe .steam:nth-child(2){animation-delay:.8s}
.scene-cafe .steam:nth-child(3){animation-delay:1.6s}
@keyframes steamRise{0%{opacity:0;transform:translateY(0) scaleX(1)}30%{opacity:.35}100%{opacity:0;transform:translateY(-40px) scaleX(1.5)}}
.scene-cafe .silhouette{animation:shadowPulse 6s ease-in-out infinite}
@keyframes shadowPulse{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.45;transform:scale(1.015)}}

.scene-train .platform-light{animation:platformGlow 5s ease-in-out infinite}
@keyframes platformGlow{0%,100%{opacity:.08}50%{opacity:.2}}
.scene-train .fog{animation:fogDrift 10s ease-in-out infinite}
.scene-train .fog:nth-child(2){animation-delay:3s;animation-duration:12s}
@keyframes fogDrift{0%,100%{opacity:.15;transform:translateX(0)}50%{opacity:.35;transform:translateX(25px)}}

.scene-rain .raindrop{animation:rainFall 1.5s linear infinite}
.scene-rain .raindrop:nth-child(2){animation-delay:.3s}
.scene-rain .raindrop:nth-child(3){animation-delay:.6s}
.scene-rain .raindrop:nth-child(4){animation-delay:.9s}
.scene-rain .raindrop:nth-child(5){animation-delay:1.2s}
@keyframes rainFall{0%{opacity:0;transform:translateY(-20px)}20%{opacity:.4}100%{opacity:0;transform:translateY(100px)}}
.scene-rain .puddle{animation:puddleRipple 3s ease-in-out infinite}
@keyframes puddleRipple{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.35;transform:scale(1.08)}}

.scene-archive .paper{animation:paperFloat 6s ease-in-out infinite}
.scene-archive .paper:nth-child(2){animation-delay:1s;animation-duration:7s}
@keyframes paperFloat{0%,100%{opacity:.25;transform:translateY(0) rotate(0deg)}50%{opacity:.45;transform:translateY(-12px) rotate(1.5deg)}}
.scene-archive .folder{animation:folderShift 8s ease-in-out infinite}
@keyframes folderShift{0%,100%{opacity:.15}50%{opacity:.35}}

/* ═══ BOOT OVERLAY — CASE FILE ═══ */
#boot-overlay{
  position:fixed;inset:0;z-index:9999;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;opacity:1;transition:opacity 2s cubic-bezier(.4,0,.2,1);
  padding:var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left)
}
#boot-overlay.hidden{opacity:0;pointer-events:none}

/* Dissolving figure */
.figure-svg{
  width:clamp(80px,22vw,140px);height:clamp(100px,28vw,180px);
  animation:figurePulse 4s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(136,153,170,.2));
}
@keyframes figurePulse{0%,100%{transform:scale(1);opacity:.65}50%{transform:scale(1.04);opacity:.9}}

/* Case file seal */
.case-seal{
  margin-top:clamp(14px,3vw,24px);border:1.5px solid var(--colour-dim);
  padding:clamp(10px,2.5vw,16px) clamp(18px,4vw,32px);position:relative;
  text-align:center;
}
.case-seal::before,.case-seal::after{
  content:'';position:absolute;width:10px;height:10px;border:1.5px solid var(--colour-dim);
}
.case-seal::before{top:-5px;left:-5px;border-right:none;border-bottom:none}
.case-seal::after{bottom:-5px;right:-5px;border-left:none;border-top:none}

#boot-overlay h1{
  font-family:var(--font-serif);font-size:clamp(1.4rem,6vw,2.8rem);font-weight:600;
  color:var(--colour);letter-spacing:2px;
  text-shadow:0 0 30px var(--colour);animation:titleFlicker 4s infinite;
  text-align:center;line-height:1.2;
}
#boot-overlay .akte-nr{
  font-family:var(--font-case);font-size:clamp(.7rem,2vw,1rem);
  color:var(--colour-dim);margin-top:6px;opacity:.5;letter-spacing:3px;
}
.boot-prompt{
  color:#444;font-size:clamp(.85rem,2.5vw,1.1rem);
  margin-top:clamp(20px,5vh,40px);animation:pulse 2s infinite;
  letter-spacing:3px;font-family:var(--font-case);
}
.boot-sub{
  color:var(--colour-dim);font-size:clamp(.55rem,1.5vw,.7rem);
  margin-top:clamp(10px,2vh,16px);opacity:.3;text-align:center;
  padding:0 10px;font-family:var(--font-crt);letter-spacing:2px;
}
.boot-stamp{
  position:absolute;bottom:clamp(20px,5vh,40px);right:clamp(15px,4vw,30px);
  font-family:var(--font-case);font-size:clamp(.6rem,1.5vw,.8rem);
  color:var(--red);opacity:.15;transform:rotate(-12deg);
  border:1.5px solid var(--red);padding:3px 10px;letter-spacing:2px;
}

@keyframes titleFlicker{0%,18%,22%,25%,53%,56%,100%{opacity:1;text-shadow:0 0 30px var(--colour)}20%,24%,55%{opacity:.55;text-shadow:0 0 12px var(--colour-dim)}}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:.75}}
@keyframes blink{50%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInSlow{from{opacity:0}to{opacity:1}}
@keyframes screenShake{0%,100%{transform:translate(0)}10%{transform:translate(-2px,1px)}30%{transform:translate(2px,-1px)}50%{transform:translate(-1px,2px)}70%{transform:translate(1px,-1px)}90%{transform:translate(-1px,0)}}
@keyframes ledBreathe{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes noSignalPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:.9;transform:scale(1.015)}}
@keyframes gentleDrift{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

.tap-hint{display:none;color:var(--colour-dim);font-size:clamp(.65rem,1.8vw,.8rem);margin-top:8px;animation:pulse 1.5s infinite;font-family:var(--font-crt)}
@media(hover:none) and (pointer:coarse){.tap-hint{display:block}}

/* ═══ STATION ═══ */
#particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;contain:strict}

#station{
  display:none;grid-template-columns:1fr minmax(170px,260px);grid-template-rows:1fr;
  gap:clamp(8px,2vw,12px);width:min(96vw,1080px);height:min(90vh,740px);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;
  contain:layout style;
  padding:max(4px,var(--safe-top)) var(--safe-right) max(4px,var(--safe-bottom)) var(--safe-left)
}
#station.on{display:grid;animation:stationFadeIn 1.5s ease-out forwards}
@keyframes stationFadeIn{from{opacity:0;transform:translate(-50%,-50%) scale(.96)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* TV Unit */
.tv-unit{
  grid-column:1;grid-row:1;
  background:linear-gradient(145deg,#141418,#0c0c10);
  border-radius:clamp(10px,2.5vw,18px);border:2px solid #1a1a22;
  box-shadow:inset 0 0 50px #000,0 12px 50px rgba(0,0,0,.85);
  display:flex;flex-direction:column;padding:clamp(8px,2vw,16px);
  position:relative;z-index:2;
}

.screen-bezel{
  flex:1;background:#020204;border-radius:clamp(6px,1.5vw,10px);
  position:relative;overflow:hidden;border:2px solid #12121a;
  box-shadow:inset 0 0 50px rgba(0,0,0,.9);
  transition:border-color .5s,box-shadow .5s;min-height:200px
}
.screen-bezel.shake{animation:screenShake .5s ease-out}
.screen-bezel.flash{border-color:rgba(136,153,170,.2);box-shadow:inset 0 0 50px rgba(0,0,0,.9),0 0 20px rgba(136,153,170,.05)}

canvas#crt{position:absolute;inset:0;width:100%;height:100%;z-index:5;image-rendering:pixelated}
canvas#fx{position:absolute;inset:0;width:100%;height:100%;z-index:7;opacity:0;transition:opacity 1s;pointer-events:none}
canvas#fx.on{opacity:1}
.crt-warmup{position:absolute;inset:0;z-index:19;background:radial-gradient(circle at center,#0a0a12 0%,#050508 60%);transition:opacity 3s;pointer-events:none}
.crt-warmup.off{opacity:0}
.scanlines{position:absolute;inset:0;pointer-events:none;z-index:30;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);opacity:.45}
.vignette{position:absolute;inset:0;pointer-events:none;z-index:31;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.8) 100%)}
.glass-glare{position:absolute;inset:0;pointer-events:none;z-index:32;background:linear-gradient(135deg,rgba(255,255,255,.015) 0%,transparent 35%)}
.scan-bar{position:absolute;top:0;left:0;width:100%;height:5px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.04),transparent);opacity:.35;z-index:33;pointer-events:none;animation:scanbar 5s linear infinite}
.tracking-bar{position:absolute;left:0;width:100%;height:3px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.06),transparent);opacity:0;z-index:34;pointer-events:none;transition:opacity .3s}
.tracking-bar.on{opacity:1;animation:trackDrift 3s linear infinite}
@keyframes scanbar{from{top:-4%}to{top:104%}}
@keyframes trackDrift{0%{top:-2%}100%{top:102%}}
.screen-glow{position:absolute;inset:-15px;z-index:-1;border-radius:20px;pointer-events:none;transition:background 2.5s}

/* Screen Content */
#screen{position:absolute;inset:0;z-index:25;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(10px,3vw,20px);opacity:1;transition:opacity 1s}
#screen.fade-out{opacity:0}
#screen.fade-in{animation:screenFadeIn 1s forwards}
@keyframes screenFadeIn{from{opacity:0;filter:blur(2px)}to{opacity:1;filter:blur(0)}}

.channel-id{position:absolute;top:clamp(8px,2vw,12px);left:clamp(8px,2vw,14px);font-size:clamp(.9rem,2.2vw,1.4rem);color:var(--colour-dim);opacity:.4;text-shadow:0 0 6px var(--colour-dim);letter-spacing:2px;z-index:35;font-family:var(--font-crt)}
.counter{position:absolute;top:clamp(8px,2vw,12px);right:clamp(8px,2vw,14px);font-size:clamp(.8rem,1.8vw,1rem);color:rgba(255,255,255,.45);opacity:0;z-index:35;transition:opacity .5s;font-family:var(--font-crt)}
.counter.on{opacity:1}
.rec-ind{position:absolute;top:clamp(8px,2vw,12px);right:clamp(8px,2vw,14px);font-size:clamp(.75rem,1.8vw,.95rem);color:var(--red-bright);opacity:0;transition:opacity .4s;z-index:35;font-family:var(--font-crt)}
.rec-ind.on{opacity:1;animation:blink 1s infinite}
.screen-msg{font-size:clamp(.85rem,2.8vw,1.5rem);color:var(--colour-dim);text-shadow:0 0 10px var(--colour-dim);letter-spacing:3px;text-align:center;animation:fadeInSlow 1.2s,noSignalPulse 4s ease-in-out 1.2s infinite;font-family:var(--font-crt)}
.dlg-box{position:absolute;bottom:clamp(8px,2vw,14px);left:50%;transform:translateX(-50%);z-index:40;text-align:center;color:var(--colour-bright);font-family:var(--font-serif);font-size:clamp(.8rem,2.2vw,1.15rem);text-shadow:0 0 6px var(--colour);background:rgba(8,8,12,.93);padding:clamp(6px,1.5vw,10px) clamp(10px,2.5vw,18px);border-radius:3px;border:1px solid rgba(136,153,170,.1);max-width:90%;line-height:1.5;opacity:0;transition:opacity .6s;pointer-events:none}
.dlg-box.vis{opacity:1}
.boot-text{width:92%;text-align:left;color:var(--colour);font-size:clamp(10px,2vw,14px);line-height:1.8;white-space:pre-wrap;font-family:var(--font-crt)}
.boot-line{opacity:0;animation:fadeIn .5s forwards}
.boot-text .cursor{display:inline-block;width:6px;height:1.1em;background:var(--colour);vertical-align:text-bottom;margin-left:2px;animation:blink .8s step-end infinite}

/* TV Controls */
.tv-controls{
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(5px,1.2vw,7px) clamp(6px,1.5vw,12px);
  margin-top:clamp(3px,.8vw,5px);flex-shrink:0;flex-wrap:wrap;gap:5px
}
.power-section{display:flex;align-items:center;gap:4px}
.led{width:clamp(5px,1.2vw,6px);height:clamp(5px,1.2vw,6px);border-radius:50%;transition:all .4s;box-shadow:inset 0 0 2px rgba(0,0,0,.6)}
.led.pwr{background:#252}
.led.pwr.on{background:#88aacc;box-shadow:0 0 5px rgba(136,170,204,.5);animation:ledBreathe 3s infinite}
.led.play{background:#223}
.led.play.on{background:#8899aa;box-shadow:0 0 5px rgba(136,153,170,.5)}
.ctrl-label{font-size:clamp(6px,1.3vw,8px);letter-spacing:.12em;color:#444;text-transform:uppercase;margin-left:2px}
.tape-slot{
  width:clamp(90px,22vw,150px);height:clamp(20px,4.5vw,24px);
  background:#040406;border:1.5px solid #222228;border-radius:3px;
  cursor:default;box-shadow:inset 0 2px 6px rgba(0,0,0,.8);
  position:relative;overflow:hidden;transition:all .4s;
  display:flex;align-items:center;justify-content:center;min-height:var(--min-touch)
}
.slot-label{font-size:clamp(6px,1.3vw,8px);letter-spacing:.1em;color:#2a2a32;transition:color .4s;position:relative;z-index:2;font-family:var(--font-crt)}
.tape-slot.active{border-color:var(--colour);box-shadow:inset 0 2px 6px rgba(0,0,0,.8),0 0 8px rgba(136,153,170,.12)}
.tape-slot.active .slot-label{color:var(--colour);animation:pulse 1.5s infinite}
.slot-flap{position:absolute;inset:0;background:linear-gradient(180deg,#161618,#0c0c10);transform-origin:top;transition:transform .6s;border-bottom:1px solid #222228;z-index:1}
.tape-slot.inserting .slot-flap{transform:perspective(80px) rotateX(-95deg)}
.eject-btn{
  padding:clamp(3px,.8vw,5px) clamp(6px,1.5vw,12px);
  background:linear-gradient(180deg,#1a1a1e,#101012);
  border:1.5px solid #28282e;color:#555;cursor:pointer;
  font-family:var(--font-crt);font-size:clamp(7px,1.3vw,9px);
  border-radius:3px;letter-spacing:1px;transition:all .2s;
  min-height:var(--min-touch);min-width:55px
}
.eject-btn:hover,.eject-btn:active{background:#141416;color:#999;border-color:#36363e}
.brand-label{font-size:clamp(6px,1.1vw,9px);letter-spacing:.25em;color:#1a1a22;text-transform:uppercase;display:none;font-family:var(--font-case)}
@media(min-width:600px){.brand-label{display:inline}}

/* ═══ TAPE RACK (ASSERVATE) ═══ */
.tape-rack{
  grid-column:2;grid-row:1;
  background:linear-gradient(180deg,#0c0c10,#060608);
  border:2px solid #16161c;border-radius:clamp(5px,1.2vw,8px);
  padding:clamp(6px,1.5vw,12px);display:flex;flex-direction:column;
  gap:clamp(7px,1.2vw,10px);overflow-y:auto;
  box-shadow:inset 0 0 20px #000;scrollbar-width:thin;
  scrollbar-color:#1a1a22 #060608;contain:content
}
.rack-header{
  color:#2a2a32;text-align:center;border-bottom:1px solid #141418;
  padding-bottom:5px;margin-bottom:2px;letter-spacing:3px;
  font-size:clamp(7px,1.3vw,10px);animation:fadeInSlow .8s;
  font-family:var(--font-case)
}
.rack-progress{font-size:clamp(6px,1.1vw,8px);color:var(--colour-dim);opacity:.5;display:block;margin-top:2px;font-family:var(--font-crt)}

/* VHS Tape */
.vhs-tape{
  min-height:clamp(68px,14vw,85px);
  background:linear-gradient(180deg,#14141a,#0c0c10);
  border-radius:4px;border:1.5px solid #22222a;position:relative;
  cursor:grab;transition:border-color .3s,opacity .3s,transform .3s,box-shadow .3s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:2px 4px 12px rgba(0,0,0,.5);flex-shrink:0;touch-action:none;
  opacity:0;animation:tapeSlideIn .6s forwards
}
@keyframes tapeSlideIn{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
.vhs-tape:nth-child(2){animation-delay:.06s}
.vhs-tape:nth-child(3){animation-delay:.12s}
.vhs-tape:nth-child(4){animation-delay:.18s}
.vhs-tape:nth-child(5){animation-delay:.24s}
.vhs-tape:nth-child(6){animation-delay:.3s}
.vhs-tape:active{cursor:grabbing;transform:scale(.97)}
.vhs-tape.dragging{opacity:.15!important;transform:scale(.9)}
.vhs-tape.locked{opacity:.3!important;cursor:not-allowed}
.vhs-tape.seq-locked{opacity:.45!important;cursor:not-allowed}
.vhs-tape.complete::after{content:'✓';position:absolute;top:4px;right:4px;font-size:clamp(8px,1.3vw,10px);color:var(--grey);text-shadow:0 0 4px var(--grey)}
.vhs-tape.selected{border-color:var(--colour);box-shadow:0 0 12px rgba(136,153,170,.2),2px 4px 12px rgba(0,0,0,.5)}
.vhs-tape.selected::before{content:'EINLEGEN';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:clamp(6px,1vw,7px);color:var(--colour);letter-spacing:1px;animation:pulse 1s infinite;white-space:nowrap;font-family:var(--font-crt)}
@media(hover:hover){.vhs-tape:hover:not(.locked):not(.seq-locked){transform:translateY(-2px) scale(1.015);box-shadow:3px 6px 16px rgba(0,0,0,.6);border-color:#2e2e38;z-index:5}}

.tape-ghost{position:fixed;z-index:9999;pointer-events:none;width:130px;height:82px;background:linear-gradient(180deg,#14141a,#0c0c10);border:1.5px solid var(--colour);border-radius:4px;box-shadow:0 10px 30px rgba(0,0,0,.8),0 0 12px rgba(136,153,170,.1);transform:rotate(-4deg) scale(1.03);display:flex;flex-direction:column;align-items:center;justify-content:center}
.tape-window{position:absolute;top:7px;left:12%;width:76%;height:18px;background:#050506;border-radius:3px;border:1.5px solid #18181e;display:flex;align-items:center;justify-content:space-around;padding:0 7px;overflow:hidden;box-shadow:inset 0 0 4px rgba(0,0,0,.6)}
.reel{width:clamp(9px,1.8vw,12px);height:clamp(9px,1.8vw,12px);border:2px solid #2a2a32;border-radius:50%;background:#060606;position:relative;transition:border-color .3s}
.reel::after{content:'';position:absolute;inset:2px;border:1.5px solid #18181e;border-radius:50%;background:#020204}
.vhs-tape:active .reel,.vhs-tape.selected .reel{border-color:#3a3a44;animation:spin 1.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tape-strip{width:18px;height:1px;background:#18181e}

/* Evidence-style tape label */
.tape-label{
  background:linear-gradient(#d4d0c8,#c4bcb0);color:#1a1a1e;
  padding:2px 5px;margin-top:clamp(18px,4vw,26px);width:86%;
  text-align:center;font-family:var(--font-case);font-weight:400;
  font-size:clamp(7px,1.6vw,10px);transform:rotate(-.5deg);
  box-shadow:0 1px 3px rgba(0,0,0,.25);border-radius:1px;line-height:1.15;
  letter-spacing:.5px;
}
.tape-subtitle{
  font-family:var(--font-serif);font-size:clamp(7px,1.4vw,9px);
  color:#444;font-style:italic;margin-top:1px;
}
.tape-status{font-family:var(--font-crt);font-size:clamp(5px,1vw,7px);color:#555;letter-spacing:.08em;margin-top:1px}
.tape-color{position:absolute;top:7px;right:4px;width:4px;height:4px;border-radius:50%}
.tape-desc{position:absolute;bottom:3px;left:4px;font-size:clamp(5px,.9vw,6px);color:#3a3a42;font-family:var(--font-detect);font-style:italic;max-width:80%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ═══ INTRO SCREEN ═══ */
.case-intro{display:flex;flex-direction:column;align-items:center;gap:clamp(8px,2.5vw,14px);width:100%;animation:fadeIn 1.2s}
.case-glow{
  width:clamp(90px,25vw,160px);height:clamp(90px,25vw,160px);
  background:radial-gradient(circle,rgba(136,153,170,.12) 0%,transparent 70%);
  border-radius:50%;animation:caseGlow 3s infinite;
  display:flex;align-items:center;justify-content:center
}
@keyframes caseGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.85;transform:scale(1.04)}}

.intro-line{
  font-family:var(--font-case);font-size:clamp(.7rem,2vw,1rem);
  color:var(--colour-dim);text-align:center;min-height:1.6em;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .8s,transform .8s;opacity:0;transform:translateY(5px);
  padding:0 10px;letter-spacing:1px;
}
.intro-line.show{opacity:1;transform:translateY(0)}
.intro-line.narrative{
  font-family:var(--font-serif);font-style:italic;font-size:clamp(.85rem,2.5vw,1.3rem);
  color:var(--colour-bright);letter-spacing:0;
}
.intro-line .highlight{color:var(--gold);font-family:var(--font-detect)}

.load-display{text-align:center;width:90%;animation:fadeIn 1s}
.load-title{font-size:clamp(8px,1.6vw,12px);margin-bottom:3px;letter-spacing:.15em;font-family:var(--font-crt);color:var(--colour-dim)}
.load-desc{font-family:var(--font-detect);font-size:clamp(8px,1.5vw,11px);color:var(--colour-dim);margin-bottom:clamp(6px,1.5vw,10px);font-style:italic;opacity:0;animation:fadeInSlow 1s .5s forwards}
.load-bar{width:clamp(130px,35vw,180px);height:clamp(3px,.8vw,5px);border-radius:3px;overflow:hidden;margin:0 auto;border:1px solid var(--colour);background:rgba(136,153,170,.06)}
.load-fill{height:100%;width:0%;transition:width .1s;background:linear-gradient(90deg,var(--colour-dim),var(--colour))}

/* ═══ ARCHIVE SCREEN ═══ */
.archive{display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2.5vw,18px);animation:fadeIn 3s;padding:0 10px}
.archive-text{font-family:var(--font-serif);font-size:clamp(.8rem,2.2vw,1.2rem);color:var(--grey);text-shadow:0 0 12px rgba(136,153,170,.2);text-align:center;line-height:1.6;animation:gentleDrift 4s infinite;font-style:italic}
.archive-sub{font-family:var(--font-detect);font-size:clamp(.7rem,1.8vw,1rem);color:var(--colour-dim);opacity:0;animation:fadeInSlow 2s 1.5s forwards}
.archive-question{
  font-family:var(--font-case);font-size:clamp(.6rem,1.5vw,.85rem);
  color:var(--gold);opacity:0;animation:fadeInSlow 3s 3s forwards;
  letter-spacing:2px;
}

/* Audio Button */
.audio-btn{
  position:fixed;top:calc(8px + var(--safe-top));right:calc(8px + var(--safe-right));
  z-index:200;background:rgba(0,0,0,.6);border:1px solid #222228;
  border-radius:3px;color:#444;font-family:var(--font-crt);
  font-size:clamp(8px,1.8vw,10px);padding:clamp(4px,.8vw,5px) clamp(5px,1.2vw,8px);
  cursor:pointer;transition:all .3s;min-height:var(--min-touch);min-width:48px
}
.audio-btn:hover,.audio-btn.on{color:var(--colour);border-color:var(--colour)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  #station{
    grid-template-columns:1fr;grid-template-rows:minmax(280px,1fr) auto;
    width:100vw;height:auto;max-height:none;position:relative;
    top:auto;left:auto;transform:none;padding:clamp(5px,1.5vw,8px);gap:6px;margin:0 auto
  }
  #station.on{animation:stationFadeInM 1.5s forwards}
  @keyframes stationFadeInM{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  .tv-unit{min-height:clamp(260px,48vh,380px)}
  .tape-rack{
    grid-column:1;grid-row:2;flex-direction:row;overflow-x:auto;overflow-y:hidden;
    padding:clamp(5px,1.2vw,8px);gap:clamp(5px,1.2vw,7px);
    min-height:clamp(85px,16vh,110px);max-height:clamp(95px,18vh,120px);
    -webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory
  }
  .tape-rack::-webkit-scrollbar{height:2px}
  .tape-rack::-webkit-scrollbar-track{background:#060608}
  .tape-rack::-webkit-scrollbar-thumb{background:#1a1a22;border-radius:2px}
  .rack-header{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);padding-bottom:0;padding-right:5px;border-bottom:none;border-right:1px solid #121216;margin-bottom:0;margin-right:2px;flex-shrink:0}
  .rack-progress{display:none}
  .vhs-tape{min-width:clamp(95px,20vw,120px);min-height:clamp(60px,13vw,75px);scroll-snap-align:start;flex-shrink:0}
}
@media(max-width:600px){
  #station{grid-template-rows:minmax(240px,52vh) auto;padding:4px;gap:5px}
  .tv-unit{padding:6px;min-height:240px}
  .tv-controls{padding:3px 5px;gap:3px}
  .tape-slot{width:85px;height:var(--min-touch)}
  .eject-btn{min-width:48px;padding:3px 6px}
  .vhs-tape{min-width:90px;min-height:62px}
  .tape-label{font-size:7px;margin-top:16px}
}
@media(max-width:480px){
  .figure-svg{width:70px;height:90px}
  #boot-overlay h1{font-size:clamp(1.1rem,6.5vw,1.5rem)}
  .tv-unit{padding:5px;border-radius:8px}
  .screen-bezel{border-radius:6px;min-height:190px}
  .tv-controls{flex-wrap:wrap;justify-content:center}
  .power-section{order:1}.tape-slot{order:3;width:100%;margin-top:3px}.eject-btn{order:2}
  .vhs-tape{min-width:80px;min-height:55px}
  .tape-window{height:14px;top:5px}
  .reel{width:9px;height:9px}
  .tape-label{font-size:6.5px;margin-top:12px;width:92%}
}
@media(max-width:360px){
  .vhs-tape{min-width:72px;min-height:50px}
  .tape-label{font-size:6px;margin-top:10px}
}
@media(max-height:500px) and (orientation:landscape){
  #station{grid-template-columns:minmax(200px,1fr) minmax(90px,180px);grid-template-rows:1fr;height:96vh;width:98vw}
  .tv-unit{min-height:auto}
  .tape-rack{grid-column:2;grid-row:1;flex-direction:column;overflow-x:hidden;overflow-y:auto;min-height:auto;max-height:none}
  .rack-header{writing-mode:horizontal-tb;transform:none;padding-right:0;padding-bottom:5px;border-right:none;border-bottom:1px solid #121216}
  .vhs-tape{min-width:auto;min-height:clamp(48px,11vh,60px)}
}
@media(-webkit-min-device-pixel-ratio:2),(min-resolution:192dpi){.scanlines{opacity:.3}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}.scan-bar,.tracking-bar{display:none}}
</style>
</head>

<div id="bg-scenes">

<!-- SCENE 2: TRAIN — The Months of Almost -->

<svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="platGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0f0f18"/><stop offset="100%" stop-color="#080810"/></linearGradient>
<radialGradient id="platLight" cx="50%" cy="0%" r="100%"><stop offset="0%" stop-color="#aabbcc" stop-opacity="0.15"/><stop offset="100%" stop-color="transparent"/></radialGradient>
</defs>
<rect x="0" y="0" width="400" height="300" fill="#06060a"/>
<rect class="platform-light" x="0" y="180" width="400" height="120" fill="url(#platGrad)"/>
