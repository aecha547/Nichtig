<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KOMMENTAR — Ein Spuk in der Realität</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400;1,600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #020203;
        --panel-bg: #07070a;
        --border-color: #1a1a24;
        --text-dim: #5c5c6d;
        --accent-gold: #cba677;
        --accent-red: #8B0000;
        --crt-curvature: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    
    body {
        background: var(--bg-color);
        background-image: radial-gradient(circle at 50% 50%, #0a0a0f 0%, #000 100%);
        color: #fff;
        font-family: 'Share Tech Mono', monospace;
        height: 100vh;
        overflow: hidden;
        cursor: none; /* Custom cursor used */
    }

    /* --- Custom Cursor --- */
    #custom-cursor {
        position: fixed; top: 0; left: 0;
        width: 12px; height: 12px;
        border: 1.5px solid rgba(255,255,255,0.8);
        border-radius: 50%;
        pointer-events: none;
        z-index: 999999;
        mix-blend-mode: difference;
        transition: width 0.1s, height 0.1s, margin-left 0.1s, margin-top 0.1s;
        transform: translate(-50%, -50%);
    }
    #custom-cursor.click {
        width: 24px; height: 24px;
        background: rgba(255,255,255,0.2);
    }

    /* --- Prologue Sequence --- */
    #prologue-layer {
        position: fixed; inset: 0;
        background: #000;
        z-index: 10000;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        transition: opacity 2s ease;
    }
    .pro-btn {
        padding: 15px 30px;
        border: 1px solid var(--text-dim);
        background: transparent;
        color: var(--text-dim);
        font-family: 'Share Tech Mono', monospace;
        font-size: 1.2rem;
        letter-spacing: 4px;
        cursor: none;
        transition: all 0.3s;
        animation: pulse 2s infinite;
    }
    .pro-btn:hover { color: #fff; border-color: #fff; text-shadow: 0 0 10px #fff; }

    .pro-text-container {
        position: absolute; inset: 0;
        display: flex; justify-content: center; align-items: center;
        pointer-events: none;
    }
    .pro-line {
        position: absolute;
        color: #fff;
        font-family: 'Cormorant Garamond', serif;
        opacity: 0;
        filter: blur(10px);
        transition: opacity 2s ease, filter 2s ease;
        text-align: center;
        width: 80%;
    }
    .pro-line.show { opacity: 1; filter: blur(0px); }
    
    /* Specific Typography for Prologue */
    #pl-0 { font-size: 2.5rem; letter-spacing: 0.5rem; }
    #pl-1 { font-size: 2rem; font-style: italic; color: #aaa; }
    #pl-2 { font-size: 2.2rem; }
    #pl-3 { font-size: 3rem; color: var(--accent-gold); text-shadow: 0 0 20px rgba(203, 166, 119, 0.4); }

    .pro-title {
        position: absolute;
        font-family: 'Cinzel', serif;
        font-size: clamp(3rem, 10vw, 8rem);
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #fff;
        text-shadow: 0 0 20px #fff, 0 0 50px var(--accent-gold);
        opacity: 0;
        transform: scale(1.3);
        transition: transform 6s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 0.5s;
        z-index: 10001;
    }
    .pro-title.slam { opacity: 1; transform: scale(1); }
    .pro-title.fade { opacity: 0; transition: opacity 2s ease; }

    /* --- Boot Sequence --- */
    #boot-layer {
        position: fixed; inset: 0; z-index: 9000;
        background: #020202; padding: 40px;
        color: #aaa; font-size: 1.2rem; line-height: 1.8;
        display: none;
    }
    
    /* --- Main Station Layout --- */
    #station {
        display: none;
        grid-template-columns: 1fr 380px;
        gap: 2rem;
        padding: 3rem;
        width: 100%; max-width: 1600px;
        height: 100vh;
        margin: 0 auto;
        opacity: 0;
        transition: opacity 3s ease;
    }
    #station.show { display: grid; opacity: 1; }

    /* TV Unit */
    .tv-unit {
        background: #050505;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 
            inset 0 0 20px #000,
            inset 0 2px 0 rgba(255,255,255,0.05),
            0 20px 50px rgba(0,0,0,0.8),
            0 0 100px rgba(0,0,0,0.4);
        border: 1px solid #111;
        display: flex; flex-direction: column;
        position: relative;
    }
    .tv-bezel {
        flex: 1;
        border-radius: var(--crt-curvature);
        background: #000;
        padding: 15px;
        box-shadow: inset 0 0 30px #000;
        position: relative;
    }
    .crt-screen {
        position: relative;
        width: 100%; height: 100%;
        border-radius: var(--crt-curvature);
        background: #020203;
        overflow: hidden;
        box-shadow: inset 0 0 10px #000;
    }
    #crt-canvas {
        position: absolute; inset: 0; width: 100%; height: 100%;
        image-rendering: pixelated;
    }
    .crt-overlay {
        position: absolute; inset: 0; pointer-events: none; z-index: 10;
    }
    .scanlines {
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 3px, 3px 100%;
        opacity: 0.4;
    }
    .vignette {
        background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.9) 100%);
    }
    .glass-reflection {
        background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.02) 100%);
        border-radius: var(--crt-curvature);
    }

    /* HTML Content inside CRT */
    #html-content {
        position: absolute; inset: 20px; z-index: 20;
        color: #dcdcc8;
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.3rem; line-height: 1.7;
        overflow-y: auto;
        padding: 20px;
        text-shadow: 0 0 5px rgba(220, 220, 200, 0.4);
        mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        display: none;
    }
    #html-content.show { display: block; animation: crt-flicker-in 1s forwards; }
    
    #html-content::-webkit-scrollbar { width: 4px; }
    #html-content::-webkit-scrollbar-thumb { background: rgba(200, 200, 180, 0.3); border-radius: 2px; }

    /* TV Controls */
    .tv-controls {
        margin-top: 20px;
        display: flex; justify-content: space-between; align-items: center;
        height: 60px;
    }
    .tape-slot {
        flex: 1; margin-right: 20px; height: 100%;
        background: #030303; border: 2px solid #1a1a1a; border-radius: 4px;
        box-shadow: inset 0 10px 20px rgba(0,0,0,0.9);
        display: flex; justify-content: center; align-items: center;
        position: relative; transition: border-color 0.3s;
    }
    .tape-slot.highlight { border-color: var(--text-dim); }
    .tape-slot::after {
        content: ''; position: absolute; width: 90%; height: 4px;
        background: #000; border-bottom: 1px solid #222;
    }
    
    .hardware-btn {
        padding: 0 20px; height: 100%;
        background: linear-gradient(to bottom, #1a1a24, #0a0a0f);
        border: 1px solid #222; border-radius: 4px;
        color: #777; font-family: 'Share Tech Mono'; font-size: 1rem;
        cursor: none; transition: all 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    .hardware-btn:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.5); color: #aaa; }

    /* Tape Rack */
    .tape-rack {
        background: #08080a;
        border: 1px solid var(--border-color);
        border-radius: 12px; padding: 20px;
        display: flex; flex-direction: column;
        box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    }
    .tape-rack h2 {
        font-size: 1.2rem; letter-spacing: 5px; color: #555;
        border-bottom: 1px solid #1a1a24; padding-bottom: 10px; margin-bottom: 5px;
        text-align: center;
    }
    .rack-stats {
        text-align: center; font-size: 0.8rem; color: var(--accent-gold);
        margin-bottom: 20px; opacity: 0.7;
    }
    .tapes-container {
        display: flex; flex-direction: column; gap: 15px;
        overflow-y: auto; flex: 1; padding-right: 5px;
    }
    
    /* Individual Tapes */
    .vhs-tape {
        background: linear-gradient(to bottom, #15151a, #0a0a0c);
        border: 1px solid #2a2a35; border-top: 1px solid #3a3a45;
        border-radius: 4px; height: 90px;
        padding: 10px; position: relative;
        box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: none; flex-shrink: 0;
    }
    .vhs-tape:hover { transform: translateY(-3px) scale(1.02); border-color: #4a4a55; }
    .vhs-tape::before {
        content: ''; position: absolute;
        left: -10px; right: -10px; top: 35px; height: 18px;
        background: #030303; border-top: 1px solid #000; border-bottom: 1px solid #111;
    }
    .tape-label {
        background: #d4cfc5; border: 1px solid #b4afa5;
        color: #111; padding: 4px; text-align: center;
        font-size: 0.8rem; margin-top: 25px; font-weight: bold;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        position: relative; z-index: 2;
    }
    .tape-desc {
        position: absolute; bottom: 5px; left: 10px;
        font-size: 0.6rem; color: #444; font-family: sans-serif;
    }
    
    /* Tape States */
    .vhs-tape.completed { filter: grayscale(0.7) brightness(0.6); }
    .vhs-tape.completed::after {
        content: 'ARCHIVIERT'; position: absolute;
        right: -25px; top: 15px; background: #333; color: #888;
        font-size: 0.6rem; padding: 2px 30px; transform: rotate(45deg); z-index: 5;
    }
    .vhs-tape.locked {
        border-color: #311; pointer-events: none;
        background: repeating-linear-gradient(45deg, #1a0f0f, #1a0f0f 5px, #2a1515 5px, #2a1515 10px);
    }
    .vhs-tape.locked .tape-label { background: #000; color: #522; border-color: #500; }
    .vhs-tape.unlocked-secret { border-color: var(--accent-red); }
    .vhs-tape.unlocked-secret .tape-label { background: #111; color: var(--accent-red); border-color: var(--accent-red); }

    /* Drag Ghost */
    .tape-ghost {
        position: fixed; pointer-events: none; z-index: 99999;
        width: 300px; height: 90px;
        background: linear-gradient(to bottom, #15151a, #0a0a0c);
        border: 1px solid #4a4a55; border-radius: 4px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        transform: translate(-50%, -50%) rotate(-3deg) scale(1.05);
        opacity: 0.8;
    }

    /* Final Cinematic CSS */
    .final-cinematic {
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        height: 100%; text-align: center; padding: 0 40px;
    }
    .final-title { font-family: 'Cinzel', serif; font-size: 3rem; margin-bottom: 2rem; color: #fff; }
    .final-text { opacity: 0; animation: fade-in-up 2s forwards; font-size: 1.5rem; margin-bottom: 1rem; }
    .delay-1 { animation-delay: 2s; }
    .delay-2 { animation-delay: 6s; }
    .delay-3 { animation-delay: 9s; color: var(--accent-red); font-size: 2rem; font-family: 'Share Tech Mono';}

    @keyframes fade-in-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes crt-flicker-in { 0% { opacity: 0; filter: brightness(2) contrast(2); } 100% { opacity: 1; filter: brightness(1) contrast(1); } }

    /* Responsive */
    @media (max-width: 900px) {
        #station { grid-template-columns: 1fr; grid-template-rows: 55vh 1fr; padding: 10px; height: 100%; overflow-y: auto; gap: 1rem; }
        .tv-unit { padding: 15px; }
        .tapes-container { flex-direction: row; overflow-x: auto; overflow-y: hidden; padding-bottom: 10px; }
        .vhs-tape { width: 250px; height: 80px; }
        .tape-label { margin-top: 20px; }
    }
</style>
</head>
<body>

<div id="custom-cursor"></div>

<!-- Prologue -->
<div id="prologue-layer">
    <button class="pro-btn" id="btn-start">[ VERBINDUNG HERSTELLEN ]</button>
    <div class="pro-text-container">
        <div class="pro-line" id="pl-0">Stille.</div>
        <div class="pro-line" id="pl-1">Die Art von Stille, die jemand hinterlässt.</div>
        <div class="pro-line" id="pl-2">Er kommentierte das Leben,<br>aber lebte es nie.</div>
        <div class="pro-line" id="pl-3">Bis <i>sie</i> kam.</div>
    </div>
    <div class="pro-title" id="pro-title">KOMMENTAR</div>
</div>

<!-- Boot -->
<div id="boot-layer">
    <div id="boot-text"></div>
</div>

<!-- Station -->
<div id="station">
    <div class="tv-unit">
        <div class="tv-bezel">
            <div class="crt-screen">
                <canvas id="crt-canvas"></canvas>
                <div class="crt-overlay scanlines"></div>
                <div class="crt-overlay vignette"></div>
                <div class="crt-overlay glass-reflection"></div>
                <div id="html-content"></div>
            </div>
        </div>
        <div class="tv-controls">
            <div class="tape-slot" id="tape-slot"></div>
            <button id="eject-btn" class="hardware-btn">EJECT</button>
        </div>
    </div>
    
    <div class="tape-rack">
        <h2>LARVATUS ARCHIV</h2>
        <div class="rack-stats" id="rack-stats">0/4 ARCHIVIERT</div>
        <div class="tapes-container" id="tapes-container">
            <!-- Populated by JS -->
        </div>
    </div>
</div>

<script>
/* =========================================
   1. DATA & STATE
========================================= */
const TAPES =[
  { id: 'tape1', title: 'AKTE I: Der Beobachter', file: 'tape1.html', desc: 'Die erste Sichtung.' },
  { id: 'tape2', title: 'AKTE II: Die Nähe', file: 'tape2.html', desc: 'Der Abstand verringert sich.' },
  { id: 'tape3', title: 'AKTE III: Das Verschwinden', file: 'tape3.html', desc: 'Plötzliche Leere.' },
  { id: 'tape4', title: 'AKTE IV: Die Suche', file: 'tape4.html', desc: 'Die verbleibenden Spuren.' },
  { id: 'tape5', title: 'AKTE ?: Kommentar', file: null, desc: 'CLASSIFIED', secret: true }
];

let state = {
    completed:[],
    playing: null,
    draggingTapeId: null
};

/* =========================================
   2. AUDIO ENGINE (Web Audio API)
========================================= */
const Snd = {
    ctx: null, master: null, bgmAudio: null,
    init() {
        if(this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.5;
        this.master.connect(this.ctx.destination);
        
        this.bgmAudio = new Audio('MEMORY.mp3');
        this.bgmAudio.loop = true;
    },
    sfxType() {
        if(!this.ctx) return;
        let t = this.ctx.currentTime;
        let o = this.ctx.createOscillator();
        let g = this.ctx.createGain();
        o.type = 'triangle';
        o.frequency.setValueAtTime(600 + Math.random()*400, t);
        g.gain.setValueAtTime(0.05, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        o.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + 0.05);
    },
    sfxSubImpact() {
        if(!this.ctx) return;
        let t = this.ctx.currentTime;
        let o = this.ctx.createOscillator();
        let g = this.ctx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(80, t);
        o.frequency.exponentialRampToValueAtTime(10, t + 1.5);
        g.gain.setValueAtTime(1.0, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
        o.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + 1.5);
    },
    sfxInsert() {
        if(!this.ctx) return;
        let t = this.ctx.currentTime;
        let o = this.ctx.createOscillator();
        let mod = this.ctx.createOscillator();
        let modGain = this.ctx.createGain();
        let g = this.ctx.createGain();
        
        o.type = 'square'; o.frequency.value = 40;
        mod.type = 'sine'; mod.frequency.value = 15;
        mod.connect(modGain);
        modGain.gain.value = 25;
        modGain.connect(o.frequency);
        
        g.gain.setValueAtTime(0.05, t);
        g.gain.linearRampToValueAtTime(0.08, t + 0.3);
        g.gain.linearRampToValueAtTime(0, t + 1.0);
        
        o.connect(g); g.connect(this.master);
        mod.start(t); mod.stop(t + 1.0);
        o.start(t); o.stop(t + 1.0);
    }
};

/* =========================================
   3. CURSOR & INTERACTION
========================================= */
const cursor = document.getElementById('custom-cursor');
window.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    if(state.draggingTapeId) updateDragGhost(e.clientX, e.clientY);
});
window.addEventListener('mousedown', () => cursor.classList.add('click'));
window.addEventListener('mouseup', () => {
    cursor.classList.remove('click');
    if(state.draggingTapeId) endDrag();
});

/* =========================================
   4. PROLOGUE CHOREOGRAPHY
========================================= */
document.getElementById('btn-start').addEventListener('click', () => {
    document.getElementById('btn-start').style.display = 'none';
    Snd.init();
    
    // Attempt play. If it fails, fallback to visual timer.
    Snd.bgmAudio.play().then(() => {
        startSyncLoop(true);
    }).catch(() => {
        startSyncLoop(false);
    });
});

function showText(id) { document.getElementById(id).classList.add('show'); }
function hideAllText() {
    for(let i=0; i<4; i++) document.getElementById('pl-'+i).classList.remove('show');
}

function startSyncLoop(audioSuccess) {
    let startTime = audioSuccess ? Snd.ctx.currentTime : Date.now()/1000;
    
    let events =[
        { t: 1.0, fired: false, fn: () => showText('pl-0') },
        { t: 3.5, fired: false, fn: () => { document.getElementById('pl-0').classList.remove('show'); showText('pl-1'); } },
        { t: 6.5, fired: false, fn: () => { document.getElementById('pl-1').classList.remove('show'); showText('pl-2'); } },
        { t: 8.5, fired: false, fn: () => { document.getElementById('pl-2').classList.remove('show'); showText('pl-3'); } },
        { t: 9.8, fired: false, fn: () => { hideAllText(); Snd.sfxSubImpact(); document.body.style.filter = "invert(1)"; setTimeout(()=>document.body.style.filter="", 100); } },
        { t: 10.0, fired: false, fn: () => { document.getElementById('pro-title').classList.add('slam'); } },
        { t: 13.0, fired: false, fn: () => { document.getElementById('pro-title').classList.add('fade'); } },
        { t: 14.5, fired: false, fn: () => { document.getElementById('prologue-layer').style.display = 'none'; startBootSequence(); } }
    ];

    function loop() {
        let elapsed = audioSuccess ? (Snd.ctx.currentTime - startTime) : (Date.now()/1000 - startTime);
        events.forEach(ev => {
            if(!ev.fired && elapsed >= ev.t) { ev.fired = true; ev.fn(); }
        });
        if(elapsed < 15.0) requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
}

/* =========================================
   5. BOOT SEQUENCE
========================================= */
async function startBootSequence() {
    const bootLayer = document.getElementById('boot-layer');
    const bootText = document.getElementById('boot-text');
    bootLayer.style.display = 'block';
    
    const lines =[
        "LARVATUS ARCHIV SYSTEM v4.0.1",
        "COPYRIGHT (C) 1994 - CLASSIFIED",
        "====================================",
        "INITIALIZING MEMORY BLOCKS... OK",
        "MOUNTING DRIVE K:... OK",
        "SCANNING FOR CORRUPTION... ANOMALIES DETECTED",
        "BYPASSING SECURITY PROTOCOLS...",
        "ACCESS GRANTED.",
        "LOADING INTERFACE..."
    ];

    for(let line of lines) {
        let div = document.createElement('div');
        bootText.appendChild(div);
        for(let i=0; i<line.length; i++) {
            div.textContent += line[i];
            if(line[i] !== ' ') Snd.sfxType();
            await new Promise(r => setTimeout(r, 15 + Math.random()*20));
        }
        await new Promise(r => setTimeout(r, 200));
    }
    
    await new Promise(r => setTimeout(r, 500));
    bootLayer.style.display = 'none';
    
    // Show Station
    const station = document.getElementById('station');
    station.classList.add('show');
    CRTRenderer.init();
    buildTapeRack();
}

/* =========================================
   6. CRT CANVAS RENDERER & SCENES
========================================= */
const CRTRenderer = {
    canvas: null, ctx: null, w: 0, h: 0,
    time: 0, glitchAmount: 0,
    sceneIndex: 0, sceneTimer: 0,
    
    init() {
        this.canvas = document.getElementById('crt-canvas');
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.resize();
        window.addEventListener('resize', () => this.resize());
        requestAnimationFrame(this.render.bind(this));
    },
    resize() {
        let rect = this.canvas.parentElement.getBoundingClientRect();
        this.w = this.canvas.width = rect.width;
        this.h = this.canvas.height = rect.height;
    },
    triggerGlitch(amount = 1.0) {
        this.glitchAmount = amount;
    },
    render() {
        this.time += 0.016;
        let ctx = this.ctx, w = this.w, h = this.h;
        
        // Motion blur fade
        ctx.fillStyle = "rgba(2, 2, 3, 0.25)";
        ctx.fillRect(0, 0, w, h);
        
        // If playing tape, just draw static/noise subtly
        if (state.playing) {
            this.drawNoise(ctx, w, h, 0.05);
        } else {
            // Draw Idle Scene
            this.sceneTimer += 0.016;
            if(this.sceneTimer > 12.0) {
                this.sceneTimer = 0;
                this.sceneIndex = (this.sceneIndex + 1) % Scenes.length;
                this.triggerGlitch(0.8);
            }
            Scenes[this.sceneIndex](ctx, w, h, this.time);
        }

        // Apply Glitch Slices
        if (this.glitchAmount > 0.01) {
            let slices = 5 + Math.random() * 10 * this.glitchAmount;
            for(let i=0; i<slices; i++) {
                let sy = Math.random() * h;
                let sh = Math.random() * (h/4) * this.glitchAmount;
                let dx = (Math.random() - 0.5) * 50 * this.glitchAmount;
                ctx.drawImage(this.canvas, 0, sy, w, sh, dx, sy, w, sh);
            }
            ctx.globalCompositeOperation = "screen";
            ctx.fillStyle = `rgba(255, 0, 0, ${this.glitchAmount * 0.15})`;
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = `rgba(0, 0, 255, ${this.glitchAmount * 0.15})`;
            ctx.fillRect(5, 0, w, h);
            ctx.globalCompositeOperation = "source-over";
            this.glitchAmount *= 0.88; // decay
        }
        
        requestAnimationFrame(this.render.bind(this));
    },
    drawNoise(ctx, w, h, opacity) {
        let imgData = ctx.createImageData(w, h);
        let buf = new Uint32Array(imgData.data.buffer);
        for(let i=0; i<buf.length; i++) {
            if(Math.random() < opacity) buf[i] = 0xffffffff;
        }
        ctx.globalCompositeOperation = "screen";
        ctx.putImageData(imgData, 0, 0);
        ctx.globalCompositeOperation = "source-over";
    }
};

/* --- Generative Scenes --- */
const Scenes =[
    function drawBallerina(ctx, w, h, t) {
        let cx = w/2, cy = h/2;
        ctx.strokeStyle = "rgba(180, 200, 220, 0.4)";
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx, cy - 60); ctx.lineTo(cx, cy + 80); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy - 70, 10, 0, Math.PI*2); ctx.stroke();
        for(let i=0; i<20; i++) {
            let y = cy + i * 3;
            let radius = 10 + i * 4 * Math.abs(Math.sin(t * 1.5 + i * 0.1));
            ctx.beginPath();
            ctx.ellipse(cx, y, radius, radius * 0.2, 0, 0, Math.PI*2);
            ctx.stroke();
        }
        let armA = Math.sin(t * 2) * 30;
        ctx.beginPath();
        ctx.moveTo(cx, cy - 40); ctx.quadraticCurveTo(cx - 40, cy - 50 + armA, cx - 50, cy - 20);
        ctx.moveTo(cx, cy - 40); ctx.quadraticCurveTo(cx + 40, cy - 50 - armA, cx + 50, cy - 20);
        ctx.stroke();
    },
    function drawWaltz(ctx, w, h, t) {
        let cx = w/2, cy = h/2;
        ctx.globalCompositeOperation = "screen";
        for(let j=0; j<2; j++) {
            ctx.beginPath();
            ctx.strokeStyle = j===0 ? "rgba(120, 160, 220, 0.5)" : "rgba(220, 180, 120, 0.5)";
            for(let i=0; i<60; i++) {
                let angle = t * (1 + j*0.1) + i * 0.1;
                let rad = 50 + 40 * Math.sin(t * 0.4 + i * 0.05);
                let x = cx + Math.cos(angle) * rad + Math.sin(t+i*0.02)*30;
                let y = cy + Math.sin(angle) * rad * 0.5 + Math.cos(t+i*0.02)*30;
                if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        ctx.globalCompositeOperation = "source-over";
    },
    function drawRain(ctx, w, h, t) {
        ctx.strokeStyle = "rgba(150, 180, 200, 0.6)";
        ctx.beginPath();
        for(let i=0; i<80; i++) {
            let x = (Math.sin(i * 123.45) * 0.5 + 0.5) * w;
            let y = ((t * 800 + i * 987) % (h + 100)) - 50;
            let len = 15 + Math.random() * 20;
            ctx.moveTo(x, y); ctx.lineTo(x - len*0.1, y + len);
        }
        ctx.stroke();
        let py = h - 30;
        for(let i=0; i<4; i++) {
            let px = w * 0.25 * i + 40;
            let rad = (t * 60 + i * 25) % 50;
            let op = 1 - (rad / 50);
            ctx.strokeStyle = `rgba(150, 180, 200, ${op * 0.5})`;
            ctx.beginPath(); ctx.ellipse(px, py, rad, rad * 0.2, 0, 0, Math.PI * 2); ctx.stroke();
        }
    },
    function drawAbsence(ctx, w, h, t) {
        let cx = w/2, cy = h/2 + 30;
        let lightX = cx + Math.sin(t*0.8) * 120;
        let grad = ctx.createRadialGradient(lightX, cy - 100, 0, lightX, cy - 100, 250);
        grad.addColorStop(0, "rgba(255, 230, 180, 0.08)");
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
        
        ctx.fillStyle = "rgba(5, 5, 8, 1)";
        ctx.fillRect(cx - 25, cy, 50, 6); 
        ctx.fillRect(cx - 23, cy + 6, 5, 40); 
        ctx.fillRect(cx + 18, cy + 6, 5, 40); 
        ctx.fillRect(cx - 23, cy - 45, 5, 45); 
        ctx.fillRect(cx + 18, cy - 45, 5, 45); 
        ctx.fillRect(cx - 23, cy - 30, 46, 5); 
        
        let ghostOp = Math.max(0, Math.sin(t * 0.6) * 0.4);
        ctx.fillStyle = `rgba(140, 160, 180, ${ghostOp})`;
        ctx.beginPath(); ctx.arc(cx, cy - 25, 18, 0, Math.PI * 2); ctx.fill();
    }
];

/* =========================================
   7. TAPE LOGIC & INTERACTION
========================================= */
function buildTapeRack() {
    const container = document.getElementById('tapes-container');
    container.innerHTML = '';
    
    let allStandardDone = TAPES.filter(t => !t.secret).every(t => state.completed.includes(t.id));
    let completedCount = state.completed.filter(id => id !== 'tape5').length;
    document.getElementById('rack-stats').textContent = `${completedCount}/4 ARCHIVIERT`;

    TAPES.forEach(tape => {
        let isDone = state.completed.includes(tape.id);
        let div = document.createElement('div');
        div.className = 'vhs-tape';
        
        if (tape.secret) {
            if (!allStandardDone) {
                div.classList.add('locked');
                div.innerHTML = `<div class="tape-label">GESPERRT</div><div class="tape-desc">...</div>`;
            } else {
                div.classList.add('unlocked-secret');
                div.innerHTML = `<div class="tape-label">${tape.title}</div><div class="tape-desc">${tape.desc}</div>`;
                div.addEventListener('mousedown', (e) => startDrag(e, tape));
            }
        } else {
            if (isDone) div.classList.add('completed');
            div.innerHTML = `<div class="tape-label">${tape.title}</div><div class="tape-desc">${tape.desc}</div>`;
            div.addEventListener('mousedown', (e) => startDrag(e, tape));
        }
        
        container.appendChild(div);
    });
}

// Drag & Drop
let dragGhostEl = null;
function startDrag(e, tape) {
    if(state.playing) return;
    state.draggingTapeId = tape.id;
    dragGhostEl = document.createElement('div');
    dragGhostEl.className = 'tape-ghost';
    dragGhostEl.innerHTML = `<div class="tape-label">${tape.title}</div>`;
    document.body.appendChild(dragGhostEl);
    updateDragGhost(e.clientX, e.clientY);
}
function updateDragGhost(x, y) {
    if(!dragGhostEl) return;
    dragGhostEl.style.left = x + 'px';
    dragGhostEl.style.top = y + 'px';
    
    let slot = document.getElementById('tape-slot');
    let rect = slot.getBoundingClientRect();
    if(x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
        slot.classList.add('highlight');
    } else {
        slot.classList.remove('highlight');
    }
}
function endDrag() {
    let slot = document.getElementById('tape-slot');
    if(slot.classList.contains('highlight')) {
        insertTape(state.draggingTapeId);
    }
    slot.classList.remove('highlight');
    state.draggingTapeId = null;
    if(dragGhostEl) { dragGhostEl.remove(); dragGhostEl = null; }
}

async function insertTape(tapeId) {
    state.playing = tapeId;
    Snd.sfxInsert();
    CRTRenderer.triggerGlitch(2.5);
    
    let tape = TAPES.find(t => t.id === tapeId);
    const contentBox = document.getElementById('html-content');
    contentBox.classList.remove('show');
    contentBox.innerHTML = '';
    
    setTimeout(async () => {
        CRTRenderer.triggerGlitch(0.5);
        if (tape.secret) {
            // Final Cinematic
            contentBox.innerHTML = `
                <div class="final-cinematic">
                    <h1 class="final-title">KOMMENTAR</h1>
                    <p class="final-text delay-1">Wenn jemand dich liebt und dann jeden Beweis seiner Existenz entfernt,<br>wurdest du dann geliebt?</p>
                    <p class="final-text delay-2" style="margin-top:40px; color:var(--text-dim)">Es gibt keine Antworten.</p>
                    <p class="final-text delay-3">Nur Kommentar.</p>
                </div>
            `;
            contentBox.classList.add('show');
        } else {
            // Standard fetch
            try {
                let res = await fetch(tape.file);
                if (!res.ok) throw new Error("Not found");
                let text = await res.text();
                contentBox.innerHTML = text;
            } catch (e) {
                // High-immersion fallback if run locally without server
                contentBox.innerHTML = `
                    <div style="text-align:center; padding-top:40px;">
                        <h2 style="color:var(--accent-red); font-family:'Cinzel';">SYSTEM ERROR 404</h2>
                        <p style="margin-bottom: 20px;">Die Datei <code>${tape.file}</code> konnte nicht geladen werden.</p>
                        <p style="color:var(--text-dim); font-size:0.9rem;">(Bitte stellen Sie sicher, dass Sie einen lokalen Webserver verwenden.)</p>
                        <hr style="border:none; border-bottom:1px dashed #555; margin: 30px 0;">
                        <p style="font-style:italic;">Transkript-Backup läuft...</p>
                        <p style="margin-top:20px; font-size:1.5rem;">"Wir waren hier.<br>Aber niemand erinnert sich."</p>
                    </div>
                `;
            }
            contentBox.classList.add('show');
        }
    }, 1200);
}

document.getElementById('eject-btn').addEventListener('click', () => {
    if(!state.playing) return;
    CRTRenderer.triggerGlitch(1.5);
    Snd.sfxInsert(); // reuse mechanic sound
    document.getElementById('html-content').classList.remove('show');
    
    if(!state.completed.includes(state.playing)) {
        state.completed.push(state.playing);
    }
    state.playing = null;
    buildTapeRack();
});

</script>
