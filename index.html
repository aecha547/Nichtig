<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#020205">
<title>KOMMENTAR</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020205;--c:#8a9bae;--c-dim:#4a5a6a;--c-bright:#c8e4ff;--c-ghost:#7a8b9e;
  --gold:#c4a855;--red:#8b2233;--ease:cubic-bezier(0.16,1,0.3,1);
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--c);touch-action:none;cursor:none}

@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.85}}
@keyframes blink{50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);filter:blur(8px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
@keyframes fadeDown{from{opacity:1;transform:translateY(0);filter:blur(0)}to{opacity:0;transform:translateY(-14px);filter:blur(6px)}}
@keyframes breathe{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.7;transform:scale(1.02)}}
@keyframes shake{0%,100%{transform:translate(0)}15%{transform:translate(-3px,2px)}30%{transform:translate(3px,-2px)}50%{transform:translate(-2px,3px)}70%{transform:translate(2px,-1px)}85%{transform:translate(-1px,0)}}
@keyframes tapeSlide{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes stationReveal{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes trackDrift{from{top:-3%}to{top:103%}}
@keyframes scanBar{from{top:-5%}to{top:105%}}
@keyframes reel{to{transform:rotate(360deg)}}
@keyframes warmup{0%{opacity:1}100%{opacity:0}}

/* CURSOR */
#cur{position:fixed;top:0;left:0;width:14px;height:14px;border:1.5px solid rgba(200,228,255,.55);border-radius:50%;pointer-events:none;z-index:999999;mix-blend-mode:difference;transform:translate(-50%,-50%);transition:width .15s,height .15s,background .15s}
#cur::after{content:'';position:absolute;inset:3px;border-radius:50%;background:rgba(200,228,255,.5)}
#cur.big{width:26px;height:26px;background:rgba(200,228,255,.06)}
#cur.hide{opacity:0}

/* VHS BG */
#vhsbg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* GLITCH OVERLAY */
#glitch{position:fixed;inset:0;z-index:9985;pointer-events:none;transition:background .05s,transform .05s}
#stear{position:fixed;inset:0;z-index:9986;pointer-events:none;opacity:0;background:#030308}
#stear.on{animation:tearA .11s steps(2) forwards}
@keyframes tearA{0%{opacity:1;clip-path:inset(33% 0 61% 0)}50%{clip-path:inset(41% 0 53% 0);transform:translateX(5px)}100%{opacity:0}}
#chroma{position:fixed;inset:0;z-index:9984;pointer-events:none;opacity:0;mix-blend-mode:screen}
#chroma.on{animation:chromaA .14s ease-out forwards}
@keyframes chromaA{0%{opacity:.35;box-shadow:inset -4px 0 0 rgba(136,170,204,.2),inset 4px 0 0 rgba(170,120,80,.15)}100%{opacity:0}}

/* TRANSITION CANVAS — film burns, fades */
#tcanvas{position:fixed;inset:0;z-index:99999;pointer-events:none;display:none}

/* PROLOGUE */
#prologue{
  position:fixed;inset:0;z-index:10000;background:#010103;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.5s ease;cursor:pointer;
  padding:20px calc(20px + env(safe-area-inset-right,0px)) 20px calc(20px + env(safe-area-inset-left,0px));
}
#prologue.gone{opacity:0;pointer-events:none}
.pro-ghost{
  width:clamp(55px,14vw,90px);height:clamp(70px,18vw,115px);
  margin-bottom:clamp(18px,5vh,40px);opacity:0;transition:opacity 3s ease;
  filter:drop-shadow(0 0 40px rgba(138,155,174,.28));animation:breathe 9s ease-in-out infinite;
}
.pro-ghost.show{opacity:1}
.pro-lines{position:relative;min-height:90px;display:flex;align-items:center;justify-content:center;width:100%;max-width:700px}
.pro-line{
  position:absolute;width:95%;max-width:660px;text-align:center;
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(1.1rem,3.8vw,2rem);color:var(--c-ghost);line-height:1.75;
  opacity:0;letter-spacing:.02em;
}
.pro-line.in{animation:fadeUp 1.8s var(--ease) forwards}
.pro-line.out{animation:fadeDown 1.4s ease forwards}
.pro-line em{font-style:italic;color:var(--c-bright)}
.pro-line .void{color:#3a4a5e;font-style:italic}
.pro-line .ache{color:#c4a855;font-style:italic}

/* KOMMENTAR TITLE — the final thing */
#pro-title{
  position:absolute;font-family:'Cinzel',serif;
  font-size:clamp(2.8rem,10vw,7rem);font-weight:700;
  letter-spacing:.35em;color:#fff;
  text-shadow:0 0 40px rgba(255,255,255,.3),0 0 80px rgba(196,168,85,.2);
  opacity:0;transform:scale(1.12) translateY(6px);
  transition:transform 5s cubic-bezier(.1,.8,.2,1),opacity .5s ease;
  pointer-events:none;
}
#pro-title.slam{opacity:1;transform:scale(1) translateY(0)}
#pro-title.fade{opacity:0;transition:opacity 1.2s ease}

#pro-sub{
  position:absolute;bottom:calc(18px + var(--sb));
  font-family:'VT323',monospace;font-size:clamp(.8rem,1.8vw,1rem);
  color:var(--c-dim);letter-spacing:4px;animation:pulse 2.8s infinite;
  opacity:0;transition:opacity 1.2s ease;
}
#pro-sub.show{opacity:1}

/* BOOT */
#boot{
  position:fixed;inset:0;z-index:9998;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .8s ease;
}
#boot.vis{opacity:1;pointer-events:auto}
#boot.gone{opacity:0;pointer-events:none}
.boot-lines{
  font-family:'VT323',monospace;font-size:clamp(11px,1.8vw,14px);
  color:var(--c-dim);line-height:2;width:min(88%,480px);
}
.boot-lines span{display:block;opacity:0;animation:fadeUp .3s forwards}
.boot-lines .ok{color:var(--c)}
.boot-lines .warn{color:var(--gold)}
.boot-lines .err{color:var(--red)}
.boot-cur{display:inline-block;width:6px;height:1em;background:var(--c);vertical-align:text-bottom;animation:blink .65s step-end infinite}

/* STATION */
#station{
  display:none;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(95vw,1160px);height:min(90vh,780px);
  grid-template-columns:1fr minmax(180px,280px);gap:clamp(10px,2vw,20px);
  padding:clamp(4px,1vw,8px);opacity:0;
}
#station.on{display:grid;animation:stationReveal 1.8s var(--ease) forwards}

/* TV */
.tv{
  background:linear-gradient(145deg,#111118,#080810);
  border-radius:clamp(12px,2.5vw,20px);border:1.5px solid #1a1a24;
  box-shadow:inset 0 0 80px rgba(0,0,0,.9),0 20px 55px rgba(0,0,0,.85);
  display:flex;flex-direction:column;padding:clamp(10px,2vw,18px);position:relative;z-index:2;
}
.bezel{
  flex:1;background:#010102;border-radius:clamp(8px,1.8vw,13px);
  position:relative;overflow:hidden;
  border:2px solid #0a0a12;
  box-shadow:inset 0 0 55px rgba(0,0,0,1);min-height:220px;
  transition:border-color .6s,box-shadow .6s;
}
.bezel.lit{border-color:rgba(138,155,174,.12);box-shadow:inset 0 0 55px rgba(0,0,0,1),0 0 20px rgba(138,155,174,.04)}
.bezel.shake{animation:shake .4s ease-out}

#crt{position:absolute;inset:0;width:100%;height:100%;z-index:5;image-rendering:pixelated}
#scenes{position:absolute;inset:0;width:100%;height:100%;z-index:6;mix-blend-mode:screen;opacity:0;transition:opacity 2s ease}
#scenes.on{opacity:1}
#fxcvs{position:absolute;inset:0;width:100%;height:100%;z-index:8;opacity:0;pointer-events:none;transition:opacity .5s}
#fxcvs.on{opacity:1}

.warmup-layer{position:absolute;inset:0;z-index:18;background:radial-gradient(circle,#080810 0%,#020205 70%);pointer-events:none;transition:opacity 4s ease}
.warmup-layer.off{opacity:0}
.scanlines{position:absolute;inset:0;z-index:29;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);opacity:.55}
.vignette{position:absolute;inset:0;z-index:30;pointer-events:none;background:radial-gradient(ellipse 88% 88% at center,transparent 35%,rgba(0,0,0,.92) 100%)}
.glass{position:absolute;inset:0;z-index:31;pointer-events:none;background:linear-gradient(128deg,rgba(255,255,255,.025) 0%,transparent 38%,transparent 62%,rgba(255,255,255,.01) 100%)}
.scan-bar{position:absolute;left:0;width:100%;height:4px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.025),transparent);z-index:32;pointer-events:none;animation:scanBar 7s linear infinite;opacity:.3}
.track-bar{position:absolute;left:0;width:100%;height:3px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.06),transparent);opacity:0;z-index:33;pointer-events:none}
.track-bar.on{opacity:1;animation:trackDrift 3.5s linear infinite}

.osd{position:absolute;font-family:'VT323',monospace;font-size:clamp(.9rem,2vw,1.15rem);color:var(--c-ghost);z-index:35;text-shadow:0 0 5px var(--c-ghost);opacity:.6;letter-spacing:1px}
#osd-ch{top:14px;left:18px}
#osd-rec{top:14px;right:18px;color:var(--red);opacity:0}
#osd-rec.on{opacity:1;animation:blink 1.1s infinite}
#osd-timer{bottom:16px;right:18px;opacity:0}
#osd-timer.on{opacity:.6}
#osd-quote{bottom:20px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:clamp(.6rem,1.4vw,.78rem);font-style:italic;color:var(--c-dim);opacity:0;transition:opacity 2.2s;white-space:nowrap;z-index:35;letter-spacing:1px}
#osd-quote.show{opacity:.4}

#screen{position:absolute;inset:0;z-index:25;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(12px,3vw,28px);transition:opacity .7s ease}
#screen.out{opacity:0}

.screen-msg{font-family:'VT323',monospace;font-size:clamp(1rem,3vw,1.5rem);color:var(--c-dim);letter-spacing:3px;text-align:center;animation:fadeUp 1s ease}
.intro-view{display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2.5vw,18px);animation:fadeUp 1.4s var(--ease)}
.intro-glow{width:clamp(70px,18vw,120px);height:clamp(70px,18vw,120px);border-radius:50%;background:radial-gradient(circle,rgba(138,155,174,.1) 0%,transparent 70%);animation:breathe 6s infinite;display:flex;align-items:center;justify-content:center}
.intro-line{font-family:'Cormorant Garamond',serif;font-size:clamp(.82rem,2.4vw,1.2rem);color:var(--c-bright);text-align:center;font-style:italic;opacity:0;transform:translateY(8px);transition:opacity 1.2s ease,transform 1.2s var(--ease);line-height:1.6}
.intro-line.show{opacity:1;transform:translateY(0)}
.intro-line .gold{color:var(--gold)}
.intro-sub{font-family:'VT323',monospace;font-size:clamp(.5rem,1.4vw,.7rem);color:var(--c-dim);letter-spacing:4px;text-transform:uppercase;opacity:0;animation:fadeUp 1.5s 1.6s forwards}
.load-bar-wrap{width:clamp(120px,32vw,180px);height:3px;border-radius:3px;border:1px solid rgba(138,155,174,.12);background:rgba(138,155,174,.03);overflow:hidden}
.load-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--c-dim),var(--c));transition:width .06s linear}

.archive-view{display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2.5vw,18px);animation:fadeUp 2s var(--ease);padding:0 10px}
.archive-text{font-family:'Cormorant Garamond',serif;font-size:clamp(.82rem,2.3vw,1.15rem);color:var(--c-ghost);text-align:center;line-height:1.7;font-style:italic}
.progress-dots{display:flex;gap:clamp(6px,1.4vw,10px)}
.pdot{width:clamp(5px,1.1vw,7px);height:clamp(5px,1.1vw,7px);border-radius:50%;border:1px solid rgba(138,155,174,.2);transition:all .8s ease}
.pdot.filled{background:var(--c);border-color:var(--c);box-shadow:0 0 6px rgba(138,155,174,.3)}
.archive-hint{font-family:'Cormorant Garamond',serif;font-size:clamp(.7rem,1.8vw,.95rem);color:var(--c-dim);font-style:italic;opacity:0;animation:fadeUp 1.5s 1s forwards}

.tape-view{width:100%;height:100%;overflow-y:auto;font-family:'Cormorant Garamond',serif;font-size:clamp(.85rem,2.4vw,1.15rem);color:var(--c-bright);line-height:1.75;text-shadow:0 0 4px rgba(200,228,255,.2);scrollbar-width:thin;scrollbar-color:rgba(138,155,174,.15) transparent;padding-right:4px}
.tape-view::-webkit-scrollbar{width:3px}.tape-view::-webkit-scrollbar-thumb{background:rgba(138,155,174,.15);border-radius:2px}

.final-view{text-align:center;padding:20px;display:flex;flex-direction:column;gap:20px}
.final-view h1{font-family:'Cinzel',serif;font-size:clamp(2rem,5vw,3.2rem);color:var(--red);text-shadow:0 0 30px rgba(139,34,51,.5)}
.final-view p{font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,2.5vw,1.5rem);color:var(--c-bright);opacity:0;animation:fadeUp 2s forwards;line-height:1.6}
.final-view p.d1{animation-delay:2s}
.final-view p.d2{animation-delay:7s;color:var(--c-ghost);font-style:italic}
.final-view p.d3{animation-delay:12s;font-family:'VT323',monospace;font-size:1.8rem;letter-spacing:4px;color:#fff;text-shadow:0 0 10px #fff}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:8px;padding:clamp(6px,1.5vw,12px) 0 0;flex-wrap:wrap}
.slot{
  flex:1;min-width:130px;height:clamp(30px,5vw,36px);
  background:#020205;border:1.5px solid #16161e;border-radius:4px;
  box-shadow:inset 0 4px 14px rgba(0,0,0,.9);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .3s,box-shadow .3s;cursor:pointer;
}
.slot.hover{border-color:var(--c-dim);box-shadow:inset 0 4px 14px rgba(0,0,0,.9),0 0 12px rgba(138,155,174,.12)}
.slot-txt{font-family:'VT323',monospace;font-size:clamp(.7rem,1.5vw,.85rem);letter-spacing:2px;color:#282830;transition:color .3s}
.slot.hover .slot-txt{color:var(--c-bright);animation:pulse 1.5s infinite}
.cbtn{
  background:linear-gradient(to bottom,#181820,#0e0e16);border:1px solid #202028;
  color:#555;font-family:'VT323',monospace;font-size:clamp(.7rem,1.4vw,.85rem);letter-spacing:1px;
  padding:0 clamp(10px,2vw,16px);height:clamp(30px,5vw,36px);border-radius:3px;cursor:none;
  transition:all .2s;min-height:44px;min-width:50px;
}
.cbtn:hover{color:#aaa;border-color:#3a3a48}
.cbtn:active{transform:translateY(1px)}

/* RACK */
.rack{
  background:linear-gradient(180deg,#0a0a0f,#050508);
  border:1.5px solid #141420;border-radius:clamp(6px,1.5vw,12px);
  padding:clamp(8px,2vw,14px);display:flex;flex-direction:column;gap:clamp(8px,1.5vw,12px);
  overflow-y:auto;box-shadow:inset 0 0 30px rgba(0,0,0,.75);
  scrollbar-width:thin;scrollbar-color:#161620 #050508;
}
.rack-hdr{font-family:'VT323',monospace;font-size:clamp(.7rem,1.3vw,.85rem);letter-spacing:4px;color:#282830;text-align:center;border-bottom:1px solid #101018;padding-bottom:8px}
.pdots-rack{display:flex;justify-content:center;gap:7px;margin-bottom:4px}

/* TAPES */
.tape{
  background:linear-gradient(to bottom,#141420,#0a0a10);
  border:1px solid #242432;border-radius:4px;
  height:clamp(70px,14vw,86px);padding:10px;position:relative;
  box-shadow:0 5px 16px rgba(0,0,0,.6);
  transition:transform .35s var(--ease),border-color .3s,opacity .3s;
  cursor:none;flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  animation:tapeSlide .6s var(--ease) backwards;
}
.tape::before{content:'';position:absolute;left:10%;right:10%;top:11px;height:16px;background:#020204;border-radius:2px;border:1px solid #0e0e18}
@media(hover:hover){.tape:hover:not(.locked){transform:translateY(-4px) scale(1.02);border-color:#3a3a4a;z-index:5}}
.tape.done::after{content:'✓';position:absolute;top:11px;right:11px;color:var(--c);font-size:.75rem;text-shadow:0 0 5px var(--c)}
.tape.locked{opacity:.25;pointer-events:none;filter:grayscale(.7) brightness(.6)}
.tape.secret{border-color:var(--red)}
.tape.secret .tape-lbl{background:#0e0e14;color:var(--red)}
.tape.sel{border-color:var(--c-dim);box-shadow:0 0 16px rgba(138,155,174,.12),0 5px 16px rgba(0,0,0,.6)}
.tape.sel .reel{animation:reel 1.2s linear infinite}
.tape-lbl{background:linear-gradient(#d6d2c6,#c6c0b4);color:#141420;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(7.5px,1.7vw,10.5px);padding:2px 8px;margin-top:clamp(18px,4vw,23px);width:84%;text-align:center;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.25);line-height:1.2}
.tape-desc{font-size:clamp(5px,.9vw,7px);color:#3a4a5a;font-style:italic;margin-top:4px}
.tape-dot{position:absolute;top:10px;right:6px;width:4px;height:4px;border-radius:50%}
.tape-win{position:absolute;top:9px;left:11%;width:78%;height:16px;background:#030306;border-radius:2px;border:1px solid #141420;display:flex;align-items:center;justify-content:space-around;padding:0 6px}
.reel{width:11px;height:11px;border:1.5px solid #202028;border-radius:50%;background:#040407;position:relative}
.reel::after{content:'';position:absolute;inset:2px;border:1px solid #141420;border-radius:50%;background:#020204}
.reel-bar{width:14px;height:1px;background:#141420}

/* DRAG GHOST */
.dg{
  position:fixed;pointer-events:none;z-index:99998;width:140px;height:78px;
  background:linear-gradient(to bottom,#141420,#0a0a10);border:1.5px solid var(--c-dim);
  border-radius:4px;box-shadow:0 18px 40px rgba(0,0,0,.9);opacity:.85;
  transform:translate(-50%,-50%) rotate(-3.5deg) scale(1.05);
  display:flex;align-items:center;justify-content:center;
}
.dg .tape-lbl{background:linear-gradient(#d6d2c6,#c6c0b4);color:#141420;padding:3px 10px;font-family:'Cormorant Garamond',serif;font-weight:600;border-radius:2px;font-size:9px}

/* MOBILE */
@media(max-width:760px){
  #station{grid-template-columns:1fr;grid-template-rows:1fr auto;position:relative;top:auto;left:auto;transform:none;width:100vw;height:auto;padding:6px;gap:6px}
  #station.on{animation:none;opacity:1}
  .tv{min-height:clamp(240px,48vh,360px)}
  .rack{flex-direction:row;overflow-x:auto;overflow-y:hidden;min-height:clamp(82px,16vw,100px);max-height:120px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;flex-shrink:0}
  .rack-hdr,.pdots-rack{display:none}
  .tape{min-width:clamp(88px,20vw,115px);scroll-snap-align:start;flex-shrink:0;height:clamp(62px,13vw,78px)}
  .tape-lbl{font-size:8px;padding:2px 5px;margin-top:15px}
}
@media(max-width:480px){
  .tv{padding:8px}.bezel{min-height:190px}
  .controls{justify-content:center}.slot{width:100%;margin-top:4px;order:2}.cbtn{order:1}
  .tape-lbl{font-size:7px;margin-top:12px}
}
@media(max-height:480px) and (orientation:landscape){
  #station{grid-template-columns:1fr minmax(110px,180px);grid-template-rows:1fr;height:96vh;width:98vw;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
  .rack{flex-direction:column;overflow-y:auto;overflow-x:hidden;min-height:auto;max-height:none}
  .rack-hdr,.pdots-rack{display:block}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div id="cur"></div>
<canvas id="vhsbg"></canvas>
<div id="glitch"></div>
<div id="stear"></div>
<div id="chroma"></div>
<canvas id="tcanvas"></canvas>

<!-- PROLOGUE -->
<div id="prologue">
  <svg class="pro-ghost" id="pghost" viewBox="0 0 80 120">
    <defs>
      <radialGradient id="gg" cx="50%" cy="40%">
        <stop offset="0%" stop-color="#9aaab8" stop-opacity=".5"/>
        <stop offset="55%" stop-color="#6a7a8a" stop-opacity=".15"/>
        <stop offset="100%" stop-color="#445566" stop-opacity="0"/>
      </radialGradient>
      <filter id="gblur"><feGaussianBlur stdDeviation="2.5"/></filter>
      <filter id="gblur2"><feGaussianBlur stdDeviation="5"/></filter>
    </defs>

/* ─── AUDIO ENGINE ─── */
const Audio2={
  ctx:null,master:null,hum:null,humG:null,bgm:null,
  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.master=this.ctx.createGain(); this.master.gain.value=0;
    this.master.connect(this.ctx.destination);
    this.bgm=new window.Audio('MEMORY.mp3');
    this.bgm.loop=true; this.bgm.volume=0; this.bgm.preload='auto';
  },
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()},
  fadeVol(to,t=0.5){
    if(!this.master)return;
    const now=this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(now);
    this.master.gain.setValueAtTime(this.master.gain.value,now);
    this.master.gain.linearRampToValueAtTime(to,now+t);
  },

  // Void Drone: fills the 10s silence in MEMORY.mp3
  playVoidDrone(){
    if(!this.ctx)return;
    const t=this.ctx.currentTime;
    const osc=this.ctx.createOscillator(), g=this.ctx.createGain();
    // Deep sub 42Hz
    osc.type='sine'; osc.frequency.setValueAtTime(42,t); osc.frequency.linearRampToValueAtTime(38,t+10);
    // Vibrato LFO for unease
    const lfo=this.ctx.createOscillator(), lfoG=this.ctx.createGain();
    lfo.frequency.value=0.18; lfoG.gain.value=2.5;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    // Envelope: fade in 2s, hold, fade out 2s right as melody hits
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.82,t+2);
    g.gain.linearRampToValueAtTime(0.82,t+8);
    g.gain.linearRampToValueAtTime(0,t+10);
    osc.connect(g); g.connect(this.master);
    osc.start(t); osc.stop(t+10.5);
    lfo.start(t); lfo.stop(t+10.5);
  },

  // Cinematic sub-bass impact for KOMMENTAR slam
  sfxImpact(){
    if(!this.ctx)return;
    const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(90,t); o.frequency.exponentialRampToValueAtTime(18,t+2.2);
    g.gain.setValueAtTime(1,t); g.gain.exponentialRampToValueAtTime(0.005,t+2.2);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+2.3);
    // High crack
    const c=this.ctx.createOscillator(), cg=this.ctx.createGain();
    c.type='square'; c.frequency.value=700;
    cg.gain.setValueAtTime(0.07,t); cg.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    c.connect(cg); cg.connect(this.master); c.start(t); c.stop(t+0.12);
  },

  sfxClunk(){
    if(!this.ctx)return;
    const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(130,t); o.frequency.exponentialRampToValueAtTime(30,t+0.22);
    g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.005,t+0.22);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.25);
  },

  sfxInsert(){
    if(!this.ctx)return;
    const t=this.ctx.currentTime;
    // Motor whir
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(55,t); o.frequency.linearRampToValueAtTime(30,t+0.7);
    g.gain.setValueAtTime(0.08,t); g.gain.linearRampToValueAtTime(0,t+0.8);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.85);
    // Click
    const c=this.ctx.createOscillator(), cg=this.ctx.createGain();
    c.type='sine'; c.frequency.value=800;
    cg.gain.setValueAtTime(0.05,t+0.05); cg.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    c.connect(cg); cg.connect(this.master); c.start(t+0.05); c.stop(t+0.2);
  },

  sfxEject(){
    if(!this.ctx)return;
    this.sfxClunk();
    const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(45,t+0.1); o.frequency.linearRampToValueAtTime(80,t+0.5);
    g.gain.setValueAtTime(0,t+0.1); g.gain.linearRampToValueAtTime(0.06,t+0.2); g.gain.linearRampToValueAtTime(0,t+0.55);
    o.connect(g); g.connect(this.master); o.start(t+0.1); o.stop(t+0.6);
  },

  startHum(){
    if(!this.ctx||this.hum)return;
    this.hum=this.ctx.createOscillator();
    this.humG=this.ctx.createGain();
    this.hum.type='sine'; this.hum.frequency.value=60;
    this.humG.gain.value=0.005;
    this.hum.connect(this.humG); this.humG.connect(this.master);
    this.hum.start();

  playBGM(){

        if(!S.bgmStarted)return;
        const el=(Date.now()-start)/1000;
        if(el<7.4){requestAnimationFrame(fade);return}
        if(this.bgm.volume<0.16){this.bgm.volume=Math.min(this.bgm.volume+0.0013,0.16);requestAnimationFrame(fade)}
      };
      requestAnimationFrame(fade);
    }).catch(()=>{S.bgmStarted=false});
  },

  enable(){
    this.init(); this.resume();
    if(!S.audioOn){
      S.audioOn=true; this.fadeVol(0.4); this.startHum();

    $('audiobtn').textContent=S.audioOn?'♪ AN':'♪ AUS';
    $('audiobtn').style.color=S.audioOn?'#aaa':'#555';
  }
};

/* ─── TRANSITION ENGINE — Film Burn, VHS Static ─── */
const TX={
  cv:null, ctx:null,
  init(){this.cv=$('tcanvas');this.ctx=this.cv.getContext('2d');this.resize();window.addEventListener('resize',()=>this.resize())},
  resize(){this.cv.width=window.innerWidth;this.cv.height=window.innerHeight},

  // FILM BURN: CapCut-style warm amber burn expanding from center then black
  filmBurn(dur=2200){
    return new Promise(res=>{
      this.cv.style.display='block';
      const ctx=this.ctx, w=this.cv.width, h=this.cv.height;
      const maxR=Math.sqrt(w*w+h*h)*0.7;
      const s=performance.now();
      const draw=now=>{
        const p=Math.min((now-s)/dur,1);
        ctx.clearRect(0,0,w,h);
        if(p<0.55){
          // Warm burn radiates out
          const r=p/0.55;
          const gr=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,maxR*r*1.3);
          gr.addColorStop(0,`rgba(255,218,100,${r*0.95})`);
          gr.addColorStop(0.3,`rgba(210,130,50,${r*0.8})`);
          gr.addColorStop(0.65,`rgba(100,45,15,${r*0.6})`);
          gr.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=gr; ctx.fillRect(0,0,w,h);
          // Film grain
          for(let i=0;i<300;i++){
            ctx.fillStyle=`rgba(255,230,120,${Math.random()*0.08*r})`;
            ctx.fillRect(Math.random()*w,Math.random()*h,1,1);
          }
          // Vignette char lines
          if(Math.random()<0.3*r){
            const ly=Math.random()*h;
            ctx.fillStyle=`rgba(255,220,100,${Math.random()*0.06*r})`;
            ctx.fillRect(0,ly,w,1+Math.floor(Math.random()*3));
          }
        } else {
          // Fade to black
          const r=(p-0.55)/0.45;
          const gr=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,maxR*1.3);
          gr.addColorStop(0,`rgba(255,218,100,${Math.max(0,0.95-r*2)})`);
          gr.addColorStop(0.4,`rgba(80,30,10,${Math.max(0,0.5-r)})`);
          gr.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=gr; ctx.fillRect(0,0,w,h);
          ctx.fillStyle=`rgba(0,0,0,${r*r})`; ctx.fillRect(0,0,w,h);
        }
        if(p<1)requestAnimationFrame(draw);
        else{ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);res()}
      };
      requestAnimationFrame(draw);
    });
  },

  // FADE FROM BLACK
  fadeFromBlack(dur=1400){
    return new Promise(res=>{
      const ctx=this.ctx, w=this.cv.width, h=this.cv.height;
      ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h);
      const s=performance.now();
      const draw=now=>{
        const p=Math.min((now-s)/dur,1);
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle=`rgba(0,0,0,${1-p})`; ctx.fillRect(0,0,w,h);
        if(p<1)requestAnimationFrame(draw);
        else{this.cv.style.display='none';res()}
      };
      requestAnimationFrame(draw);
    });
  },

  // VHS STATIC BURST for tape insert/eject
  staticBurst(dur=500){
    this.cv.style.display='block';
    const ctx=this.ctx, w=this.cv.width, h=this.cv.height;
    const s=performance.now();
    // Only on the bezel area
    const bezel=$('bezel'); const br=bezel.getBoundingClientRect();
    const draw=now=>{
      const p=Math.min((now-s)/dur,1);
      ctx.clearRect(0,0,w,h);
      const strength=p<0.3?p/0.3:Math.max(0,1-(p-0.3)/0.7);
      if(strength>0.02){
        // VHS noise
        const id=ctx.createImageData(Math.floor(br.width*0.5),Math.floor(br.height*0.5));
        const bd=id.data;
        for(let i=0;i<bd.length;i+=4){
          const v=Math.random()<0.25?Math.floor(Math.random()*200*strength):0;
          bd[i]=bd[i+1]=bd[i+2]=v; bd[i+3]=Math.floor(v*0.7);
        }
        ctx.save();
        ctx.translate(br.left,br.top);
        const tc=document.createElement('canvas');
        tc.width=id.width; tc.height=id.height;
        tc.getContext('2d').putImageData(id,0,0);
        ctx.drawImage(tc,0,0,br.width,br.height);
        // Horizontal displacement
        for(let y=0;y<br.height;y+=rnd(4,20)|0){
          if(Math.random()<0.25*strength){
            ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.06*strength})`;
            ctx.fillRect(0,y,br.width,1+Math.floor(Math.random()*2));
          }
        }
        // Color fringe
        ctx.fillStyle=`rgba(136,170,204,${0.03*strength})`;
        ctx.fillRect(3,0,br.width,br.height);
        ctx.fillStyle=`rgba(204,136,100,${0.03*strength})`;
        ctx.fillRect(-3,0,br.width,br.height);
        ctx.restore();
      }
      if(p<1)requestAnimationFrame(draw);
      else this.cv.style.display='none';
    };
    requestAnimationFrame(draw);
  }
};

/* ─── GLITCH ENGINE ─── */
const GLITCH={
  trigger(amt){
    const gl=$('glitch'); let v=amt;
    const step=()=>{
      if(v>0.015){
        gl.style.background=`rgba(${rnd(0,255)|0},${rnd(0,255)|0},${rnd(0,255)|0},${v*0.1})`;
        gl.style.transform=`translate(${(Math.random()-.5)*12*v}px,${(Math.random()-.5)*12*v}px)`;
        v*=0.82; requestAnimationFrame(step);
      } else {gl.style.background='transparent';gl.style.transform='none'}
    };
    step();
  },
  tear(){const t=$('stear');t.classList.add('on');setTimeout(()=>t.classList.remove('on'),120)},
  chroma(){const c=$('chroma');c.classList.add('on');setTimeout(()=>c.classList.remove('on'),150)},
  burst(a=1.5){this.trigger(a);if(Math.random()<.5)this.tear();if(Math.random()<.3)this.chroma()}
};

/* ─── CRT NOISE ─── */
const CRT={
  cv:null, ctx:null, w:0, h:0, tex:null,
  init(){
    this.cv=$('crt'); this.ctx=this.cv.getContext('2d',{alpha:false});
    this.resize(); window.addEventListener('resize',()=>this.resize()); this.draw();
  },
  resize(){
    const r=this.cv.parentElement.getBoundingClientRect();
    this.w=this.cv.width=Math.max(r.width*.5|0,1);
    this.h=this.cv.height=Math.max(r.height*.5|0,1);
    const id=this.ctx.createImageData(this.w,this.h);
    const buf=new Uint32Array(id.data.buffer);
    for(let i=0;i<buf.length;i++)buf[i]=Math.random()<0.055?0xff242432:0xff060609;
    this.tex=id;
  },
  draw(){
    if(this.w&&this.h&&this.tex){
      this.ctx.putImageData(this.tex,0,0);
      if(Math.random()<0.055){
        const y=Math.random()*this.h|0;
        this.ctx.fillStyle='rgba(255,255,255,0.04)';
        this.ctx.fillRect(0,y,this.w,1+Math.random()*5|0);
      }
    }
    requestAnimationFrame(()=>this.draw());
  }
};

/* ─── VHS BACKGROUND ─── */
const VHS={
  cv:null, ctx:null, w:0, h:0, dust:[], neb:[],
  init(){
    this.cv=$('vhsbg'); this.ctx=this.cv.getContext('2d');
    this.resize(); window.addEventListener('resize',()=>this.resize());
    const n=isMobile()?40:65;
    for(let i=0;i<n;i++) this.dust.push({x:rnd(0,1),y:rnd(0,1),vx:rnd(-.0003,.0003),vy:rnd(-.0008,-.0002),sz:rnd(1,2.5),op:rnd(.02,.06),ph:rnd(0,TAU),fr:rnd(.2,.5)});
    const cols=['138,155,174','196,175,87','155,172,190'];
    for(let j=0;j<(isMobile()?2:3);j++) this.neb.push({x:rnd(0,1),y:rnd(0,1),vx:rnd(-.06,.06)*.001,vy:rnd(-.06,.06)*.001,r:rnd(90,160),ph:rnd(0,TAU),col:cols[j%3]});
    this.draw();
  },
  resize(){this.w=this.cv.width=window.innerWidth;this.h=this.cv.height=window.innerHeight},
  draw(){
    const t=performance.now()*.001;
    const ctx=this.ctx, w=this.w, h=this.h;
    if(!w||!h){requestAnimationFrame(()=>this.draw());return}
    ctx.fillStyle='rgba(2,2,5,.12)'; ctx.fillRect(0,0,w,h);
    for(const n of this.neb){
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<-.1)n.x=1.1; if(n.x>1.1)n.x=-.1;
      if(n.y<-.1)n.y=1.1; if(n.y>1.1)n.y=-.1;
      const pulse=0.0035+0.003*Math.sin(t*.3+n.ph);
      const g=ctx.createRadialGradient(n.x*w,n.y*h,0,n.x*w,n.y*h,n.r);
      g.addColorStop(0,`rgba(${n.col},${pulse})`); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(n.x*w-n.r,n.y*h-n.r,n.r*2,n.r*2);
    }
    for(const p of this.dust){
      p.ph+=p.fr*.008; p.x+=p.vx+Math.sin(p.ph*p.fr)*.0001; p.y+=p.vy;
      if(p.y<-.01){p.y=1.01;p.x=Math.random()}
      if(p.x<-.01)p.x=1.01; if(p.x>1.01)p.x=-.01;
      const op=p.op*(.6+.4*Math.sin(t*1.3+p.ph));
      ctx.fillStyle=`rgba(138,155,174,${op})`; ctx.beginPath(); ctx.arc(p.x*w,p.y*h,p.sz,0,TAU); ctx.fill();
    }
    if(Math.random()<.02){
      ctx.fillStyle=`rgba(138,155,174,${.006+Math.random()*.008})`;
      ctx.fillRect(0,Math.random()*h,w,1+Math.random()*2.5);
    }
    requestAnimationFrame(()=>this.draw());
  }
};

    this.cv=$('scenes'); this.ctx=this.cv.getContext('2d');
    this.resize(); window.addEventListener('resize',()=>this.resize());
    for(let i=0;i<18;i++) this.dust.push({x:rnd(0,1),y:rnd(0,1),vx:rnd(-.0002,.0002),vy:rnd(-.0007,-.0001),sz:rnd(.4,1.8),op:rnd(.03,.1),ph:rnd(0,TAU)});
  },
  resize(){if(!this.cv)return;const r=this.cv.parentElement.getBoundingClientRect();this.w=this.cv.width=Math.max(r.width|0,1);this.h=this.cv.height=Math.max(r.height|0,1)},
  start(){
    if(this.active)return;
    this.active=true; this.cv.classList.add('on'); this.st=performance.now(); this.updateQ();
    const draw=now=>{if(!this.active)return;this.render(now);this.raf=requestAnimationFrame(draw)};
    this.raf=requestAnimationFrame(draw);
  },
  stop(){this.active=false;cancelAnimationFrame(this.raf);this.cv.classList.remove('on');const q=$('osd-quote');if(q){q.classList.remove('show')}},
  updateQ(){
    const q=$('osd-quote'); if(!q)return;
    q.classList.remove('show');
    setTimeout(()=>{if(this.active){q.textContent=this.QUOTES[this.idx];q.classList.add('show')}},500);
  },
  render(now){
    const el=now-this.st, dur=this.DUR;
    if(el>dur){this.idx=(this.idx+1)%6;this.st=now;this.updateQ();GLITCH.trigger(0.4)}
    let a=1;
    if(el<2000)a=el/2000; else if(el>dur-2000)a=Math.max(0,(dur-el)/2000);
    const c=this.ctx, w=this.w, h=this.h, t=now*.001;
    c.clearRect(0,0,w,h);
    // Dust
    c.fillStyle='rgb(155,172,190)';
    for(const p of this.dust){
      p.ph+=.005; p.x+=p.vx+Math.sin(p.ph)*.00008; p.y+=p.vy;
      if(p.y<-.01){p.y=1.01;p.x=Math.random()}
      if(p.x<-.01)p.x=1.01; if(p.x>1.01)p.x=-.01;
      c.globalAlpha=p.op*a*(.5+.5*Math.sin(t*1.5+p.ph));
      c.beginPath(); c.arc(p.x*w,p.y*h,p.sz,0,TAU); c.fill();
    }
    c.globalAlpha=a*.42;
    switch(this.idx){
      case 0:this.waltz(c,w,h,t);break;
      case 1:this.observer(c,w,h,t);break;
      case 2:this.rain(c,w,h,t);break;
      case 3:this.ballerina(c,w,h,t);break;
      case 4:this.words(c,w,h,t);break;
      case 5:this.absence(c,w,h,t);break;
    }
    c.globalAlpha=1;
  },

  ghost(c,x,y,sc,sway,op=.18){
    c.save(); c.translate(x,y); c.scale(sc,sc);
    c.beginPath();
    c.moveTo(0,-30);
    c.bezierCurveTo(-14+sway,-22,-18+sway*1.2,0,-13+sway*1.4,27);
    c.lineTo(13-sway*1.4,27);
    c.bezierCurveTo(18-sway*1.2,0,14-sway,-22,0,-30);
    c.closePath();
    c.fillStyle=`rgba(138,155,174,${op})`; c.fill();
    c.beginPath(); c.ellipse(0,-36,7,9,0,0,TAU);
    c.fillStyle=`rgba(155,172,190,${op*1.1})`; c.fill();
    c.fillStyle=`rgba(20,20,30,${op*2.2})`;
    c.beginPath(); c.arc(-2.8,-37,1.1,0,TAU); c.fill();
    c.beginPath(); c.arc(2.8,-37,1.1,0,TAU); c.fill();
    c.restore();
  },

  waltz(c,w,h,t){
    const cx=w*.5, cy=h*.48, r=w*.11;
    const a1=t*.38, a2=a1+Math.PI;
    const x1=cx+Math.cos(a1)*r, y1=cy+Math.sin(a1)*r*.4;
    const x2=cx+Math.cos(a2)*r, y2=cy+Math.sin(a2)*r*.4;
    const gr=c.createRadialGradient(cx,cy,0,cx,cy,r*1.5);
    gr.addColorStop(0,'rgba(138,155,174,.04)'); gr.addColorStop(1,'transparent');
    c.fillStyle=gr; c.fillRect(0,0,w,h);
    // Trail
    c.strokeStyle='rgba(138,155,174,.04)'; c.lineWidth=1;
    c.beginPath();
    for(let i=0;i<24;i++){const tt=t*.38-i*.05;c.lineTo(cx+Math.cos(tt)*r,cy+Math.sin(tt)*r*.4)}
    c.stroke();
    if(Math.sin(t*4.5)>-.45)this.ghost(c,x1,y1,.85,Math.sin(t*2.1)*2,.2);
    this.ghost(c,x2,y2,.85,Math.sin(t*2.1+1.2)*2,.18);
    // Arms reaching
    if(Math.sin(t*.45)>.72){
      c.strokeStyle='rgba(138,155,174,.05)'; c.lineWidth=1;
      c.beginPath(); c.moveTo(x1,y1-18); c.quadraticCurveTo(cx,cy-28,x2,y2-18); c.stroke();
    }
    // Floor
    c.fillStyle='rgba(138,155,174,.015)';
    c.beginPath(); c.ellipse(cx,cy+h*.28,r*1.6,6,0,0,TAU); c.fill();
  },

  observer(c,w,h,t){
    const cx=w*.5, cy=h*.52;
    const gr=c.createRadialGradient(cx,h*.08,0,cx,h*.08,w*.38);
    gr.addColorStop(0,'rgba(170,187,204,.03)'); gr.addColorStop(1,'transparent');
    c.fillStyle=gr; c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(255,255,255,.04)'; c.lineWidth=2;
    c.strokeRect(cx-50,cy-62,100,120);
    c.beginPath(); c.moveTo(cx,cy-62); c.lineTo(cx,cy+58); c.moveTo(cx-50,cy-1); c.lineTo(cx+50,cy-1); c.stroke();
    this.ghost(c,cx,cy+22,1.12,Math.sin(t*.55)*1.5,.2);
    for(let i=0;i<3;i++){
      const fy=h*(.74+i*.08), fx=cx+Math.sin(t*.2+i*2)*w*.14;
      c.fillStyle='rgba(138,155,174,.018)';
      c.beginPath(); c.ellipse(fx,fy,w*.28,11,0,0,TAU); c.fill();
    }
    if(Math.sin(t*.65)>.97){
      c.fillStyle='rgba(138,155,174,.1)';
      c.beginPath(); c.arc(cx-3,cy-15,1.5,0,TAU); c.fill();
      c.beginPath(); c.arc(cx+3,cy-15,1.5,0,TAU); c.fill();
    }
  },

  rain(c,w,h,t){
    const cx=w*.5, cy=h*.52;
    c.strokeStyle='rgba(138,155,174,.09)'; c.lineWidth=1;
    for(let i=0;i<42;i++){
      const spd=1+(i%3)*.5;
      const rx=(i*37+t*48*spd)%w, ry=(i*71+t*115*spd)%h;
      c.beginPath(); c.moveTo(rx,ry); c.lineTo(rx-1.2,ry+12+(i%4)*3); c.stroke();
    }
    for(let j=0;j<5;j++){
      const pr=(t*18+j*28)%55, px=w*(.12+j*.18);
      const op=Math.max(0,1-pr/55)*.07;
      c.strokeStyle=`rgba(138,155,174,${op})`; c.lineWidth=.7;
      c.beginPath(); c.ellipse(px,h*.84,pr*1.8,pr*.28,0,0,TAU); c.stroke();
    }
    const pa=c.globalAlpha;
    c.globalAlpha*=.38;
    this.ghost(c,cx,cy,.9,Math.sin(t*.3)*1.1,.14);
    c.globalAlpha=pa;
  },

  ballerina(c,w,h,t){
    const cx=w*.5, cy=h*.48, rot=Math.sin(t*.32)*.22;
    const gr=c.createRadialGradient(cx,h*.12,0,cx,h*.12,w*.28);
    gr.addColorStop(0,'rgba(196,175,87,.022)'); gr.addColorStop(1,'transparent');
    c.fillStyle=gr; c.fillRect(0,0,w,h);
    c.save(); c.translate(cx,cy); c.rotate(rot);
    c.fillStyle='rgba(155,172,190,.15)';
    c.beginPath(); c.moveTo(0,-23); c.bezierCurveTo(-8,-15,-7,4,-3,14); c.lineTo(3,14); c.bezierCurveTo(7,4,8,-15,0,-23); c.fill();
    c.beginPath(); c.ellipse(0,-28,5.5,7,0,0,TAU); c.fillStyle='rgba(170,188,204,.18)'; c.fill();
    const armA=Math.sin(t*.8)*.6;
    c.strokeStyle='rgba(155,172,190,.1)'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(-3,-14); c.quadraticCurveTo(-18+armA*5,-22,-26+armA*8,-16); c.stroke();
    c.beginPath(); c.moveTo(3,-14); c.quadraticCurveTo(18-armA*5,-22,26-armA*8,-16); c.stroke();
    c.fillStyle='rgba(155,172,190,.06)';
    c.beginPath(); c.ellipse(0,14,18,5,0,0,TAU); c.fill();
    c.restore();
    for(let i=0;i<12;i++){
      const px=cx+Math.sin(t*1.8+i*.9)*28, py=cy-(t*40+i*14)%88+18;
      const pop=Math.max(0,1-((t*40+i*14)%88)/88)*.24;
      c.fillStyle=`rgba(170,188,204,${pop})`;
      c.beginPath(); c.arc(px,py,1.3,0,TAU); c.fill();
    }
    c.fillStyle='rgba(0,0,0,.05)';
    c.beginPath(); c.ellipse(cx,cy+46,18,4,0,0,TAU); c.fill();
  },

  words(c,w,h,t){
    const words=['Leere','Stille','War er real?','Ich war hier','Warum?','Vergessen','Sie','Ende','Kommentar'];
    const fs=Math.max(13,Math.min(w*.055,21))|0;
    c.font=`${fs}px "Cormorant Garamond", serif`;
    c.textAlign='center'; c.textBaseline='middle';
    for(let i=0;i<words.length;i++){
      const ph=t*.12+i*1.4;
      const wx=w*.5+Math.sin(ph*.7+i)*w*.32, wy=h*.5+Math.cos(ph*.5+i*1.9)*h*.34;
      const op=.03+.065*Math.abs(Math.sin(ph*1.5+i));
      const rot2=Math.sin(ph*.25+i)*.1;
      c.save(); c.translate(wx,wy); c.rotate(rot2); c.globalAlpha=op;
      c.fillStyle=i===8?'rgba(196,168,85,.8)':'rgba(138,155,174,.8)';
      c.fillText(words[i],0,0); c.restore();
    }
    c.globalAlpha=1;
  },

  absence(c,w,h,t){
    const cx=w*.5, cy=h*.5;
    c.strokeStyle='rgba(138,155,174,.09)'; c.lineWidth=1.8;
    c.beginPath();
    c.moveTo(cx-22,cy+14); c.lineTo(cx-24,cy+50);
    c.moveTo(cx+22,cy+14); c.lineTo(cx+24,cy+50);
    c.moveTo(cx-22,cy+14); c.lineTo(cx+22,cy+14);
    c.moveTo(cx-22,cy+5); c.lineTo(cx-22,cy+14);
    c.moveTo(cx+22,cy+5); c.lineTo(cx+22,cy+14);
    c.moveTo(cx-22,cy-30); c.lineTo(cx-22,cy+5);
    c.moveTo(cx+22,cy-30); c.lineTo(cx+22,cy+5);
    c.moveTo(cx-22,cy-30); c.lineTo(cx+22,cy-30);
    c.stroke();
    const cyc=(t*.15)%1, yOff=-cyc*60, gOp=Math.max(0,1-cyc)*.5;
    if(gOp>.01){const pa=c.globalAlpha;c.globalAlpha*=gOp;this.ghost(c,cx,cy+yOff,.85,0,.16);c.globalAlpha=pa}
    const tOp=Math.max(0,Math.sin(t*.4)*.5+.2)*.18;
    c.globalAlpha=tOp;
    c.fillStyle='rgb(138,155,174)';
    c.font=`italic ${Math.max(12,w*.044|0)}px "Cormorant Garamond", serif`;
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('Er war hier.',cx,cy+h*.35);
    c.globalAlpha=1;
  }
};

/* ─── FX CANVAS (tape insert particles) ─── */
const FX={
  cv:null,ctx:null,w:0,h:0,active:false,raf:0,
  init(){this.cv=$('fxcvs');this.ctx=this.cv.getContext('2d',{alpha:true});this.resize();window.addEventListener('resize',()=>this.resize())},
  resize(){const r=$('bezel').getBoundingClientRect();this.w=this.cv.width=r.width|0;this.h=this.cv.height=r.height|0},
  start(col){
    this.stop(); this.active=true; this.cv.classList.add('on'); this.resize();
    const ctx=this.ctx, w=this.w, h=this.h;
    const pts=[];
    for(let i=0;i<20;i++) pts.push({x:rnd(0,w),y:rnd(0,h),vx:rnd(-.8,.8),vy:rnd(-2,-.4),sz:rnd(1.2,3.2),a:rnd(.12,.4),rot:rnd(0,TAU),rv:rnd(-.04,.04)});
    const t0=performance.now(), self=this;
    const draw=now=>{
      if(!self.active)return;
      const p=Math.min((now-t0)/3800,1);
      ctx.clearRect(0,0,w,h);
      const fade=p>.8?(1-(p-.8)/.2):Math.min(p/.1,1);
      ctx.fillStyle=col||'#8a9bae';
      for(const pt of pts){
        pt.y+=pt.vy*.35; pt.x+=pt.vx*.1+Math.sin(pt.rot)*.3; pt.rot+=pt.rv;
        if(pt.y<-10){pt.y=h+10;pt.x=rnd(0,w)}
        ctx.globalAlpha=pt.a*fade*.3; ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.sz,0,TAU); ctx.fill();
      }
      ctx.globalAlpha=1;
      if(p<1)self.raf=requestAnimationFrame(draw); else self.stop();
    };
    self.raf=requestAnimationFrame(draw);
  },
  stop(){this.active=false;cancelAnimationFrame(this.raf);this.cv.classList.remove('on');if(this.ctx&&this.w)this.ctx.clearRect(0,0,this.w,this.h)}
};

/* ─── CUSTOM CURSOR ─── */
const CURSOR={
  el:null, vx:0, vy:0, x:0, y:0, tx:0, ty:0,
  init(){
    this.el=$('cur');
    document.addEventListener('mousemove',e=>{this.tx=e.clientX;this.ty=e.clientY;if(S.dragging)DRAG.move(e.clientX,e.clientY)});
    document.addEventListener('mousedown',()=>this.el.classList.add('big'));
    document.addEventListener('mouseup',()=>{this.el.classList.remove('big');if(S.dragging)DRAG.end()});
    document.addEventListener('mouseleave',()=>this.el.classList.add('hide'));
    document.addEventListener('mouseenter',()=>this.el.classList.remove('hide'));
    this.animate();
  },
  animate(){
    this.x+=(this.tx-this.x)*.18; this.y+=(this.ty-this.y)*.18;
    this.el.style.left=this.x+'px'; this.el.style.top=this.y+'px';
    requestAnimationFrame(()=>this.animate());
  }
};

/* ─── DRAG ENGINE ─── */
const DRAG={
  startEl:null, startTape:null, ghostEl:null,
  start(e,tapeEl,tape){
    if(S.playing)return;
    S.dragging=tape.id; this.startEl=tapeEl; this.startTape=tape;
    Audio2.sfxClunk();
    const g=document.createElement('div'); g.className='dg';
    g.innerHTML=`<div class="tape-lbl">${tape.title}</div>`;
    document.body.appendChild(g); this.ghostEl=g;
    this.move(e.clientX||e.touches[0].clientX,e.clientY||e.touches[0].clientY);
  },
  move(x,y){
    if(!this.ghostEl)return;
    this.ghostEl.style.left=x+'px'; this.ghostEl.style.top=y+'px';
    const sr=$('slot').getBoundingClientRect(), gr=this.ghostEl.getBoundingClientRect();
    const over=!(gr.right<sr.left||gr.left>sr.right||gr.bottom<sr.top||gr.top>sr.bottom);
    $('slot').classList.toggle('hover',over);
  },
  end(){
    if(!S.dragging)return;
    const over=$('slot').classList.contains('hover');
    $('slot').classList.remove('hover');
    if(this.ghostEl){this.ghostEl.remove();this.ghostEl=null}
    if(over)STATION.insert(S.dragging);
    S.dragging=null;
  }
};

/* ─── PROLOGUE CONTROLLER ─── */
const PROLOGUE={
  async start(){
    document.getElementById('prologue').addEventListener('click',()=>{
      if(S.phase==='prologue')this.run();
    },{once:true});
    document.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===' ')&&S.phase==='prologue'){e.preventDefault();this.run()}},{once:true});
    // Show ghost
    await sleep(400);
    $('pghost').classList.add('show');
    await sleep(800);
    $('pro-sub').classList.add('show');
  },

  async run(){
    if(S.phase!=='prologue')return;
    S.phase='running';
    $('pro-sub').classList.remove('show');
    Audio2.enable();
    Audio2.playBGM();
    Audio2.playVoidDrone();

    // Play through lines
    for(let i=0;i<PRO_LINES.length;i++){
      const line=PRO_LINES[i], el=$('pl'+i);
      await sleep(i===0?PRO_LINES[0].delay:PRO_LINES[i].delay-PRO_LINES[i-1].delay-(i===0?0:PRO_LINES[i-1].show));
      el.innerHTML=line.html; el.classList.remove('out'); el.classList.add('in');
      if(i===2)GLITCH.tear();
      if(i===3){GLITCH.trigger(0.6);GLITCH.chroma()}
      await sleep(line.show);
      el.classList.remove('in'); el.classList.add('out');
    }

    await sleep(800);
    // KOMMENTAR SLAMS IN — last thing in prologue
    Audio2.sfxImpact();
    GLITCH.burst(2.5);
    $('pro-title').classList.add('slam');
    // Hold title for 3.2 seconds
    await sleep(3200);
    // FILM BURN TRANSITION
    await TX.filmBurn(2200);
    $('prologue').classList.add('gone');
    await this.boot();
  },

  async boot(){
    S.phase='booting';
    $('boot').classList.add('vis');
    const container=$('boot-lines');
    for(const line of BOOT_LINES){
      await sleep(line.d===0?0:100+Math.random()*80);
      const el=document.createElement('span');
      el.style.animationDelay='0s';
      if(line.t==='')el.innerHTML='&nbsp;';
      else el.innerHTML=line.c?`<span class="${line.c}">${line.t}</span>`:line.t;
      container.appendChild(el);
    }
    const cur=document.createElement('span'); cur.className='boot-cur'; container.appendChild(cur);
    await sleep(1200);
    $('boot').classList.remove('vis'); $('boot').classList.add('gone');
    await sleep(800);
    await STATION.init();
    TX.fadeFromBlack(1400);
  }
};

/* ─── STATION CONTROLLER ─── */
const STATION={
  async init(){
    S.phase='ready';
    CRT.init(); SCENES.init(); FX.init();
    $('station').classList.add('on');
    $('ejectbtn').addEventListener('click',()=>this.eject());
    $('audiobtn').addEventListener('click',()=>Audio2.toggle());
    $('slot').addEventListener('click',()=>{if(S.sel&&!S.playing)this.insert(S.sel)});
    this.buildRack();
    await sleep(700);
    $('warmup').classList.add('off');
    await sleep(300);
    SCENES.start();
    this.showIntro();
  },

  fmtTime(s){const m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+String(sc).padStart(2,'0')},

  showIntro(){
    const screen=$('screen');
    screen.innerHTML=`
      <div class="intro-view">
        <div class="intro-glow">
          <svg viewBox="0 0 60 80" width="80" height="105">
            <defs><radialGradient id="igg" cx="50%" cy="50%"><stop offset="0%" stop-color="#aabbcc" stop-opacity=".38"/><stop offset="100%" stop-color="#667788" stop-opacity=".1"/></radialGradient></defs>
            <ellipse cx="30" cy="42" rx="13" ry="23" fill="url(#igg)"/>
            <ellipse cx="30" cy="30" rx="6" ry="3.5" fill="#aabbcc" opacity=".42"/>
            <circle cx="27" cy="29" r="1" fill="#222"/><circle cx="33" cy="29" r="1" fill="#222"/>
          </svg>
        </div>
        <div class="intro-line" id="il1">„Er kommentierte das Leben, aber lebte es nie."</div>
        <div class="intro-line" id="il2">Bis <span class="gold">sie</span> kam.</div>
        <div class="intro-sub">Ein Spuk in der Realität</div>
        <div class="load-bar-wrap"><div class="load-bar-fill" id="lbf"></div></div>
      </div>`;
    setTimeout(()=>{const l=$('il1');if(l)l.classList.add('show')},350);
    setTimeout(()=>{const l=$('il2');if(l)l.classList.add('show')},1100);
    let prog=0;
    const lt=setInterval(()=>{
      prog+=rnd(1.5,4.5); if(prog>100)prog=100;
      const f=$('lbf'); if(f)f.style.width=prog+'%';
      if(prog>=100){clearInterval(lt);setTimeout(()=>this.showArchive(),800)}
    },55);
  },

  showArchive(){
    const done=S.done.length;
    const standard=TAPES.filter(t=>!t.secret);
    const dots=standard.map(t=>`<div class="pdot${S.done.includes(t.id)?' filled':''}"></div>`).join('');
    const screen=$('screen');
    const fadeOut=()=>{
      screen.classList.add('out');
      setTimeout(()=>{
        screen.innerHTML=`
          <div class="archive-view">
            <div class="archive-text">Wähle ein Band aus dem Regal.<br><span style="color:var(--c-dim)">Jedes enthält eine Geschichte.</span></div>
            <div class="progress-dots">${dots}</div>
            <div class="archive-hint">Ziehe ein Band in den Schlitz — oder tippe es an.</div>
          </div>`;
        screen.classList.remove('out');
        SCENES.start();
      },700);
    };
    fadeOut();
    this.buildRack();
  },

  buildRack(){
    const rackEl=$('rack');
    Array.from(rackEl.querySelectorAll('.tape')).forEach(el=>el.remove());
    const rdots=$('rdots'); rdots.innerHTML='';
    const standard=TAPES.filter(t=>!t.secret);
    standard.forEach(t=>{
      const d=document.createElement('div'); d.className='pdot'+(S.done.includes(t.id)?' filled':'');
      rdots.appendChild(d);
    });
    const allDone=standard.every(t=>S.done.includes(t.id));
    TAPES.forEach((tape,i)=>{
      const locked=tape.secret?!allDone:false;
      const done=S.done.includes(tape.id);
      const el=document.createElement('div');
      el.className='tape'+(locked?' locked':'')+(done?' done':'')+(tape.secret?' secret':'');
      el.dataset.idx=String(i);
      el.innerHTML=`<div class="tape-win"><div class="reel"></div><div class="reel-bar"></div><div class="reel"></div></div><div class="tape-lbl">${tape.title}</div><div class="tape-desc">${tape.desc}</div><div class="tape-dot" style="background:${tape.color}"></div>`;
      if(!locked){
        el.addEventListener('mousedown',e=>{e.preventDefault();DRAG.start(e,el,tape)});
        el.addEventListener('pointerup',e=>{
          if(e.pointerType==='touch'||!S.dragging){
            if(S.playing)return;
            if(S.sel===tape.id){
              S.sel=null; el.classList.remove('sel');
              $('slot').classList.remove('hover');
            } else {
              rackEl.querySelectorAll('.tape.sel').forEach(t=>t.classList.remove('sel'));
              S.sel=tape.id; el.classList.add('sel');
              $('slot').querySelector('.slot-txt').textContent='▶ EINLEGEN';
              $('slot').classList.add('hover');
              if(Audio2.sfxClunk)Audio2.sfxClunk();
            }
          }
        },{passive:true});
      }
      rackEl.appendChild(el);
    });
  },

  async insert(id){
    if(S.playing)return;
    const tape=TAPES.find(t=>t.id===id); if(!tape)return;
    S.playing=id; S.sel=null;
    rack.querySelectorAll('.tape.sel').forEach(t=>t.classList.remove('sel'));
    $('slot').classList.remove('hover');
    SCENES.stop(); FX.start(tape.color);
    Audio2.sfxInsert();
    GLITCH.burst(1.8); TX.staticBurst(480);
    $('bezel').classList.add('lit','shake');
    setTimeout(()=>$('bezel').classList.remove('shake'),450);
    const idx=TAPES.indexOf(tape);
    $('osd-ch').textContent=`AKTE-${idx+1}`;
    $('osd-rec').classList.add('on');
    $('osd-timer').classList.add('on');
    $('trackbar').classList.add('on');
    $('slot').querySelector('.slot-txt').textContent=tape.title;
    S.playStart=Date.now();
    S.timerInt=setInterval(()=>{
      const el=(Date.now()-S.playStart)/1000;
      $('osd-timer').textContent='▶ '+this.fmtTime(el);
    },1000);
    await sleep(1100);
    if(tape.secret){
      const screen=$('screen');
      screen.classList.add('out');
      await sleep(700);
      screen.innerHTML=`<div class="final-view">
        <h1>KOMMENTAR</h1>
        <p class="d1">Wenn jemand dich liebt und dann jeden Beweis seiner Existenz entfernt...</p>
        <p class="d1">Wurdest du dann geliebt?</p>
        <p class="d2">— Ende des Archivs —</p>
        <p class="d3">NICHTS BLEIBT.</p>
      </div>`;
      screen.classList.remove('out');
    } else {
      try{
        const res=await fetch(tape.file);
        if(!res.ok)throw new Error('404');
        const html=await res.text();
        const screen=$('screen');
        screen.classList.add('out');
        await sleep(700);
        screen.innerHTML=`<div class="tape-view">${html}</div>`;
        screen.classList.remove('out');
      } catch(e){
        const screen=$('screen');
        screen.classList.add('out');
        await sleep(700);
        screen.innerHTML=`<div class="archive-view"><div class="archive-text" style="color:var(--c-dim)">ARCHIV-FEHLER</div><div class="archive-hint" style="opacity:1">Verbindung zu ${tape.file} getrennt.<br><em style="color:var(--c-dim)">"Wir waren hier. Aber niemand erinnert sich."</em></div></div>`;
        screen.classList.remove('out');
      }
    }
  },

  eject(){
    if(!S.playing)return;
    Audio2.sfxEject(); GLITCH.burst(1.2); TX.staticBurst(350);
    if(!S.done.includes(S.playing))S.done.push(S.playing);
    S.playing=null;
    if(S.timerInt){clearInterval(S.timerInt);S.timerInt=null}
    $('osd-ch').textContent='AKTE-0';
    $('osd-rec').classList.remove('on');
    $('osd-timer').classList.remove('on');
    $('osd-timer').textContent='▶ 00:00';
    $('trackbar').classList.remove('on');
    $('bezel').classList.remove('lit');
    $('slot').querySelector('.slot-txt').textContent='▶ HIERHER ZIEHEN';
    $('slot').classList.remove('hover');
    setTimeout(()=>this.showArchive(),500);
  }
};

/* ─── TOUCH EVENTS ─── */
document.addEventListener('touchstart',e=>{
  const tapeEl=e.target.closest('.tape');
  if(tapeEl&&!tapeEl.classList.contains('locked')&&!S.playing){
    const idx=parseInt(tapeEl.dataset.idx);
    const tape=TAPES[idx];
    if(tape)DRAG.start(e,tapeEl,tape);
  }
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(S.dragging&&e.touches[0])DRAG.move(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});
document.addEventListener('touchend',()=>{if(S.dragging)DRAG.end()},{passive:true});
document.addEventListener('touchcancel',()=>{
  if(S.dragging){if(DRAG.ghostEl)DRAG.ghostEl.remove();S.dragging=null;$('slot').classList.remove('hover')}
},{passive:true});
// Touch ripple
document.addEventListener('pointerdown',e=>{
  const r=document.createElement('div');
  r.style.cssText=`position:fixed;left:${e.clientX-12}px;top:${e.clientY-12}px;width:24px;height:24px;border-radius:50%;border:1px solid rgba(138,155,174,.3);pointer-events:none;z-index:99990;animation:tRip .55s ease-out forwards`;
  document.body.appendChild(r);
  if(!document.getElementById('trip-kf')){
    const s=document.createElement('style');
    s.id='trip-kf';
    s.textContent='@keyframes tRip{0%{transform:scale(0);opacity:.5}100%{transform:scale(2.5);opacity:0}}';
    document.head.appendChild(s);
  }
  setTimeout(()=>r.remove(),600);
  if(e.pointerType==='touch'&&navigator.vibrate)navigator.vibrate(6);
},{passive:true});

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&S.playing)STATION.eject()});

/* ─── INIT ─── */
(async()=>{
  CURSOR.init(); TX.init(); VHS.init();
  await PROLOGUE.start();
})();
</script>
</body>
</html>
